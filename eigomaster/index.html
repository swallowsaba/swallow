<!DOCTYPE html>
<html lang="ja" data-theme="system">
<head>
  <meta charset="UTF-8" />
  <!-- Google系オンライン音声がRefererで403になるのを防ぐ（音声再生の生命線） -->
  <meta name="referrer" content="no-referrer" />
  <!-- モバイルファースト：等倍表示・iOSのセーフエリア対応 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="日本人がアメリカ英語をビジネスレベルでマスターするための統合学習アプリ。" />
  <!-- テーマカラー（ライト/ダークでブラウザUIの色を切り替え） -->
  <meta name="theme-color" content="#f2f3ef" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#12161a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#0f1722" />
  <meta name="color-scheme" content="dark light" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>EigoMaster｜アメリカ英語 発音スタジオ</title>
  <link rel="stylesheet" href="css/style.css?v=70" />
</head>
<body>
  <!--
    アプリ全体の骨格。
    画面の中身（ビュー）は js/app.js が #view に描画する。
    Phase 1 ではルーティングとデザインシステム、保存機構のみを実装する。
  -->
  <div class="app-shell">

    <!-- 上部ヘッダー：現在地タイトル＋ストリーク表示 -->
    <header class="app-header" role="banner">
      <div class="app-header__brand">
        <span class="app-header__mark" aria-hidden="true">/iː/</span>
        <span class="app-header__title" id="screen-title">ホーム</span>
        <span class="app-header__ver" id="app-version" title="アプリのバージョン">v70</span>
      </div>
      <button
        class="streak-pill"
        id="streak-pill"
        type="button"
        aria-label="連続学習日数"
        data-route="#/home">
        <span class="streak-pill__flame" aria-hidden="true">▲</span>
        <span class="streak-pill__count" id="streak-count">0</span>
        <span class="streak-pill__unit">日</span>
      </button>
    </header>

    <!-- メイン：各画面が描画される領域。aria-live で画面切替を支援技術へ通知 -->
    <main class="app-main" id="view" role="main" aria-live="polite" tabindex="-1">
      <!-- 初期表示は app.js が担当（JS無効時のフォールバックのみ記載） -->
      <noscript>
        <div class="empty-state">
          <p class="empty-state__title">JavaScript を有効にしてください</p>
          <p class="empty-state__body">このアプリは JavaScript で動作します。ブラウザの設定をご確認ください。</p>
        </div>
      </noscript>
    </main>

    <!-- 下部タブナビ -->
    <nav class="tab-bar" id="tab-bar" role="navigation" aria-label="メインナビゲーション">
      <a class="tab" href="#/home" data-route="#/home" data-tab="home" aria-label="ホーム">
        <span class="tab__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 4l9 6.5"/><path d="M5 9.5V20h14V9.5"/><path d="M9.5 20v-5h5v5"/></svg>
        </span>
        <span class="tab__label">ホーム</span>
      </a>
      <a class="tab" href="#/learn" data-route="#/learn" data-tab="learn" aria-label="学ぶ">
        <span class="tab__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5.5A2.5 2.5 0 0 1 5.5 3H11v16H5.5A2.5 2.5 0 0 0 3 21.5z"/><path d="M21 5.5A2.5 2.5 0 0 0 18.5 3H13v16h5.5a2.5 2.5 0 0 1 2.5 2.5z"/></svg>
        </span>
        <span class="tab__label">学ぶ</span>
      </a>
      <a class="tab" href="#/settings" data-route="#/settings" data-tab="settings" aria-label="設定">
        <span class="tab__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13.5a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V20a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H4a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H10a1.7 1.7 0 0 0 1-1.5V4a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V10a1.7 1.7 0 0 0 1.5 1H20a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
        </span>
        <span class="tab__label">設定</span>
      </a>
    </nav>

  </div>

  <!-- トースト通知（保存完了などの一時メッセージ） -->
  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <!--
    スクリプト読み込み順（重要）：
    1) storage.js（保存基盤）
    2) data/*.js（教材データ。fetchのCORS回避のため window.EigoData に登録）
    3) app.js（EM名前空間・ルーター。初期化は DOMContentLoaded まで遅延）
    4) 各機能モジュール（読み込み時に EM.registerView でルート登録）
    type="module" にすると file:// で読めない環境があるため、通常スクリプトで読み込む。
  -->
  <script src="js/config.js?v=70"></script>
  <script src="js/storage.js?v=70"></script>

  <script src="data/words.js?v=70"></script>
  <script src="data/grammar.js?v=70"></script>
  <script src="data/phonics.js?v=70"></script>
  <script src="data/linking_rules.js?v=70"></script>
  <script src="data/pron_dict.js?v=70"></script>
  <script src="data/diagnosis.js?v=70"></script>
  <script src="data/reading.js?v=70"></script>
  <script src="data/idioms.js?v=70"></script>
  <script src="data/listening.js?v=70"></script>
  <script src="data/pron_sentences.js?v=70"></script>
  <script src="data/grammar_detail.js?v=70"></script>
  <script src="data/training.js?v=70"></script>
  <script src="data/training2.js?v=70"></script>
  <script src="data/worker_code.js?v=70"></script>

  <script src="js/app.js?v=70"></script>

  <script src="js/srs.js?v=70"></script>
  <script src="js/katakana.js?v=70"></script>
  <script src="js/linking.js?v=70"></script>
  <script src="js/subtitle.js?v=70"></script>
  <script src="js/captions.js?v=70"></script>
  <script src="js/vocab.js?v=70"></script>
  <script src="js/wordbook.js?v=70"></script>
  <script src="js/idioms.js?v=70"></script>
  <script src="js/shadowing.js?v=70"></script>
  <script src="js/lesson.js?v=70"></script>
  <script src="js/skills.js?v=70"></script>
  <script src="js/audioplayer.js?v=70"></script>
  <script src="js/livecaption.js?v=70"></script>
  <script src="js/aicaption.js?v=70"></script>
  <script src="js/pronunciation.js?v=70"></script>
  <script src="js/phonics.js?v=70"></script>
  <script src="js/grammar.js?v=70"></script>
  <script src="js/reading.js?v=70"></script>
  <script src="js/listening.js?v=70"></script>
  <script src="js/diagnosis.js?v=70"></script>
</body>
</html>
