/* ============================================================
   EigoMaster — デザインシステム / グローバルスタイル
   コンセプト：「Phonetic Studio（個人発音スタジオ）」
   - 配色：ティール（集中・信号）× アンバー（達成・ストリーク）
   - 書体：日本語サンセリフ本文 × 等幅（発音記号・数値）の対比
   すべての色・余白・角丸・モーションは CSS 変数（トークン）で一元管理する。
   ============================================================ */

/* ---------- デザイントークン（ライトテーマ＝既定） ---------- */
:root {
  /* 基調色 */
  --c-bg:            #f2f3ef;   /* 背景：温かみのある紙色（クリーム回避の緑みグレー） */
  --c-surface:       #ffffff;   /* カード面 */
  --c-surface-2:     #f8f9f6;   /* 一段沈めた面 */
  --c-ink:           #1a2421;   /* 文字（緑みのある黒＝インク） */
  --c-ink-soft:      #59635e;   /* 補助テキスト */
  --c-ink-faint:     #8b938e;   /* さらに弱い注記 */
  --c-line:          #e2e4dd;   /* 罫線・境界 */
  --c-line-strong:   #cfd2ca;

  /* アクセント：ティール（主役） */
  --c-accent:        #0b7a6e;
  --c-accent-press:  #096457;
  --c-accent-soft:   #d8efe9;   /* ティールの淡い面 */
  --c-on-accent:     #ffffff;

  /* アクセント：アンバー（達成・ストリーク） */
  --c-warm:          #c9821f;
  --c-warm-soft:     #f6ebd4;

  /* 状態色 */
  --c-good:          #2f8f5b;   /* 正解・成功 */
  --c-good-soft:     #dcefe2;
  --c-bad:           #c0473b;   /* 不正解・エラー */
  --c-bad-soft:      #f6e0dd;

  /* 影 */
  --shadow-sm: 0 1px 2px rgba(26, 36, 33, 0.06);
  --shadow-md: 0 6px 20px rgba(26, 36, 33, 0.08);
  --shadow-lg: 0 12px 36px rgba(26, 36, 33, 0.12);

  /* 余白スケール（8pxベース。マジックナンバー禁止のため必ずここを参照） */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 48px;
  --space-8: 64px;

  /* 角丸 */
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-pill: 999px;

  /* タイポ */
  --font-body: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
               "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif;
  --font-mono: "SFMono-Regular", "SF Mono", "JetBrains Mono", "Roboto Mono",
               ui-monospace, Menlo, Consolas, monospace;

  --fs-display: 32px;  /* ヒーロー大見出し */
  --fs-h1:      22px;
  --fs-h2:      18px;
  --fs-body:    15px;
  --fs-small:   13px;
  --fs-tiny:    11px;

  --lh-tight: 1.2;
  --lh-base:  1.6;

  /* レイアウト寸法 */
  --shell-max:    480px;   /* モバイルファースト：内容の最大幅 */
  --header-h:     56px;
  --tabbar-h:     64px;

  /* モーション */
  --dur-fast:  120ms;
  --dur-base:  220ms;
  --ease:      cubic-bezier(0.4, 0.0, 0.2, 1);

  /* セーフエリア（iOSのホームバー等） */
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ---------- ダークテーマ：録音ブース風の沈んだ配色 ---------- */
:root[data-theme="dark"] {
  --c-bg:          #12161a;
  --c-surface:     #1b2127;
  --c-surface-2:   #222a31;
  --c-ink:         #ecefec;
  --c-ink-soft:    #a4afa9;
  --c-ink-faint:   #6f7a74;
  --c-line:        #2b333a;
  --c-line-strong: #3a444c;

  --c-accent:      #2bc4ae;
  --c-accent-press:#23a795;
  --c-accent-soft: #123a37;
  --c-on-accent:   #06201d;

  --c-warm:        #e7b25a;
  --c-warm-soft:   #3a311c;

  --c-good:        #4cc183;
  --c-good-soft:   #163326;
  --c-bad:         #e0746a;
  --c-bad-soft:    #3a221f;

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
  --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.45);
  --shadow-lg: 0 12px 36px rgba(0, 0, 0, 0.55);
}

/* OS設定に追従する「システム」モード：data-theme="system" のときのみ適用 */
@media (prefers-color-scheme: dark) {
  :root[data-theme="system"] {
    --c-bg:          #12161a;
    --c-surface:     #1b2127;
    --c-surface-2:   #222a31;
    --c-ink:         #ecefec;
    --c-ink-soft:    #a4afa9;
    --c-ink-faint:   #6f7a74;
    --c-line:        #2b333a;
    --c-line-strong: #3a444c;
    --c-accent:      #2bc4ae;
    --c-accent-press:#23a795;
    --c-accent-soft: #123a37;
    --c-on-accent:   #06201d;
    --c-warm:        #e7b25a;
    --c-warm-soft:   #3a311c;
    --c-good:        #4cc183;
    --c-good-soft:   #163326;
    --c-bad:         #e0746a;
    --c-bad-soft:    #3a221f;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
    --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.45);
    --shadow-lg: 0 12px 36px rgba(0, 0, 0, 0.55);
  }
}

/* ---------- リセット・基盤 ---------- */
*, *::before, *::after { box-sizing: border-box; }

html, body { margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  font-size: var(--fs-body);
  line-height: var(--lh-base);
  color: var(--c-ink);
  background: var(--c-bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  /* 横スクロール防止 */
  overflow-x: hidden;
}

h1, h2, h3, p { margin: 0; }

a { color: inherit; text-decoration: none; }

button {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  cursor: pointer;
  border: none;
  background: none;
}

/* キーボード操作時のフォーカスリング（WCAG：操作可能要素を明示） */
:focus-visible {
  outline: 2px solid var(--c-accent);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

/* モーション低減の希望を尊重 */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    transition-duration: 0.001ms !important;
  }
}

/* ---------- アプリ骨格レイアウト ---------- */
.app-shell {
  display: grid;
  grid-template-rows: auto 1fr auto;
  min-height: 100vh;
  min-height: 100dvh;       /* モバイルのアドレスバー変動に強い単位 */
  max-width: var(--shell-max);
  margin: 0 auto;
  background: var(--c-bg);
  position: relative;
}

/* ---------- ヘッダー ---------- */
.app-header {
  position: sticky;
  top: 0;
  z-index: 20;
  height: calc(var(--header-h) + var(--safe-top));
  padding: var(--safe-top) var(--space-4) 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: color-mix(in srgb, var(--c-bg) 86%, transparent);
  backdrop-filter: saturate(1.4) blur(12px);
  -webkit-backdrop-filter: saturate(1.4) blur(12px);
  border-bottom: 1px solid var(--c-line);
}

.app-header__brand {
  display: flex;
  align-items: baseline;
  gap: var(--space-2);
  min-width: 0;
}

/* 署名要素：発音記号風のロゴマーク（等幅・ティール） */
.app-header__mark {
  font-family: var(--font-mono);
  font-size: var(--fs-h2);
  font-weight: 600;
  color: var(--c-accent);
  letter-spacing: 0.02em;
}

.app-header__title {
  font-size: var(--fs-h1);
  font-weight: 700;
  letter-spacing: 0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ストリークの丸ピル */
.streak-pill {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-pill);
  background: var(--c-warm-soft);
  color: var(--c-warm);
  font-weight: 700;
  transition: transform var(--dur-fast) var(--ease);
}
.streak-pill:active { transform: scale(0.95); }
.streak-pill__flame { font-size: var(--fs-tiny); }
.streak-pill__count { font-family: var(--font-mono); font-size: var(--fs-h2); line-height: 1; }
.streak-pill__unit  { font-size: var(--fs-tiny); }

/* ---------- メイン領域 ---------- */
.app-main {
  padding: var(--space-5) var(--space-4);
  /* 下部ナビに隠れないよう余白を確保 */
  padding-bottom: calc(var(--tabbar-h) + var(--safe-bottom) + var(--space-6));
}
.app-main:focus { outline: none; }

/* 画面切替のフェードイン */
.view-enter { animation: viewIn var(--dur-base) var(--ease); }
@keyframes viewIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---------- 下部タブナビ ---------- */
.tab-bar {
  position: sticky;
  bottom: 0;
  z-index: 20;
  height: calc(var(--tabbar-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: color-mix(in srgb, var(--c-surface) 90%, transparent);
  backdrop-filter: saturate(1.4) blur(12px);
  -webkit-backdrop-filter: saturate(1.4) blur(12px);
  border-top: 1px solid var(--c-line);
}

.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  color: var(--c-ink-faint);
  transition: color var(--dur-fast) var(--ease);
  position: relative;
}
.tab__icon { font-size: 20px; line-height: 1; }
.tab__label { font-size: var(--fs-tiny); font-weight: 600; }

/* 現在のタブ（app.js が aria-current="page" を付与） */
.tab[aria-current="page"] { color: var(--c-accent); }
.tab[aria-current="page"]::before {
  content: "";
  position: absolute;
  top: 0;
  width: 28px;
  height: 3px;
  border-radius: var(--radius-pill);
  background: var(--c-accent);
}

/* ---------- 汎用カード ---------- */
.card {
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  box-shadow: var(--shadow-sm);
}
.card + .card { margin-top: var(--space-3); }

/* セクション見出し（アイブロウ＋タイトル） */
.section-eyebrow {
  font-family: var(--font-mono);
  font-size: var(--fs-tiny);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--c-ink-faint);
  margin-bottom: var(--space-2);
}
.section-title {
  font-size: var(--fs-h2);
  font-weight: 700;
  margin-bottom: var(--space-3);
}

/* ---------- ボタン ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-md);
  font-weight: 700;
  transition: transform var(--dur-fast) var(--ease),
              background-color var(--dur-fast) var(--ease);
}
.btn:active { transform: scale(0.97); }
.btn--block { width: 100%; }

.btn--primary { background: var(--c-accent); color: var(--c-on-accent); }
.btn--primary:hover { background: var(--c-accent-press); }

.btn--ghost {
  background: transparent;
  color: var(--c-ink);
  border: 1px solid var(--c-line-strong);
}
.btn--ghost:hover { background: var(--c-surface-2); }

.btn--danger {
  background: transparent;
  color: var(--c-bad);
  border: 1px solid color-mix(in srgb, var(--c-bad) 40%, var(--c-line));
}
.btn--danger:hover { background: var(--c-bad-soft); }

/* ---------- 空状態（準備中画面・データ無し） ---------- */
.empty-state {
  text-align: center;
  padding: var(--space-7) var(--space-4);
}
.empty-state__icon {
  font-family: var(--font-mono);
  font-size: 40px;
  color: var(--c-accent);
  opacity: 0.5;
  margin-bottom: var(--space-3);
}
.empty-state__title {
  font-size: var(--fs-h2);
  font-weight: 700;
  margin-bottom: var(--space-2);
}
.empty-state__body {
  color: var(--c-ink-soft);
  font-size: var(--fs-small);
  max-width: 30ch;
  margin: 0 auto var(--space-4);
}
.empty-state__phase {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: var(--fs-tiny);
  letter-spacing: 0.08em;
  color: var(--c-ink-faint);
  background: var(--c-surface-2);
  border: 1px solid var(--c-line);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-pill);
}

/* ============================================================
   ホーム画面 専用
   ============================================================ */
.home-hero {
  background: linear-gradient(135deg,
              var(--c-accent) 0%,
              color-mix(in srgb, var(--c-accent) 78%, #114) 100%);
  color: var(--c-on-accent);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-md);
}
/* 署名要素：背景にうっすら音声波形（装飾だが「音」という主題を表す） */
.home-hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    90deg,
    color-mix(in srgb, var(--c-on-accent) 14%, transparent) 0 2px,
    transparent 2px 10px);
  -webkit-mask-image: linear-gradient(180deg, transparent 55%, #000 100%);
  mask-image: linear-gradient(180deg, transparent 55%, #000 100%);
  opacity: 0.5;
  pointer-events: none;
}
.home-hero__eyebrow {
  font-family: var(--font-mono);
  font-size: var(--fs-tiny);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  opacity: 0.85;
}
.home-hero__greeting {
  font-size: var(--fs-display);
  font-weight: 800;
  line-height: var(--lh-tight);
  margin-top: var(--space-2);
}
.home-hero__sub {
  margin-top: var(--space-2);
  font-size: var(--fs-small);
  opacity: 0.9;
}

/* 本日のゴール：進捗リング＋テキスト */
.goal {
  display: flex;
  align-items: center;
  gap: var(--space-4);
}
.goal__ring {
  --progress: 0;   /* 0〜1。app.js が設定 */
  --ring-size: 84px;
  width: var(--ring-size);
  height: var(--ring-size);
  flex: 0 0 auto;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background:
    radial-gradient(closest-side, var(--c-surface) 70%, transparent 71%),
    conic-gradient(var(--c-accent) calc(var(--progress) * 360deg),
                   var(--c-line) 0deg);
}
.goal__ring-value {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: var(--fs-h2);
  color: var(--c-accent);
}
.goal__text { min-width: 0; }
.goal__label { font-size: var(--fs-small); color: var(--c-ink-soft); }
.goal__value { font-size: var(--fs-h1); font-weight: 700; }
.goal__value small { font-size: var(--fs-small); color: var(--c-ink-soft); font-weight: 500; }

/* クイックスタート：各モジュールへの導線グリッド */
.quick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-3);
}
.quick-card {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  text-align: left;
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  transition: transform var(--dur-fast) var(--ease),
              border-color var(--dur-fast) var(--ease);
}
.quick-card:hover { border-color: var(--c-accent); }
.quick-card:active { transform: scale(0.98); }
.quick-card__icon {
  font-family: var(--font-mono);
  font-size: 22px;
  color: var(--c-accent);
}
.quick-card__title { font-weight: 700; font-size: var(--fs-body); }
.quick-card__desc { font-size: var(--fs-small); color: var(--c-ink-soft); }

/* 横並びの統計（学習語数・セッション数など） */
.stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: var(--space-3); }
.stat { text-align: center; }
.stat__num { font-family: var(--font-mono); font-size: var(--fs-h1); font-weight: 700; }
.stat__label { font-size: var(--fs-tiny); color: var(--c-ink-soft); }

/* ============================================================
   設定画面 専用
   ============================================================ */
.setting-group { margin-bottom: var(--space-5); }
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4);
  padding: var(--space-4);
  border-bottom: 1px solid var(--c-line);
}
.setting-row:last-child { border-bottom: none; }
.setting-row__text { min-width: 0; }
.setting-row__label { font-weight: 600; }
.setting-row__hint { font-size: var(--fs-small); color: var(--c-ink-soft); }

/* セグメント切替（テーマ：システム/ライト/ダーク） */
.segmented {
  display: inline-flex;
  background: var(--c-surface-2);
  border: 1px solid var(--c-line);
  border-radius: var(--radius-pill);
  padding: 2px;
}
.segmented__btn {
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-pill);
  font-size: var(--fs-small);
  font-weight: 600;
  color: var(--c-ink-soft);
  white-space: nowrap;   /* ラベルを1行に保つ */
  transition: background-color var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.segmented__btn[aria-pressed="true"] {
  background: var(--c-accent);
  color: var(--c-on-accent);
}

/* 数値ステッパー（デイリーゴール分） */
.stepper { display: inline-flex; align-items: center; gap: var(--space-3); }
.stepper__btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--c-line-strong);
  font-size: var(--fs-h2);
  font-weight: 700;
  color: var(--c-ink);
  display: grid;
  place-items: center;
}
.stepper__btn:active { background: var(--c-surface-2); }
.stepper__value { font-family: var(--font-mono); font-weight: 700; min-width: 4ch; text-align: center; }

/* データ操作ボタン群 */
.button-stack { display: flex; flex-direction: column; gap: var(--space-3); }

/* 隠しファイル入力（インポート用） */
.visually-hidden {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0 0 0 0);
  white-space: nowrap; border: 0;
}

/* バージョン等のフッター注記 */
.app-footnote {
  text-align: center;
  font-size: var(--fs-tiny);
  color: var(--c-ink-faint);
  margin-top: var(--space-5);
}

/* ---------- トースト ---------- */
.toast {
  position: fixed;
  left: 50%;
  bottom: calc(var(--tabbar-h) + var(--safe-bottom) + var(--space-4));
  transform: translateX(-50%) translateY(12px);
  z-index: 50;
  max-width: calc(var(--shell-max) - var(--space-6));
  background: var(--c-ink);
  color: var(--c-bg);
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-pill);
  font-size: var(--fs-small);
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  transition: opacity var(--dur-base) var(--ease), transform var(--dur-base) var(--ease);
}
.toast[data-show="true"] {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast--error { background: var(--c-bad); color: #fff; }

/* ---------- ユーティリティ ---------- */
.stack-sm > * + * { margin-top: var(--space-3); }
.stack-md > * + * { margin-top: var(--space-5); }
.text-soft { color: var(--c-ink-soft); }
.mono { font-family: var(--font-mono); }

/* ============================================================
   追加コンポーネント（Phase 2〜6で各モジュールが共有）
   ============================================================ */

/* 戻りリンク */
.back-link {
  display: inline-block;
  margin-bottom: var(--space-4);
  color: var(--c-ink-soft);
  font-size: var(--fs-small);
  font-weight: 600;
}
.back-link:hover { color: var(--c-accent); }

/* バッジ */
.badge-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-3);
}
.badge {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-align: center;
  padding: var(--space-3) var(--space-2);
  border-radius: var(--radius-md);
  border: 1px solid var(--c-line);
}
.badge__icon { font-family: var(--font-mono); font-size: 20px; }
.badge__label { font-size: var(--fs-tiny); }
.badge--on { background: var(--c-warm-soft); border-color: transparent; }
.badge--on .badge__icon { color: var(--c-warm); }
.badge--off { opacity: 0.4; }
.badge--off .badge__icon { color: var(--c-ink-faint); }

/* 進捗グラフ */
.graph-wrap { margin-top: var(--space-4); }
#study-graph { width: 100%; display: block; }

/* ツールバー・フィールド */
.field { margin-bottom: var(--space-4); }
.field__label {
  display: block;
  font-size: var(--fs-small);
  font-weight: 600;
  color: var(--c-ink-soft);
  margin-bottom: var(--space-2);
}
.input, .textarea, .select {
  width: 100%;
  font-family: inherit;
  font-size: var(--fs-body);
  color: var(--c-ink);
  background: var(--c-surface);
  border: 1px solid var(--c-line-strong);
  border-radius: var(--radius-md);
  padding: var(--space-3);
}
.textarea { min-height: 110px; resize: vertical; line-height: var(--lh-base); }
.input:focus, .textarea:focus, .select:focus {
  outline: none;
  border-color: var(--c-accent);
  box-shadow: 0 0 0 3px var(--c-accent-soft);
}

/* チップ群（レベル・モード選択） */
.chip-group { display: flex; flex-wrap: wrap; gap: var(--space-2); }
.chip {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-pill);
  border: 1px solid var(--c-line-strong);
  font-size: var(--fs-small);
  font-weight: 600;
  color: var(--c-ink-soft);
  background: var(--c-surface);
  transition: all var(--dur-fast) var(--ease);
}
.chip[aria-pressed="true"] { background: var(--c-accent); color: var(--c-on-accent); border-color: transparent; }

/* サブタブ（pillタブ） */
.pill-tabs { display: flex; gap: var(--space-2); margin-bottom: var(--space-4); overflow-x: auto; }
.pill-tabs__btn {
  white-space: nowrap;
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-pill);
  font-size: var(--fs-small);
  font-weight: 700;
  color: var(--c-ink-soft);
  background: var(--c-surface-2);
  border: 1px solid var(--c-line);
}
.pill-tabs__btn[aria-pressed="true"] { background: var(--c-accent); color: var(--c-on-accent); border-color: transparent; }

/* セッション進捗バー */
.progress-bar { height: 6px; background: var(--c-line); border-radius: var(--radius-pill); overflow: hidden; margin-bottom: var(--space-4); }
.progress-bar__fill { height: 100%; background: var(--c-accent); transition: width var(--dur-base) var(--ease); }

/* フラッシュカード */
.flashcard {
  background: var(--c-surface);
  border: 1px solid var(--c-line);
  border-radius: var(--radius-lg);
  padding: var(--space-6) var(--space-5);
  text-align: center;
  box-shadow: var(--shadow-md);
  min-height: 230px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: var(--space-3);
}
.flashcard__word { font-size: var(--fs-display); font-weight: 800; letter-spacing: 0.01em; }
.flashcard__ipa { font-family: var(--font-mono); font-size: var(--fs-h2); color: var(--c-accent); }
.flashcard__kata { font-size: var(--fs-body); color: var(--c-ink-soft); }
.flashcard__pos { font-size: var(--fs-tiny); color: var(--c-ink-faint); letter-spacing: 0.08em; }
.flashcard__ja { font-size: var(--fs-h1); font-weight: 700; }
.flashcard__ex { font-size: var(--fs-small); color: var(--c-ink-soft); line-height: var(--lh-base); }
.flashcard__ex em { color: var(--c-accent); font-style: normal; font-weight: 700; }

/* 音声再生ボタン（小） */
.audio-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--c-accent-soft);
  color: var(--c-accent);
  font-size: 18px;
  flex: 0 0 auto;
}
.audio-btn:active { transform: scale(0.92); }
.audio-btn--wide { width: auto; padding: 0 var(--space-4); border-radius: var(--radius-pill); font-weight: 700; font-size: var(--fs-small); }

/* 採点ボタン群（again/hard/good/easy） */
.grade-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-2); margin-top: var(--space-4); }
.grade-btn {
  padding: var(--space-3) var(--space-1);
  border-radius: var(--radius-md);
  font-weight: 700;
  font-size: var(--fs-small);
  border: 1px solid var(--c-line-strong);
  background: var(--c-surface);
}
.grade-btn small { display: block; font-size: 10px; font-weight: 500; color: var(--c-ink-faint); }
.grade-btn[data-g="again"] { color: var(--c-bad); border-color: color-mix(in srgb, var(--c-bad) 35%, var(--c-line)); }
.grade-btn[data-g="good"]  { color: var(--c-good); border-color: color-mix(in srgb, var(--c-good) 35%, var(--c-line)); }
.grade-btn[data-g="easy"]  { background: var(--c-accent); color: var(--c-on-accent); border-color: transparent; }

/* 4択ボタン */
.choice-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: var(--space-4);
  border-radius: var(--radius-md);
  border: 1px solid var(--c-line-strong);
  background: var(--c-surface);
  font-size: var(--fs-body);
  font-weight: 600;
  margin-bottom: var(--space-3);
  transition: all var(--dur-fast) var(--ease);
}
.choice-btn:active { transform: scale(0.99); }
.choice-btn--ok  { background: var(--c-good-soft); border-color: var(--c-good); color: var(--c-good); }
.choice-btn--ng  { background: var(--c-bad-soft); border-color: var(--c-bad); color: var(--c-bad); }
.choice-btn[disabled] { cursor: default; }

/* diff単語色分け（発音チェック・並べ替え結果） */
.diff { line-height: 2; font-size: var(--fs-h2); }
.diff .w { padding: 2px 4px; border-radius: 4px; margin: 0 1px; }
.diff .w-ok { background: var(--c-good-soft); color: var(--c-good); }
.diff .w-ng { background: var(--c-bad-soft); color: var(--c-bad); text-decoration: line-through; }

/* スコアメーター */
.meter { text-align: center; margin: var(--space-4) 0; }
.meter__value { font-family: var(--font-mono); font-size: 44px; font-weight: 800; color: var(--c-accent); }
.meter__label { font-size: var(--fs-small); color: var(--c-ink-soft); }

/* 注意書きボックス */
.notice {
  display: flex;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-md);
  font-size: var(--fs-small);
  line-height: var(--lh-base);
  background: var(--c-warm-soft);
  color: var(--c-ink);
  border: 1px solid color-mix(in srgb, var(--c-warm) 30%, transparent);
}
.notice--info { background: var(--c-accent-soft); border-color: transparent; }
.notice__icon { font-weight: 800; color: var(--c-warm); flex: 0 0 auto; }
.notice--info .notice__icon { color: var(--c-accent); }

/* 行リスト（履歴・音素一覧など） */
.list-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) 0;
  border-bottom: 1px solid var(--c-line);
}
.list-row:last-child { border-bottom: none; }
.list-row__main { flex: 1; min-width: 0; }
.list-row__title { font-weight: 700; }
.list-row__sub { font-size: var(--fs-small); color: var(--c-ink-soft); }

/* カラオケ字幕行（シャドーイング・リーディング） */
.lyric { line-height: 1.9; }
.lyric__line {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background-color var(--dur-fast) var(--ease);
}
.lyric__line:hover { background: var(--c-surface-2); }
.lyric__line--active { background: var(--c-accent-soft); }
.lyric__en { font-weight: 600; }
.lyric__en .word { cursor: pointer; border-radius: 3px; }
.lyric__en .word:hover { background: var(--c-warm-soft); }
.lyric__kata { font-size: var(--fs-small); color: var(--c-accent); font-family: var(--font-mono); }
.lyric__ja { font-size: var(--fs-small); color: var(--c-ink-soft); }

/* リンキング可視化 */
.linking-out { font-size: var(--fs-h1); line-height: 2.2; }
.linking-out .lk { position: relative; padding: 0 1px; }
.linking-out .lk--link { color: var(--c-accent); border-bottom: 2px solid var(--c-accent); }
.linking-out .lk--drop { color: var(--c-bad); text-decoration: line-through; opacity: 0.7; }
.linking-out .lk--flap { color: var(--c-warm); border-bottom: 2px dotted var(--c-warm); }
.linking-out .lk--weak { color: var(--c-ink-faint); }
.linking-out .lk--assim { color: var(--c-accent); border-bottom: 2px double var(--c-accent); }
.linking-kata { margin-top: var(--space-3); font-family: var(--font-mono); color: var(--c-ink-soft); line-height: var(--lh-base); }
.legend { display: flex; flex-wrap: wrap; gap: var(--space-3); margin-top: var(--space-4); font-size: var(--fs-tiny); }
.legend span { display: inline-flex; align-items: center; gap: 4px; }
.legend i { width: 14px; height: 3px; border-radius: 2px; display: inline-block; }

/* 小さめのラベル付き値 */
.kv { display: flex; justify-content: space-between; gap: var(--space-3); padding: var(--space-2) 0; }
.kv__k { color: var(--c-ink-soft); font-size: var(--fs-small); }
.kv__v { font-weight: 700; }

/* 並べ替えタイル */
.tiles { display: flex; flex-wrap: wrap; gap: var(--space-2); margin-bottom: var(--space-3); min-height: 44px; }
.tile {
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  background: var(--c-surface);
  border: 1px solid var(--c-line-strong);
  font-weight: 600;
}
.tiles--answer { background: var(--c-surface-2); border: 1px dashed var(--c-line-strong); border-radius: var(--radius-md); padding: var(--space-3); }

/* セクション間隔ヘルパー */
.mt-4 { margin-top: var(--space-4); }
.mt-5 { margin-top: var(--space-5); }
.center { text-align: center; }
.row-between { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); }

/* 動画埋め込み（16:9レスポンシブ） */
.video-frame {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #000;
  border-radius: var(--radius-md);
  overflow: hidden;
}
.video-frame iframe, .video-frame > div {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

/* マイ動画ライブラリのサムネイル */
.vid-thumb {
  width: 72px;
  height: 48px;
  border-radius: var(--radius-sm);
  object-fit: cover;
  flex: 0 0 auto;
  background: var(--c-surface-2);
}
.vid-thumb--none {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--fs-tiny);
  line-height: 1.2;
  color: var(--c-ink-faint);
  text-align: center;
}
.list-row .vid-thumb { margin-right: var(--space-1); }

</style>
</head>
<body>
  <!--
    アプリ全体の骨格。
    画面の中身（ビュー）は js/app.js が #view に描画する。
    Phase 1 ではルーティングとデザインシステム、保存機構のみを実装する。
  -->
  <div class="app-shell">

    <!-- 上部ヘッダー：現在地タイトル＋ストリーク表示 -->
    <header class="app-header" role="banner">
      <div class="app-header__brand">
        <span class="app-header__mark" aria-hidden="true">/iː/</span>
        <span class="app-header__title" id="screen-title">ホーム</span>
      </div>
      <button
        class="streak-pill"
        id="streak-pill"
        type="button"
        aria-label="連続学習日数"
        data-route="#/home">
        <span class="streak-pill__flame" aria-hidden="true">▲</span>
        <span class="streak-pill__count" id="streak-count">0</span>
        <span class="streak-pill__unit">日</span>
      </button>
    </header>

    <!-- メイン：各画面が描画される領域。aria-live で画面切替を支援技術へ通知 -->
    <main class="app-main" id="view" role="main" aria-live="polite" tabindex="-1">
      <!-- 初期表示は app.js が担当（JS無効時のフォールバックのみ記載） -->
      <noscript>
        <div class="empty-state">
          <p class="empty-state__title">JavaScript を有効にしてください</p>
          <p class="empty-state__body">このアプリは JavaScript で動作します。ブラウザの設定をご確認ください。</p>
        </div>
      </noscript>
    </main>

    <!-- 下部タブナビ：ホーム / 単語 / 動画学習 / 発音 / 設定 -->
    <nav class="tab-bar" id="tab-bar" role="navigation" aria-label="メインナビゲーション">
      <a class="tab" href="#/home" data-route="#/home" data-tab="home" aria-label="ホーム">
        <span class="tab__icon" aria-hidden="true">◎</span>
        <span class="tab__label">ホーム</span>
      </a>
      <a class="tab" href="#/vocab" data-route="#/vocab" data-tab="vocab" aria-label="単語">
        <span class="tab__icon" aria-hidden="true">あ</span>
        <span class="tab__label">単語</span>
      </a>
      <a class="tab" href="#/video" data-route="#/video" data-tab="video" aria-label="動画学習">
        <span class="tab__icon" aria-hidden="true">▷</span>
        <span class="tab__label">動画学習</span>
      </a>
      <a class="tab" href="#/pron" data-route="#/pron" data-tab="pron" aria-label="発音">
        <span class="tab__icon" aria-hidden="true">θ</span>
        <span class="tab__label">発音</span>
      </a>
      <a class="tab" href="#/settings" data-route="#/settings" data-tab="settings" aria-label="設定">
        <span class="tab__icon" aria-hidden="true">⚙</span>
        <span class="tab__label">設定</span>
      </a>
    </nav>

  </div>

  <!-- トースト通知（保存完了などの一時メッセージ） -->
  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <!--
    スクリプト読み込み順（重要）：
    1) storage.js（保存基盤）
    2) data/*.js（教材データ。fetchのCORS回避のため window.EigoData に登録）
    3) app.js（EM名前空間・ルーター。初期化は DOMContentLoaded まで遅延）
    4) 各機能モジュール（読み込み時に EM.registerView でルート登録）
    type="module" にすると file:// で読めない環境があるため、通常スクリプトで読み込む。
  -->
  <script>
/* ===== inlined: js/storage.js ===== */
/* ============================================================
   storage.js — 永続化レイヤ（localStorage ラッパー）
   - すべての学習データを 1 つのキーに JSON で保存する。
   - スキーマバージョンを持ち、将来の構造変更にマイグレーションで対応する。
   - エクスポート/インポート（JSONダウンロード・読込）に対応する。
   - 破損耐性：読み込み失敗時は既定状態へ安全に復帰する。
   グローバル変数 `Storage` として公開する（ES Modules を使わず file:// でも動かすため）。
   ============================================================ */
(function () {
  "use strict";

  /* ---------- 定数（マジックナンバー・文字列を集約） ---------- */
  var STORAGE_KEY = "eigomaster.state.v1"; // localStorage 上のキー
  var SCHEMA_VERSION = 1;                  // データ構造のバージョン
  var MS_PER_DAY = 24 * 60 * 60 * 1000;    // 1日のミリ秒
  var DAILY_GOAL_DEFAULT = 15;             // デイリーゴールの初期値（分）

  /* ---------- 既定状態（初回起動・破損時のフォールバック） ---------- */
  function createDefaultState() {
    return {
      version: SCHEMA_VERSION,
      profile: {
        theme: "system",                 // "system" | "light" | "dark"
        dailyGoalMinutes: DAILY_GOAL_DEFAULT,
        level: null,                      // レベル診断の結果（Phase 6）
        name: ""                          // 表示名（任意）
      },
      progress: {
        streak: { current: 0, longest: 0, lastStudyDate: null }, // 連続学習
        today: { date: null, studiedMinutes: 0 },                // 当日の学習量
        daily: {},   // { "YYYY-MM-DD": 学習分 } 進捗グラフ用の日次記録
        totals: { wordsLearned: 0, sessions: 0, shadowingRuns: 0 }
      },
      srs: {},        // 単語ごとの間隔反復状態（Phase 2）
      wordbook: [],   // リーディング等で保存した単語（Phase 6）
      videos: [],     // シャドーイング用に保存した動画（マイ動画ライブラリ）
      history: []     // シャドーイング等の練習履歴（Phase 3 以降）
    };
  }

  /* ---------- 内部ユーティリティ ---------- */

  // 当日の日付を "YYYY-MM-DD" で返す（ローカルタイム基準）
  function todayISO() {
    var d = new Date();
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }

  // 2つの "YYYY-MM-DD" の差を日数で返す（a が新しいほど正）
  function daysBetween(olderISO, newerISO) {
    var older = new Date(olderISO + "T00:00:00");
    var newer = new Date(newerISO + "T00:00:00");
    return Math.round((newer - older) / MS_PER_DAY);
  }

  // 単純な再帰マージ：既定構造に保存値を重ね、欠損キーを補う（破損耐性の要）
  function deepMerge(base, override) {
    if (typeof override !== "object" || override === null || Array.isArray(override)) {
      return override === undefined ? base : override;
    }
    var result = Array.isArray(base) ? base.slice() : Object.assign({}, base);
    Object.keys(override).forEach(function (key) {
      var baseVal = base ? base[key] : undefined;
      var overVal = override[key];
      if (
        typeof baseVal === "object" && baseVal !== null && !Array.isArray(baseVal) &&
        typeof overVal === "object" && overVal !== null && !Array.isArray(overVal)
      ) {
        result[key] = deepMerge(baseVal, overVal);
      } else {
        result[key] = overVal;
      }
    });
    return result;
  }

  // 旧バージョンのデータを最新スキーマへ移行する（将来の拡張点）
  function migrate(state) {
    // 例：if (state.version < 2) { ...; state.version = 2; }
    // Phase 1 時点では version 1 のみのため変換不要。
    state.version = SCHEMA_VERSION;
    return state;
  }

  /* ---------- 公開 API：読み書き ---------- */

  // 保存状態を読み込む。失敗時は既定状態を返す（例外を投げない）。
  function getState() {
    var def = createDefaultState();
    var raw;
    try {
      raw = localStorage.getItem(STORAGE_KEY);
    } catch (e) {
      // プライベートブラウズ等で localStorage 自体が使えない場合
      console.warn("[storage] localStorage を読み取れません:", e);
      return def;
    }
    if (!raw) return def;

    var parsed;
    try {
      parsed = JSON.parse(raw);
    } catch (e) {
      console.warn("[storage] 保存データが壊れています。初期化します:", e);
      return def;
    }
    if (typeof parsed !== "object" || parsed === null) return def;

    // 既定構造に重ねて欠損を補い、必要ならマイグレーション
    var merged = deepMerge(def, parsed);
    if (merged.version !== SCHEMA_VERSION) merged = migrate(merged);
    return merged;
  }

  // 状態を保存する。成功で true、失敗で false（容量超過など）。
  function saveState(state) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      return true;
    } catch (e) {
      console.error("[storage] 保存に失敗しました:", e);
      return false;
    }
  }

  // 関数型アップデート：現在状態を受け取り新状態を返す関数を渡す
  function update(updater) {
    var next = updater(getState());
    saveState(next);
    return next;
  }

  // 全データを初期化する
  function reset() {
    var def = createDefaultState();
    saveState(def);
    return def;
  }

  /* ---------- ストリーク／学習記録のヘルパー ---------- */

  // 「今日学習した」ことを記録し、連続日数を更新する。
  // 学習系モジュールが完了時に呼ぶ想定（minutes は加算する学習時間）。
  function recordStudy(minutes) {
    return update(function (state) {
      var today = todayISO();
      var streak = state.progress.streak;
      var last = streak.lastStudyDate;

      if (last !== today) {
        // 連続判定：前回が「昨日」なら継続、それ以外は途切れて 1 から
        if (last && daysBetween(last, today) === 1) {
          streak.current = streak.current + 1;
        } else {
          streak.current = 1;
        }
        streak.longest = Math.max(streak.longest, streak.current);
        streak.lastStudyDate = today;
      }

      // 当日の学習時間（日付が変わっていたらリセットして加算）
      if (state.progress.today.date !== today) {
        state.progress.today.date = today;
        state.progress.today.studiedMinutes = 0;
      }
      state.progress.today.studiedMinutes += (minutes || 0);

      // 日次記録（進捗グラフ用）にも加算
      if (!state.progress.daily) state.progress.daily = {};
      state.progress.daily[today] = (state.progress.daily[today] || 0) + (minutes || 0);

      return state;
    });
  }

  // 当日の学習時間（分）を返す。日付が変わっていれば 0。
  function getTodayMinutes() {
    var state = getState();
    if (state.progress.today.date !== todayISO()) return 0;
    return state.progress.today.studiedMinutes;
  }

  // 合計カウンタを加算する（例：{ wordsLearned: 1, sessions: 1 }）
  function incTotals(patch) {
    return update(function (state) {
      Object.keys(patch || {}).forEach(function (k) {
        state.progress.totals[k] = (state.progress.totals[k] || 0) + patch[k];
      });
      return state;
    });
  }

  // 直近 n 日の日次学習分を [{ date, minutes }]（古い→新しい順）で返す
  function getRecentDailyMinutes(n) {
    var state = getState();
    var daily = state.progress.daily || {};
    var out = [];
    var base = new Date();
    for (var i = n - 1; i >= 0; i--) {
      var d = new Date(base.getTime() - i * MS_PER_DAY);
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, "0");
      var day = String(d.getDate()).padStart(2, "0");
      var key = y + "-" + m + "-" + day;
      out.push({ date: key, minutes: daily[key] || 0 });
    }
    return out;
  }

  // 単語帳に語を追加（重複は無視）。{ en, ja, ipa } を想定。
  function addToWordbook(entry) {
    return update(function (state) {
      if (!Array.isArray(state.wordbook)) state.wordbook = [];
      var exists = state.wordbook.some(function (w) {
        return w.en && entry.en && w.en.toLowerCase() === entry.en.toLowerCase();
      });
      if (!exists) state.wordbook.push(entry);
      return state;
    });
  }

  // 練習履歴を追加（シャドーイング等）
  function addHistory(entry) {
    return update(function (state) {
      if (!Array.isArray(state.history)) state.history = [];
      state.history.unshift(entry); // 新しいものを先頭へ
      // 履歴は直近100件に制限（肥大化防止）
      if (state.history.length > 100) state.history = state.history.slice(0, 100);
      return state;
    });
  }

  // ---- マイ動画ライブラリ（シャドーイング用） ----
  function getVideos() {
    var v = getState().videos;
    return Array.isArray(v) ? v : [];
  }
  // 動画を保存。新規は { title, url, videoId, subtitles } を想定。
  // id があれば更新、無ければ採番して追加。保存後の動画オブジェクトを返す。
  function saveVideo(entry) {
    var saved = null;
    update(function (state) {
      if (!Array.isArray(state.videos)) state.videos = [];
      if (entry.id) {
        // 更新
        var idx = state.videos.findIndex(function (v) { return v.id === entry.id; });
        if (idx >= 0) { state.videos[idx] = Object.assign({}, state.videos[idx], entry); saved = state.videos[idx]; }
      } else {
        // 追加
        entry.id = "vid_" + Date.now() + "_" + Math.floor(Math.random() * 1000);
        entry.addedAt = new Date().toISOString();
        state.videos.unshift(entry);
        saved = entry;
      }
      return state;
    });
    return saved;
  }
  function deleteVideo(id) {
    return update(function (state) {
      if (!Array.isArray(state.videos)) state.videos = [];
      state.videos = state.videos.filter(function (v) { return v.id !== id; });
      return state;
    });
  }

  /* ---------- エクスポート / インポート ---------- */

  // 現在の全データを JSON ファイルとしてダウンロードさせる
  function exportToFile() {
    var state = getState();
    var json = JSON.stringify(state, null, 2);
    var blob = new Blob([json], { type: "application/json" });
    var url = URL.createObjectURL(blob);

    var a = document.createElement("a");
    a.href = url;
    a.download = "eigomaster-backup-" + todayISO() + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // メモリ解放
    URL.revokeObjectURL(url);
  }

  // ファイル（File オブジェクト）から読み込み、検証して取り込む。
  // 成功で解決、失敗で reject（呼び出し側で日本語メッセージを表示する）。
  function importFromFile(file) {
    return new Promise(function (resolve, reject) {
      if (!file) {
        reject(new Error("ファイルが選択されていません。"));
        return;
      }
      var reader = new FileReader();
      reader.onerror = function () {
        reject(new Error("ファイルの読み込みに失敗しました。"));
      };
      reader.onload = function () {
        var parsed;
        try {
          parsed = JSON.parse(reader.result);
        } catch (e) {
          reject(new Error("JSON の形式が正しくありません。"));
          return;
        }
        // 最低限のスキーマ検証：オブジェクトで profile/progress を持つこと
        if (
          typeof parsed !== "object" || parsed === null ||
          typeof parsed.profile !== "object" || typeof parsed.progress !== "object"
        ) {
          reject(new Error("EigoMaster のバックアップ形式ではありません。"));
          return;
        }
        // 既定構造に重ねて欠損補完＋マイグレーション後に保存
        var merged = migrate(deepMerge(createDefaultState(), parsed));
        if (saveState(merged)) {
          resolve(merged);
        } else {
          reject(new Error("保存できませんでした。空き容量をご確認ください。"));
        }
      };
      reader.readAsText(file);
    });
  }

  /* ---------- グローバル公開 ---------- */
  window.Storage = {
    KEY: STORAGE_KEY,
    SCHEMA_VERSION: SCHEMA_VERSION,
    todayISO: todayISO,
    getState: getState,
    saveState: saveState,
    update: update,
    reset: reset,
    recordStudy: recordStudy,
    getTodayMinutes: getTodayMinutes,
    incTotals: incTotals,
    getRecentDailyMinutes: getRecentDailyMinutes,
    addToWordbook: addToWordbook,
    addHistory: addHistory,
    getVideos: getVideos,
    saveVideo: saveVideo,
    deleteVideo: deleteVideo,
    exportToFile: exportToFile,
    importFromFile: importFromFile
  };
})();

</script>

/* ===== inlined: js/app.js ===== */
/* ============================================================
   app.js — アプリ中核：初期化・ルーティング・共有API(EM)・ホーム・設定
   - window.EM に共有ヘルパー（TTS・トースト・画面登録・ナビ等）を公開。
   - 各機能モジュールは読み込み時に EM.registerView() で画面を登録する。
   - ルーターは登録済みビューを参照して描画する（5タブ＋サブ画面）。
   storage.js が先に読み込まれている前提。
   ============================================================ */
(function () {
  "use strict";

  var DEFAULT_ROUTE = "#/home";
  var GOAL_MIN = 5, GOAL_MAX = 120, GOAL_STEP = 5;
  var TOAST_DURATION_MS = 2600;
  var GRAPH_DAYS = 7;            // 進捗グラフの表示日数

  /* ---------- DOM 参照 ---------- */
  var viewEl = document.getElementById("view");
  var titleEl = document.getElementById("screen-title");
  var streakCountEl = document.getElementById("streak-count");
  var tabEls = Array.prototype.slice.call(document.querySelectorAll(".tab"));
  var toastEl = document.getElementById("toast");
  var toastTimer = null;

  /* ============================================================
     共有 API（EM）— 各モジュールが利用する
     ============================================================ */
  var EM = {
    views: {} // routeKey -> { title, tab, render }
  };
  window.EM = EM;

  // 画面を登録する。def = { title, tab, render }
  EM.registerView = function (routeKey, def) {
    EM.views[routeKey] = def;
  };

  // HTMLエスケープ（ユーザー入力をDOMに差し込む際の安全対策）
  EM.escapeHtml = function (s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  };

  // トースト通知
  EM.showToast = function (message, isError) {
    if (!toastEl) return;
    toastEl.textContent = message;
    toastEl.classList.toggle("toast--error", !!isError);
    toastEl.hidden = false;
    requestAnimationFrame(function () { toastEl.setAttribute("data-show", "true"); });
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.setAttribute("data-show", "false"); }, TOAST_DURATION_MS);
  };

  /* ---------- 音声合成（TTS）---------- */
  var cachedVoices = [];
  function loadVoices() {
    if (!("speechSynthesis" in window)) return;
    cachedVoices = window.speechSynthesis.getVoices() || [];
  }
  if ("speechSynthesis" in window) {
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }
  // en-US 音声を優先選択
  function pickEnUsVoice() {
    if (!cachedVoices.length) loadVoices();
    var exact = cachedVoices.find(function (v) { return v.lang === "en-US"; });
    if (exact) return exact;
    var anyEn = cachedVoices.find(function (v) { return /^en/i.test(v.lang); });
    return anyEn || null;
  }
  // テキストを読み上げる。opts = { rate, lang, onend }
  EM.speak = function (text, opts) {
    opts = opts || {};
    if (!("speechSynthesis" in window)) {
      EM.showToast("このブラウザは音声読み上げに対応していません", true);
      return;
    }
    var u = new SpeechSynthesisUtterance(text);
    u.lang = opts.lang || "en-US";
    u.rate = typeof opts.rate === "number" ? opts.rate : 1.0;
    var v = pickEnUsVoice();
    if (v) u.voice = v;
    if (typeof opts.onend === "function") u.onend = opts.onend;
    window.speechSynthesis.cancel(); // 重複再生を止める
    window.speechSynthesis.speak(u);
  };
  EM.stopSpeak = function () {
    if ("speechSynthesis" in window) window.speechSynthesis.cancel();
  };
  EM.hasTTS = ("speechSynthesis" in window);

  // サブ画面の戻りリンク（HTML文字列）
  EM.backLink = function (toRoute, label) {
    return '<a class="back-link" href="' + toRoute + '">‹ ' + EM.escapeHtml(label || "戻る") + '</a>';
  };

  // ナビゲーション（再描画）
  EM.navigate = function () { navigate(); };

  // ストリークバッジ更新
  function refreshStreakBadge() {
    var state = Storage.getState();
    if (streakCountEl) streakCountEl.textContent = String(state.progress.streak.current);
  }
  EM.refreshStreakBadge = refreshStreakBadge;

  /* ============================================================
     ホーム画面（ダッシュボード）
     ============================================================ */
  function greetingByHour() {
    var h = new Date().getHours();
    if (h < 5) return "おつかれさまです";
    if (h < 11) return "おはようございます";
    if (h < 18) return "こんにちは";
    return "こんばんは";
  }

  // バッジ定義（達成条件は state を受け取る関数）
  var BADGES = [
    { id: "first",   icon: "✦", label: "はじめの一歩", test: function (s) { return s.progress.totals.sessions >= 1; } },
    { id: "streak3", icon: "▲", label: "3日連続",     test: function (s) { return s.progress.streak.longest >= 3; } },
    { id: "streak7", icon: "★", label: "7日連続",     test: function (s) { return s.progress.streak.longest >= 7; } },
    { id: "words25", icon: "あ", label: "単語25",      test: function (s) { return s.progress.totals.wordsLearned >= 25; } },
    { id: "words100",icon: "語", label: "単語100",     test: function (s) { return s.progress.totals.wordsLearned >= 100; } },
    { id: "shadow1", icon: "▷", label: "シャドー初挑戦", test: function (s) { return s.progress.totals.shadowingRuns >= 1; } }
  ];

  function renderHome() {
    var state = Storage.getState();
    var goal = state.profile.dailyGoalMinutes;
    var mins = Storage.getTodayMinutes();
    var ratio = goal > 0 ? Math.min(mins / goal, 1) : 0;
    var pct = Math.round(ratio * 100);

  // 直近7日間の学習時間を棒グラフで描画（Canvas）
  function drawStudyGraph() {
    var canvas = document.getElementById("study-graph");
    if (!canvas) return;
    var data = Storage.getRecentDailyMinutes(GRAPH_DAYS);
    var goal = Storage.getState().profile.dailyGoalMinutes;

    // テーマ色をCSS変数から取得
    var cs = getComputedStyle(document.documentElement);
    var colAccent = cs.getPropertyValue("--c-accent").trim();
    var colLine = cs.getPropertyValue("--c-line").trim();
    var colInk = cs.getPropertyValue("--c-ink-faint").trim();

    // 解像度対応（Retina）
    var dpr = window.devicePixelRatio || 1;
    var cssW = canvas.clientWidth || 320;
    var cssH = 120;
    canvas.width = cssW * dpr;
    canvas.height = cssH * dpr;
    var ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, cssW, cssH);

    var padBottom = 22, padTop = 8;
    var maxVal = Math.max(goal, data.reduce(function (m, d) { return Math.max(m, d.minutes); }, 0), 1);
    var n = data.length;
    var gap = 10;
    var barW = (cssW - gap * (n + 1)) / n;
    var chartH = cssH - padBottom - padTop;

    // 目標ライン
    var goalY = padTop + chartH * (1 - goal / maxVal);
    ctx.strokeStyle = colLine;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(0, goalY); ctx.lineTo(cssW, goalY); ctx.stroke();
    ctx.setLineDash([]);

    var weekday = ["日","月","火","水","木","金","土"];
    data.forEach(function (d, i) {
      var x = gap + i * (barW + gap);
      var h = chartH * Math.min(d.minutes / maxVal, 1);
      var y = padTop + chartH - h;
      ctx.fillStyle = d.minutes >= goal && goal > 0 ? colAccent : colLine;
      if (d.minutes > 0) ctx.fillStyle = colAccent;
      // 角丸の棒
      var r = Math.min(4, barW / 2);
      roundRect(ctx, x, y, barW, h, r);
      ctx.fill();
      // 曜日ラベル
      ctx.fillStyle = colInk;
      ctx.font = "10px sans-serif";
      ctx.textAlign = "center";
      var wd = new Date(d.date + "T00:00:00").getDay();
      ctx.fillText(weekday[wd], x + barW / 2, cssH - 6);
    });
  }
  function roundRect(ctx, x, y, w, h, r) {
    if (h <= 0) return;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function setActiveTab(tabName) {

  <script>
/* ===== inlined: js/srs.js ===== */
/* ============================================================
   srs.js — 間隔反復（SM-2 簡易版）
   単語ごとに { ease, interval(日), reps, due("YYYY-MM-DD") } を Storage.srs に保持。
   採点は again / hard / good / easy の4段階。
   window.SRS として公開する。
   ============================================================ */
(function () {
  "use strict";

  var EASE_MIN = 1.3;       // 易しさ係数の下限
  var EASE_START = 2.5;     // 初期係数
  var EASE_DOWN_AGAIN = 0.2;
  var EASE_DOWN_HARD = 0.15;
  var EASE_UP_EASY = 0.15;

  function todayISO() { return Storage.todayISO(); }

  // "YYYY-MM-DD" に n 日足した日付
  function addDays(iso, n) {
    var d = new Date(iso + "T00:00:00");
    d.setDate(d.getDate() + n);
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }

  function defaultCard() {
    return { ease: EASE_START, interval: 0, reps: 0, due: todayISO() };
  }

  // カード取得（無ければ null）
  function getCard(id) {
    var srs = Storage.getState().srs || {};
    return srs[id] || null;
  }

  // 期限到来（未学習＝新規も対象）か
  function isDue(id) {
    var c = getCard(id);
    if (!c) return true;
    return c.due <= todayISO();
  }

  // 採点して更新し、新しいカードを返す
  function review(id, grade) {
    var card = getCard(id) || defaultCard();
    var today = todayISO();

    switch (grade) {
      case "again":
        card.reps = 0;
        card.interval = 0;
        card.ease = Math.max(EASE_MIN, card.ease - EASE_DOWN_AGAIN);
        card.due = today; // 同セッション内で再出題
        break;
      case "hard":
        card.ease = Math.max(EASE_MIN, card.ease - EASE_DOWN_HARD);
        card.interval = Math.max(1, Math.round((card.interval || 1) * 1.2));
        card.reps = card.reps + 1;
        card.due = addDays(today, card.interval);
        break;
      case "good":
        card.reps = card.reps + 1;
        if (card.reps === 1) card.interval = 1;
        else if (card.reps === 2) card.interval = 3;
        else card.interval = Math.round(card.interval * card.ease);
        card.due = addDays(today, card.interval);
        break;
      case "easy":
        card.reps = card.reps + 1;
        card.ease = card.ease + EASE_UP_EASY;
        if (card.reps === 1) card.interval = 2;
        else card.interval = Math.round((card.interval || 2) * card.ease * 1.3);
        card.due = addDays(today, card.interval);
        break;
      default:
        // 未知の採点は good 相当
        card.reps = card.reps + 1;
        card.interval = Math.max(1, card.interval);
        card.due = addDays(today, card.interval);
    }

    Storage.update(function (s) {
      if (!s.srs) s.srs = {};
      s.srs[id] = card;
      return s;
    });
    return card;
  }

  // 学習セッションを組む：期限到来の既習語を優先し、新規語で埋める（最大 size 語）
  function buildSession(words, size) {
    var due = [];
    var fresh = [];
    words.forEach(function (w) {
      var c = getCard(w.id);
      if (!c) fresh.push(w);
      else if (c.due <= todayISO()) due.push({ w: w, due: c.due });
    });
    // 期限が早い順
    due.sort(function (a, b) { return a.due < b.due ? -1 : 1; });
    var ordered = due.map(function (x) { return x.w; }).concat(fresh);
    return ordered.slice(0, size);
  }

  window.SRS = {
    GRADES: ["again", "hard", "good", "easy"],
    getCard: getCard,
    isDue: isDue,
    review: review,
    buildSession: buildSession
  };
})();

</script>

/* ===== inlined: js/subtitle.js ===== */
/* ============================================================
   subtitle.js — 字幕パーサ（SRT / VTT / プレーンテキスト）
   返り値：[{ index, start(秒|null), end(秒|null), text }]
   ユーザーが持ち込んだ字幕を自前で解析する（外部依存なし）。
   window.Subtitle として公開。
   ============================================================ */
(function () {
  "use strict";

  // "00:01:02,500" or "01:02.500" → 秒
  function timeToSeconds(str) {
    str = str.trim().replace(",", ".");
    var parts = str.split(":").map(parseFloat);
    if (parts.some(isNaN)) return null;
    var sec = 0;
    for (var i = 0; i < parts.length; i++) sec = sec * 60 + parts[i];
    return sec;
  }

  var TIME_LINE = /(\d{1,2}:)?\d{1,2}:\d{1,2}[.,]\d{1,3}\s*-->\s*(\d{1,2}:)?\d{1,2}:\d{1,2}[.,]\d{1,3}/;

  // SRT/VTT 共通のブロック解析
  function parseTimed(raw) {
    var text = String(raw).replace(/^\uFEFF/, "").replace(/\r/g, "");
    // WEBVTT ヘッダ除去
    text = text.replace(/^WEBVTT.*?(\n\n|$)/s, "");
    var blocks = text.split(/\n{2,}/);
    var cues = [];
    blocks.forEach(function (block) {
      var lines = block.split("\n").filter(function (l) { return l.trim() !== ""; });
      if (!lines.length) return;
      // 先頭が連番なら飛ばす
      if (/^\d+$/.test(lines[0].trim()) && lines.length > 1 && TIME_LINE.test(lines[1])) lines.shift();
      var timeLine = lines[0];
      if (!TIME_LINE.test(timeLine)) return; // 時刻行が無いブロックは無視
      var m = timeLine.split("-->");
      var start = timeToSeconds(m[0]);
      var end = timeToSeconds(m[1].replace(/\s.*$/, "")); // 末尾の位置指定を除去
      var body = lines.slice(1).join(" ").replace(/<[^>]+>/g, "").trim(); // タグ除去
      if (body) cues.push({ index: cues.length + 1, start: start, end: end, text: body });
    });
    return cues;
  }

  function parseSRT(raw) { return parseTimed(raw); }
  function parseVTT(raw) { return parseTimed(raw); }

  // タイムスタンプ無し：文・行ごとに分割（start/end は null）
  function parsePlainText(raw) {
    var text = String(raw).replace(/\r/g, "").trim();
    if (!text) return [];
    // 改行優先、無ければ文末記号で分割
    var pieces = text.indexOf("\n") >= 0
      ? text.split(/\n+/)
      : text.split(/(?<=[.!?])\s+/);
    return pieces.map(function (t, i) {
      return { index: i + 1, start: null, end: null, text: t.trim() };
    }).filter(function (c) { return c.text; });
  }

  // 自動判定
  function parse(raw) {
    if (TIME_LINE.test(String(raw))) return parseTimed(raw);
    return parsePlainText(raw);
  }

    parse: parse,
    parseSRT: parseSRT,
    parseVTT: parseVTT,
    parsePlainText: parsePlainText,

    choices = shuffle(choices);

    root().innerHTML = progressHtml() +
      '<div class="flashcard" style="min-height:150px">' +
        '<div class="flashcard__word">' + EM.escapeHtml(w.en) + "</div>" +
        '<div class="flashcard__ipa">' + EM.escapeHtml(w.ipa) + "</div>" +
        '<div class="center mt-4"><button class="audio-btn" id="say" type="button" aria-label="再生">▶</button></div>' +
      "</div>" +
      '<p class="field__label mt-4">意味として正しいものは？</p>' +
      '<div id="choices">' + choices.map(function (c) {
        return '<button class="choice-btn" type="button" data-ja="' + EM.escapeHtml(c) + '">' + EM.escapeHtml(c) + "</button>";
      }).join("") + "</div>";

    document.getElementById("say").addEventListener("click", function () { EM.speak(w.en); });
    EM.speak(w.en);

    root().querySelectorAll(".choice-btn").forEach(function (b) {
      b.addEventListener("click", function () {
        var correct = b.getAttribute("data-ja") === w.ja;
        root().querySelectorAll(".choice-btn").forEach(function (x) {
          x.disabled = true;
          if (x.getAttribute("data-ja") === w.ja) x.classList.add("choice-btn--ok");
          else if (x === b) x.classList.add("choice-btn--ng");
        });
        showNext(w, correct ? "good" : "again");
      });
    });
  }

  // タイピング（意味→スペル入力）
  function drawType() {
    var w = st.session[st.idx];
    root().innerHTML = progressHtml() +
      '<div class="flashcard" style="min-height:150px">' +
        '<div class="flashcard__pos">' + EM.escapeHtml(w.pos) + "</div>" +
        '<div class="flashcard__ja">' + EM.escapeHtml(w.ja) + "</div>" +
        '<div class="flashcard__ipa">' + EM.escapeHtml(w.ipa) + "</div>" +
        '<div class="center mt-4"><button class="audio-btn" id="say" type="button" aria-label="再生">▶</button></div>' +
      "</div>" +
      '<div class="field mt-4"><input class="input" id="type-in" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="英単語を入力" /></div>' +
      '<button class="btn btn--primary btn--block" id="check" type="button">こたえ合わせ</button>' +
      '<div id="type-result" class="mt-4"></div>';

    document.getElementById("say").addEventListener("click", function () { EM.speak(w.en); });
    var input = document.getElementById("type-in");
    input.focus();
    function check() {
      var ans = (input.value || "").trim().toLowerCase();
      var correct = ans === w.en.toLowerCase();
      var res = document.getElementById("type-result");
      res.innerHTML = '<div class="diff center">' +
        (correct ? '<span class="w w-ok">' + EM.escapeHtml(w.en) + "</span>"
                 : '<span class="w w-ng">' + EM.escapeHtml(ans || "（未入力）") + '</span> → <span class="w w-ok">' + EM.escapeHtml(w.en) + "</span>") +
        "</div>";
      EM.speak(w.en);
      input.disabled = true;
      document.getElementById("check").outerHTML = "";
      showNext(w, correct ? "good" : "again");
    }
    document.getElementById("check").addEventListener("click", check);
    input.addEventListener("keydown", function (e) { if (e.key === "Enter") check(); });
  }

  // 「次へ」ボタンを出す（4択・タイピング用）
  function showNext(w, autoGrade) {
    var btn = document.createElement("button");
    btn.className = "btn btn--primary btn--block mt-4";
    btn.textContent = st.idx + 1 >= st.session.length ? "結果を見る" : "次の単語へ";
    btn.addEventListener("click", function () { grade(w, autoGrade); });
    root().appendChild(btn);
  }

  /* ---------- 採点して次へ ---------- */
  function grade(w, g) {
    var isNew = !SRS.getCard(w.id);
    SRS.review(w.id, g);
    if (isNew && g !== "again") st.learnedNew += 1;

    if (g === "again") {
      // 同セッション末尾に戻して再出題
      st.session.push(w);
    }
    st.idx += 1;
    st.flipped = false;
    drawCard();
  }

  /* ---------- 結果 ---------- */
  function drawSummary() {
    var total = st.session.length;
    var minutes = Math.max(1, Math.round(total * MIN_PER_WORD));
    Storage.recordStudy(minutes);
    Storage.incTotals({ sessions: 1, wordsLearned: st.learnedNew });
    EM.refreshStreakBadge();

    root().innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-state__icon">✓</div>' +
        '<p class="empty-state__title">おつかれさまでした</p>' +
        '<p class="empty-state__body">' + total + "問を学習しました（新規 " + st.learnedNew + " 語）。<br>" +
          "学習時間に約 " + minutes + " 分を記録しました。</p>" +
      "</div>" +
      '<button class="btn btn--primary btn--block" id="again-btn" type="button">同じ設定でもう一度</button>' +
      '<a class="btn btn--ghost btn--block mt-4" href="#/home">ホームへ戻る</a>';
    document.getElementById("again-btn").addEventListener("click", drawSetup);
  }

  /* ---------- ユーティリティ ---------- */
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  EM.registerView("#/vocab", { title: "単語", tab: "vocab", render: render });
})();

</script>

  <script>
/* ===== inlined: js/idioms.js ===== */
/* ============================================================
   idioms.js — 熟語・句動詞（#/idioms）

(function () {
  "use strict";

  var LEVELS = ["A2", "B1", "B2", "C1"];
  var MODES = [
    { id: "flash", label: "フラッシュ" },
    { id: "quiz", label: "4択" }
  ];
  var SESSION_SIZE = 8;
  var MIN_PER_ITEM = 0.4;

  var st = { level: "A2", mode: "flash", session: [], idx: 0, flipped: false, learnedNew: 0 };

  function pool(level) {
    var all = (window.EigoData && window.EigoData.idioms) || [];
    return all.filter(function (x) { return x.level === level; });
  }
  function kata(phrase) { return window.Katakana ? window.Katakana.toKatakana(phrase) : ""; }

  function render() {
    return { html: '<section id="idioms-root" class="view-enter"></section>', onMount: drawSetup };
  }
  function root() { return document.getElementById("idioms-root"); }

  /* ---------- セットアップ ---------- */
  function drawSetup() {
    var p = pool(st.level);
    var dueCount = p.filter(function (x) { return SRS.getCard(x.id) && SRS.isDue(x.id); }).length;
    var newCount = p.filter(function (x) { return !SRS.getCard(x.id); }).length;

    var levelChips = LEVELS.map(function (lv) {
      return '<button class="chip" type="button" data-level="' + lv + '" aria-pressed="' + (st.level === lv) + '">' + lv + "</button>";
    }).join("");
    var modeChips = MODES.map(function (m) {
      return '<button class="chip" type="button" data-mode="' + m.id + '" aria-pressed="' + (st.mode === m.id) + '">' + m.label + "</button>";
    }).join("");

    root().innerHTML =
      EM.backLink("#/vocab", "単語学習") +
      '<p class="section-title">熟語・句動詞</p>' +
      '<p class="text-soft" style="font-size:var(--fs-small);margin-bottom:var(--space-4)">ビジネスでよく使う句動詞とイディオムを、意味と例文でまとめて覚えます。</p>' +
      '<div class="field"><span class="field__label">レベル</span><div class="chip-group">' + levelChips + "</div></div>" +
      '<div class="field"><span class="field__label">モード</span><div class="chip-group">' + modeChips + "</div></div>" +
      '<div class="card">' +
        '<div class="kv"><span class="kv__k">復習が必要</span><span class="kv__v">' + dueCount + " 件</span></div>" +
        '<div class="kv"><span class="kv__k">未学習</span><span class="kv__v">' + newCount + " 件</span></div>" +
        '<div class="kv"><span class="kv__k">このレベルの総数</span><span class="kv__v">' + p.length + " 件</span></div>" +
      "</div>" +
      '<button class="btn btn--primary btn--block mt-4" id="start-btn" type="button">学習をはじめる（最大' + SESSION_SIZE + "件）</button>";

    root().querySelectorAll("[data-level]").forEach(function (b) {
      b.addEventListener("click", function () { st.level = b.getAttribute("data-level"); drawSetup(); });
    });
    root().querySelectorAll("[data-mode]").forEach(function (b) {
      b.addEventListener("click", function () { st.mode = b.getAttribute("data-mode"); drawSetup(); });
    });
    document.getElementById("start-btn").addEventListener("click", startSession);
  }

  function startSession() {
    st.session = SRS.buildSession(pool(st.level), SESSION_SIZE);
    if (!st.session.length) { EM.showToast("学習できる項目がありません", true); return; }
    st.idx = 0; st.flipped = false; st.learnedNew = 0;
    drawCard();
  }

  function progressHtml() {
    var pct = Math.round((st.idx / st.session.length) * 100);
    return '<div class="progress-bar"><div class="progress-bar__fill" style="width:' + pct + '%"></div></div>' +
      '<p class="center text-soft" style="font-size:var(--fs-tiny);margin-bottom:var(--space-3)">' + (st.idx + 1) + " / " + st.session.length + "</p>";
  }

  function drawCard() {
    if (st.idx >= st.session.length) return drawSummary();
    if (st.mode === "flash") return drawFlash();
    return drawQuiz();
  }

  /* ---------- フラッシュカード ---------- */
  function drawFlash() {
    var x = st.session[st.idx];
    var front =
      '<div class="flashcard">' +
        '<div class="flashcard__pos">' + EM.escapeHtml(x.kind) + "</div>" +
        '<div class="flashcard__word" style="font-size:var(--fs-h1)">' + EM.escapeHtml(x.en) + "</div>" +
        '<div class="flashcard__kata">' + EM.escapeHtml(kata(x.en)) + "</div>" +

      "</div>";
    var back =
      '<div class="flashcard">' +
        '<div class="flashcard__ja">' + EM.escapeHtml(x.ja) + "</div>" +
        '<div class="flashcard__ex"><em>' + EM.escapeHtml(x.en) + "</em></div>" +
        '<div class="flashcard__ex">' + EM.escapeHtml(x.ex) + "</div>" +
        '<div class="flashcard__ex">' + EM.escapeHtml(x.exja) + "</div>" +
      "</div>";

    root().innerHTML = progressHtml() + (st.flipped ? back : front) +
      (st.flipped ? gradeRowHtml()
                  : '<button class="btn btn--primary btn--block mt-4" id="flip" type="button">意味を見る</button>');

    var say = document.getElementById("say");
    if (say) say.addEventListener("click", function () { EM.speak(x.en); });
    EM.speak(x.en);
    var flip = document.getElementById("flip");
    if (flip) flip.addEventListener("click", function () { st.flipped = true; drawFlash(); });
    bindGrade(x);
  }

  function gradeRowHtml() {
    return '<div class="grade-row">' +
      '<button class="grade-btn" data-g="again" type="button">もう一度<small>すぐ再出題</small></button>' +
      '<button class="grade-btn" data-g="hard" type="button">難しい<small>短め</small></button>' +
      '<button class="grade-btn" data-g="good" type="button">できた<small>標準</small></button>' +
      '<button class="grade-btn" data-g="easy" type="button">余裕<small>長め</small></button>' +
      "</div>";
  }
  function bindGrade(x) {
    root().querySelectorAll(".grade-btn").forEach(function (b) {
      b.addEventListener("click", function () { grade(x, b.getAttribute("data-g")); });
    });
  }

  /* ---------- 4択（熟語→意味） ---------- */
  function drawQuiz() {
    var x = st.session[st.idx];
    var others = pool(st.level).filter(function (y) { return y.id !== x.id; });
    var choices = shuffle(others).slice(0, 3).map(function (y) { return y.ja; });
    choices.push(x.ja);
    choices = shuffle(choices);

    root().innerHTML = progressHtml() +
      '<div class="flashcard" style="min-height:140px">' +
        '<div class="flashcard__pos">' + EM.escapeHtml(x.kind) + "</div>" +
        '<div class="flashcard__word" style="font-size:var(--fs-h1)">' + EM.escapeHtml(x.en) + "</div>" +
        '<div class="center mt-4"><button class="audio-btn" id="say" type="button" aria-label="再生">▶</button></div>' +
      "</div>" +
      '<p class="field__label mt-4">意味として正しいものは？</p>' +
      '<div id="choices">' + choices.map(function (c) {
        return '<button class="choice-btn" type="button" data-ja="' + EM.escapeHtml(c) + '">' + EM.escapeHtml(c) + "</button>";
      }).join("") + "</div>";

    document.getElementById("say").addEventListener("click", function () { EM.speak(x.en); });
    EM.speak(x.en);

    root().querySelectorAll(".choice-btn").forEach(function (b) {
      b.addEventListener("click", function () {
        var correct = b.getAttribute("data-ja") === x.ja;
        root().querySelectorAll(".choice-btn").forEach(function (z) {
          z.disabled = true;
          if (z.getAttribute("data-ja") === x.ja) z.classList.add("choice-btn--ok");
          else if (z === b) z.classList.add("choice-btn--ng");
        });
        var next = document.createElement("button");
        next.className = "btn btn--primary btn--block mt-4";
        next.textContent = st.idx + 1 >= st.session.length ? "結果を見る" : "次へ";
        next.addEventListener("click", function () { grade(x, correct ? "good" : "again"); });
        root().appendChild(next);
      });
    });
  }

  /* ---------- 採点 ---------- */
  function grade(x, g) {
    var isNew = !SRS.getCard(x.id);
    SRS.review(x.id, g);
    if (isNew && g !== "again") st.learnedNew += 1;
    if (g === "again") st.session.push(x);
    st.idx += 1; st.flipped = false;
    drawCard();
  }

  /* ---------- 結果 ---------- */
  function drawSummary() {
    var total = st.session.length;
    var minutes = Math.max(1, Math.round(total * MIN_PER_ITEM));
    Storage.recordStudy(minutes);
    Storage.incTotals({ sessions: 1, wordsLearned: st.learnedNew });
    EM.refreshStreakBadge();

    root().innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-state__icon">✓</div>' +
        '<p class="empty-state__title">おつかれさまでした</p>' +
        '<p class="empty-state__body">' + total + "件を学習しました（新規 " + st.learnedNew + " 件）。<br>" +
          "学習時間に約 " + minutes + " 分を記録しました。</p>" +
      "</div>" +
      '<button class="btn btn--primary btn--block" id="again-btn" type="button">同じ設定でもう一度</button>' +
      '<a class="btn btn--ghost btn--block mt-4" href="#/home">ホームへ戻る</a>';

  function shuffle(arr) {

      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  EM.registerView("#/idioms", { title: "熟語・句動詞", tab: "vocab", render: render });
})();
