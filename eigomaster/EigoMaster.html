          '<div class="empty-state__icon">▷</div>' +
          '<p class="empty-state__title">保存した動画はまだありません</p>' +
          '<p class="empty-state__body">下の「＋ 動画を追加」から、学習したいYouTube動画と字幕を登録すると、次回から一覧で選べます。</p>' +
        "</div>";
    } else {
      libraryHtml = '<div class="card" style="padding:0">' + videos.map(function (v) {
        var thumb = v.videoId
          ? '<img class="vid-thumb" src="https://img.youtube.com/vi/' + EM.escapeHtml(v.videoId) + '/mqdefault.jpg" alt="" loading="lazy" onerror="this.onerror=null;this.outerHTML=\'<div class=&quot;vid-thumb vid-thumb--none&quot;>YouTube</div>\';" />'
          : '<div class="vid-thumb vid-thumb--none">字幕<br>のみ</div>';
        return '<div class="list-row">' +
          thumb +
          '<div class="list-row__main">' +
            '<div class="list-row__title">' + EM.escapeHtml(v.title || "（無題）") + "</div>" +
            '<div class="list-row__sub">' + (v.videoId ? "YouTube" : "字幕のみ") + " ・ " + cueCountLabel(v.subtitles) + "</div>" +
          "</div>" +
          '<button class="audio-btn" type="button" data-play="' + v.id + '" aria-label="練習">▶</button>' +
          '<button class="audio-btn" type="button" data-edit="' + v.id + '" aria-label="編集" style="background:var(--c-surface-2);color:var(--c-ink-soft)">✎</button>' +
          '<button class="audio-btn" type="button" data-del="' + v.id + '" aria-label="削除" style="background:var(--c-bad-soft);color:var(--c-bad)">✕</button>' +
        "</div>";
      }).join("") + "</div>";
    }

    root().innerHTML =
      '<div class="row-between"><p class="section-title" style="margin:0">シャドーイング</p>' +
        '<span class="text-soft" style="font-size:var(--fs-small)">保存 ' + videos.length + " 件</span></div>" +
      '<div class="notice notice--info"><span class="notice__icon">i</span>' +
        '<span>学習する動画は<strong>自分で選べます</strong>。YouTubeのURLと字幕（SRT/VTT/テキスト）を登録すると一覧に保存され、いつでも選んで練習できます。著作権の都合で字幕は同梱していません。</span></div>' +
      '<p class="section-title mt-5" style="font-size:var(--fs-body)">保存した動画から選ぶ</p>' +
      libraryHtml +
      '<button class="btn btn--primary btn--block mt-4" id="add-video" type="button">＋ 動画を追加</button>' +
      '<button class="btn btn--ghost btn--block mt-4" id="quick-practice" type="button">登録せずにすぐ練習する</button>';

    document.getElementById("add-video").addEventListener("click", function () { drawForm(null); });
    document.getElementById("quick-practice").addEventListener("click", function () { drawForm(null, true); });

    root().querySelectorAll("[data-play]").forEach(function (b) {
      b.addEventListener("click", function () { playSaved(b.getAttribute("data-play")); });
    });
    root().querySelectorAll("[data-edit]").forEach(function (b) {
      b.addEventListener("click", function () { drawForm(b.getAttribute("data-edit")); });
    });
    root().querySelectorAll("[data-del]").forEach(function (b) {
      b.addEventListener("click", function () {
        if (!window.confirm("この動画を一覧から削除しますか？")) return;
        Storage.deleteVideo(b.getAttribute("data-del"));
        EM.showToast("削除しました");
        drawSetup();
      });
    });
  }

  // 字幕テキストから行数ラベルを作る
  function cueCountLabel(sub) {
    if (!sub) return "字幕なし";
    var n = window.Subtitle.parse(sub).length;
    return n + " 行";
  }

  // 保存済み動画を選んで練習開始（動画ありなら選択肢を出す）
  function playSaved(id) {
    var v = Storage.getVideos().find(function (x) { return x.id === id; });
    if (!v) return;
    cues = window.Subtitle.parse(v.subtitles || "");
    if (!cues.length) { EM.showToast("この動画には字幕が登録されていません", true); return; }
    currentTitle = v.title || "";
    if (v.videoId) drawPlayer(v.videoId);
    else drawSilent();
  }

  /* ---------- 追加 / 編集フォーム ---------- */
  function drawForm(editId, quickOnly) {
    var editing = editId ? Storage.getVideos().find(function (x) { return x.id === editId; }) : null;
    var title = editing ? editing.title : "";
    var url = editing ? editing.url : "";
    var sub = editing ? editing.subtitles : (quickOnly ? SAMPLE_SRT : "");

    root().innerHTML =
      '<a class="back-link" id="form-back" href="#/video">‹ 一覧へ戻る</a>' +
      '<p class="section-title">' + (editing ? "動画を編集" : (quickOnly ? "すぐ練習" : "動画を追加")) + "</p>" +
      (quickOnly ? "" :
        '<div class="field"><label class="field__label" for="vid-title">タイトル</label>' +
          '<input class="input" id="vid-title" type="text" placeholder="例：TED 〇〇 のスピーチ" value="' + EM.escapeHtml(title) + '" /></div>') +
      '<div class="field"><label class="field__label" for="yt-url">YouTube URL（任意・空なら字幕のみで練習）</label>' +
        '<input class="input" id="yt-url" type="text" placeholder="https://www.youtube.com/watch?v=..." value="' + EM.escapeHtml(url) + '" /></div>' +
      '<div class="field"><label class="field__label" for="sub-in">字幕 / スクリプト（SRT・VTT・テキスト）</label>' +
        '<textarea class="textarea" id="sub-in" placeholder="字幕を貼り付け">' + EM.escapeHtml(sub) + "</textarea></div>" +
      (quickOnly
        ? '<button class="btn btn--primary btn--block" id="quick-go" type="button">この内容で練習する</button>'
        : '<button class="btn btn--primary btn--block" id="save-video" type="button">' + (editing ? "保存する" : "保存して一覧に追加") + "</button>" +
          '<button class="btn btn--ghost btn--block mt-4" id="save-and-play" type="button">保存してすぐ練習</button>');

    document.getElementById("form-back").addEventListener("click", function (e) { e.preventDefault(); drawSetup(); });

    if (quickOnly) {
      document.getElementById("quick-go").addEventListener("click", function () {
        var s = readForm(true);
        if (!s) return;
        cues = s.cues; currentTitle = "";
        if (s.videoId) drawPlayer(s.videoId); else drawSilent();
      });
      return;
    }

    document.getElementById("save-video").addEventListener("click", function () {
      if (saveForm(editing)) { EM.showToast(editing ? "更新しました" : "一覧に追加しました"); drawSetup(); }
    });
    document.getElementById("save-and-play").addEventListener("click", function () {
      var saved = saveForm(editing);
      if (!saved) return;
      cues = window.Subtitle.parse(saved.subtitles || "");
      if (!cues.length) { EM.showToast("字幕を入力してください", true); return; }
      currentTitle = saved.title || "";
      if (saved.videoId) drawPlayer(saved.videoId); else drawSilent();
    });
  }

  // フォーム値を読む（quickOnly時は保存せず {cues, videoId} を返す）
  function readForm(quickOnly) {
    var subRaw = document.getElementById("sub-in").value || "";
    var parsed = window.Subtitle.parse(subRaw);
    if (!parsed.length) { EM.showToast("字幕を入力してください", true); return null; }
    var id = extractVideoId(document.getElementById("yt-url").value || "");
    return { cues: parsed, videoId: id };
  }

  // フォーム値を保存し、保存済み動画オブジェクトを返す
  function saveForm(editing) {
    var titleEl = document.getElementById("vid-title");
    var subRaw = document.getElementById("sub-in").value || "";
    if (!window.Subtitle.parse(subRaw).length) { EM.showToast("字幕を入力してください", true); return null; }
    var url = document.getElementById("yt-url").value || "";
    var videoId = extractVideoId(url);
    var entry = {
      title: (titleEl ? titleEl.value : "").trim() || (videoId ? "YouTube動画" : "字幕のみ"),
      url: url.trim(),
      videoId: videoId,
      subtitles: subRaw
    };
    if (editing) entry.id = editing.id;
    return Storage.saveVideo(entry);
  }

  /* ---------- 動画モード ---------- */
  function drawPlayer(videoId) {
    root().innerHTML =
      titleBarHtml() +
      '<div class="video-frame"><div id="yt-player"></div></div>' +
      controlsHtml() +
      recorderHtml() +
      '<div class="lyric mt-4" id="lyric"></div>' +
      finishHtml();

    bindTitleBar();
    renderLyrics();
    bindControls();
    bindRecorder();
    bindFinish();

    ensureYouTubeAPI(function () {
      player = new YT.Player("yt-player", {
        videoId: videoId,
        playerVars: { rel: 0, playsinline: 1 },
        events: {
          onReady: function () { startPolling(); },
          onError: function () { EM.showToast("動画を読み込めませんでした", true); }
        }
      });
    });
  }

  function controlsHtml() {
    var speedBtns = SPEEDS.map(function (s) {
      return '<button class="chip" type="button" data-speed="' + s + '" aria-pressed="' + (s === 1.0) + '">' + s + "x</button>";
    }).join("");
    return '<div class="card mt-4">' +
      '<div class="row-between"><span class="field__label" style="margin:0">速度</span><div class="chip-group">' + speedBtns + "</div></div>" +
      '<div class="grade-row mt-4" style="grid-template-columns:repeat(4,1fr)">' +
        '<button class="btn btn--ghost" id="seek-back" type="button">⟲ ' + SEEK_STEP + "s</button>" +
        '<button class="btn btn--ghost" id="play-pause" type="button">▶/⏸</button>' +
        '<button class="btn btn--ghost" id="seek-fwd" type="button">' + SEEK_STEP + "s ⟳</button>" +
        '<button class="btn btn--ghost" id="loop-toggle" type="button">A-B</button>' +
      "</div>" +
      '<p class="text-soft center" id="loop-status" style="font-size:var(--fs-tiny);margin-top:8px">A-Bループ：未設定</p>' +
      '<div class="grade-row" style="grid-template-columns:1fr 1fr">' +
        '<button class="btn btn--ghost" id="set-a" type="button">A点をセット</button>' +
        '<button class="btn btn--ghost" id="set-b" type="button">B点をセット</button>' +
      "</div>" +
    "</div>";
  }

  function bindControls() {
    root().querySelectorAll("[data-speed]").forEach(function (b) {
      b.addEventListener("click", function () {
        var s = parseFloat(b.getAttribute("data-speed"));
        if (player && player.setPlaybackRate) player.setPlaybackRate(s);
        root().querySelectorAll("[data-speed]").forEach(function (x) {
          x.setAttribute("aria-pressed", x === b ? "true" : "false");
        });
      });
    });
    click("play-pause", function () {
      if (!player) return;
      var s = player.getPlayerState();
      if (s === YT.PlayerState.PLAYING) player.pauseVideo(); else player.playVideo();
    });
    click("seek-back", function () { if (player) player.seekTo(Math.max(0, player.getCurrentTime() - SEEK_STEP), true); });
    click("seek-fwd", function () { if (player) player.seekTo(player.getCurrentTime() + SEEK_STEP, true); });
    click("set-a", function () { if (player) { loopA = player.getCurrentTime(); updateLoopStatus(); } });
    click("set-b", function () { if (player) { loopB = player.getCurrentTime(); updateLoopStatus(); } });
    click("loop-toggle", function () {
      if (loopA == null || loopB == null) { EM.showToast("A点とB点をセットしてください", true); return; }
      loopOn = !loopOn; updateLoopStatus();
    });
  }
  function updateLoopStatus() {
    var el = document.getElementById("loop-status");
    if (!el) return;
    if (loopA == null && loopB == null) { el.textContent = "A-Bループ：未設定"; return; }
    el.textContent = "A-Bループ：" + (loopOn ? "ON" : "OFF") +
      "（A " + fmt(loopA) + " / B " + fmt(loopB) + "）";
  }
  function fmt(t) { return t == null ? "—" : t.toFixed(1) + "s"; }

  function startPolling() {
    stopPolling();
    pollTimer = setInterval(function () {
      if (!player || !player.getCurrentTime) return;
      var t = player.getCurrentTime();
      // A-Bループ
      if (loopOn && loopA != null && loopB != null && t >= loopB) { player.seekTo(loopA, true); return; }
      // 字幕ハイライト
      var idx = cues.findIndex(function (c) { return c.start != null && t >= c.start && t <= (c.end || c.start + 3); });
      if (idx !== activeIdx) { activeIdx = idx; highlightActive(); }
    }, 200);
  }
  function stopPolling() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

  /* ---------- 字幕（3段：英語 / カタカナ / 訳）---------- */
  function splitEnJa(text) {
    // "English | 日本語" や "English\t日本語" 形式なら訳を分離
    var m = text.split(/\s*[|\t]\s*/);
    if (m.length >= 2) return { en: m[0], ja: m.slice(1).join(" ") };
    return { en: text, ja: "" };
  }
  function renderLyrics() {
    var box = document.getElementById("lyric");
    box.innerHTML = cues.map(function (c, i) {
      var p = splitEnJa(c.text);
      var kata = window.Katakana ? window.Katakana.toKatakana(p.en) : "";
      return '<div class="lyric__line" data-i="' + i + '">' +
        '<div class="lyric__en">' + EM.escapeHtml(p.en) + "</div>" +
        '<div class="lyric__kata">' + EM.escapeHtml(kata) + "</div>" +
        (p.ja ? '<div class="lyric__ja">' + EM.escapeHtml(p.ja) + "</div>" : "") +
      "</div>";
    }).join("");
    box.querySelectorAll(".lyric__line").forEach(function (line) {
      line.addEventListener("click", function () {
        var i = parseInt(line.getAttribute("data-i"), 10);
        var c = cues[i];
        if (player && c.start != null) player.seekTo(c.start, true);
        else EM.speak(splitEnJa(c.text).en); // 音声なしモードでは読み上げ
      });
    });
  }
  function highlightActive() {
    var box = document.getElementById("lyric");
    if (!box) return;
    box.querySelectorAll(".lyric__line").forEach(function (line) {
      line.classList.toggle("lyric__line--active", parseInt(line.getAttribute("data-i"), 10) === activeIdx);
    });
    var active = box.querySelector(".lyric__line--active");
    if (active) active.scrollIntoView({ block: "center", behavior: "smooth" });
  }

  /* ---------- 音声なしモード ---------- */
  function drawSilent() {
    activeIdx = 0;
    root().innerHTML =
      titleBarHtml() +
      '<div class="notice notice--info"><span class="notice__icon">i</span><span>各行を読み上げ（お手本）→自分で発音、を手動で進めます。</span></div>' +
      '<div class="lyric mt-4" id="lyric"></div>' +
      '<div class="grade-row mt-4" style="grid-template-columns:1fr 1fr 1fr">' +
        '<button class="btn btn--ghost" id="say-line" type="button">▶ お手本</button>' +
        '<button class="btn btn--ghost" id="prev-line" type="button">‹ 前へ</button>' +
        '<button class="btn btn--primary" id="next-line" type="button">次へ ›</button>' +
      "</div>" +
      recorderHtml() +
      finishHtml();
    bindTitleBar();
    renderLyrics();
    highlightActive();
    bindRecorder();
    bindFinish();

    click("say-line", function () { EM.speak(splitEnJa(cues[activeIdx].text).en); });
    click("prev-line", function () { if (activeIdx > 0) { activeIdx--; highlightActive(); } });
    click("next-line", function () {
      if (activeIdx < cues.length - 1) { activeIdx++; highlightActive(); EM.speak(splitEnJa(cues[activeIdx].text).en); }
      else EM.showToast("最後の行です。お疲れさまでした。");
    });
  }

  /* ---------- 録音聞き比べ ---------- */
  function recorderHtml() {
    var supported = !!(navigator.mediaDevices && window.MediaRecorder);
    if (!supported) {
      return '<div class="notice mt-4"><span class="notice__icon">!</span><span>このブラウザは録音に対応していません。お手本の聞き取りと音読で練習しましょう。</span></div>';
    }
    return '<div class="card mt-4">' +
      '<p class="section-eyebrow">録音して聞き比べ</p>' +
      '<div class="grade-row" style="grid-template-columns:1fr 1fr 1fr">' +
        '<button class="btn btn--ghost" id="rec-start" type="button">● 録音</button>' +
        '<button class="btn btn--ghost" id="rec-stop" type="button" disabled>■ 停止</button>' +
        '<button class="btn btn--ghost" id="rec-play" type="button" disabled>▶ 再生</button>' +
      "</div></div>";
  }
  function bindRecorder() {
    if (!(navigator.mediaDevices && window.MediaRecorder)) return;
    click("rec-start", function () {
      navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
        rec.stream = stream;
        rec.chunks = [];
        rec.recorder = new MediaRecorder(stream);
        rec.recorder.ondataavailable = function (e) { if (e.data.size) rec.chunks.push(e.data); };
        rec.recorder.onstop = function () {
          if (rec.url) URL.revokeObjectURL(rec.url);
          rec.url = URL.createObjectURL(new Blob(rec.chunks, { type: "audio/webm" }));
          var p = document.getElementById("rec-play"); if (p) p.disabled = false;
        };
        rec.recorder.start();
        toggleRec(true);
      }).catch(function () {
        EM.showToast("マイクの使用が許可されませんでした", true);
      });
    });
    click("rec-stop", function () {
      if (rec.recorder && rec.recorder.state !== "inactive") rec.recorder.stop();
      if (rec.stream) rec.stream.getTracks().forEach(function (t) { t.stop(); });
      toggleRec(false);
    });
    click("rec-play", function () { if (rec.url) new Audio(rec.url).play(); });
  }
  function toggleRec(on) {
    var s = document.getElementById("rec-start"), e = document.getElementById("rec-stop");
    if (s) s.disabled = on; if (e) e.disabled = !on;
  }

  /* ---------- 終了（履歴保存）---------- */
  function finishHtml() {
    return '<button class="btn btn--primary btn--block mt-5" id="finish-btn" type="button">練習を終える</button>';
  }
  function bindFinish() {
    click("finish-btn", function () {
      Storage.recordStudy(3);
      Storage.incTotals({ shadowingRuns: 1, sessions: 1 });
      Storage.addHistory({ type: "shadowing", at: new Date().toISOString(), lines: cues.length });
      EM.refreshStreakBadge();
      EM.showToast("シャドーイングを記録しました");
      teardown();
      location.hash = "#/home";
    });
  }

  /* ---------- クリーンアップ ---------- */
  function teardown() {
    stopPolling();
    activeIdx = -1; loopA = loopB = null; loopOn = false;
    if (rec.recorder && rec.recorder.state !== "inactive") { try { rec.recorder.stop(); } catch (e) {} }
    if (rec.stream) { rec.stream.getTracks().forEach(function (t) { t.stop(); }); rec.stream = null; }
    if (player && player.destroy) { try { player.destroy(); } catch (e) {} player = null; }
  }

  function click(id, fn) { var el = document.getElementById(id); if (el) el.addEventListener("click", fn); }

  EM.registerView("#/video", { title: "動画学習", tab: "video", render: render });
})();

</script>
  <script>
/* ===== inlined: js/pronunciation.js ===== */
/* ============================================================
   pronunciation.js — 発音チェック（#/pron-check）
   - Web Speech API（SpeechRecognition）が使えれば、認識結果を
     目標文と単語単位で diff し、一致率(%)を表示。
   - 非対応ブラウザでは MediaRecorder 録音 → お手本と聞き比べにフォールバック。
   - 認識精度には限界がある旨を正直に明記する。
   ============================================================ */
(function () {
  "use strict";

  var TARGETS = [
    "Could you send me the report?",
    "I was wondering if you could help.",
    "Let's check it out together.",
    "Thank you for joining the meeting.",
    "We need to align on the goals."
  ];

  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var recognition = null;
  var rec = { recorder: null, chunks: [], url: null, stream: null };
  var current = TARGETS[0];

  function normalize(s) {
    return String(s).toLowerCase().replace(/[^a-z'\s]/g, "").split(/\s+/).filter(Boolean);
  }

  // LCS で目標語が認識結果に含まれるかを判定し、各目標語に ok/ng を付与
  function diffWords(target, said) {
    var t = normalize(target), s = normalize(said);
    var n = t.length, m = s.length;
    var dp = [];
    for (var i = 0; i <= n; i++) { dp.push(new Array(m + 1).fill(0)); }
    for (var i2 = 1; i2 <= n; i2++) {
      for (var j = 1; j <= m; j++) {
        dp[i2][j] = t[i2 - 1] === s[j - 1] ? dp[i2 - 1][j - 1] + 1 : Math.max(dp[i2 - 1][j], dp[i2][j - 1]);
      }
    }
    // バックトラックして一致語を特定
    var matched = new Array(n).fill(false);
    var i3 = n, j3 = m;
    while (i3 > 0 && j3 > 0) {
      if (t[i3 - 1] === s[j3 - 1]) { matched[i3 - 1] = true; i3--; j3--; }
      else if (dp[i3 - 1][j3] >= dp[i3][j3 - 1]) i3--;
      else j3--;
    }
    var hit = matched.filter(Boolean).length;
    var pct = n ? Math.round((hit / n) * 100) : 0;
    return { words: t, matched: matched, pct: pct };
  }

  function render() {
    return { html: '<section id="pron-root" class="view-enter"></section>', onMount: draw };
  }
  function root() { return document.getElementById("pron-root"); }

  function draw() {
    var targetChips = TARGETS.map(function (s, i) {
      return '<button class="choice-btn" type="button" data-target="' + i + '">' + EM.escapeHtml(s) + "</button>";
    }).join("");

    root().innerHTML =
      EM.backLink("#/pron", "発音メニュー") +
      '<p class="section-title">発音チェック</p>' +
      (SR
        ? '<div class="notice"><span class="notice__icon">!</span><span>音声認識は便利ですが万能ではありません。雑音や訛りで結果が変わるため、<strong>目安</strong>として使ってください。</span></div>'
        : '<div class="notice"><span class="notice__icon">!</span><span>このブラウザは音声認識に非対応です。<strong>録音して聞き比べる</strong>方式で練習します（Chrome系だと自動採点が使えます）。</span></div>') +

      '<p class="field__label mt-4">お手本の文を選ぶ</p>' +
      '<div id="targets">' + targetChips + "</div>" +
      '<div class="field mt-4"><label class="field__label" for="custom">自分で入力（任意）</label>' +
        '<input class="input" id="custom" type="text" placeholder="練習したい英文" /></div>' +

      '<div class="card mt-4">' +
        '<div class="row-between"><span class="field__label" style="margin:0">選択中の文</span>' +

        : recorderHtml()) +
      '<div id="result" class="mt-4"></div>';

    root().querySelectorAll("[data-target]").forEach(function (b) {
      b.addEventListener("click", function () {
        current = TARGETS[parseInt(b.getAttribute("data-target"), 10)];
        document.getElementById("custom").value = "";

    document.getElementById("custom").addEventListener("input", function (e) {
      if (e.target.value.trim()) current = e.target.value.trim();

  /* ---------- 音声認識モード ---------- */
  function runRecognition() {

    recognition.maxAlternatives = 1;

    btn.textContent = "🎙 話してください…";
    btn.disabled = true;

    recognition.onresult = function (e) {
      var said = e.results[0][0].transcript;
      showResult(said);

    recognition.onerror = function (ev) {
      EM.showToast(ev.error === "not-allowed" ? "マイクが許可されませんでした" : "認識できませんでした。もう一度お試しください", true);
    };

  function showResult(said) {

    var diffHtml = d.words.map(function (w, i) {
      return '<span class="w ' + (d.matched[i] ? "w-ok" : "w-ng") + '">' + EM.escapeHtml(w) + "</span>";
    }).join(" ");
    document.getElementById("result").innerHTML =
      '<div class="card">' +
        '<div class="meter"><div class="meter__value">' + d.pct + '%</div><div class="meter__label">単語一致率（目安）</div></div>' +
        '<p class="diff center">' + diffHtml + "</p>" +
        '<p class="text-soft center mt-4" style="font-size:var(--fs-small)">認識結果：「' + EM.escapeHtml(said) + "」</p>" +
        '<button class="btn btn--ghost btn--block mt-4" id="retry-model" type="button">▶ お手本をもう一度</button>' +
      "</div>";
    click("retry-model", function () { EM.speak(current); });

    // 学習量を記録（軽め）
    Storage.recordStudy(1);
    Storage.incTotals({ sessions: 1 });
    EM.refreshStreakBadge();
  }

  /* ---------- 録音フォールバック ---------- */
  function recorderHtml() {
    if (!(navigator.mediaDevices && window.MediaRecorder)) {
      return '<div class="notice mt-4"><span class="notice__icon">!</span><span>録音にも非対応の環境です。お手本を聞いて、声に出して真似る練習をしましょう。</span></div>';
    }
    return '<div class="card mt-4"><p class="section-eyebrow">録音して聞き比べ</p>' +
      '<div class="grade-row" style="grid-template-columns:1fr 1fr 1fr">' +
        '<button class="btn btn--ghost" id="rec-start" type="button">● 録音</button>' +
        '<button class="btn btn--ghost" id="rec-stop" type="button" disabled>■ 停止</button>' +
        '<button class="btn btn--ghost" id="rec-play" type="button" disabled>▶ 自分の声</button>' +
      "</div></div>";
  }
  function bindRecorder() {
    if (!(navigator.mediaDevices && window.MediaRecorder)) return;
    click("rec-start", function () {
      navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
        rec.stream = stream; rec.chunks = [];
        rec.recorder = new MediaRecorder(stream);
        rec.recorder.ondataavailable = function (e) { if (e.data.size) rec.chunks.push(e.data); };
        rec.recorder.onstop = function () {
          if (rec.url) URL.revokeObjectURL(rec.url);
          rec.url = URL.createObjectURL(new Blob(rec.chunks, { type: "audio/webm" }));
          var p = document.getElementById("rec-play"); if (p) p.disabled = false;
          Storage.recordStudy(1); Storage.incTotals({ sessions: 1 }); EM.refreshStreakBadge();
        };
        rec.recorder.start();
        setRec(true);
      }).catch(function () { EM.showToast("マイクが許可されませんでした", true); });
    });
    click("rec-stop", function () {
      if (rec.recorder && rec.recorder.state !== "inactive") rec.recorder.stop();
      if (rec.stream) rec.stream.getTracks().forEach(function (t) { t.stop(); });
      setRec(false);
    });
    click("rec-play", function () { if (rec.url) new Audio(rec.url).play(); });

  function setRec(on) {
    var s = document.getElementById("rec-start"), e = document.getElementById("rec-stop");
    if (s) s.disabled = on; if (e) e.disabled = !on;

  function click(id, fn) { var el = document.getElementById(id); if (el) el.addEventListener("click", fn); }

  EM.registerView("#/pron-check", { title: "発音チェック", tab: "pron", render: render });
})();

  <script>
/* ===== inlined: js/phonics.js ===== */
/* ============================================================
   phonics.js — フォニックス（#/phonics）
   タブ1：44音素一覧（IPA / つづり / 口の形 / 例語＋TTS）
   タブ2：ミニマルペア聞き分けゲーム（ランダム再生→2択→正答率）
   ============================================================ */
(function () {
  "use strict";

  var tab = "list";   // list | game
  var game = { pair: null, answer: null, correct: 0, total: 0 };

  function data() { return (window.EigoData && window.EigoData.phonics) || { phonemes: [], minimalPairs: [] }; }

  function render() {
    return { html: '<section id="phonics-root" class="view-enter"></section>', onMount: draw };
  }
  function root() { return document.getElementById("phonics-root"); }

  function draw() {
    root().innerHTML =
      EM.backLink("#/pron", "発音メニュー") +
      '<p class="section-title">フォニックス</p>' +
      '<div class="pill-tabs">' +
        '<button class="pill-tabs__btn" data-tab="list" aria-pressed="' + (tab === "list") + '">44音素</button>' +
        '<button class="pill-tabs__btn" data-tab="game" aria-pressed="' + (tab === "game") + '">聞き分けゲーム</button>' +
      "</div>" +
      '<div id="phonics-body"></div>';

    root().querySelectorAll("[data-tab]").forEach(function (b) {
      b.addEventListener("click", function () { tab = b.getAttribute("data-tab"); draw(); });
    });
    if (tab === "list") drawList(); else drawGame();
  }

  /* ---------- 音素一覧 ---------- */
  function drawList() {
    var ph = data().phonemes;
    var html = ph.map(function (p) {
      var exBtns = p.ex.map(function (w) {
        return '<button class="chip" type="button" data-say="' + EM.escapeHtml(w) + '">' + EM.escapeHtml(w) + " ▶</button>";
      }).join(" ");
      return '<div class="card" style="margin-bottom:var(--space-3)">' +
        '<div class="row-between">' +
          '<span class="flashcard__ipa" style="font-size:var(--fs-h1)">' + EM.escapeHtml(p.ipa) + "</span>" +
          '<span class="list-row__sub">' + EM.escapeHtml(p.type) + " ・ つづり：" + EM.escapeHtml(p.spell) + "</span>" +
        "</div>" +
        '<p class="setting-row__hint" style="margin-top:8px">' + EM.escapeHtml(p.mouth) + "</p>" +
        '<div class="chip-group mt-4">' + exBtns + "</div>" +
      "</div>";
    }).join("");
    document.getElementById("phonics-body").innerHTML = html;

    document.getElementById("phonics-body").querySelectorAll("[data-say]").forEach(function (b) {
      b.addEventListener("click", function () { EM.speak(b.getAttribute("data-say")); });
    });
  }

  /* ---------- 聞き分けゲーム ---------- */
  function newRound() {
    var pairs = data().minimalPairs;
    game.pair = pairs[Math.floor(Math.random() * pairs.length)];
    game.answer = Math.random() < 0.5 ? "a" : "b";
  }
  function drawGame() {
    if (!game.pair) newRound();
    var p = game.pair;
    var rate = game.total ? Math.round((game.correct / game.total) * 100) : 0;

    document.getElementById("phonics-body").innerHTML =
      '<div class="notice notice--info"><span class="notice__icon">i</span><span>「' + EM.escapeHtml(p.focus) +
        '」の聞き分け。再生ボタンを押し、どちらが聞こえたかを選んでください。</span></div>' +
      '<div class="center mt-5"><button class="audio-btn audio-btn--wide" id="play-sound" type="button" style="font-size:var(--fs-body);padding:12px 24px">🔊 再生する</button></div>' +
      '<div class="grade-row mt-5" style="grid-template-columns:1fr 1fr">' +
        '<button class="choice-btn center" data-pick="a" type="button">' + EM.escapeHtml(p.a) + "<br><small>" + EM.escapeHtml(p.ipaA) + "</small></button>" +
        '<button class="choice-btn center" data-pick="b" type="button">' + EM.escapeHtml(p.b) + "<br><small>" + EM.escapeHtml(p.ipaB) + "</small></button>" +
      "</div>" +
      '<div id="game-result"></div>' +
      '<div class="card mt-5"><div class="kv"><span class="kv__k">正答率</span><span class="kv__v">' + rate + "% （" + game.correct + "/" + game.total + "）</span></div></div>";

    document.getElementById("play-sound").addEventListener("click", playCurrent);
    document.getElementById("phonics-body").querySelectorAll("[data-pick]").forEach(function (b) {
      b.addEventListener("click", function () { judge(b.getAttribute("data-pick")); });
    });
    playCurrent();
  }
  function playCurrent() {
    var p = game.pair;
    EM.speak(game.answer === "a" ? p.a : p.b);
  }
  function judge(pick) {
    var p = game.pair;
    var correct = pick === game.answer;
    game.total += 1; if (correct) game.correct += 1;

    var said = game.answer === "a" ? p.a : p.b;
    document.getElementById("phonics-body").querySelectorAll("[data-pick]").forEach(function (b) {
      b.disabled = true;
      if (b.getAttribute("data-pick") === game.answer) b.classList.add("choice-btn--ok");
      else if (b.getAttribute("data-pick") === pick) b.classList.add("choice-btn--ng");
    });
    document.getElementById("game-result").innerHTML =
      '<div class="card mt-4 center">' +
        '<p class="list-row__title">' + (correct ? "正解！" : "おしい！") + "</p>" +
        '<p class="list-row__sub">正解は「' + EM.escapeHtml(said) + "」でした。</p>" +
        '<button class="btn btn--primary btn--block mt-4" id="next-round" type="button">次の問題へ</button>' +
      "</div>";

    Storage.recordStudy(1);
    document.getElementById("next-round").addEventListener("click", function () { newRound(); drawGame(); });
  }

  EM.registerView("#/phonics", { title: "フォニックス", tab: "pron", render: render });
})();

  <script>
/* ===== inlined: js/grammar.js ===== */
/* ============================================================
   grammar.js — 文法（#/grammar）
   レッスン一覧 → 各レッスン：解説 → 例文(TTS) → 並べ替え → 穴埋め → 英作文。
   ============================================================ */
(function () {
  "use strict";

  var currentId = null;
  var reorder = { source: [], answer: [], target: "" };

  function lessons() { return (window.EigoData && window.EigoData.grammar) || []; }
  function findLesson(id) { return lessons().find(function (l) { return l.id === id; }); }

  function render() {
    return { html: '<section id="grammar-root" class="view-enter"></section>', onMount: function () {
      if (currentId && findLesson(currentId)) drawLesson(currentId); else drawList();
    }};
  }
  function root() { return document.getElementById("grammar-root"); }

  /* ---------- 一覧 ---------- */
  function drawList() {
    currentId = null;
    var cards = lessons().map(function (l) {
      return '<button class="quick-card" type="button" data-lesson="' + l.id + '" style="text-align:left">' +
        '<span class="quick-card__title">' + EM.escapeHtml(l.title) + "</span>" +
        '<span class="quick-card__desc">' + EM.escapeHtml(l.ja.slice(0, 38)) + "…</span></button>";
    }).join("");
    root().innerHTML =
      '<p class="section-title">文法</p>' +
      '<p class="text-soft" style="font-size:var(--fs-small);margin-bottom:var(--space-4)">日本人がつまずきやすい順に並べています。</p>' +
      '<div class="quick-grid">' + cards + "</div>";
    root().querySelectorAll("[data-lesson]").forEach(function (b) {
      b.addEventListener("click", function () { drawLesson(b.getAttribute("data-lesson")); });
    });
  }

  /* ---------- レッスン ---------- */
  function drawLesson(id) {
    currentId = id;
    var l = findLesson(id);
    if (!l) return drawList();

    // 並べ替えの初期化
    reorder.target = l.reorder.answer;
    reorder.source = shuffle(tokenize(l.reorder.answer));
    reorder.answer = [];

    var examples = l.examples.map(function (ex) {
      return '<div class="list-row">' +
        '<div class="list-row__main"><div class="list-row__title">' + EM.escapeHtml(ex.en) + "</div>" +
          '<div class="list-row__sub">' + EM.escapeHtml(ex.ja) + "</div></div>" +
        '<button class="audio-btn" type="button" data-say="' + EM.escapeHtml(ex.en) + '" aria-label="再生">▶</button></div>';
    }).join("");

    var blankOptions = l.blank.options.map(function (o) {
      return '<button class="choice-btn" type="button" data-opt="' + EM.escapeHtml(o) + '">' + EM.escapeHtml(o) + "</button>";
    }).join("");

    root().innerHTML =
      '<a class="back-link" id="to-list" href="#/grammar">‹ 文法レッスン一覧</a>' +
      '<p class="section-title">' + EM.escapeHtml(l.title) + "</p>" +

      '<div class="card"><p class="section-eyebrow">解説</p><p style="line-height:var(--lh-base)">' + EM.escapeHtml(l.ja) + "</p></div>" +

      '<p class="section-title mt-5">例文</p>' +
      '<div class="card">' + examples + "</div>" +

      '<p class="section-title mt-5">並べ替え</p>' +
      '<div class="card">' +
        '<p class="list-row__sub">' + EM.escapeHtml(l.reorder.ja) + "</p>" +
        '<div class="tiles tiles--answer mt-4" id="ro-answer"></div>' +
        '<div class="tiles" id="ro-source"></div>' +
        '<div class="grade-row" style="grid-template-columns:1fr 1fr">' +
          '<button class="btn btn--ghost" id="ro-reset" type="button">リセット</button>' +
          '<button class="btn btn--primary" id="ro-check" type="button">こたえ合わせ</button>' +
        "</div>" +
        '<div id="ro-result" class="mt-4"></div>' +
      "</div>" +

      '<p class="section-title mt-5">穴埋め</p>' +
      '<div class="card">' +
        '<p class="diff" style="font-size:var(--fs-h2)">' + EM.escapeHtml(l.blank.before) +
          '<span class="w" style="background:var(--c-warm-soft)">____</span>' + EM.escapeHtml(l.blank.after) + "</p>" +
        '<p class="list-row__sub mt-4">' + EM.escapeHtml(l.blank.ja) + "</p>" +
        '<div class="mt-4" id="blank-opts">' + blankOptions + "</div>" +
      "</div>" +

      '<p class="section-title mt-5">英作文（セルフチェック）</p>' +
      '<div class="card">' +
        '<p class="list-row__sub">' + EM.escapeHtml(l.writing.prompt) + "</p>" +
        '<div class="field mt-4"><textarea class="textarea" id="writing-in" placeholder="英語で書いてみましょう"></textarea></div>' +
        '<button class="btn btn--ghost btn--block" id="show-model" type="button">模範解答を見る</button>' +
        '<div id="model-area" class="mt-4"></div>' +
      "</div>";

    bindLesson(l);
  }

  function bindLesson(l) {
    document.getElementById("to-list").addEventListener("click", function (e) { e.preventDefault(); drawList(); });

    root().querySelectorAll("[data-say]").forEach(function (b) {
      b.addEventListener("click", function () { EM.speak(b.getAttribute("data-say")); });
    });

    drawReorder();
    document.getElementById("ro-reset").addEventListener("click", function () {
      reorder.source = shuffle(tokenize(reorder.target)); reorder.answer = [];
      document.getElementById("ro-result").innerHTML = ""; drawReorder();
    });
    document.getElementById("ro-check").addEventListener("click", checkReorder);

    // 穴埋め
    root().querySelectorAll("#blank-opts .choice-btn").forEach(function (b) {
      b.addEventListener("click", function () {
        var ok = b.getAttribute("data-opt") === l.blank.answer;
        root().querySelectorAll("#blank-opts .choice-btn").forEach(function (x) {
          x.disabled = true;
          if (x.getAttribute("data-opt") === l.blank.answer) x.classList.add("choice-btn--ok");
          else if (x === b) x.classList.add("choice-btn--ng");
        });
        if (ok) { EM.speak(l.blank.before + l.blank.answer + l.blank.after); Storage.recordStudy(1); EM.refreshStreakBadge(); }
      });
    });

    // 英作文
    document.getElementById("show-model").addEventListener("click", function () {
      document.getElementById("model-area").innerHTML =
        '<div class="list-row"><div class="list-row__main"><div class="list-row__sub">模範解答</div>' +
          '<div class="list-row__title">' + EM.escapeHtml(l.writing.model) + "</div></div>" +
          '<button class="audio-btn" type="button" id="say-model" aria-label="再生">▶</button></div>';
      document.getElementById("say-model").addEventListener("click", function () { EM.speak(l.writing.model); });
      Storage.recordStudy(1); EM.refreshStreakBadge();
    });
  }

  /* ---------- 並べ替えウィジェット ---------- */
  function drawReorder() {
    var ans = document.getElementById("ro-answer");
    var src = document.getElementById("ro-source");
    if (!ans || !src) return;
    ans.innerHTML = reorder.answer.map(function (t, i) {
      return '<button class="tile" type="button" data-from="answer" data-i="' + i + '">' + EM.escapeHtml(t) + "</button>";
    }).join("") || '<span class="text-soft" style="font-size:var(--fs-small)">下の語をタップして並べます</span>';
    src.innerHTML = reorder.source.map(function (t, i) {
      return '<button class="tile" type="button" data-from="source" data-i="' + i + '">' + EM.escapeHtml(t) + "</button>";
    }).join("");

    ans.querySelectorAll("[data-i]").forEach(function (b) {
      b.addEventListener("click", function () {
        var i = parseInt(b.getAttribute("data-i"), 10);
        reorder.source.push(reorder.answer.splice(i, 1)[0]); drawReorder();
      });
    });
    src.querySelectorAll("[data-i]").forEach(function (b) {
      b.addEventListener("click", function () {
        var i = parseInt(b.getAttribute("data-i"), 10);
        reorder.answer.push(reorder.source.splice(i, 1)[0]); drawReorder();
      });
    });
  }
  function checkReorder() {
    var built = reorder.answer.join(" ");
    var ok = built === reorder.target;
    document.getElementById("ro-result").innerHTML =
      '<div class="diff center">' + (ok
        ? '<span class="w w-ok">' + EM.escapeHtml(reorder.target) + "</span>"
        : '<span class="w w-ng">' + EM.escapeHtml(built || "（未配置）") + '</span><br>正解：<span class="w w-ok">' + EM.escapeHtml(reorder.target) + "</span>") +
      "</div>";
    if (ok) { EM.speak(reorder.target); Storage.recordStudy(1); EM.refreshStreakBadge(); }
  }

  /* ---------- ユーティリティ ---------- */
  function tokenize(sentence) {
    // 末尾の句読点は直前の語にくっつける
    return sentence.trim().split(/\s+/);
  }
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    // 偶然そろってしまったら軽くずらす
    if (a.join(" ") === arr.join(" ") && a.length > 1) { var x = a.shift(); a.push(x); }
    return a;
  }

  EM.registerView("#/grammar", { title: "文法", tab: "home", render: render });
})();

</script>

        '<strong>' + EM.escapeHtml(s.title) + "</strong> <small>（" + s.level + "）</small></button>";
    }).join("");

    root().innerHTML =
      '<p class="section-title">リーディング</p>' +
      '<p class="field__label">サンプルを選ぶ</p>' + chips +
      '<div class="field mt-4"><label class="field__label" for="read-in">または自分のテキストを貼り付け</label>' +
        '<textarea class="textarea" id="read-in" placeholder="英文を貼り付け"></textarea></div>' +
      '<button class="btn btn--primary btn--block" id="read-go" type="button">読む</button>';

    root().querySelectorAll("[data-sample]").forEach(function (b) {
      b.addEventListener("click", function () {
        var s = samples()[parseInt(b.getAttribute("data-sample"), 10)];
        document.getElementById("read-in").value = s.text;
      });
    });
    document.getElementById("read-go").addEventListener("click", function () {
      var text = (document.getElementById("read-in").value || "").trim();
      if (!text) { EM.showToast("テキストを入力してください", true); return; }

  function drawReader() {
    var lines = st.cues.map(function (c, i) {
      var words = c.text.split(/\s+/).map(function (w) {
        return '<span class="word" data-word="' + EM.escapeHtml(w) + '">' + EM.escapeHtml(w) + "</span>";
      }).join(" ");
      return '<div class="lyric__line" data-line="' + i + '"><div class="lyric__en">' + words + "</div></div>";
    }).join("");

    var wpmChips = WPM_OPTIONS.map(function (w) {
      return '<button class="chip" type="button" data-wpm="' + w + '" aria-pressed="' + (w === st.wpm) + '">' + w + " wpm</button>";
    }).join("");

    root().innerHTML =
      '<a class="back-link" id="to-setup" href="#/reading">‹ テキストを選び直す</a>' +
      '<div class="notice notice--info"><span class="notice__icon">i</span><span>文をタップで読み上げ、単語をタップで意味を表示します。</span></div>' +
      '<div class="card mt-4"><div class="lyric" id="reader">' + lines + "</div></div>" +

      '<div class="card mt-4"><p class="section-eyebrow">速読モード（WPM）</p>' +
        '<div class="chip-group">' + wpmChips + "</div>" +
        '<div class="center mt-4"><div class="meter__value" id="wpm-word" style="min-height:54px">—</div></div>' +
        '<div class="grade-row" style="grid-template-columns:1fr 1fr">' +
          '<button class="btn btn--primary" id="wpm-start" type="button">スタート</button>' +
          '<button class="btn btn--ghost" id="wpm-stop" type="button">ストップ</button>' +
        "</div></div>" +

      '<div id="dict-panel"></div>';

    document.getElementById("to-setup").addEventListener("click", function (e) { e.preventDefault(); drawSetup(); });

    // 文クリックで読み上げ
    root().querySelectorAll(".lyric__line").forEach(function (line) {
      line.addEventListener("click", function (e) {
        if (e.target.classList.contains("word")) return; // 単語タップは別処理
        var i = parseInt(line.getAttribute("data-line"), 10);
        EM.speak(st.cues[i].text);
        Storage.recordStudy(1); EM.refreshStreakBadge();
      });
    });
    // 単語タップ辞書
    root().querySelectorAll(".word").forEach(function (sp) {
      sp.addEventListener("click", function (e) {
        e.stopPropagation();
        showDict(sp.getAttribute("data-word"));
      });
    });
    // WPM
    root().querySelectorAll("[data-wpm]").forEach(function (b) {
      b.addEventListener("click", function () {
        st.wpm = parseInt(b.getAttribute("data-wpm"), 10);
        root().querySelectorAll("[data-wpm]").forEach(function (x) { x.setAttribute("aria-pressed", x === b ? "true" : "false"); });
      });
    });
    document.getElementById("wpm-start").addEventListener("click", startWpm);
    document.getElementById("wpm-stop").addEventListener("click", stopWpm);
  }

  /* ---------- 単語辞書 ---------- */
  function lookup(raw) {
    var key = raw.toLowerCase().replace(/[^a-z']/g, "");
    var words = (window.EigoData && window.EigoData.words) || [];
    var hit = words.find(function (w) { return w.en.toLowerCase() === key; });
    if (hit) return { en: hit.en, ipa: hit.ipa, kata: hit.kata, ja: hit.ja };
    var dict = (window.EigoData && window.EigoData.pronDict) || {};
    if (dict[key]) return { en: key, ipa: dict[key].ipa, kata: dict[key].kata, ja: "" };
    return { en: key, ipa: "", kata: window.Katakana ? window.Katakana.wordToKatakana(key) : "", ja: "" };
  }
  function showDict(raw) {
    var d = lookup(raw);
    var panel = document.getElementById("dict-panel");
    panel.innerHTML =
      '<div class="card mt-4">' +
        '<div class="row-between">' +
          '<div><span class="flashcard__word" style="font-size:var(--fs-h1)">' + EM.escapeHtml(d.en) + "</span> " +
            '<span class="flashcard__ipa" style="font-size:var(--fs-body)">' + EM.escapeHtml(d.ipa) + "</span></div>" +
          '<button class="audio-btn" id="dict-say" type="button" aria-label="再生">▶</button>' +
        "</div>" +
        '<p class="list-row__sub mt-4">' + EM.escapeHtml(d.kata) + (d.ja ? " ・ " + EM.escapeHtml(d.ja) : "") + "</p>" +
        '<button class="btn btn--ghost btn--block mt-4" id="dict-add" type="button">＋ 単語帳に追加</button>' +
      "</div>";
    panel.scrollIntoView({ block: "nearest", behavior: "smooth" });
    document.getElementById("dict-say").addEventListener("click", function () { EM.speak(d.en); });
    document.getElementById("dict-add").addEventListener("click", function () {
      Storage.addToWordbook({ en: d.en, ja: d.ja, ipa: d.ipa });
      EM.showToast("単語帳に追加しました");
    });
    EM.speak(d.en);
  }

  /* ---------- WPM速読 ---------- */
  function startWpm() {
    stopWpm();
    st.wordIdx = 0;
    var interval = Math.round(60000 / st.wpm);
    var disp = document.getElementById("wpm-word");
    st.timer = setInterval(function () {
      if (st.wordIdx >= st.words.length) { stopWpm(); disp.textContent = "完了"; Storage.recordStudy(1); EM.refreshStreakBadge(); return; }
      disp.textContent = st.words[st.wordIdx];
      st.wordIdx += 1;
    }, interval);
  }
  function stopWpm() { if (st.timer) { clearInterval(st.timer); st.timer = null; } }

  EM.registerView("#/reading", { title: "リーディング", tab: "home", render: render });
})();

</script>
  <script>
/* ===== inlined: js/diagnosis.js ===== */
/* ============================================================
   diagnosis.js — レベル診断（#/diagnosis）
   10問の選択式 → 正答数からレベル(A1〜C1)を判定し、profile.level に保存。
   結果に応じた学習パスを提示する。
   ============================================================ */
(function () {
  "use strict";

  var st = { idx: 0, correct: 0, started: false };

  // 正答数 → レベルと助言
  var BANDS = [
    { min: 9, level: "C1", advice: "高度な語彙と仮定法も安定。シャドーイングとリンキングで自然さを磨き、専門分野の多読に進みましょう。" },
    { min: 7, level: "B2", advice: "実務に必要な土台は十分。発音チェックとリンキングで「通じる」から「自然」へ。B2〜C1の語彙を増やしましょう。" },
    { min: 5, level: "B1", advice: "基礎は固まりつつあります。現在完了・関係詞を復習し、単語SRSとシャドーイングを習慣化しましょう。" },
    { min: 3, level: "A2", advice: "簡単なやり取りはOK。前置詞と冠詞を重点的に、フォニックスで音の基礎も整えましょう。" },
    { min: 0, level: "A1", advice: "ここがスタート地点。単語SRSとフォニックスから始め、短い文の音読を毎日少しずつ。" }
  ];

  function questions() { return (window.EigoData && window.EigoData.diagnosis) || []; }

  function render() {
    return { html: '<section id="diag-root" class="view-enter"></section>', onMount: drawIntro };
  }
  function root() { return document.getElementById("diag-root"); }

  function drawIntro() {
    var saved = Storage.getState().profile.level;
    root().innerHTML =
      '<p class="section-title">レベル診断</p>' +
      '<div class="card"><p style="line-height:var(--lh-base)">10問の選択問題であなたの目安レベル（CEFR A1〜C1）を判定します。所要時間は約2分です。</p>' +
        (saved ? '<div class="kv mt-4"><span class="kv__k">現在の記録</span><span class="kv__v">' + EM.escapeHtml(saved) + "</span></div>" : "") +
      "</div>" +
      '<button class="btn btn--primary btn--block mt-4" id="diag-start" type="button">診断をはじめる</button>';
    document.getElementById("diag-start").addEventListener("click", function () {
      st.idx = 0; st.correct = 0; st.started = true; drawQuestion();
    });
  }

  function drawQuestion() {
    var qs = questions();
    if (st.idx >= qs.length) return drawResult();
    var q = qs[st.idx];
    var pct = Math.round((st.idx / qs.length) * 100);

    root().innerHTML =
      '<div class="progress-bar"><div class="progress-bar__fill" style="width:' + pct + '%"></div></div>' +
      '<p class="center text-soft" style="font-size:var(--fs-tiny);margin-bottom:var(--space-3)">' + (st.idx + 1) + " / " + qs.length + "</p>" +
      '<div class="card"><p class="flashcard__ja" style="font-size:var(--fs-h2)">' + EM.escapeHtml(q.q) + "</p></div>" +
      '<div class="mt-4" id="diag-opts">' +
        q.options.map(function (o, i) {
          return '<button class="choice-btn" type="button" data-i="' + i + '">' + EM.escapeHtml(o) + "</button>";
        }).join("") +
      "</div>";

    root().querySelectorAll("[data-i]").forEach(function (b) {
      b.addEventListener("click", function () {
        var pick = parseInt(b.getAttribute("data-i"), 10);
        var ok = pick === q.answer;
        if (ok) st.correct += 1;
        root().querySelectorAll("[data-i]").forEach(function (x, xi) {
          x.disabled = true;
          if (xi === q.answer) x.classList.add("choice-btn--ok");
          else if (x === b) x.classList.add("choice-btn--ng");
        });
        var next = document.createElement("button");
        next.className = "btn btn--primary btn--block mt-4";
        next.textContent = st.idx + 1 >= qs.length ? "結果を見る" : "次の問題へ";
        next.addEventListener("click", function () { st.idx += 1; drawQuestion(); });
        root().appendChild(next);
      });
    });
  }

  function drawResult() {
    var band = BANDS.find(function (b) { return st.correct >= b.min; });
    Storage.update(function (s) { s.profile.level = band.level; return s; });
    Storage.recordStudy(2);
    Storage.incTotals({ sessions: 1 });
    EM.refreshStreakBadge();

    root().innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-state__icon">' + EM.escapeHtml(band.level) + "</div>" +
        '<p class="empty-state__title">あなたの目安レベルは ' + EM.escapeHtml(band.level) + "</p>" +
        '<p class="empty-state__body">' + st.correct + " / " + questions().length + " 問正解</p>" +
      "</div>" +
      '<div class="card"><p class="section-eyebrow">これからの学習パス</p><p style="line-height:var(--lh-base)">' + EM.escapeHtml(band.advice) + "</p></div>" +
      '<a class="btn btn--primary btn--block mt-4" href="#/vocab">単語学習へ</a>' +
      '<a class="btn btn--ghost btn--block mt-4" href="#/home">ホームへ戻る</a>';
  }

  EM.registerView("#/diagnosis", { title: "レベル診断", tab: "home", render: render });
})();

</script>
