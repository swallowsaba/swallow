      <h1 class="page-title">問題演習</h1>
      <p class="page-lede">
        G検定形式の <strong>480問</strong>のオリジナル演習。
        各章 20 問×24章。解答解説付き。トピックを選んで実戦力を磨きましょう。
      </p>

      <div id="quiz-selector">
        <div class="section-h"><h2>主要トピック</h2></div>
        <div class="quiz-topics" id="main-topics"></div>

        <div class="section-h" style="margin-top:32px;"><h2>章ごとに演習</h2><span class="count">24章 × 20問</span></div>
        <div class="quiz-topics" id="chapter-topics"></div>
      </div>

      <div id="quiz-runner" class="quiz-runner" style="display:none;"></div>
    </div>
    <script src="assets/data/quiz.js" defer></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var quizState = { topic: null, questions: [], idx: 0, answers: [], correct: 0 };
        var $sel = document.getElementById('quiz-selector');
        var $run = document.getElementById('quiz-runner');
        var $main = document.getElementById('main-topics');
        var $chap = document.getElementById('chapter-topics');

        function renderTopics() {
          if (!window.QUIZ_DATA) return;
          $main.innerHTML = QUIZ_DATA.topics.map(function(t) {
            return '<div class="quiz-topic-card" data-topic-id="' + t.id + '">' +
              '<div class="quiz-topic-card__count">' + t.count + '問</div>' +
              '<div class="quiz-topic-card__title">' + t.label + '</div>' +
              '<div class="quiz-topic-card__desc">' + t.desc + '</div>' +
              '</div>';
          }).join('');
          $chap.innerHTML = QUIZ_DATA.chapters.map(function(t) {
            return '<div class="quiz-topic-card" data-topic-id="' + t.id + '">' +
              '<div class="quiz-topic-card__count">' + t.count + '問</div>' +
              '<div class="quiz-topic-card__title">' + t.label + '</div>' +
              '</div>';
          }).join('');
          document.querySelectorAll('.quiz-topic-card').forEach(function(c) {
            c.addEventListener('click', function() { startQuiz(c.getAttribute('data-topic-id')); });
          });
        }

        function findTopic(id) {
          var all = QUIZ_DATA.topics.concat(QUIZ_DATA.chapters);
          return all.find(function(t) { return t.id === id; });
        }

        function shuffle(arr) {
          var a = arr.slice();
          for (var i = a.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = a[i]; a[i] = a[j]; a[j] = t;
          }
          return a;
        }

        function startQuiz(topicId) {
          var topic = findTopic(topicId);
          if (!topic || !topic.problems.length) return;
          var n = Math.min(10, topic.problems.length); // 10 problems per session
          quizState = { topic: topic, questions: shuffle(topic.problems).slice(0, n), idx: 0, answers: [], correct: 0 };
          $sel.style.display = 'none';
          $run.style.display = 'block';
          renderQuestion();
        }

        function renderQuestion() {
          var q = quizState.questions[quizState.idx];
          var letters = ['①', '②', '③', '④', '⑤'];
          var choicesHtml = q.choices.map(function(c, i) {
            return '<button class="quiz-choice" data-idx="' + i + '">' +
              '<span class="quiz-choice__letter">' + letters[i] + '</span>' +
              '<span>' + c + '</span></button>';
          }).join('');
          $run.innerHTML =
            '<div class="quiz-progress-info"><span>' + quizState.topic.label + '</span><span>' + (quizState.idx + 1) + ' / ' + quizState.questions.length + '</span></div>' +
            '<div class="pbar pbar--thick" style="margin-bottom:20px;"><div class="pbar__fill" style="width:' + ((quizState.idx) / quizState.questions.length * 100) + '%;background:var(--accent);"></div></div>' +
            '<div class="quiz-card-active">' +
              '<div class="quiz-q-num">問 ' + (quizState.idx + 1) + '</div>' +
              '<div class="quiz-q-text">' + q.q + '</div>' +
              '<div class="quiz-choices">' + choicesHtml + '</div>' +
              '<div class="quiz-feedback" id="qf"></div>' +
              '<div class="quiz-actions" id="qa" style="display:none;">' +
                '<button class="btn btn--ghost" id="quit-btn">中断</button>' +
                '<button class="btn btn--primary" id="next-btn">' + (quizState.idx + 1 >= quizState.questions.length ? '結果を見る →' : '次へ →') + '</button>' +
              '</div>' +
              '<div class="quiz-actions" id="qa-init"><button class="btn btn--ghost" id="quit-btn-2">中断</button></div>' +
            '</div>';
          document.querySelectorAll('.quiz-choice').forEach(function(b) {
            b.addEventListener('click', function() { selectAnswer(parseInt(b.getAttribute('data-idx'))); });
          });
          var quit = document.getElementById('quit-btn-2');
          if (quit) quit.addEventListener('click', exitQuiz);
        }

        function selectAnswer(idx) {
          var q = quizState.questions[quizState.idx];
          quizState.answers.push(idx);
          var isCorrect = (idx === q.answer);
          if (isCorrect) quizState.correct++;
          document.querySelectorAll('.quiz-choice').forEach(function(b, i) {
            b.disabled = true;
            if (i === q.answer) b.classList.add('is-correct');
            else if (i === idx) b.classList.add('is-incorrect');
            else if (i === idx) b.classList.add('is-selected');
          });
          var fb = document.getElementById('qf');
          fb.classList.add(isCorrect ? 'is-correct' : 'is-incorrect');
          fb.innerHTML = '<strong>' + (isCorrect ? '✓ 正解！' : '✗ 不正解') + '</strong> ' + q.explanation;
          document.getElementById('qa').style.display = 'flex';
          document.getElementById('qa-init').style.display = 'none';
          document.getElementById('next-btn').addEventListener('click', nextQuestion);
          document.getElementById('quit-btn').addEventListener('click', exitQuiz);
        }

        function nextQuestion() {
          quizState.idx++;
          if (quizState.idx >= quizState.questions.length) { showResult(); }
          else { renderQuestion(); }
        }

        function showResult() {
          var pct = Math.round((quizState.correct / quizState.questions.length) * 100);
          $run.innerHTML =
            '<div class="quiz-result">' +
              '<div style="font-size:48px;">' + (pct >= 80 ? '🏆' : pct >= 60 ? '🎉' : '📚') + '</div>' +
              '<div class="quiz-result__score">' + pct + '%</div>' +
              '<div class="quiz-result__label">' + quizState.correct + ' / ' + quizState.questions.length + ' 問正解 — ' + quizState.topic.label + '</div>' +
              '<div style="display:flex;gap:10px;justify-content:center;">' +
                '<button class="btn btn--primary" id="retry-btn">もう一度挑戦</button>' +
                '<button class="btn btn--ghost" id="back-btn">他のトピックを選ぶ</button>' +
              '</div>' +
            '</div>';
          document.getElementById('retry-btn').addEventListener('click', function() { startQuiz(quizState.topic.id); });
          document.getElementById('back-btn').addEventListener('click', exitQuiz);
          if (window.Swallow && Swallow.Store) Swallow.Store.addXP(pct, 'クイズ完了 (' + pct + '%)');
        }

        function exitQuiz() {
          $run.style.display = 'none';
          $sel.style.display = 'block';
          window.scrollTo({top: 0, behavior: 'smooth'});
        }

        renderTopics();
      });
    </script>

  </main>
