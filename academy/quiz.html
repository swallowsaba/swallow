<div class="wrap wrap--wide">
  <div id="quiz-selector">
    <div class="head">
      <div class="eyebrow"><span class="dot"></span>Quiz</div>
      <h1>問題演習</h1>
      <p class="desc">G検定形式の <strong>474問</strong> のオリジナル演習。各問は解説付き、関連章への直接リンクで深掘りできます。<strong>1セッション10問</strong>をランダム出題します。</p>
    </div>
    <div class="sec">
      <div class="sec-head"><h2>主要トピック</h2></div>
      <div class="quiz-topics" id="main-topics"></div>
    </div>
    <div class="sec">
      <div class="sec-head"><h2>章ごとに演習</h2><span class="meta">24章</span></div>
      <div class="quiz-topics" id="chapter-topics"></div>
    </div>
  </div>
  <div id="quiz-runner" class="quiz-runner" style="display:none;"></div>
</div>
<script src="assets/data/quiz.js" defer></script>
<script src="assets/js/main.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var $sel=document.getElementById('quiz-selector'),$run=document.getElementById('quiz-runner');
  var $main=document.getElementById('main-topics'),$chap=document.getElementById('chapter-topics');
  var state=null,L=['A','B','C','D','E'];
  function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
  function findTopic(id){if(!window.QUIZ_DATA)return null;return QUIZ_DATA.topics.concat(QUIZ_DATA.chapters).find(function(t){return t.id===id;});}
  function renderTopics(){
    if(!window.QUIZ_DATA){$main.innerHTML='<div class="search-empty">読み込み中…</div>';setTimeout(renderTopics,100);return;}
    $main.innerHTML=QUIZ_DATA.topics.map(function(t){return '<div class="quiz-topic-card" data-id="'+t.id+'"><div class="quiz-topic-card__count">'+t.count+' 問</div><div class="quiz-topic-card__title">'+t.label+'</div><div class="quiz-topic-card__desc">'+t.desc+'</div></div>';}).join('');
    $chap.innerHTML=QUIZ_DATA.chapters.map(function(t){return '<div class="quiz-topic-card" data-id="'+t.id+'"><div class="quiz-topic-card__count">'+t.count+' 問</div><div class="quiz-topic-card__title">'+t.label+'</div></div>';}).join('');
    document.querySelectorAll('.quiz-topic-card').forEach(function(c){c.addEventListener('click',function(){startQuiz(c.getAttribute('data-id'));});});
  }
  function startQuiz(id){var t=findTopic(id);if(!t||!t.problems.length)return;var n=Math.min(10,t.problems.length);state={topic:t,questions:shuffle(t.problems).slice(0,n),idx:0,correct:0,answered:false};$sel.style.display='none';$run.style.display='block';window.scrollTo(0,0);renderQuestion();}
  function renderQuestion(){
    var p=state.questions[state.idx],pct=state.idx/state.questions.length*100;
    var ch=p.choices.map(function(c,i){return '<button class="quiz-choice" data-i="'+i+'"><span class="quiz-choice__letter">'+L[i]+'</span><span>'+c+'</span></button>';}).join('');
    $run.innerHTML='<div class="quiz-progress-info"><span>'+state.topic.label+'</span><span>'+(state.idx+1)+' / '+state.questions.length+'</span></div>'+
      '<div class="quiz-topbar"><div class="bar"><div class="bar-fill" style="width:'+pct+'%"></div></div></div>'+
      '<div class="quiz-card-active"><div class="quiz-q-num">'+p.section+'</div><div class="quiz-q-text">'+p.q+'</div><div>'+ch+'</div><div id="ex"></div></div>'+
      '<div class="quiz-actions"><button class="btn btn--ghost btn--sm" id="quit">中断して戻る</button><div id="nx"></div></div>';
    state.answered=false;
    document.querySelectorAll('.quiz-choice').forEach(function(b){b.addEventListener('click',function(){answer(parseInt(b.getAttribute('data-i')));});});
    document.getElementById('quit').addEventListener('click',exitQuiz);
  }
  function answer(i){
    if(state.answered)return;state.answered=true;
    var p=state.questions[state.idx],ok=(i===p.answer);if(ok)state.correct++;
    document.querySelectorAll('.quiz-choice').forEach(function(b,j){b.disabled=true;if(j===p.answer)b.classList.add('is-correct');else if(j===i)b.classList.add('is-incorrect');});
    var link=p.chapter_url?'<a class="quiz-explain__link" href="'+p.chapter_url+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>この問題を章で確認する</a>':'';
    document.getElementById('ex').innerHTML='<div class="quiz-explain"><div class="quiz-explain__status '+(ok?'ok':'ng')+'"><span class="quiz-explain__status-icon">'+(ok?'✓':'✕')+'</span>'+(ok?'正解':'不正解')+'</div><div class="quiz-explain__body"><div class="quiz-explain__answer">正解 — <strong>'+L[p.answer]+'. '+p.choices[p.answer]+'</strong></div><div class="quiz-explain__label">解説</div><div class="quiz-explain__text">'+p.explanation+'</div>'+link+'</div></div>';
    document.getElementById('nx').innerHTML='<button class="btn btn--primary" id="next">'+(state.idx+1>=state.questions.length?'結果を見る':'次の問題')+'</button>';
    document.getElementById('next').addEventListener('click',next);
    setTimeout(function(){document.getElementById('ex').scrollIntoView({behavior:'smooth',block:'nearest'});},80);
  }
  function next(){state.idx++;if(state.idx>=state.questions.length)showResult();else{renderQuestion();window.scrollTo({top:0,behavior:'smooth'});}}
  function showResult(){
    var pct=Math.round(state.correct/state.questions.length*100);
    $run.innerHTML='<div class="quiz-result"><div class="quiz-result__pct">'+pct+'%</div><div class="quiz-result__detail">'+state.correct+' / '+state.questions.length+' 問 正解</div><div class="quiz-result__topic">'+state.topic.label+'</div><div class="quiz-result__actions"><button class="btn btn--primary" id="retry">もう一度</button><button class="btn btn--ghost" id="back">トピック一覧へ</button></div></div>';
    document.getElementById('retry').addEventListener('click',function(){startQuiz(state.topic.id);});
    document.getElementById('back').addEventListener('click',exitQuiz);
    if(window.Swallow&&Swallow.Store)Swallow.Store.addXP(pct,'クイズ完了 ('+pct+'%)');
  }
  function exitQuiz(){$run.style.display='none';$sel.style.display='block';window.scrollTo({top:0,behavior:'smooth'});}
  renderTopics();
});
</script>
</body>
