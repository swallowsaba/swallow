# mainブランチへのpush時にGitHub Pagesへ自動デプロイ
# ルートに index.html が無ければサブディレクトリ一覧を自動生成する
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # Node 20非推奨の警告対策: アクションを強制的にNode 24で実行する
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate landing page if root index.html is missing
        run: |
          if [ -f index.html ]; then
            echo "Root index.html already exists — keeping it as-is."
            exit 0
          fi

          echo "No root index.html — generating landing page from subdirectories..."

          # index.html を含むサブディレクトリを列挙 (.git や .github は除外)
          mapfile -t DIRS < <(find . -maxdepth 2 -name index.html -not -path "./index.html" -not -path "./.*/*" \
                                | sed -E 's|^\./||;s|/index\.html$||' | sort)

          {
            cat <<'HTML_HEAD'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Swallow — Projects</title>
          <style>
            :root {
              --bg:#0d1117; --panel:#161b22; --border:#30363d;
              --text:#e6edf3; --text-dim:#8d96a0; --accent:#58a6ff;
              --purple:#a371f7;
            }
            *{box-sizing:border-box}
            body{margin:0;padding:40px 20px;background:var(--bg);color:var(--text);
              font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans",sans-serif;
              min-height:100vh;display:flex;flex-direction:column;align-items:center}
            h1{font-size:32px;margin:0 0 8px;
              background:linear-gradient(135deg,var(--accent),var(--purple));
              -webkit-background-clip:text;background-clip:text;color:transparent}
            .sub{color:var(--text-dim);margin-bottom:32px;font-size:14px}
            .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
              gap:14px;max-width:900px;width:100%}
            a.card{display:block;padding:18px 20px;background:var(--panel);border:1px solid var(--border);
              border-radius:10px;color:var(--text);text-decoration:none;
              transition:border-color .15s,transform .1s,box-shadow .15s}
            a.card:hover{border-color:var(--accent);transform:translateY(-2px);
              box-shadow:0 4px 16px rgba(88,166,255,0.15)}
            a.card .name{font-size:16px;font-weight:600}
            a.card .path{color:var(--text-dim);font-size:12px;font-family:"SFMono-Regular",Menlo,monospace;
              margin-top:4px}
            .empty{color:var(--text-dim);font-style:italic;margin-top:20px}
            footer{margin-top:auto;padding-top:40px;color:var(--text-dim);font-size:11px}
            footer a{color:var(--accent);text-decoration:none}
          </style>
          </head>
          <body>
          <h1>⚡ Swallow</h1>
          <div class="sub">Projects deployed on GitHub Pages</div>
          <div class="grid">
          HTML_HEAD

            if [ ${#DIRS[@]} -eq 0 ]; then
              echo '<div class="empty">No subdirectories with index.html were found.</div>'
            else
              for d in "${DIRS[@]}"; do
                echo "<a class=\"card\" href=\"${d}/\"><div class=\"name\">${d}</div><div class=\"path\">/${d}/</div></a>"
              done
            fi

            cat <<HTML_FOOT
          </div>
          <footer>
            Auto-generated on $(date -u +"%Y-%m-%d %H:%M UTC") · 
            <a href="https://github.com/${{ github.repository }}">${{ github.repository }}</a>
          </footer>
          </body>
          </html>
          HTML_FOOT
          } > index.html

          echo "Generated landing page with ${#DIRS[@]} project(s)."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
