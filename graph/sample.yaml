environments:
  - id: prod
    label: 本番
    color: "#e74c3c"
  - id: stg
    label: ステージング
    color: "#f39c12"
  - id: dev
    label: 開発
    color: "#3fb950"

zones:
  - id: dmz
    label: DMZ
    color: "rgba(231, 76, 60, 0.12)"
    x: 30
    y: 40
    width: 680
    height: 320
    environments: [prod, stg, dev]
  - id: web
    label: Web Servers
    color: "rgba(52, 152, 219, 0.15)"
    parent: dmz
    x: 250
    y: 90
    width: 440
    height: 240
  - id: internal
    label: Internal LAN
    color: "rgba(46, 204, 113, 0.12)"
    x: 30
    y: 410
    width: 680
    height: 250
  - id: db-zone
    label: Database
    color: "rgba(241, 196, 15, 0.15)"
    parent: internal
    x: 360
    y: 460
    width: 330
    height: 170

nodes:
  - id: firewall
    label: Firewall
    color: "rgba(231, 76, 60, 0.8)"
    zone: dmz
    x: 60
    y: 160
    width: 140
    height: 60
  - id: web01
    label: Web-01
    color: "rgba(52, 152, 219, 0.8)"
    zone: web
    x: 280
    y: 130
    width: 130
    height: 55
  - id: web02
    label: Web-02
    color: "rgba(41, 128, 185, 0.8)"
    zone: web
    x: 440
    y: 130
    width: 130
    height: 55
    environments: [prod, stg]
  - id: lb
    label: Load Balancer
    color: "rgba(155, 89, 182, 0.8)"
    zone: web
    x: 350
    y: 240
    width: 140
    height: 55
  - id: app-server
    label: App Server
    color: "rgba(46, 204, 113, 0.8)"
    zone: internal
    x: 60
    y: 500
    width: 140
    height: 60
  - id: db-primary
    label: DB Primary
    color: "rgba(243, 156, 18, 0.8)"
    zone: db-zone
    x: 390
    y: 500
    width: 130
    height: 55
  - id: db-replica
    label: DB Replica
    color: "rgba(230, 126, 34, 0.8)"
    zone: db-zone
    x: 540
    y: 500
    width: 130
    height: 55
    environments: [prod]

connections:
  - from: firewall
    to: lb
    protocol: HTTPS
    port: 443
    bidirectional: false
  - from: lb
    to: web01
    protocol: HTTP
    port: 80
    bidirectional: false
  - from: lb
    to: web02
    protocol: HTTP
    port: 80
    bidirectional: false
  - from: web01
    to: app-server
    protocol: HTTP
    port: 8080
    ports: {prod: 8080, stg: 18080, dev: 3000}
    bidirectional: false
  - from: web02
    to: app-server
    protocol: HTTP
    port: 8080
    ports: {prod: 8080, stg: 18080}
    environments: [prod, stg]
    bidirectional: false
  - from: app-server
    to: db-primary
    protocol: TCP
    port: 5432
    bidirectional: false
  - from: db-primary
    to: db-replica
    protocol: TCP
    port: 5432
    bidirectional: false
  - from: firewall
    to: app-server
    protocol: SSH
    port: 22
    bidirectional: true
