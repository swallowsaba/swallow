  html += '<div style="font-size:12px;color:var(--t2);margin-bottom:12px">'+escHtml(tpl.description||"")+'</div>';
  html += '<div style="background:var(--ac-bg);padding:8px 12px;border-radius:4px;font-size:12px;color:var(--ac);margin-bottom:14px">⚡ <b>'+(tpl.nodes||[]).length+'</b>個のサブタスク + <b>'+(tpl.edges||[]).length+'</b>個の依存関係を自動生成します</div>';

  // Custom fields
  (tpl.fields || []).forEach(function(f){
    var label = escHtml(f.label) + (f.required ? ' <span style="color:var(--dn)">*</span>' : '');
    html += '<label>'+label+'</label>';
    if (f.type === "date") html += '<input id="tplF_'+f.key+'" type="date" value="'+(f.default||"")+'">';
    else html += '<input id="tplF_'+f.key+'" value="'+escHtml(f.default||"")+'">';
  });

  html += '<label>開始日</label><input id="tplStart" type="date" value="'+(new Date().toISOString().substr(0,10))+'">';
  html += '<label>親チケット担当者</label><select id="tplParentAsg"><option value="">- 未設定 -</option>'+TS.users.map(function(u){return '<option value="'+u.id+'">'+escHtml(u.name)+'</option>'}).join("")+'</select>';

  // Role-based assignee mapping
  var roles = [...new Set((tpl.nodes||[]).map(function(n){return n.role}).filter(Boolean))];
  if (roles.length){
    html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--bd)"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--t2);margin-bottom:8px;letter-spacing:.5px">ロール → 担当者の割当 (任意)</div>';
    roles.forEach(function(r){
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="background:var(--b3);padding:3px 8px;border-radius:3px;font-size:11px;font-family:monospace;width:80px">'+escHtml(r)+'</span><select id="tplR_'+r+'" style="flex:1;padding:5px 8px;border:1px solid var(--bd);border-radius:3px;background:var(--b1);color:var(--t1);font-size:12px"><option value="">- 未設定 -</option>'+TS.users.map(function(u){return '<option value="'+u.id+'">'+escHtml(u.name)+'</option>'}).join("")+'</select></div>';
    });
    html += '</div>';
  }

  html += '<div class="ma"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn bp" id="tplApplyOk">⚡ 適用 (自動生成)</button></div>';
  showModal(html);

  document.getElementById("tplApplyOk").onclick = function(){
    var fields = {};
    var missing = [];
    (tpl.fields||[]).forEach(function(f){
      var el = document.getElementById("tplF_"+f.key);
      var v = el ? el.value : "";
      if (f.required && !v.trim()) missing.push(f.label);
      fields[f.key] = v;
    });
    if (missing.length){toast("必須項目: "+missing.join(", "),1);return}

    var roleAssignees = {};
    roles.forEach(function(r){var s=document.getElementById("tplR_"+r);if(s&&s.value)roleAssignees[r]=s.value});

    var startDate = document.getElementById("tplStart").value;
    var parentAsg = document.getElementById("tplParentAsg").value;

    var r = applyTemplate(templateId, fields, {startDate:startDate, parentAssignee:parentAsg, roleAssignees:roleAssignees});
    if (r.ok){
      closeModal();
      toast("✓ "+(r.subtaskKeys.length+1)+"件のチケットを生成 (親: "+r.parentKey+")");
      TS.selectedTicket = r.parentKey;
      switchView("ticket");
    } else {
      toast(r.msg || "適用失敗", 1);
    }
  };
}

function tplImportDlg(){
  showModal('<h3>📥 テンプレートをインポート</h3><label>YAML テキスト</label><textarea id="tplImpY" style="width:100%;min-height:240px;font-family:\'SF Mono\',monospace;font-size:11px;padding:8px;border:1px solid var(--bd);border-radius:3px;background:var(--b1);color:var(--t1);outline:none"></textarea><input type="file" id="tplImpFile" accept=".yaml,.yml" style="display:block;margin-top:6px"><div class="ma"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn bp" id="tplImpOk">インポート</button></div>');
  document.getElementById("tplImpFile").onchange = function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){document.getElementById("tplImpY").value=ev.target.result};r.readAsText(f)};
  document.getElementById("tplImpOk").onclick = function(){
    var y = document.getElementById("tplImpY").value.trim();
    if (!y){toast("YAMLを入力",1);return}
    try {
      var parsed = yP(y);
      if (!parsed || !parsed.name){toast("無効なYAML",1);return}
      parsed.id = "tpl-"+Date.now();
      if (!parsed.nodes) parsed.nodes = [];
      if (!parsed.edges) parsed.edges = [];
      if (!parsed.fields) parsed.fields = [];
      if(typeof urCapture==="function")urCapture("テンプレートインポート",true);
      TS.templates.push(parsed);
      audit("create","template",parsed.id,"imported: "+parsed.name);
      saveTS();
      closeModal();
      renderTemplateView();
      toast("インポート完了");
    } catch(e){toast("パースエラー: "+e.message,1)}
  };
}

/* ============================================================
   TEMPLATE EDITOR — Visual Node-Edge GUI with drag & drop
   ============================================================ */

function pushTemplateHistory(){
  if (!TPL_STATE.editing) return;
  TPL_STATE.history.push(JSON.stringify(TPL_STATE.editing));
  if (TPL_STATE.history.length > 50) TPL_STATE.history.shift();
  TPL_STATE.redoStack = [];
}

function tplUndo(){
  if (TPL_STATE.history.length === 0) return;
  TPL_STATE.redoStack.push(JSON.stringify(TPL_STATE.editing));
  TPL_STATE.editing = JSON.parse(TPL_STATE.history.pop());
  renderTemplateView();
}
function tplRedo(){
  if (TPL_STATE.redoStack.length === 0) return;
  TPL_STATE.history.push(JSON.stringify(TPL_STATE.editing));
  TPL_STATE.editing = JSON.parse(TPL_STATE.redoStack.pop());
  renderTemplateView();
}

function renderTemplateEditor(v){
  var t = TPL_STATE.editing;
  var html = '<div class="page-header"><div class="page-bc"><a id="tplBack">⚡ Templates</a> / <span>'+escHtml(t.name)+'</span></div><div class="page-title" style="display:flex;align-items:center;gap:10px"><span style="background:'+escHtml(t.color||"#0c66e4")+';color:#fff;width:36px;height:36px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:20px">'+(t.icon||"⚡")+'</span><input id="tplEdName" value="'+escHtml(t.name)+'" style="font-size:24px;font-weight:600;border:none;background:transparent;color:var(--t1);outline:none;flex:1"></div></div>';

  html += '<div class="page-toolbar">';
  html += '<button class="btn-icon" id="tplUndo" title="Undo (Ctrl+Z)">↶</button>';
  html += '<button class="btn-icon" id="tplRedo" title="Redo (Ctrl+Y)">↷</button>';
  html += '<span class="sep"></span>';
  html += '<button class="btn secondary" id="tplAddNode">+ タスク追加</button>';
  html += '<button class="btn secondary" id="tplAddField">+ フィールド追加</button>';
  html += '<button class="btn secondary" id="tplProps">⚙ プロパティ</button>';
  html += '<button class="btn secondary" id="tplExport">📤 Export YAML</button>';
  html += '<div style="flex:1"></div>';
  html += '<button class="btn secondary" id="tplCancel">キャンセル</button>';
  html += '<button class="btn bp" id="tplSave">💾 保存</button>';
  html += '</div>';

  // Editor: split into canvas + side panel
  html += '<div class="tpl-editor-body">';
  html += '<div class="tpl-canvas-wrap"><div class="tpl-canvas" id="tplCanvas" style="background:var(--b2);background-image:radial-gradient(circle, var(--bd) 1px, transparent 1px);background-size:20px 20px"></div></div>';
  html += '<div class="tpl-sidebar"><h4 style="padding:14px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);font-weight:700;border-bottom:1px solid var(--bd);background:var(--b2);margin:0">タスク一覧 ('+(t.nodes||[]).length+')</h4><div id="tplNodeList" style="padding:8px"></div></div>';
  html += '</div>';

  v.innerHTML = html;

  // Bindings
  document.getElementById("tplBack").onclick = function(){
    if (TPL_STATE.editing && TPL_STATE.history.length){
      if (!confirm("未保存の変更があります。破棄しますか？")) return;
    }
    TPL_STATE.editing = null; TPL_STATE.history=[]; TPL_STATE.redoStack=[];
    renderTemplateView();
  };
  document.getElementById("tplEdName").onchange = function(){pushTemplateHistory();t.name = this.value};
  document.getElementById("tplUndo").onclick = tplUndo;
  document.getElementById("tplRedo").onclick = tplRedo;
  document.getElementById("tplAddNode").onclick = function(){tplAddNodeDlg()};
  document.getElementById("tplAddField").onclick = function(){tplAddFieldDlg()};
  document.getElementById("tplProps").onclick = function(){tplPropsDlg()};
  document.getElementById("tplExport").onclick = function(){
    var yaml = yS(t);
    downloadFile(t.name.replace(/\s+/g,"-").toLowerCase()+".template.yaml", yaml, "text/yaml");
    toast("YAMLエクスポート");
  };
  document.getElementById("tplCancel").onclick = function(){
    if (TPL_STATE.history.length){if(!confirm("変更を破棄しますか？"))return}
    TPL_STATE.editing = null; renderTemplateView();
  };
  document.getElementById("tplSave").onclick = function(){
    if(typeof urCapture==="function")urCapture("テンプレート保存",true);
    var idx = TS.templates.findIndex(function(x){return x.id===t.id});
    if (idx >= 0) TS.templates[idx] = JSON.parse(JSON.stringify(t));
    else TS.templates.push(JSON.parse(JSON.stringify(t)));
    audit("update","template",t.id,t.name);
    saveTS();
    TPL_STATE.editing = null;
    renderTemplateView();
    toast("✓ 保存しました");
  };

  // Render canvas + node list
  renderTemplateCanvas();

  // Keyboard shortcuts
  document.onkeydown = function(e){
    if (!TPL_STATE.editing) return;
    if ((e.ctrlKey||e.metaKey) && e.key === "z"){e.preventDefault(); tplUndo()}
    else if ((e.ctrlKey||e.metaKey) && (e.key === "y" || (e.shiftKey && e.key === "Z"))){e.preventDefault(); tplRedo()}
    else if (e.key === "Delete" && TPL_STATE.selectedNodeId){
      pushTemplateHistory();
      t.nodes = t.nodes.filter(function(n){return n.id !== TPL_STATE.selectedNodeId});
      t.edges = t.edges.filter(function(e){return e.from !== TPL_STATE.selectedNodeId && e.to !== TPL_STATE.selectedNodeId});
      TPL_STATE.selectedNodeId = null;
      renderTemplateCanvas();
    }
  };
}

function renderTemplateCanvas(){
  var t = TPL_STATE.editing;
  var canvas = document.getElementById("tplCanvas");
  var list = document.getElementById("tplNodeList");
  if (!canvas || !t) return;

  // Compute bounding box
  var maxX = 0, maxY = 0;
  (t.nodes||[]).forEach(function(n){
    if (n.x + 200 > maxX) maxX = n.x + 200;
    if (n.y + 100 > maxY) maxY = n.y + 100;
  });
  var W = Math.max(1200, maxX + 100);
  var H = Math.max(600, maxY + 100);

  // Build SVG
  canvas.innerHTML = '';
  var svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width", W);
  svg.setAttribute("height", H);
  svg.style.cssText = "display:block";
  svg.innerHTML = '<defs><marker id="tplArr" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 L3,5 Z" fill="#5e6c84"/></marker><filter id="tplShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter></defs>';

  // Edges
  var edgesG = document.createElementNS("http://www.w3.org/2000/svg","g");
  edgesG.setAttribute("class","tpl-edges");
  (t.edges||[]).forEach(function(e, i){
    var fromN = t.nodes.find(function(n){return n.id===e.from});
    var toN = t.nodes.find(function(n){return n.id===e.to});
    if (!fromN || !toN) return;
    var x1 = fromN.x + 180, y1 = fromN.y + 32;
    var x2 = toN.x, y2 = toN.y + 32;
    var midX = (x1 + x2) / 2;
    var pathD = "M "+x1+","+y1+" C "+midX+","+y1+" "+midX+","+y2+" "+x2+","+y2;
    var hit = document.createElementNS("http://www.w3.org/2000/svg","path");
    hit.setAttribute("d", pathD);
    hit.setAttribute("stroke","transparent");
    hit.setAttribute("stroke-width","18");
    hit.setAttribute("fill","none");
    hit.style.cursor = "pointer";
    hit.dataset.edgeIdx = i;
    edgesG.appendChild(hit);
    var path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d", pathD);
    path.setAttribute("stroke","#5e6c84");
    path.setAttribute("stroke-width","2");
    path.setAttribute("fill","none");
    path.setAttribute("marker-end","url(#tplArr)");
    edgesG.appendChild(path);
  });
  svg.appendChild(edgesG);

  // Drawing edge preview
  var drawingG = document.createElementNS("http://www.w3.org/2000/svg","g");
  drawingG.setAttribute("id","tplDrawingEdge");
  svg.appendChild(drawingG);

  // Nodes
  var nodesG = document.createElementNS("http://www.w3.org/2000/svg","g");
  (t.nodes||[]).forEach(function(n){
    var g = document.createElementNS("http://www.w3.org/2000/svg","g");
    g.setAttribute("transform","translate("+n.x+","+n.y+")");
    g.dataset.nodeId = n.id;
    g.style.cursor = "grab";

    var rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
    rect.setAttribute("width", 180);
    rect.setAttribute("height", 64);
    rect.setAttribute("rx", 8);
    rect.setAttribute("fill", "#fff");
    rect.setAttribute("stroke", TPL_STATE.selectedNodeId===n.id ? "#0c66e4" : "#dfe1e6");
    rect.setAttribute("stroke-width", TPL_STATE.selectedNodeId===n.id ? "2" : "1");
    rect.setAttribute("filter", "url(#tplShadow)");
    g.appendChild(rect);

    // Type stripe
    var typeColor = ({task:"#1868db",bug:"#e2483d",story:"#22a06b",epic:"#8270db",incident:"#f5a623"})[n.type||"task"]||"#1868db";
    var stripe = document.createElementNS("http://www.w3.org/2000/svg","rect");
    stripe.setAttribute("x",0); stripe.setAttribute("y",0); stripe.setAttribute("width",4); stripe.setAttribute("height",64); stripe.setAttribute("rx",8);
    stripe.setAttribute("fill", typeColor);
    g.appendChild(stripe);

    // Title
    var title = document.createElementNS("http://www.w3.org/2000/svg","text");
    title.setAttribute("x",14); title.setAttribute("y",24);
    title.setAttribute("fill","#172b4d");
    title.setAttribute("font-size","13");
    title.setAttribute("font-weight","600");
    title.setAttribute("font-family","-apple-system,sans-serif");
    var txt = n.title || "Untitled";
    title.textContent = txt.length > 22 ? txt.substring(0,20)+"…" : txt;
    g.appendChild(title);

    // Meta
    var meta = document.createElementNS("http://www.w3.org/2000/svg","text");
    meta.setAttribute("x",14); meta.setAttribute("y",44);
    meta.setAttribute("fill","#5e6c84");
    meta.setAttribute("font-size","11");
    meta.setAttribute("font-family","-apple-system,sans-serif");
    var metaTxt = (n.role || n.type || "task");
    if (n.durationDays) metaTxt += " · "+n.durationDays+"d";
    meta.textContent = metaTxt;
    g.appendChild(meta);

    // Output port (right circle)
    var port = document.createElementNS("http://www.w3.org/2000/svg","circle");
    port.setAttribute("cx", 180); port.setAttribute("cy", 32); port.setAttribute("r", 7);
    port.setAttribute("fill","#0c66e4");
    port.setAttribute("stroke","#fff");
    port.setAttribute("stroke-width","2");
    port.style.cursor = "crosshair";
    port.classList.add("tpl-port-out");
    port.dataset.nodeId = n.id;
    g.appendChild(port);

    // Delete button (× top-right) shown on hover via CSS
    var del = document.createElementNS("http://www.w3.org/2000/svg","g");
    del.setAttribute("transform","translate(168,-6)");
    del.classList.add("tpl-node-del");
    del.style.cursor = "pointer";
    del.style.opacity = "0";
    var delBg = document.createElementNS("http://www.w3.org/2000/svg","circle");
    delBg.setAttribute("r",10); delBg.setAttribute("fill","#c9372c");
    del.appendChild(delBg);
    var delX = document.createElementNS("http://www.w3.org/2000/svg","text");
    delX.setAttribute("text-anchor","middle"); delX.setAttribute("y",4);
    delX.setAttribute("fill","#fff"); delX.setAttribute("font-size","12"); delX.setAttribute("font-weight","700");
    delX.textContent = "×";
    del.appendChild(delX);
    del.dataset.delNode = n.id;
    g.appendChild(del);

    // Show del on hover
    g.addEventListener("mouseenter",function(){del.style.opacity="1"});
    g.addEventListener("mouseleave",function(){del.style.opacity="0"});

    nodesG.appendChild(g);
  });
  svg.appendChild(nodesG);
  canvas.appendChild(svg);

  // === Drag & Drop & edge-creation handlers ===
  var dragState = null;
  var edgeState = null;

  svg.addEventListener("mousedown", function(e){
    var target = e.target;
    // Edge port click
    if (target.classList && target.classList.contains("tpl-port-out")){
      e.stopPropagation();
      edgeState = {fromId: target.dataset.nodeId, x: e.offsetX, y: e.offsetY};
      return;
    }
    // Delete node
    var delEl = target.closest && target.closest(".tpl-node-del");
    if (delEl){
      pushTemplateHistory();
      var nid = delEl.dataset.delNode;
      t.nodes = t.nodes.filter(function(n){return n.id !== nid});
      t.edges = t.edges.filter(function(ed){return ed.from!==nid && ed.to!==nid});
      renderTemplateCanvas();
      return;
    }
    // Node drag
    var nodeG = target.closest && target.closest("[data-node-id]");
    if (nodeG){
      var nid = nodeG.dataset.nodeId;
      var node = t.nodes.find(function(n){return n.id===nid});
      if (!node) return;
      TPL_STATE.selectedNodeId = nid;
      var rect = svg.getBoundingClientRect();
      dragState = {nid:nid, offX:e.clientX-rect.left-node.x, offY:e.clientY-rect.top-node.y, moved:false};
    }
  });

  // Document-level mousemove for drag (not bound to SVG, so drag continues outside SVG bounds)
  // Remove previous handlers if present (re-renders)
  if (TPL_STATE._docMove) document.removeEventListener("mousemove", TPL_STATE._docMove);
  if (TPL_STATE._docUp) document.removeEventListener("mouseup", TPL_STATE._docUp);

  TPL_STATE._docMove = function(e){
    if (!dragState && !edgeState) return;
    var rect = svg.getBoundingClientRect();
    if (dragState){
      e.preventDefault();
      var node = t.nodes.find(function(n){return n.id===dragState.nid});
      if (!node) return;
      if (!dragState.moved) {pushTemplateHistory(); dragState.moved = true}
      node.x = Math.max(0, Math.round((e.clientX - rect.left - dragState.offX)/10)*10);
      node.y = Math.max(0, Math.round((e.clientY - rect.top - dragState.offY)/10)*10);
      // Update only this node's transform - avoid rebuilding entire SVG which kills drag
      var nodeEl = svg.querySelector('[data-node-id="'+node.id+'"]');
      if (nodeEl) nodeEl.setAttribute("transform","translate("+node.x+","+node.y+")");
      // Grow SVG if dragging near edge
      var curW = parseInt(svg.getAttribute("width"));
      var curH = parseInt(svg.getAttribute("height"));
      if (node.x + 280 > curW) svg.setAttribute("width", node.x + 400);
      if (node.y + 200 > curH) svg.setAttribute("height", node.y + 300);
      // Update edges connected to this node
      tplRedrawEdges(svg, t);
    } else if (edgeState){
      var dgEl = document.getElementById("tplDrawingEdge");
      if (!dgEl) return;
      var fromN = t.nodes.find(function(n){return n.id===edgeState.fromId});
      if (!fromN) return;
      var x1 = fromN.x + 180, y1 = fromN.y + 32;
      var x2 = e.clientX - rect.left, y2 = e.clientY - rect.top;
      var midX = (x1+x2)/2;
      var d = "M "+x1+","+y1+" C "+midX+","+y1+" "+midX+","+y2+" "+x2+","+y2;
      dgEl.innerHTML = '<path d="'+d+'" stroke="#0c66e4" stroke-width="2" fill="none" stroke-dasharray="4,3" marker-end="url(#tplArr)"/>';
    }
  };

  TPL_STATE._docUp = function(e){
    if (edgeState){
      // Find target node under cursor
      var rect = svg.getBoundingClientRect();
      var mx = e.clientX - rect.left;
      var my = e.clientY - rect.top;
      var targetNode = t.nodes.find(function(n){return mx >= n.x && mx <= n.x+180 && my >= n.y && my <= n.y+64 && n.id !== edgeState.fromId});
      if (targetNode){
        // Avoid duplicate
        var dup = (t.edges||[]).find(function(e){return e.from===edgeState.fromId && e.to===targetNode.id});
        if (!dup){
          pushTemplateHistory();
          t.edges = t.edges || [];
          t.edges.push({from:edgeState.fromId, to:targetNode.id});
        }
      }
      var dgEl = document.getElementById("tplDrawingEdge");
      if (dgEl) dgEl.innerHTML = "";
      edgeState = null;
      renderTemplateCanvas();
    }
    if (dragState && dragState.moved){
      // Full rerender to update sidebar list and ensure consistency
      renderTemplateCanvas();
    }
    dragState = null;
  };

  document.addEventListener("mousemove", TPL_STATE._docMove);
  document.addEventListener("mouseup", TPL_STATE._docUp);

  // Edge click to delete
  svg.addEventListener("click", function(e){
    var hitPath = e.target;
    if (hitPath.dataset && hitPath.dataset.edgeIdx != null){
      if (confirm("この依存関係を削除しますか？")){
        pushTemplateHistory();
        t.edges.splice(parseInt(hitPath.dataset.edgeIdx), 1);
        renderTemplateCanvas();
      }
    }
  });

  // Double-click node = edit
  svg.addEventListener("dblclick", function(e){
    var nodeG = e.target.closest && e.target.closest("[data-node-id]");
    if (nodeG){tplEditNodeDlg(nodeG.dataset.nodeId)}
  });

  // Sidebar list
  list.innerHTML = "";
  (t.nodes||[]).forEach(function(n, i){
    var item = document.createElement("div");
    item.className = "tpl-list-item"+(TPL_STATE.selectedNodeId===n.id?" active":"");
    item.innerHTML = '<span class="ti '+(n.type||"task")+'">'+(n.type||"T")[0].toUpperCase()+'</span><span class="tpl-li-title">'+escHtml(n.title||"Untitled")+'</span><button class="tpl-li-edit">✎</button>';

/* Redraw edges only (used during drag to avoid full re-render) */
function tplRedrawEdges(svg, t){
  if (!svg || !t) return;
  var oldEdges = svg.querySelector(".tpl-edges");
  if (!oldEdges) return;
  var edgesG = document.createElementNS("http://www.w3.org/2000/svg","g");
  edgesG.setAttribute("class","tpl-edges");
  (t.edges||[]).forEach(function(e, i){
    var fromN = t.nodes.find(function(n){return n.id===e.from});
    var toN = t.nodes.find(function(n){return n.id===e.to});
    if (!fromN || !toN) return;
    var x1 = fromN.x + 180, y1 = fromN.y + 32;
    var x2 = toN.x, y2 = toN.y + 32;
    var midX = (x1 + x2) / 2;
    var pathD = "M "+x1+","+y1+" C "+midX+","+y1+" "+midX+","+y2+" "+x2+","+y2;
    var hit = document.createElementNS("http://www.w3.org/2000/svg","path");
    hit.setAttribute("d", pathD);
    hit.setAttribute("stroke","transparent");
    hit.setAttribute("stroke-width","18");
    hit.setAttribute("fill","none");
    hit.style.cursor = "pointer";
    hit.dataset.edgeIdx = i;
    edgesG.appendChild(hit);
    var path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d", pathD);
    path.setAttribute("stroke","#5e6c84");
    path.setAttribute("stroke-width","2");
    path.setAttribute("fill","none");
    path.setAttribute("marker-end","url(#tplArr)");
    edgesG.appendChild(path);
  });
  oldEdges.parentNode.replaceChild(edgesG, oldEdges);
}

/* ============================================================
   BULK OPERATIONS + ALERT ENGINE
   - Multi-select tickets in Issues view
   - Bulk transition / assign / label / delete
   - Auto-complete parent when all subtasks done
   - Auto-complete with confirmation modal
   - Alert engine: 7d/1d/9am-today/1h/30m/overdue
   - In-app + Webhook + Email/Slack/Discord placeholders
   ============================================================ */

/* ===== Bulk selection state ===== */
var BULK = {
  selected: new Set(),     // ticket keys
  enabled: false
};

function bulkToggle(key){
  if (BULK.selected.has(key)) BULK.selected.delete(key);
  else BULK.selected.add(key);
  updateBulkBar();
}
function bulkClear(){BULK.selected.clear(); BULK.enabled=false; updateBulkBar()}
function bulkSelectAll(){
  // Select all visible (currently filtered) tickets
  var rows = document.querySelectorAll("[data-key]");
  rows.forEach(function(r){if(r.dataset.key)BULK.selected.add(r.dataset.key)});
  updateBulkBar();
}

function updateBulkBar(){
  var bar = document.getElementById("bulkBar");
  if (!bar){
    if (BULK.selected.size === 0) return;
    bar = document.createElement("div");
    bar.id = "bulkBar";
    bar.className = "bulk-bar";
    document.body.appendChild(bar);
  }
  if (BULK.selected.size === 0){bar.style.display="none"; return}
  bar.style.display = "flex";
  bar.innerHTML = '<span class="bulk-cnt">'+BULK.selected.size+'</span><span style="font-size:13px;color:var(--t1)">件選択中</span><div style="flex:1"></div>'+
    '<button class="btn secondary btn-sm" id="bulkSel">全選択</button>'+
    '<button class="btn secondary btn-sm" id="bulkAsg">担当変更</button>'+
    '<button class="btn secondary btn-sm" id="bulkLbl">ラベル追加</button>'+
    '<button class="btn secondary btn-sm" id="bulkSt">ステータス変更</button>'+
    '<button class="btn bp btn-sm" id="bulkDone">✓ Done</button>'+
    '<button class="btn danger btn-sm" id="bulkDel">削除</button>'+
    '<button class="btn-icon" id="bulkClose" title="クリア">×</button>';
  document.getElementById("bulkSel").onclick = bulkSelectAll;
  document.getElementById("bulkClose").onclick = function(){bulkClear(); rerenderCurrent()};
  document.getElementById("bulkAsg").onclick = bulkAsgDlg;
  document.getElementById("bulkLbl").onclick = bulkLblDlg;
  document.getElementById("bulkSt").onclick = bulkStDlg;
  document.getElementById("bulkDone").onclick = bulkDone;
  document.getElementById("bulkDel").onclick = bulkDel;
}

function rerenderCurrent(){
  if (TS.currentView === "ticket" && typeof renderTicketView === "function") renderTicketView();
  else if (TS.currentView === "kanban" && typeof renderKanbanView === "function") renderKanbanView();
  else if (TS.currentView === "backlog" && typeof renderBacklogView === "function") renderBacklogView();

function bulkStDlg(){
  var opts = TS.statuses.map(function(s){return '<option value="'+s.id+'">'+escHtml(s.name)+'</option>'}).join("");
  showModal('<h3>📊 一括ステータス変更 ('+BULK.selected.size+'件)</h3><label>ステータス</label><select id="bSt">'+opts+'</select><div style="font-size:11px;color:var(--wn);margin-top:8px;padding:6px 8px;background:var(--wn-bg);border-radius:3px">⚠ ワークフローのValidatorはスキップされます</div><div class="ma"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn bp" id="bStOk">適用</button></div>');
  document.getElementById("bStOk").onclick = function(){
    var v = document.getElementById("bSt").value;
    var n = 0;
    BULK.selected.forEach(function(k){
      var t = TS.tickets.find(function(x){return x.key===k});
      if (!t) return;
      var oldS = t.status;
      t.status = v;
      t.updatedAt = new Date().toISOString();
      if (typeof appendTicketHistory === "function") appendTicketHistory(t.key, {ts:new Date().toISOString(),user:TS.currentUser?TS.currentUser.id:"system",type:"bulk_transition",from:oldS,to:v,comment:"bulk update"});
      audit("transition","ticket",k,"bulk "+oldS+"→"+v);
      if (typeof syncTicketToGantt === "function") syncTicketToGantt(k);
      n++;
    });
    saveTS(); closeModal(); toast(n+"件更新"); bulkClear(); rerenderCurrent();

function bulkDone(){
  var doneStatus = TS.statuses.find(function(s){return s.id==="done"}) || TS.statuses[TS.statuses.length-1];
  if (!doneStatus){toast("Doneステータスなし",1);return}
  if (!confirm(BULK.selected.size+"件を完了状態にしますか?")) return;
  var n = 0;
  BULK.selected.forEach(function(k){
    var t = TS.tickets.find(function(x){return x.key===k});
    if (!t) return;
    var oldS = t.status;
    t.status = doneStatus.id;
    t.updatedAt = new Date().toISOString();
    if (typeof appendTicketHistory === "function") appendTicketHistory(t.key,{ts:new Date().toISOString(),user:TS.currentUser?TS.currentUser.id:"system",type:"bulk_done",from:oldS,to:doneStatus.id,comment:"bulk done"});
    audit("transition","ticket",k,"bulk done");
    if (typeof syncTicketToGantt === "function") syncTicketToGantt(k);
    n++;
  });
  // After bulk done, check parent auto-complete
  checkAllParentsAutoComplete();
  saveTS(); toast("✓ "+n+"件完了"); bulkClear(); rerenderCurrent();
}

function bulkDel(){
  if (!confirm(BULK.selected.size+"件削除しますか? この操作は取り消せません")) return;
  var n = 0;
  BULK.selected.forEach(function(k){if(deleteTicket(k))n++});
  saveTS(); toast(n+"件削除"); bulkClear(); rerenderCurrent();
}

/* ===== Auto-complete parent when all subtasks done ===== */
function checkAllParentsAutoComplete(){
  var doneId = "done";
  var checked = {};
  TS.tickets.forEach(function(t){
    if (t.parentKey && !checked[t.parentKey]){
      checked[t.parentKey] = true;
      var parent = TS.tickets.find(function(x){return x.key===t.parentKey});
      if (!parent || parent.status === doneId) return;
      var subs = TS.tickets.filter(function(x){return x.parentKey===parent.key});
      if (subs.length && subs.every(function(s){return s.status===doneId})){
        // Ask user
        if (TS.autoCompleteParent === "auto"){
          parent.status = doneId;
          parent.updatedAt = new Date().toISOString();
          if (typeof appendTicketHistory === "function") appendTicketHistory(parent.key,{ts:new Date().toISOString(),user:"system",type:"auto_complete",from:parent.status,to:doneId,comment:"全サブタスク完了で自動完了"});
          audit("auto_complete","ticket",parent.key,"all subtasks done");
        } else if (TS.autoCompleteParent !== "off"){
          // Prompt
          setTimeout(function(){
            if (confirm("親チケット "+parent.key+" の全サブタスクが完了しました。\n親も完了にしますか?")){
              parent.status = doneId;
              parent.updatedAt = new Date().toISOString();
              if (typeof appendTicketHistory === "function") appendTicketHistory(parent.key,{ts:new Date().toISOString(),user:TS.currentUser?TS.currentUser.id:"system",type:"auto_complete",from:parent.status,to:doneId,comment:"全サブタスク完了で完了"});
              audit("auto_complete","ticket",parent.key,"manual confirm");
              saveTS();
              rerenderCurrent();
            }
          }, 100);
        }
      }
    }
  });
}

// Hook into updateTicket to check parent auto-complete
if (typeof updateTicket === "function"){
  var _origUpdateTicketBulk = updateTicket;
  updateTicket = function(key, patch){
    var ok = _origUpdateTicketBulk(key, patch);
    if (ok && patch && patch.status === "done"){
      var t = TS.tickets.find(function(x){return x.key===key});
      if (t && t.parentKey) checkAllParentsAutoComplete();
    }
    return ok;
  };
}

  if (!TS.alertConfig){
    TS.alertConfig = {
      rules: DEFAULT_ALERT_RULES.slice(),
      channels: {inApp:true, webhook:"", email:"", slack:"", discord:""},
      lastFired: {}    // key: ruleId+ticketKey -> timestamp
    };
    saveTS();
  }
  if (!TS.alertConfig.rules) TS.alertConfig.rules = DEFAULT_ALERT_RULES.slice();
  if (!TS.alertConfig.channels) TS.alertConfig.channels = {inApp:true, webhook:"", email:"", slack:"", discord:""};
  if (!TS.alertConfig.lastFired) TS.alertConfig.lastFired = {};
}

function evaluateAlerts(){
  ensureAlertConfig();
  if (!TS.currentUser) return;
  var now = new Date();
  var nowMs = now.getTime();
  var fired = [];

  TS.tickets.forEach(function(t){
    if (!t.dueDate || t.status === "done") return;
    if (TS.currentUser && t.assignee && t.assignee !== TS.currentUser.id) return; // only my tickets

    var due = new Date(t.dueDate + "T18:00:00");
    var dueMs = due.getTime();

    TS.alertConfig.rules.forEach(function(rule){
      if (!rule.enabled) return;
      var key = rule.id + ":" + t.key;
      var last = TS.alertConfig.lastFired[key];
      var shouldFire = false;
      var msg = "";

      if (rule.when === "days_before"){
        var triggerMs = dueMs - rule.value * 24 * 3600 * 1000;
        var window = 60*60*1000; // 1 hour window
        if (nowMs >= triggerMs && nowMs - triggerMs < 24*3600*1000){
          if (!last || (nowMs - last) > 12*3600*1000){
            shouldFire = true;
            msg = t.key+": 期限まで"+rule.value+"日 ("+t.title+")";
          }
        }
      } else if (rule.when === "hours_before"){
        var triggerMs = dueMs - rule.value * 3600 * 1000;
        if (nowMs >= triggerMs && nowMs < dueMs){
          if (!last || (nowMs - last) > 30*60*1000){
            shouldFire = true;
            msg = t.key+": 期限まで"+rule.value+"時間 ("+t.title+")";
          }
        }
      } else if (rule.when === "min_before"){
        var triggerMs = dueMs - rule.value * 60 * 1000;
        if (nowMs >= triggerMs && nowMs < dueMs){
          if (!last || (nowMs - last) > 10*60*1000){
            shouldFire = true;
            msg = t.key+": 期限まで"+rule.value+"分 ("+t.title+")";
          }
        }
      } else if (rule.when === "today_at"){
        var ttoday = new Date(now);
        var parts = (rule.value||"09:00").split(":");
        ttoday.setHours(parseInt(parts[0])||9, parseInt(parts[1])||0, 0, 0);
        var todayMs = ttoday.getTime();
        var dueDay = new Date(t.dueDate); dueDay.setHours(0,0,0,0);
        var nowDay = new Date(now); nowDay.setHours(0,0,0,0);
        if (dueDay.getTime() === nowDay.getTime() && nowMs >= todayMs && (nowMs - todayMs) < 60*60*1000){
          if (!last || (nowMs - last) > 12*3600*1000){
            shouldFire = true;
            msg = t.key+": 本日が期限です ("+t.title+")";
          }
        }
      } else if (rule.when === "after_due"){
        if (nowMs > dueMs && (nowMs - dueMs) < (rule.value+30)*60*1000){
          if (!last || (nowMs - last) > 60*60*1000){
            shouldFire = true;
            msg = t.key+": ⚠ 期限超過 ("+t.title+")";
          }
        }
      } else if (rule.when === "daily"){
        var ttoday = new Date(now);
        var parts = (rule.value||"09:00").split(":");
        ttoday.setHours(parseInt(parts[0])||9, parseInt(parts[1])||0, 0, 0);
        var todayMs = ttoday.getTime();
        if (nowMs >= todayMs && (nowMs - todayMs) < 60*60*1000){
          if (!last || (nowMs - last) > 12*3600*1000){
            shouldFire = true;
            msg = t.key+": 本日のリマインダー ("+t.title+")";
          }
        }
      }

      if (shouldFire){
        TS.alertConfig.lastFired[key] = nowMs;
        fired.push({ticket:t, rule:rule, msg:msg});
      }
    });
  });

  if (fired.length){
    fired.forEach(function(f){
      // In-app notification
      if (TS.alertConfig.channels.inApp && typeof notify === "function"){
        notify(TS.currentUser.id, f.msg, f.ticket.key);
      }
      // Webhook (fire-and-forget)
      if (TS.alertConfig.channels.webhook){
        try {
          fetch(TS.alertConfig.channels.webhook, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              type:"alert", rule:f.rule.name, ticket:f.ticket.key, title:f.ticket.title,
              dueDate:f.ticket.dueDate, message:f.msg, ts:new Date().toISOString()
            })
          }).catch(function(){});
        } catch(e){}
      }
    });
    saveTS();
  }
}

/* Run alerts every 60 seconds */
function startAlertEngine(){
  ensureAlertConfig();
  evaluateAlerts();
  setInterval(evaluateAlerts, 60000);
}

/* ============================================================
   PROCESS VISUALIZER
   Visualize the actual ticket graph (parent + subtasks + dependencies)
   - Works for tickets generated from templates (uses templateSnapshot)
   - Also works for ANY parent ticket (auto-builds graph from
     subtasks + blocks/blocked_by links)
   - Status color coding (todo/inprogress/review/done)
   - Click a node -> jump to ticket
   - Right-click node -> mini context menu (status, assignee)
   - In-place status & assignee selectors on each node
   ============================================================ */

var PVZ = {
  open: false,
  parentKey: null,
  positions: {},   // parentKey -> {ticketKey: {x,y}}
  zoom: 1, panX: 0, panY: 0,
  draggingNode: null, panning: false
};

function pvLoadPositions(){
  try {
    var s = localStorage.getItem("pvzPositions");
    if (s) PVZ.positions = JSON.parse(s);
  } catch(e){}
}
function pvSavePositions(){
  try { localStorage.setItem("pvzPositions", JSON.stringify(PVZ.positions)); } catch(e){}
}
pvLoadPositions();

/* ===== Determine if a ticket has a process to visualize ===== */
function hasProcess(ticket){
  if (!ticket) return false;
  // Generated from template?
  if (ticket.templateId && ticket.templateRole === "parent") return true;
  // Any ticket with subtasks?
  if (TS.tickets.some(function(t){return t.parentKey === ticket.key})) return true;
  return false;
}

/* ===== Build graph from ticket relationships ===== */
function buildProcessGraph(parentTicket){
  var nodes = [];
  var edges = [];
  // Always include parent itself as the root
  nodes.push({
    id: parentTicket.key,
    ticketKey: parentTicket.key,
    title: parentTicket.title,
    role: "parent",
    isParent: true
  });

  // Get all subtasks
  var subs = TS.tickets.filter(function(t){return t.parentKey === parentTicket.key});

  // If parent has templateSnapshot, use that for layout
  if (parentTicket.templateSnapshot && parentTicket.templateSnapshot.nodes && parentTicket.templateSnapshot.nodes.length){
    var snap = parentTicket.templateSnapshot;
    snap.nodes.forEach(function(n){
      // Find ticket whose templateNodeId matches
      var t = subs.find(function(x){return x.templateNodeId === n.id});
      if (t){
        nodes.push({
          id: t.key,
          templateNodeId: n.id,
          ticketKey: t.key,
          title: t.title,
          role: n.role || t.type,
          x: n.x, y: n.y
        });
      }
    });
    // Edges from snapshot (template node id -> ticket key)
    var nodeIdToKey = {};
    snap.nodes.forEach(function(n){
      var t = subs.find(function(x){return x.templateNodeId === n.id});
      if (t) nodeIdToKey[n.id] = t.key;
    });
    (snap.edges||[]).forEach(function(e){
      var fromK = nodeIdToKey[e.from];
      var toK = nodeIdToKey[e.to];
      if (fromK && toK) edges.push({from:fromK, to:toK, type:"template"});
    });
  } else {
    // No template snapshot - use subtasks directly
    subs.forEach(function(t){
      nodes.push({
        id: t.key, ticketKey: t.key, title: t.title, role: t.type
      });
    });
  }

  // Always add explicit blocks/blocked_by links between any of these tickets
  var nodeKeys = {};
  nodes.forEach(function(n){nodeKeys[n.ticketKey]=true});
  TS.tickets.forEach(function(t){
    if (!nodeKeys[t.key]) return;
    (t.links||[]).forEach(function(l){
      if (l.type === "blocks" && nodeKeys[l.target]){
        var dup = edges.find(function(e){return e.from===t.key && e.to===l.target});
        if (!dup) edges.push({from:t.key, to:l.target, type:"link"});
      }
    });
  });

  // Edge from parent to each top-level subtask (no incoming edge from another sub)
  var hasIncoming = {};
  edges.forEach(function(e){hasIncoming[e.to] = true});
  subs.forEach(function(s){
    if (nodeKeys[s.key] && !hasIncoming[s.key]){
      edges.push({from: parentTicket.key, to: s.key, type:"parent"});
    }
  });

  return {nodes: nodes, edges: edges};
}

/* ===== Auto-layout when no template positions exist ===== */
function pvAutoLayout(graph, parentKey){
  var levels = {};
  var visited = {};
  // Start from parent (the root)
  var queue = [{id: parentKey, level: 0}];
  levels[parentKey] = 0;
  visited[parentKey] = true;
  while (queue.length){
    var cur = queue.shift();
    graph.edges.forEach(function(e){
      if (e.from === cur.id){
        var nl = (cur.level || 0) + 1;
        if (levels[e.to] == null || levels[e.to] < nl){
          levels[e.to] = nl;
          if (!visited[e.to]){visited[e.to] = true; queue.push({id:e.to, level:nl})}
        }
      }
    });
  }
  graph.nodes.forEach(function(n){if(levels[n.id]==null)levels[n.id]=0});

  // Group by level
  var byLevel = {};
  graph.nodes.forEach(function(n){
    var l = levels[n.id];
    if (!byLevel[l]) byLevel[l] = [];
    byLevel[l].push(n.id);
  });
  var COL_W = 240, ROW_H = 100, MARGIN_X = 60, MARGIN_Y = 60;
  var positions = {};
  Object.keys(byLevel).map(Number).sort(function(a,b){return a-b}).forEach(function(lv){
    byLevel[lv].forEach(function(id, ri){
      positions[id] = {x: MARGIN_X + lv*COL_W, y: MARGIN_Y + ri*ROW_H};
    });
  });
  return positions;
}

function pvGetPos(graph, parentKey, nodeId, templateX, templateY){
  if (!PVZ.positions[parentKey]){
    PVZ.positions[parentKey] = pvAutoLayout(graph, parentKey);
  }
  if (!PVZ.positions[parentKey][nodeId]){
    if (templateX != null && templateY != null){
      PVZ.positions[parentKey][nodeId] = {x: templateX, y: templateY};
    } else {
      var auto = pvAutoLayout(graph, parentKey);
      PVZ.positions[parentKey][nodeId] = auto[nodeId] || {x: 60, y: 60};
    }
  }
  return PVZ.positions[parentKey][nodeId];
}

/* ===== Render the Process Visualizer modal ===== */
function showProcessVisualizer(parentKey){
  var parent = TS.tickets.find(function(x){return x.key===parentKey});
  if (!parent){toast("チケットが見つかりません",1);return}

  PVZ.open = true;
  PVZ.parentKey = parentKey;

  var graph = buildProcessGraph(parent);

  // Build modal
  var modal = document.getElementById("pvzModal");
  if (!modal){
    modal = document.createElement("div");
    modal.id = "pvzModal";
    modal.className = "pvz-modal";
    document.body.appendChild(modal);
  }
  modal.style.display = "flex";

  var headerColor = (parent.templateSnapshot && parent.templateSnapshot.color) || "#0c66e4";
  var icon = (parent.templateSnapshot && parent.templateSnapshot.icon) || "📊";
  var tplName = (parent.templateSnapshot && parent.templateSnapshot.name) || "Process";

  var subs = TS.tickets.filter(function(t){return t.parentKey === parent.key});
  var doneCnt = subs.filter(function(s){return s.status==="done"}).length;
  var totalCnt = subs.length;
  var pctDone = totalCnt ? Math.round(doneCnt/totalCnt*100) : 0;

  modal.innerHTML = '<div class="pvz-content"><div class="pvz-header"><div class="pvz-h-icon" style="background:'+escHtml(headerColor)+'">'+icon+'</div><div style="flex:1;min-width:0"><div class="pvz-h-title">'+escHtml(parent.key)+': '+escHtml(parent.title)+'</div><div class="pvz-h-meta">'+escHtml(tplName)+' · '+graph.nodes.length+' tasks · '+graph.edges.length+' links · 進捗 '+pctDone+'% ('+doneCnt+'/'+totalCnt+')</div></div><button class="pvz-close" id="pvzClose" title="Close">×</button></div><div class="pvz-toolbar"><button class="btn secondary btn-sm" id="pvzAuto">⚡ Auto Layout</button><button class="btn secondary btn-sm" id="pvzZIn">＋</button><button class="btn secondary btn-sm" id="pvzZOut">－</button><button class="btn secondary btn-sm" id="pvzReset">⊕ Reset</button><span style="font-size:11px;color:var(--t2);margin-left:auto">ノードクリック=詳細, ドラッグ=移動, ホイール=ズーム</span></div><div class="pvz-stage" id="pvzStage"></div></div>';

  var stage = document.getElementById("pvzStage");

  // Compute SVG size
  var maxX = 800, maxY = 400;
  graph.nodes.forEach(function(n){
    var pos = pvGetPos(graph, parent.key, n.id, n.x, n.y);
    if (pos.x + 200 > maxX) maxX = pos.x + 200;
    if (pos.y + 80 > maxY) maxY = pos.y + 80;
  });
  var svgW = Math.max(1200, maxX + 200);
  var svgH = Math.max(600, maxY + 200);

  var svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width", svgW);
  svg.setAttribute("height", svgH);
  svg.style.cssText = "transform-origin:0 0;transform:translate("+PVZ.panX+"px,"+PVZ.panY+"px) scale("+PVZ.zoom+")";
  svg.id = "pvzSvg";
  svg.innerHTML = '<defs>'+
    '<marker id="pvzArr" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 L3,5 Z" fill="#5e6c84"/></marker>'+
    '<marker id="pvzArrParent" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 L3,5 Z" fill="#a5b3c2" opacity="0.6"/></marker>'+
    '<filter id="pvzShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>'+
    '</defs>';

  // Edges first
  var edgesG = document.createElementNS("http://www.w3.org/2000/svg","g");
  edgesG.setAttribute("class","pvz-edges");
  graph.edges.forEach(function(e){pvDrawEdge(edgesG, graph, parent.key, e)});
  svg.appendChild(edgesG);

  // Nodes
  var nodesG = document.createElementNS("http://www.w3.org/2000/svg","g");
  graph.nodes.forEach(function(n){pvDrawNode(nodesG, graph, parent.key, n)});
  svg.appendChild(nodesG);

  stage.appendChild(svg);

  // Detail popup container
  var popup = document.createElement("div");
  popup.id = "pvzNodePop";
  popup.className = "pvz-node-pop";
  popup.style.display = "none";
  stage.appendChild(popup);

  // === Bindings ===
  document.getElementById("pvzClose").onclick = closeProcessVisualizer;
  document.getElementById("pvzAuto").onclick = function(){
    PVZ.positions[parent.key] = pvAutoLayout(graph, parent.key);
    pvSavePositions();
    showProcessVisualizer(parent.key);
  };
  document.getElementById("pvzZIn").onclick = function(){PVZ.zoom = Math.min(2, PVZ.zoom*1.2); pvApplyTransform()};
  document.getElementById("pvzZOut").onclick = function(){PVZ.zoom = Math.max(0.4, PVZ.zoom/1.2); pvApplyTransform()};
  document.getElementById("pvzReset").onclick = function(){PVZ.zoom=1;PVZ.panX=0;PVZ.panY=0;pvApplyTransform()};

  // Close on Escape
  document.addEventListener("keydown", pvKeyHandler);

  // Wheel zoom
  stage.addEventListener("wheel", function(e){
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : 0.9;
    PVZ.zoom = Math.max(0.3, Math.min(3, PVZ.zoom*factor));
    pvApplyTransform();
  }, {passive:false});

  // Pan
  stage.addEventListener("mousedown", function(e){
    if (e.target === stage || e.target === svg){
      PVZ.panning = true;
      PVZ._panStart = {x:e.clientX, y:e.clientY, panX:PVZ.panX, panY:PVZ.panY};
      hidePopup();
    }
  });
  document.addEventListener("mousemove", pvMouseMoveHandler);
  document.addEventListener("mouseup", pvMouseUpHandler);

  function pvApplyTransform(){
    var s = document.getElementById("pvzSvg");
    if (s) s.style.transform = "translate("+PVZ.panX+"px,"+PVZ.panY+"px) scale("+PVZ.zoom+")";
  }
}

function pvKeyHandler(e){
  if (e.key === "Escape" && PVZ.open){
    closeProcessVisualizer();
  }
}

function pvMouseMoveHandler(e){
  if (PVZ.panning){
    PVZ.panX = PVZ._panStart.panX + (e.clientX - PVZ._panStart.x);
    PVZ.panY = PVZ._panStart.panY + (e.clientY - PVZ._panStart.y);
    var s = document.getElementById("pvzSvg");
    if (s) s.style.transform = "translate("+PVZ.panX+"px,"+PVZ.panY+"px) scale("+PVZ.zoom+")";
  }
  if (PVZ.draggingNode){
    var stage = document.getElementById("pvzStage");
    if (!stage) return;
    var rect = stage.getBoundingClientRect();
    var sx = (e.clientX - rect.left - PVZ.panX) / PVZ.zoom;
    var sy = (e.clientY - rect.top - PVZ.panY) / PVZ.zoom;
    var pos = PVZ.positions[PVZ.parentKey][PVZ.draggingNode];
    pos.x = sx - PVZ._dragOff.x;
    pos.y = sy - PVZ._dragOff.y;
    var nodeEl = document.querySelector('[data-pvz-node="'+PVZ.draggingNode+'"]');
    if (nodeEl) nodeEl.setAttribute("transform", "translate("+pos.x+","+pos.y+")");
    pvRedrawEdges();
  }
}
function pvMouseUpHandler(){
  if (PVZ.panning) PVZ.panning = false;
  if (PVZ.draggingNode){PVZ.draggingNode = null; pvSavePositions()}
}

function pvRedrawEdges(){
  var svg = document.getElementById("pvzSvg");
  if (!svg) return;
  var oldEdges = svg.querySelector(".pvz-edges");
  if (!oldEdges) return;
  var parent = TS.tickets.find(function(x){return x.key===PVZ.parentKey});
  if (!parent) return;
  var graph = buildProcessGraph(parent);
  var newEdges = document.createElementNS("http://www.w3.org/2000/svg","g");
  newEdges.setAttribute("class","pvz-edges");
  graph.edges.forEach(function(e){pvDrawEdge(newEdges, graph, parent.key, e)});
  oldEdges.parentNode.replaceChild(newEdges, oldEdges);
}

function closeProcessVisualizer(){
  var modal = document.getElementById("pvzModal");
  if (modal) modal.style.display = "none";
  PVZ.open = false;
  document.removeEventListener("keydown", pvKeyHandler);
  document.removeEventListener("mousemove", pvMouseMoveHandler);
  document.removeEventListener("mouseup", pvMouseUpHandler);
  hidePopup();
}

function hidePopup(){
  var p = document.getElementById("pvzNodePop");
  if (p) p.style.display = "none";
}

/* ===== Draw a process node ===== */
function pvDrawNode(group, graph, parentKey, n){
  var t = TS.tickets.find(function(x){return x.key===n.ticketKey});
  if (!t) return;
  var pos = pvGetPos(graph, parentKey, n.id, n.x, n.y);

  var W = n.isParent ? 220 : 200;
  var H = n.isParent ? 76 : 70;

  // Status -> color
  var stColors = {todo:"#5e6c84", inprogress:"#0c66e4", review:"#a54800", done:"#216e4e"};
  var stBg = {todo:"#f1f2f4", inprogress:"#e9f2ff", review:"#fff7d6", done:"#dcfff1"};
  var st = TS.statuses.find(function(s){return s.id===t.status});
  var stColor = stColors[t.status] || (st ? st.color : "#5e6c84");
  var stBgColor = stBg[t.status] || "#fff";
  var stName = st ? st.name : t.status;

  var g = document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("data-pvz-node", n.id);
  g.setAttribute("data-pvz-key", t.key);
  g.setAttribute("transform", "translate("+pos.x+","+pos.y+")");
  g.style.cursor = "grab";

  // Background
  var rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
  rect.setAttribute("width", W); rect.setAttribute("height", H);
  rect.setAttribute("rx", 8);
  rect.setAttribute("fill", "#fff");
  rect.setAttribute("stroke", stColor);
  rect.setAttribute("stroke-width", n.isParent ? 3 : 2);
  rect.setAttribute("filter","url(#pvzShadow)");
  g.appendChild(rect);

  // Status stripe
  var stripe = document.createElementNS("http://www.w3.org/2000/svg","rect");
  stripe.setAttribute("x",0); stripe.setAttribute("y",0); stripe.setAttribute("width",W); stripe.setAttribute("height",24);
  stripe.setAttribute("rx",8);
  stripe.setAttribute("fill", stColor);
  g.appendChild(stripe);

  // Status name in stripe
  var stTxt = document.createElementNS("http://www.w3.org/2000/svg","text");
  stTxt.setAttribute("x", 12); stTxt.setAttribute("y", 16);
  stTxt.setAttribute("fill","#fff"); stTxt.setAttribute("font-size","10"); stTxt.setAttribute("font-weight","700");
  stTxt.setAttribute("font-family","sans-serif"); stTxt.setAttribute("letter-spacing","0.5");
  stTxt.textContent = (stName||"").toUpperCase();
  g.appendChild(stTxt);

  // Key in stripe right
  var keyTxt = document.createElementNS("http://www.w3.org/2000/svg","text");
  keyTxt.setAttribute("x", W-12); keyTxt.setAttribute("y", 16);
  keyTxt.setAttribute("fill","#fff"); keyTxt.setAttribute("font-size","10"); keyTxt.setAttribute("font-weight","600");
  keyTxt.setAttribute("font-family","SF Mono, monospace"); keyTxt.setAttribute("text-anchor","end");
  keyTxt.textContent = t.key;
  g.appendChild(keyTxt);

  // Title
  var title = document.createElementNS("http://www.w3.org/2000/svg","text");
  title.setAttribute("x", 12); title.setAttribute("y", 44);
  title.setAttribute("fill","#172b4d"); title.setAttribute("font-size", n.isParent ? "14" : "13");
  title.setAttribute("font-weight", n.isParent ? "700" : "600");
  title.setAttribute("font-family","-apple-system,sans-serif");
  var maxLen = n.isParent ? 28 : 24;
  title.textContent = t.title.length > maxLen ? t.title.substring(0, maxLen-1)+"…" : t.title;
  g.appendChild(title);

  // Meta line: assignee + due
  var meta = document.createElementNS("http://www.w3.org/2000/svg","text");
  meta.setAttribute("x", 12); meta.setAttribute("y", 62);
  meta.setAttribute("fill","#5e6c84"); meta.setAttribute("font-size","11");
  meta.setAttribute("font-family","-apple-system,sans-serif");
  var asgU = TS.users.find(function(u){return u.id===t.assignee});
  var metaTxt = "👤 " + (asgU?asgU.name:"未割当");
  if (t.dueDate){
    var overdue = (t.dueDate < new Date().toISOString().substr(0,10) && t.status!=="done");
    metaTxt += "  📅 " + t.dueDate + (overdue ? " ⚠" : "");
  }
  meta.textContent = metaTxt;
  g.appendChild(meta);

  // Click to show node popup with actions
  g.addEventListener("click", function(e){
    e.stopPropagation();
    if (g._wasDragged){g._wasDragged = false; return}
    showNodePopup(t, e.clientX, e.clientY);
  });
  // Double-click jumps directly
  g.addEventListener("dblclick", function(e){
    e.stopPropagation();
    closeProcessVisualizer();
    TS.selectedTicket = t.key;
    if (typeof switchView === "function") switchView("ticket");
  });
  // Drag
  g.addEventListener("mousedown", function(e){
    if (e.button !== 0) return;
    e.stopPropagation();
    var stage = document.getElementById("pvzStage");
    if (!stage) return;
    var rect = stage.getBoundingClientRect();
    var sx = (e.clientX - rect.left - PVZ.panX) / PVZ.zoom;
    var sy = (e.clientY - rect.top - PVZ.panY) / PVZ.zoom;
    var p = PVZ.positions[parentKey][n.id];
    PVZ.draggingNode = n.id;
    PVZ._dragOff = {x: sx-p.x, y: sy-p.y};
    g._dragStart = {x:e.clientX, y:e.clientY};
  });
  g.addEventListener("mouseup", function(e){
    if (g._dragStart){
      var moved = Math.abs(e.clientX-g._dragStart.x) + Math.abs(e.clientY-g._dragStart.y);
      g._wasDragged = (moved > 4);
      g._dragStart = null;
    }
  });

  group.appendChild(g);
}

/* ===== Edge drawing ===== */
function pvDrawEdge(group, graph, parentKey, e){
  var fromN = graph.nodes.find(function(n){return n.id===e.from});
  var toN = graph.nodes.find(function(n){return n.id===e.to});
  if (!fromN || !toN) return;
  var fromPos = pvGetPos(graph, parentKey, fromN.id, fromN.x, fromN.y);
  var toPos = pvGetPos(graph, parentKey, toN.id, toN.x, toN.y);
  var fromW = fromN.isParent ? 220 : 200;
  var fromH = fromN.isParent ? 76 : 70;

  // Connection points (right edge of from, left edge of to)
  var x1 = fromPos.x + fromW, y1 = fromPos.y + fromH/2;
  var x2 = toPos.x, y2 = toPos.y + (toN.isParent?38:35);
  var midX = (x1+x2)/2;

  var pathD = "M "+x1+","+y1+" C "+midX+","+y1+" "+midX+","+y2+" "+x2+","+y2;

  var path = document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d", pathD);
  path.setAttribute("fill","none");
  if (e.type === "parent"){
    path.setAttribute("stroke", "#a5b3c2");
    path.setAttribute("stroke-width","1.5");
    path.setAttribute("stroke-dasharray","4,3");
    path.setAttribute("marker-end","url(#pvzArrParent)");
  } else {
    path.setAttribute("stroke", "#5e6c84");
    path.setAttribute("stroke-width","2");
    path.setAttribute("marker-end","url(#pvzArr)");
  }
  group.appendChild(path);
}

/* ===== Node action popup ===== */
function showNodePopup(t, clientX, clientY){
  var pop = document.getElementById("pvzNodePop");
  if (!pop) return;
  var stage = document.getElementById("pvzStage");
  var rect = stage.getBoundingClientRect();
  var x = clientX - rect.left + 10;
  var y = clientY - rect.top + 10;
  // Constrain to stage
  if (x + 280 > rect.width) x = rect.width - 290;
  if (y + 320 > rect.height) y = rect.height - 330;

  var stOpts = TS.statuses.map(function(s){return '<option value="'+s.id+'"'+(t.status===s.id?" selected":"")+'>'+escHtml(s.name)+'</option>'}).join("");
  var asgOpts = '<option value="">- 未割当 -</option>'+TS.users.map(function(u){return '<option value="'+u.id+'"'+(t.assignee===u.id?" selected":"")+'>'+escHtml(u.name)+'</option>'}).join("");
  var prOpts = TS.priorities.map(function(p){return '<option value="'+p+'"'+(t.priority===p?" selected":"")+'>'+p+'</option>'}).join("");

  // Available transitions from current ticket workflow
  var trBtns = "";
  if (typeof getAvailableTransitions === "function"){
    var trs = getAvailableTransitions(t);
    if (trs.length){
      trBtns = '<div style="margin-top:8px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#9fadbc;letter-spacing:.5px;margin-bottom:4px">Workflow</div>';
      trs.slice(0,4).forEach(function(tr){
        trBtns += '<button class="pvz-tr-btn" data-tr="'+tr.id+'">'+escHtml(tr.name)+' →</button>';
      });
      trBtns += '</div>';
    }
  }

  pop.innerHTML = '<div class="pvz-pop-h"><span class="pvz-pop-key">'+t.key+'</span><button class="pvz-pop-close">×</button></div>'+
    '<div class="pvz-pop-title">'+escHtml(t.title)+'</div>'+
    '<label>Status</label><select class="pvz-sel" data-act="status">'+stOpts+'</select>'+
    '<label>Assignee</label><select class="pvz-sel" data-act="assignee">'+asgOpts+'</select>'+
    '<label>Priority</label><select class="pvz-sel" data-act="priority">'+prOpts+'</select>'+
    trBtns+
    '<div class="pvz-pop-actions"><button class="btn secondary btn-sm" data-act="open">📋 詳細を開く</button><button class="btn bp btn-sm" data-act="comment">💬 コメント</button></div>';

  pop.style.left = x+"px";
  pop.style.top = y+"px";
  pop.style.display = "block";

  pop.querySelector(".pvz-pop-close").onclick = hidePopup;
  pop.querySelectorAll(".pvz-sel").forEach(function(s){
    s.onchange = function(){
      var act = s.dataset.act;
      var patch = {};
      patch[act] = s.value;
      if (typeof updateTicket === "function"){
        updateTicket(t.key, patch);
        toast("✓ "+t.key+" "+act+"="+s.value);
        // Re-render with new status color
        if (PVZ.parentKey) showProcessVisualizer(PVZ.parentKey);
      }
    };
  });
  // Workflow transitions
  pop.querySelectorAll(".pvz-tr-btn").forEach(function(b){
    b.onclick = function(){
      var trId = b.dataset.tr;
      var wf = (typeof getTicketWorkflow==="function") ? getTicketWorkflow(t) : null;
      if (!wf){toast("ワークフロー未定義",1);return}
      var tr = wf.transitions.find(function(x){return x.id===trId});
      if (!tr) return;
      // Pre-check conditions
      for (var i=0;i<(tr.conditions||[]).length;i++){
        var c = tr.conditions[i];
        var fn = WF_CONDITIONS[c.type||c];
        if (fn){var r=fn.check(t,tr,{});if(!r.ok){toast("条件NG: "+r.msg,1);return}}
      }
      var needsDlg = (tr.validators||[]).length || (tr.postFunctions||[]).some(function(p){return (p.type||p)==="set_resolution"});
      if (needsDlg && typeof showTransitionDlg==="function"){
        hidePopup();
        showTransitionDlg(t, tr);
        // Re-render after closes (heuristic: timeout)
        setTimeout(function(){if(PVZ.parentKey&&PVZ.open)showProcessVisualizer(PVZ.parentKey)}, 400);
      } else {
        var rr = executeTransition(t.key, trId, {});
        if (rr.ok){toast("'"+tr.name+"' 実行"); if(PVZ.parentKey)showProcessVisualizer(PVZ.parentKey)}
        else toast(rr.msg||"失敗",1);
      }
    };
  });
  pop.querySelector('[data-act="open"]').onclick = function(){
    closeProcessVisualizer();
    TS.selectedTicket = t.key;
    if (typeof switchView==="function") switchView("ticket");
  };
  pop.querySelector('[data-act="comment"]').onclick = function(){
    var c = prompt("コメント");
    if (c && c.trim()){
      if (typeof addComment === "function") addComment(t.key, c);
      toast("コメント追加");
    }
  };
}

/* ============================================================
   KEYBOARD SHORTCUTS (Linear/Notion-style)
   - g+i / g+b / g+k / g+t / g+w : navigate views (gantt/issues/board/templates/workflows)
   - c    : create new ticket
   - /    : focus global search
   - ?    : show shortcut help
   - j/k  : next/prev ticket in Issues
   - x    : toggle bulk select on focused row
   - Esc  : close modal/popup
   ============================================================ */

var KS = {
  pendingPrefix: null,    // for two-key sequences like "g i"
  prefixTimer: null
};

function isInputFocused(){
  var a = document.activeElement;
  if (!a) return false;
  var tag = a.tagName;
  return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || a.contentEditable === "true";
}

function ksClearPrefix(){
  if (KS.prefixTimer){clearTimeout(KS.prefixTimer); KS.prefixTimer=null}
  KS.pendingPrefix = null;
  hideKsHint();
}

function showKsHint(text){
  var hint = document.getElementById("ksHint");
  if (!hint){
    hint = document.createElement("div");
    hint.id = "ksHint";
    hint.style.cssText = "position:fixed;bottom:24px;left:24px;background:#1d2125;color:#fff;padding:8px 14px;border-radius:6px;font-size:12px;z-index:3000;font-family:monospace;box-shadow:0 4px 12px rgba(0,0,0,.3)";
    document.body.appendChild(hint);
  }
  hint.textContent = text;
  hint.style.display = "block";
}
function hideKsHint(){
  var h = document.getElementById("ksHint");
  if (h) h.style.display = "none";
}

document.addEventListener("keydown", function(e){
  // Always allow Esc
  if (e.key === "Escape"){
    // Close modal if open
    var modal = document.getElementById("modal");
    if (modal && modal.style.display === "flex") closeModal();
    // Close process visualizer
    if (typeof PVZ !== "undefined" && PVZ.open && typeof closeProcessVisualizer === "function") closeProcessVisualizer();
    // Close notif
    var n = document.getElementById("notif");
    if (n && n.style.display === "flex") n.style.display = "none";
    ksClearPrefix();
    return;
  }

  if (isInputFocused()) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return; // Skip ctrl-combo

  // Two-key sequences (g + ...)
  if (KS.pendingPrefix === "g"){
    e.preventDefault();
    var view = null;
    switch(e.key){
      case "i": view = "ticket"; break;
      case "b": view = "backlog"; break;
      case "k": view = "kanban"; break;
      case "p": view = "sprint"; break;
      case "t": view = "template"; break;
      case "g": view = "gantt"; break;
      case "w": view = "workflow"; break;
      case "s": view = "admin"; break;
      case "a": view = "audit"; break;
    }
    ksClearPrefix();
    if (view && typeof switchView === "function") switchView(view);
    return;
  }

  // Single keys
  switch(e.key){
    case "g":
      KS.pendingPrefix = "g";
      showKsHint("g _ 待機中... (i=Issues, b=Backlog, k=Board, t=Templates, g=Gantt, w=Workflows, s=Settings)");
      KS.prefixTimer = setTimeout(ksClearPrefix, 1500);
      e.preventDefault();
      break;
    case "c":
      e.preventDefault();
      if (typeof newTicketDlg === "function") newTicketDlg();
      break;
    case "/":
      e.preventDefault();
      var s = document.getElementById("globalSearch");
      if (s){s.focus(); s.select()}
      break;
    case "?":
      e.preventDefault();
      showShortcutHelp();
      break;
    case "b":
      e.preventDefault();
      if (typeof showBackupDlg === "function") showBackupDlg();
      break;
    // Issues navigation
    case "j":
    case "k":
      if (TS.currentView === "ticket"){
        e.preventDefault();
        navigateTicketList(e.key === "j" ? 1 : -1);
      }
      break;
    case "x":
      if (TS.currentView === "ticket" && TS.selectedTicket){
        e.preventDefault();
        if (typeof bulkToggle === "function"){
          bulkToggle(TS.selectedTicket);
          if (typeof renderTicketView === "function") renderTicketView();
        }
      }
      break;
    case "o":
    case "Enter":
      if (TS.currentView === "ticket" && TS.selectedTicket){
        // Already showing detail — focus a textarea? scroll into view.
        var det = document.getElementById("ticketDetail");
        if (det) det.scrollIntoView({behavior:"smooth"});
      }
      break;
  }
});

function navigateTicketList(dir){
  if (typeof searchTickets !== "function") return;
  var results = searchTickets(TS.filter || "");
  if (!results.length) return;
  var idx = TS.selectedTicket ? results.findIndex(function(t){return t.key===TS.selectedTicket}) : -1;
  idx = idx + dir;
  if (idx < 0) idx = 0;
  if (idx >= results.length) idx = results.length - 1;
  TS.selectedTicket = results[idx].key;
  if (typeof renderTicketView === "function") renderTicketView();
  // Scroll the row into view
  setTimeout(function(){
    var row = document.querySelector('.tk-row[data-key="'+results[idx].key+'"]');
    if (row) row.scrollIntoView({block:"nearest", behavior:"smooth"});
  }, 50);
}

/* ============================================================
   GLOBAL UNDO / REDO
   - Snapshots the entire TS state (tickets, templates, workflows...)
   - Triggered by: Ctrl+Z / Ctrl+Y / Cmd+Z / Cmd+Shift+Z
   - Also exposed via toolbar buttons
   - Captures snapshots BEFORE mutating operations:
     ticket create/update/delete, template add/edit/del,
     workflow change, bulk operations, transition, etc.
   ============================================================ */

var UR = {
  history: [],       // Array of snapshots (most recent at end)
  future: [],        // Redo stack (most recent at end)
  capturing: true,   // Set to false when applying undo/redo (to prevent double-capture)
  transactionDepth: 0, // >0 means inside a multi-op transaction; suppress intermediate captures
  maxHistory: 60,
  lastCaptureMs: 0,
  debounceMs: 250    // Coalesce rapid changes into single undo step
};

// Begin a transaction: only the FIRST urCapture call records, subsequent ones are ignored
function urBegin(label){
  if (UR.transactionDepth === 0){
    urCapture(label, true);
  }
  UR.transactionDepth++;
}
function urEnd(){
  UR.transactionDepth = Math.max(0, UR.transactionDepth - 1);
}

// Build a deep snapshot of mutable TS state
function urSnapshot(){
  // Don't include UI/transient fields like currentView, filter, selectedTicket
  // (so undo doesn't change which screen you're on)
  return JSON.stringify({
    tickets: TS.tickets,
    sprints: TS.sprints,
    workflows: TS.workflows,
    workflowSchemes: TS.workflowSchemes,
    workflowDrafts: TS.workflowDrafts,
    statuses: TS.statuses,
    priorities: TS.priorities,
    types: TS.types,
    resolutions: TS.resolutions,
    users: TS.users,
    roles: TS.roles,
    templates: TS.templates,
    templatesInitialized: TS.templatesInitialized,
    ticketHistory: TS.ticketHistory,
    notifications: TS.notifications,
    customFields: TS.customFields,
    ticketSeq: TS.ticketSeq,
    autoCompleteParent: TS.autoCompleteParent,
    alertConfig: TS.alertConfig,
    boardConfig: TS.boardConfig,
    ganttData: (typeof S !== "undefined" && S.data) ? JSON.stringify(S.data) : null
  });
}

function urApplySnapshot(snapStr){
  try {
    var snap = JSON.parse(snapStr);
    UR.capturing = false;
    TS.tickets = snap.tickets || [];
    TS.sprints = snap.sprints || [];
    TS.workflows = snap.workflows || [];
    TS.workflowSchemes = snap.workflowSchemes || [];
    TS.workflowDrafts = snap.workflowDrafts || {};
    TS.statuses = snap.statuses || [];
    TS.priorities = snap.priorities || [];
    TS.types = snap.types || [];
    TS.resolutions = snap.resolutions || [];
    TS.users = snap.users || [];
    TS.roles = snap.roles || [];
    TS.templates = snap.templates || [];
    TS.templatesInitialized = snap.templatesInitialized;
    TS.ticketHistory = snap.ticketHistory || {};
    TS.notifications = snap.notifications || [];
    TS.customFields = snap.customFields || [];
    TS.ticketSeq = snap.ticketSeq || 1;
    TS.autoCompleteParent = snap.autoCompleteParent;
    TS.alertConfig = snap.alertConfig;
    TS.boardConfig = snap.boardConfig;
    if (snap.ganttData && typeof S !== "undefined"){
      try {
        S.data = JSON.parse(snap.ganttData);
        if (typeof flatAll === "function") S.flat = flatAll(S.data.tasks||[]);
        if (typeof resG === "function") resG(S.flat||[]);
        if (typeof yS === "function" && document.getElementById("ye")){
          document.getElementById("ye").value = yS(S.data);
        }
      } catch(e){console.warn("ganttData restore failed",e)}
    }
    saveTS();
    UR.capturing = true;
  } catch(e){
    console.error("urApplySnapshot error:", e);
    UR.capturing = true;
  }
}

// Capture current state. If `force` is false, debounces rapid calls.
function urCapture(label, force){
  if (!UR.capturing) return;
  // Inside a transaction, suppress intermediate captures
  if (UR.transactionDepth > 0) return;
  var now = Date.now();
  if (!force && now - UR.lastCaptureMs < UR.debounceMs && UR.history.length > 0){
    // Replace last entry instead of adding new (debounce coalesce)
    return;
  }
  var snap = urSnapshot();
  // Only push if different from previous
  if (UR.history.length > 0 && UR.history[UR.history.length-1].snap === snap) return;
  UR.history.push({snap: snap, label: label || "", ts: now});
  if (UR.history.length > UR.maxHistory) UR.history.shift();
  UR.future = []; // clear redo stack on new action
  UR.lastCaptureMs = now;
  urUpdateButtons();
}

function urUndo(){
  if (UR.history.length === 0){toast("これ以上戻せません",1);return}
  var current = urSnapshot();
  var last = UR.history.pop();
  UR.future.push({snap: current, label: last.label, ts: Date.now()});
  urApplySnapshot(last.snap);
  rerenderAfterUndo();
  toast("↶ 取り消し" + (last.label ? " ("+last.label+")" : ""));
  urUpdateButtons();
}

function urRedo(){
  if (UR.future.length === 0){toast("これ以上やり直せません",1);return}
  var current = urSnapshot();
  var next = UR.future.pop();
  UR.history.push({snap: current, label: next.label, ts: Date.now()});
  urApplySnapshot(next.snap);
  rerenderAfterUndo();
  toast("↷ やり直し" + (next.label ? " ("+next.label+")" : ""));
  urUpdateButtons();
}

function rerenderAfterUndo(){
  var v = TS.currentView || "gantt";
  if (v === "gantt" && typeof render === "function") render();
  else if (v === "ticket" && typeof renderTicketView === "function") renderTicketView();
  else if (v === "kanban" && typeof renderKanbanView === "function") renderKanbanView();
  else if (v === "backlog" && typeof renderBacklogView === "function") renderBacklogView();
  else if (v === "template" && typeof renderTemplateView === "function") renderTemplateView();
  else if (v === "workflow" && typeof renderWorkflowView === "function") renderWorkflowView();
  else if (v === "audit" && typeof renderAuditView === "function") renderAuditView();
  else if (v === "admin" && typeof renderAdminView === "function") renderAdminView();
}

function urUpdateButtons(){
  var u = document.getElementById("topUndo");
  var r = document.getElementById("topRedo");
  if (u) {u.disabled = UR.history.length===0; u.title = UR.history.length===0 ? "取り消し (履歴なし)" : "取り消し ("+UR.history.length+"ステップ) [Ctrl+Z]"}
  if (r) {r.disabled = UR.future.length===0; r.title = UR.future.length===0 ? "やり直し (履歴なし)" : "やり直し ("+UR.future.length+"ステップ) [Ctrl+Y]"}
}

/* ===== Hook into mutating functions ===== */

(function(){
  // Wait until other modules are loaded
  function tryHook(){
    if (typeof updateTicket !== "function" || typeof createTicket !== "function" || typeof deleteTicket !== "function") {
      setTimeout(tryHook, 50); return;
    }

    // Wrap createTicket
    var _origCreate = createTicket;
    createTicket = function(p){urCapture("チケット作成", true); return _origCreate(p)};

    // Wrap updateTicket - debounce so dropdown changes coalesce
    var _origUpdate = updateTicket;
    updateTicket = function(key, patch){
      urCapture("チケット更新", false);
      return _origUpdate(key, patch);
    };

    // Wrap deleteTicket
    var _origDelete = deleteTicket;
    deleteTicket = function(key){urCapture("チケット削除", true); return _origDelete(key)};

    // Wrap addComment if exists
    if (typeof addComment === "function"){
      var _origAddCmt = addComment;
      addComment = function(key, body){urCapture("コメント追加", true); return _origAddCmt(key, body)};
    }

    // Wrap applyTemplate - one transaction = one undo step
    if (typeof applyTemplate === "function"){
      var _origApplyTpl = applyTemplate;
      applyTemplate = function(id, fields, opts){
        urBegin("テンプレート適用");
        try { return _origApplyTpl(id, fields, opts); }
        finally { urEnd(); }
      };
    }

    // Wrap executeTransition
    if (typeof executeTransition === "function"){
      var _origExec = executeTransition;
      executeTransition = function(key, trId, ctx){urCapture("ワークフロー遷移", true); return _origExec(key, trId, ctx)};
    }

    // Wrap workflow ops
    if (typeof publishDraft === "function"){
      var _origPub = publishDraft;
      publishDraft = function(id){urCapture("ワークフロー公開", true); return _origPub(id)};
    }
    if (typeof saveDraft === "function"){
      var _origSDraft = saveDraft;
      saveDraft = function(id, draft){urCapture("ワークフロー編集", false); return _origSDraft(id, draft)};
    }
    if (typeof deleteWorkflow === "function"){
      var _origDelWf = deleteWorkflow;
      deleteWorkflow = function(id){urCapture("ワークフロー削除", true); return _origDelWf(id)};
    }

    // Wrap bulk operations - each is one undo step
    ["bulkDone", "bulkDel"].forEach(function(name){
      if (typeof window[name] === "function"){
        var orig = window[name];
        window[name] = function(){
          urBegin(name === "bulkDone" ? "一括完了" : "一括削除");
          try { return orig.apply(this, arguments); }
          finally { urEnd(); }
        };
      }
    });

    // Initial baseline snapshot (so first action can be undone back to baseline)
    setTimeout(function(){
      urCapture("初期状態", true);
      // The above adds initial state to history. Pop it so users don't have a
      // useless "undo" that does nothing meaningful before any change.
      UR.history.pop();
      urUpdateButtons();
    }, 500);
  }
  tryHook();
})();

/* ===== Keyboard shortcuts ===== */

document.addEventListener("keydown", function(e){
  // Skip when input/textarea is focused (let native undo work)
  var a = document.activeElement;
  if (a && (a.tagName === "INPUT" || a.tagName === "TEXTAREA" || a.isContentEditable)){
    // Exception: Ctrl+Shift+Z always triggers app-level redo (not used by inputs typically)
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === "z" || e.key === "Z")){
      e.preventDefault();
      urRedo();
    }
    return;
  }
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === "z"){
    e.preventDefault();
    urUndo();
  } else if ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === "y" || (e.shiftKey && e.key.toLowerCase() === "z"))){
    e.preventDefault();
    urRedo();
  }
}, true);
