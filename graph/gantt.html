/* ============================================================
   SPRINT MANAGEMENT (JIRA級)
   - Active / Planned / Completed タブ
   - Sprint create/edit/start/complete
   - Goal, capacity, dates
   - Burndown chart (SVG)
   - Velocity chart (last 5 sprints)
   - Drag tickets between Backlog and Sprint
   ============================================================ */

var SPRINT_STATE = {
  selectedSprintId: null,
  view: "active"   // "active" | "planned" | "completed"
};

function ensureSprints(){
  if (!TS.sprints) TS.sprints = [];
}

function getActiveSprints(){
  ensureSprints();
  return TS.sprints.filter(function(s){return s.state === "active"});
}
function getPlannedSprints(){
  ensureSprints();
  return TS.sprints.filter(function(s){return !s.state || s.state === "planned"});
}
function getCompletedSprints(){
  ensureSprints();
  return TS.sprints.filter(function(s){return s.state === "completed"});
}

function getSprintTickets(sprintId){
  return TS.tickets.filter(function(t){return t.sprintId === sprintId});
}
function getSprintSP(sprintId){
  return getSprintTickets(sprintId).reduce(function(a,t){return a + (t.storyPoint||0)}, 0);
}
function getSprintDoneSP(sprintId){
  return getSprintTickets(sprintId).filter(function(t){return t.status === "done"}).reduce(function(a,t){return a + (t.storyPoint||0)}, 0);
}

/* ============================================================
   SPRINT VIEW
   ============================================================ */
function renderSprintView(){
  ensureSprints();
  var v = document.getElementById("sprintView");
  if (!v) return;

  var html = '<div class="page-header"><div class="page-bc"><a>プロジェクト</a> / <a>Sprints</a></div><div class="page-title">🏃 Sprints</div><div style="font-size:13px;color:var(--t2);margin-top:4px">アジャイル開発のためのスプリント管理</div></div>';

  // Tabs
  var actCnt = getActiveSprints().length;
  var planCnt = getPlannedSprints().length;
  var compCnt = getCompletedSprints().length;
  html += '<div class="page-toolbar" style="border-bottom:1px solid var(--bd);padding-bottom:0">';
  html += '<div style="display:flex;gap:0;flex:1">';
  ["active","planned","completed"].forEach(function(tab){
    var label = {active:"⚡ Active",planned:"📋 Planned",completed:"✓ Completed"}[tab];
    var cnt = {active:actCnt,planned:planCnt,completed:compCnt}[tab];
    var on = SPRINT_STATE.view === tab;
    html += '<button class="sp-tab'+(on?" on":"")+'" data-sp-tab="'+tab+'" style="padding:10px 18px;background:'+(on?"var(--b1)":"transparent")+';border:none;border-bottom:2px solid '+(on?"var(--ac)":"transparent")+';color:'+(on?"var(--ac)":"var(--t2)")+';font-weight:'+(on?"600":"400")+';cursor:pointer;font-family:inherit;font-size:13px">'+label+' <span style="background:var(--b3);padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px">'+cnt+'</span></button>';
  });
  html += '</div>';
  html += '<button class="btn bp" id="spCreate">+ Sprint作成</button>';
  html += '<button class="btn secondary" id="spVelocity">📊 ベロシティ</button>';
  html += '</div>';

  html += '<div style="flex:1;overflow:auto;padding:20px;background:var(--b2)">';
  if (SPRINT_STATE.view === "active"){
    html += renderActiveSprints();
  } else if (SPRINT_STATE.view === "planned"){
    html += renderPlannedSprints();
  } else {
    html += renderCompletedSprints();
  }
  html += '</div>';

  v.innerHTML = html;

  // Bind tabs
  v.querySelectorAll(".sp-tab").forEach(function(t){
    t.onclick = function(){SPRINT_STATE.view = t.dataset.spTab; renderSprintView()};
  });
  document.getElementById("spCreate").onclick = function(){spCreateDlg()};
  document.getElementById("spVelocity").onclick = function(){spVelocityDlg()};

  bindSprintActions(v);
}

function renderActiveSprints(){
  var actives = getActiveSprints();
  if (!actives.length){
    return '<div class="empty-state"><div class="empty-state-icon">⚡</div><div class="empty-state-title">アクティブなスプリントがありません</div><div class="empty-state-text">Plannedタブからスプリントを開始してください</div></div>';
  }
  var html = '';
  actives.forEach(function(sp){
    html += renderSprintDetail(sp, true);
  });
  return html;
}

function renderPlannedSprints(){
  var planned = getPlannedSprints();
  if (!planned.length){
    return '<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">未開始のスプリントがありません</div><div class="empty-state-text">「+ Sprint作成」で新しいスプリントを作成してください</div></div>';
  }
  var html = '';
  planned.forEach(function(sp){
    html += renderSprintDetail(sp, false);
  });
  return html;
}

function renderCompletedSprints(){
  var comp = getCompletedSprints();
  if (!comp.length){
    return '<div class="empty-state"><div class="empty-state-icon">✓</div><div class="empty-state-title">完了したスプリントがありません</div></div>';
  }
  var html = '';
  comp.forEach(function(sp){
    html += renderSprintDetail(sp, false, true);
  });
  return html;
}

function renderSprintDetail(sp, isActive, isCompleted){
  var tickets = getSprintTickets(sp.id);
  var totalSP = getSprintSP(sp.id);
  var doneSP = getSprintDoneSP(sp.id);
  var pct = totalSP > 0 ? Math.round(doneSP/totalSP*100) : 0;
  var capacity = sp.capacity || 0;
  var capacityPct = capacity > 0 ? Math.round(totalSP/capacity*100) : 0;
  var capacityStatus = capacityPct > 100 ? "over" : (capacityPct > 80 ? "warn" : "ok");

  // Status counts
  var stCounts = {};
  TS.statuses.forEach(function(s){stCounts[s.id] = 0});
  tickets.forEach(function(t){if(stCounts[t.status]!=null)stCounts[t.status]++});

  var html = '<div class="sp-card" data-sp-id="'+sp.id+'">';
  html += '<div class="sp-card-h">';
  html += '<div style="flex:1">';
  html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">';
  html += '<h3 style="margin:0;font-size:18px;color:var(--t1)">🏃 '+escHtml(sp.name)+'</h3>';
  if (isActive) html += '<span class="sp-state-pill active">⚡ ACTIVE</span>';
  else if (isCompleted) html += '<span class="sp-state-pill completed">✓ COMPLETED</span>';
  else html += '<span class="sp-state-pill planned">📋 PLANNED</span>';
  html += '</div>';
  if (sp.goal) html += '<div style="font-size:13px;color:var(--t2);margin-bottom:6px">🎯 '+escHtml(sp.goal)+'</div>';
  var dateInfo = '';
  if (sp.startDate) dateInfo += sp.startDate;
  if (sp.endDate) dateInfo += ' → ' + sp.endDate;
  if (dateInfo) html += '<div style="font-size:11px;color:var(--t3);font-family:monospace">'+dateInfo+'</div>';
  html += '</div>';

  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">';
  if (!isActive && !isCompleted){
    html += '<button class="btn bp btn-sm" data-sp-act="start" data-sp-id="'+sp.id+'">▶ 開始</button>';
  }
  if (isActive){
    html += '<button class="btn bp btn-sm" data-sp-act="complete" data-sp-id="'+sp.id+'">✓ 完了</button>';
    html += '<button class="btn secondary btn-sm" data-sp-act="burndown" data-sp-id="'+sp.id+'">📈 バーンダウン</button>';
  }
  if (isCompleted){
    html += '<button class="btn secondary btn-sm" data-sp-act="report" data-sp-id="'+sp.id+'">📊 レポート</button>';
  }
  html += '<button class="btn secondary btn-sm" data-sp-act="edit" data-sp-id="'+sp.id+'">✎ 編集</button>';
  html += '<button class="btn-icon" data-sp-act="delete" data-sp-id="'+sp.id+'" style="color:var(--dn)">×</button>';
  html += '</div>';
  html += '</div>';

  // Stats row
  html += '<div class="sp-stats">';
  html += '<div class="sp-stat"><div class="sp-stat-l">チケット</div><div class="sp-stat-v">'+tickets.length+'</div></div>';
  html += '<div class="sp-stat"><div class="sp-stat-l">SP合計</div><div class="sp-stat-v">'+totalSP+'</div></div>';
  if (capacity > 0){
    html += '<div class="sp-stat"><div class="sp-stat-l">キャパシティ</div><div class="sp-stat-v">'+capacity+' SP</div></div>';
    html += '<div class="sp-stat"><div class="sp-stat-l">使用率</div><div class="sp-stat-v" style="color:'+(capacityStatus==="over"?"var(--dn)":capacityStatus==="warn"?"var(--wn)":"var(--gn)")+'">'+capacityPct+'%</div></div>';
  }
  html += '<div class="sp-stat"><div class="sp-stat-l">完了率</div><div class="sp-stat-v" style="color:var(--gn)">'+pct+'% ('+doneSP+'/'+totalSP+' SP)</div></div>';
  html += '</div>';

  // Progress bar
  html += '<div class="sp-progress">';
  TS.statuses.forEach(function(st){
    var w = totalSP > 0 ? (tickets.filter(function(t){return t.status===st.id}).reduce(function(a,t){return a+(t.storyPoint||0)},0) / totalSP * 100) : 0;
    if (w > 0){
      html += '<div class="sp-progress-seg" style="width:'+w+'%;background:'+st.color+'" title="'+escHtml(st.name)+': '+stCounts[st.id]+'件"></div>';
    }
  });
  html += '</div>';

  // Status legend
  html += '<div style="display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--t2);margin-top:6px;margin-bottom:10px">';
  TS.statuses.forEach(function(st){
    html += '<span><span style="display:inline-block;width:8px;height:8px;background:'+st.color+';border-radius:50%;margin-right:4px;vertical-align:middle"></span>'+escHtml(st.name)+': '+stCounts[st.id]+'</span>';
  });
  html += '</div>';

  // Tickets list
  html += '<div class="sp-tickets" data-sp-drop="'+sp.id+'">';
  if (!tickets.length){
    html += '<div class="sp-tickets-empty">チケットがありません。Backlogからドラッグして追加してください</div>';
  } else {
    tickets.forEach(function(t){
      var st = TS.statuses.find(function(s){return s.id===t.status});
      html += '<div class="sp-ticket" draggable="true" data-key="'+t.key+'">';
      html += '<span class="ti '+(t.parentKey?"subtask":t.type)+'">'+(t.parentKey?"S":t.type[0].toUpperCase())+'</span>';
      html += '<span class="sp-ticket-key">'+t.key+'</span>';
      html += '<span class="sp-ticket-title">'+escHtml(t.title)+'</span>';
      html += '<span class="lozenge '+(t.status==="done"?"done":t.status==="inprogress"?"inprogress":"todo")+'" style="background:'+(st?st.color+"22":"var(--b3)")+';color:'+(st?st.color:"var(--t2)")+'">'+escHtml(st?st.name:t.status)+'</span>';
      if (t.storyPoint) html += '<span class="sp-sp-pill">'+t.storyPoint+'</span>';
      html += '<span style="font-size:11px;color:var(--t2);min-width:60px">'+escHtml(t.assignee||"-")+'</span>';
      html += '<button class="btn-icon" data-rm-from-sp="'+t.key+'" title="スプリントから外す">×</button>';
      html += '</div>';
    });
  }
  html += '</div>';
  html += '</div>';
  return html;
}

function bindSprintActions(v){
  v.querySelectorAll("[data-sp-act]").forEach(function(b){
    b.onclick = function(e){
      e.stopPropagation();
      var act = b.dataset.spAct;
      var id = b.dataset.spId;
      if (act === "start") spStart(id);
      else if (act === "complete") spComplete(id);
      else if (act === "edit") spEditDlg(id);
      else if (act === "delete") spDelete(id);
      else if (act === "burndown") spBurndownDlg(id);
      else if (act === "report") spReportDlg(id);
    };
  });
  v.querySelectorAll("[data-rm-from-sp]").forEach(function(b){
    b.onclick = function(e){
      e.stopPropagation();
      var key = b.dataset.rmFromSp;
      if (typeof urCapture === "function") urCapture("スプリントから外す", true);
      var t = TS.tickets.find(function(x){return x.key===key});
      if (t){t.sprintId = null; t.updatedAt = new Date().toISOString(); audit("update","ticket",key,"removed from sprint")}
      saveTS();
      renderSprintView();
      toast("スプリントから外しました");
    };
  });
  // Drag tickets between sprints / backlog
  v.querySelectorAll(".sp-ticket[draggable]").forEach(function(t){
    t.ondragstart = function(e){
      e.dataTransfer.setData("text/plain", t.dataset.key);
      e.dataTransfer.effectAllowed = "move";
      t.classList.add("dragging");
    };
    t.ondragend = function(){t.classList.remove("dragging")};
  });
  v.querySelectorAll("[data-sp-drop]").forEach(function(zone){
    zone.ondragover = function(e){e.preventDefault(); zone.classList.add("dragover")};
    zone.ondragleave = function(){zone.classList.remove("dragover")};
    zone.ondrop = function(e){
      e.preventDefault();
      zone.classList.remove("dragover");
      var key = e.dataTransfer.getData("text/plain");
      var spId = zone.dataset.spDrop;
      var t = TS.tickets.find(function(x){return x.key===key});
      if (!t || t.sprintId === spId) return;
      if (typeof urCapture === "function") urCapture("スプリントへ移動", true);
      t.sprintId = spId; t.updatedAt = new Date().toISOString();
      audit("update","ticket",key,"moved to sprint "+spId);
      saveTS();
      renderSprintView();
      toast("スプリントへ移動");
    };
  });
}

/* ============================================================
   SPRINT CREATE / EDIT
   ============================================================ */
function spCreateDlg(){
  var html = '<h3>+ 新規スプリント作成</h3>';
  html += '<label>スプリント名 *</label><input id="spcName" placeholder="例: Sprint 1">';
  html += '<label>ゴール (任意)</label><textarea id="spcGoal" rows="2" placeholder="このスプリントで達成したいこと"></textarea>';
  html += '<div class="fr"><div><label>開始日</label><input id="spcStart" type="date"></div><div><label>終了日</label><input id="spcEnd" type="date"></div></div>';
  html += '<label>キャパシティ (合計SP、任意)</label><input id="spcCap" type="number" placeholder="例: 30">';
  html += '<div class="ma"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn bp" id="spcOk">作成</button></div>';
  showModal(html);
  // Default dates: today + 14 days
  var today = new Date();

function spStart(id){

  if (actives.length > 0 && !confirm("既にアクティブなスプリント "+actives[0].name+" があります。このまま開始しますか？(複数アクティブ可)")) return;

function spComplete(id){
  var sp = TS.sprints.find(function(x){return x.id===id});
  if (!sp) return;
  var tickets = getSprintTickets(id);
  var done = tickets.filter(function(t){return t.status==="done"});
  var notDone = tickets.filter(function(t){return t.status!=="done"});

  var html = '<h3>✓ Sprint完了</h3>';
  html += '<div style="font-size:13px;color:var(--t1);margin-bottom:14px">'+escHtml(sp.name)+'</div>';
  html += '<div class="sp-stats" style="background:var(--b2);padding:12px;border-radius:4px;margin-bottom:14px">';
  html += '<div class="sp-stat"><div class="sp-stat-l">完了</div><div class="sp-stat-v" style="color:var(--gn)">'+done.length+' (' +done.reduce(function(a,t){return a+(t.storyPoint||0)},0) + ' SP)</div></div>';
  html += '<div class="sp-stat"><div class="sp-stat-l">未完了</div><div class="sp-stat-v" style="color:var(--wn)">'+notDone.length+' ('+notDone.reduce(function(a,t){return a+(t.storyPoint||0)},0) + ' SP)</div></div>';
  html += '</div>';
  if (notDone.length){
    html += '<label>未完了チケットの行き先</label>';
    var sprintOpts = '<option value="__backlog__">Backlogに戻す</option>';
    var planned = getPlannedSprints();
    planned.forEach(function(p){sprintOpts += '<option value="'+p.id+'">'+escHtml(p.name)+' に移動</option>'});
    html += '<select id="spcMoveTo">'+sprintOpts+'</select>';
  }
  html += '<div class="ma"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn bp" id="spcCompOk">完了</button></div>';
  showModal(html);
  document.getElementById("spcCompOk").onclick = function(){
    if (typeof urCapture === "function") urCapture("スプリント完了", true);
    var moveTo = notDone.length ? document.getElementById("spcMoveTo").value : null;
    if (moveTo === "__backlog__"){
      notDone.forEach(function(t){t.sprintId = null});
    } else if (moveTo){
      notDone.forEach(function(t){t.sprintId = moveTo});
    }
    sp.state = "completed";
    sp.actualEndDate = new Date().toISOString().substr(0,10);
    sp.completedSP = done.reduce(function(a,t){return a+(t.storyPoint||0)},0);
    sp.completedCount = done.length;
    sp.notCompletedCount = notDone.length;
    audit("update","sprint",id,"completed");
    saveTS();
    closeModal();
    SPRINT_STATE.view = "completed";
    renderSprintView();
    toast("✓ Sprint完了: "+sp.name);
  };
}

function spDelete(id){
  var sp = TS.sprints.find(function(x){return x.id===id});

  var tcnt = getSprintTickets(id).length;

  if (typeof urCapture === "function") urCapture("スプリント削除", true);

  saveTS();
  renderSprintView();
  toast("削除");
}

/* ============================================================
   BURNDOWN CHART (SVG)
   ============================================================ */
function spBurndownDlg(id){
  var sp = TS.sprints.find(function(x){return x.id===id});
  if (!sp) return;

  // Compute current remaining
  var totalSP = getSprintSP(id);
  var remainingSP = totalSP - getSprintDoneSP(id);

  // Update today's snapshot
  if (!sp.dailySnapshots) sp.dailySnapshots = [];
  var today = new Date().toISOString().substr(0,10);
  var existing = sp.dailySnapshots.find(function(s){return s.date===today});
  if (existing) existing.remaining = remainingSP;
  else sp.dailySnapshots.push({date: today, remaining: remainingSP});
  saveTS();

  // Compute date range
  var startDate = sp.actualStartDate || sp.startDate || today;
  var endDate = sp.endDate || today;
  var start = new Date(startDate);
  var end = new Date(endDate);
  var totalDays = Math.max(1, Math.round((end - start)/86400000));
  var initialSP = sp.initialSP || totalSP;

  var W = 620, H = 320, ML = 50, MR = 20, MT = 30, MB = 40;
  var pw = W - ML - MR;
  var ph = H - MT - MB;

  // Ideal line: from (0, initialSP) to (totalDays, 0)
  var idealX1 = ML, idealY1 = MT;
  var idealX2 = ML + pw, idealY2 = MT + ph;

  var svg = '<svg width="'+W+'" height="'+H+'" style="background:var(--b1);border:1px solid var(--bd);border-radius:4px">';
  // Grid
  for (var i = 0; i <= 5; i++){
    var y = MT + (ph * i / 5);
    svg += '<line x1="'+ML+'" y1="'+y+'" x2="'+(ML+pw)+'" y2="'+y+'" stroke="var(--bd)" stroke-width="0.5"/>';
    var v = Math.round(initialSP * (5-i) / 5);
    svg += '<text x="'+(ML-8)+'" y="'+(y+4)+'" text-anchor="end" font-size="10" fill="var(--t2)" font-family="sans-serif">'+v+'</text>';
  }
  // Date axis
  for (var d = 0; d <= totalDays; d += Math.max(1, Math.ceil(totalDays/7))){
    var x = ML + (pw * d / totalDays);
    var dt = new Date(start.getTime() + d*86400000);
    var lbl = (dt.getMonth()+1)+"/"+dt.getDate();
    svg += '<line x1="'+x+'" y1="'+MT+'" x2="'+x+'" y2="'+(MT+ph)+'" stroke="var(--bd)" stroke-width="0.5"/>';
    svg += '<text x="'+x+'" y="'+(MT+ph+15)+'" text-anchor="middle" font-size="9" fill="var(--t2)" font-family="sans-serif">'+lbl+'</text>';
  }
  // Ideal burndown
  svg += '<line x1="'+idealX1+'" y1="'+idealY1+'" x2="'+idealX2+'" y2="'+idealY2+'" stroke="#5e6c84" stroke-width="1.5" stroke-dasharray="4,3"/>';
  svg += '<text x="'+(ML+pw)+'" y="'+(MT-8)+'" text-anchor="end" font-size="10" fill="#5e6c84" font-family="sans-serif">理想ライン</text>';

  // Actual burndown
  if (sp.dailySnapshots && sp.dailySnapshots.length){
    var pts = sp.dailySnapshots.map(function(s){
      var dayIdx = Math.round((new Date(s.date) - start)/86400000);
      var x = ML + (pw * dayIdx / totalDays);
      var y = MT + ph - (ph * s.remaining / Math.max(1, initialSP));
      return [x, Math.max(MT, Math.min(MT+ph, y))];
    }).filter(function(p){return !isNaN(p[0]) && !isNaN(p[1])});

    if (pts.length > 1){
      var pathD = "M " + pts.map(function(p){return p[0]+","+p[1]}).join(" L ");
      svg += '<path d="'+pathD+'" stroke="#0c66e4" stroke-width="2.5" fill="none"/>';
    }
    pts.forEach(function(p){
      svg += '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="4" fill="#0c66e4" stroke="#fff" stroke-width="2"/>';
    });
  }

  svg += '<text x="'+(W/2)+'" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="var(--t1)" font-family="sans-serif">バーンダウンチャート</text>';
  svg += '<text x="'+ML+'" y="'+MT-8+'" font-size="10" fill="#0c66e4" font-family="sans-serif">SP残り</text>';
  svg += '</svg>';

  var html = '<h3>📈 '+escHtml(sp.name)+' バーンダウン</h3>';
  html += '<div style="display:flex;gap:12px;margin-bottom:14px;font-size:12px">';
  html += '<div>初期SP: <b>'+initialSP+'</b></div>';
  html += '<div>残SP: <b style="color:var(--ac)">'+remainingSP+'</b></div>';
  html += '<div>完了SP: <b style="color:var(--gn)">'+getSprintDoneSP(id)+'</b></div>';
  html += '<div>進捗: <b>'+(initialSP>0?Math.round((initialSP-remainingSP)/initialSP*100):0)+'%</b></div>';
  html += '</div>';
  html += '<div style="display:flex;justify-content:center">'+svg+'</div>';
  html += '<div class="ma"><button class="btn bp" onclick="closeModal()">閉じる</button></div>';
  showModal(html);
}

function spVelocityDlg(){
  ensureSprints();
  var completed = getCompletedSprints().slice(-5);
  var W = 600, H = 280, ML = 60, MR = 20, MT = 30, MB = 50;
  var pw = W - ML - MR;
  var ph = H - MT - MB;
  var maxSP = Math.max.apply(null, completed.map(function(s){return Math.max(s.completedSP||0, s.initialSP||0)}).concat([10]));

  var svg = '<svg width="'+W+'" height="'+H+'" style="background:var(--b1);border:1px solid var(--bd);border-radius:4px">';
  // Grid + Y labels
  for (var i = 0; i <= 5; i++){
    var y = MT + (ph * i / 5);
    svg += '<line x1="'+ML+'" y1="'+y+'" x2="'+(ML+pw)+'" y2="'+y+'" stroke="var(--bd)" stroke-width="0.5"/>';
    var v = Math.round(maxSP * (5-i) / 5);
    svg += '<text x="'+(ML-8)+'" y="'+(y+4)+'" text-anchor="end" font-size="10" fill="var(--t2)" font-family="sans-serif">'+v+'</text>';
  }
  // Bars
  if (completed.length){
    var bw = pw / completed.length * 0.6;
    var gap = pw / completed.length;
    completed.forEach(function(sp, idx){
      var cx = ML + gap*idx + gap/2;
      var commitH = ph * (sp.initialSP||0) / maxSP;
      var doneH = ph * (sp.completedSP||0) / maxSP;
      // Commit bar (background)
      svg += '<rect x="'+(cx-bw/2)+'" y="'+(MT+ph-commitH)+'" width="'+bw+'" height="'+commitH+'" fill="#a5b3c2" opacity="0.4"/>';
      // Done bar (foreground)
      svg += '<rect x="'+(cx-bw/2)+'" y="'+(MT+ph-doneH)+'" width="'+bw+'" height="'+doneH+'" fill="#0c66e4"/>';
      // Label
      svg += '<text x="'+cx+'" y="'+(MT+ph+15)+'" text-anchor="middle" font-size="10" fill="var(--t1)" font-family="sans-serif">'+escHtml(sp.name.substring(0,12))+'</text>';
      svg += '<text x="'+cx+'" y="'+(MT+ph+28)+'" text-anchor="middle" font-size="9" fill="var(--t2)" font-family="sans-serif">'+(sp.completedSP||0)+' / '+(sp.initialSP||0)+'</text>';
    });
    // Average line
    var avg = completed.reduce(function(a,s){return a+(s.completedSP||0)},0) / completed.length;
    var avgY = MT + ph - (ph * avg / maxSP);
    svg += '<line x1="'+ML+'" y1="'+avgY+'" x2="'+(ML+pw)+'" y2="'+avgY+'" stroke="var(--gn)" stroke-width="2" stroke-dasharray="4,3"/>';
    svg += '<text x="'+(ML+pw)+'" y="'+(avgY-4)+'" text-anchor="end" font-size="10" fill="var(--gn)" font-family="sans-serif" font-weight="700">平均: '+Math.round(avg)+' SP</text>';
  }
  svg += '<text x="'+(W/2)+'" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="var(--t1)" font-family="sans-serif">ベロシティ (直近5スプリント)</text>';
  svg += '</svg>';

  var html = '<h3>📊 ベロシティチャート</h3>';
  if (!completed.length){
    html += '<div class="empty-state"><div class="empty-state-text">完了したスプリントがありません</div></div>';
  } else {
    html += '<div style="font-size:12px;color:var(--t2);margin-bottom:14px">グレー = コミットメント / 青 = 完了SP / 緑線 = 平均ベロシティ</div>';
    html += '<div style="display:flex;justify-content:center">'+svg+'</div>';
  }
  html += '<div class="ma"><button class="btn bp" onclick="closeModal()">閉じる</button></div>';
  showModal(html);
}

/* ============================================================
   MULTI-PROJECT SUPPORT
   - Multiple projects with isolated data
   - Each project has: tickets, sprints, workflows, templates,
     statuses, priorities, types, ticketHistory, ticketSeq,
     boardConfig, ganttData
   - Switch via topbar dropdown
   - Auto-migration from single-project to multi-project
   ============================================================ */

var PRJ = {
  projects: [],             // Array of {id, name, key, icon, color, createdAt, data}
  activeProjectId: null,
  STORAGE_KEY: "gantt_projects_v1",
  LEGACY_KEY: "ganttTicketState"
};

/* List of TS fields that are project-specific (i.e., snapshotted into project.data) */
var PROJECT_SCOPED_FIELDS = [
  "tickets","sprints","statuses","priorities","types","workflows",
  "workflowSchemes","workflowDrafts","resolutions","customFields",
  "ticketHistory","templates","ticketSeq","alertConfig",
  "autoCompleteParent","templatesInitialized","boardConfig"
];

/* Fields that are GLOBAL (shared across projects, not snapshotted) */
var GLOBAL_FIELDS = ["users","roles","currentUser","notifications","auditLog","autoLink","gitProvider","gitRepo"];

function prjLoad(){
  try {
    var raw = localStorage.getItem(PRJ.STORAGE_KEY);
    if (!raw) return false;
    var data = JSON.parse(raw);
    PRJ.projects = data.projects || [];
    PRJ.activeProjectId = data.activeProjectId || null;
    return true;
  } catch(e){console.warn("prjLoad failed:", e);return false}
}

function prjSave(){
  try {
    localStorage.setItem(PRJ.STORAGE_KEY, JSON.stringify({
      projects: PRJ.projects,
      activeProjectId: PRJ.activeProjectId
    }));
  } catch(e){console.warn("prjSave failed:", e)}
}

function getActiveProject(){
  return PRJ.projects.find(function(p){return p.id===PRJ.activeProjectId});
}

/* Snapshot all project-scoped fields from TS into the active project */
function prjSnapshotFromTS(){
  var p = getActiveProject();
  if (!p) return;
  if (!p.data) p.data = {};
  PROJECT_SCOPED_FIELDS.forEach(function(f){
    p.data[f] = TS[f];
  });
  // Also store gantt data
  if (typeof S !== "undefined" && S.data){
    try { p.data._ganttData = JSON.stringify(S.data); } catch(e){}
  }
  // Also store yaml editor content
  if (document.getElementById("ye")){
    p.data._yaml = document.getElementById("ye").value;
  }
}

/* Restore project-scoped fields from project to TS */
function prjRestoreToTS(p){
  if (!p || !p.data) return;
  PROJECT_SCOPED_FIELDS.forEach(function(f){
    if (p.data[f] !== undefined){
      TS[f] = p.data[f];
    } else {
      // Initialize with defaults for missing fields
      if (f === "tickets") TS[f] = [];
      else if (f === "sprints") TS[f] = [];
      else if (f === "statuses") TS[f] = JSON.parse(JSON.stringify(DEFAULT_STATUSES));
      else if (f === "priorities") TS[f] = JSON.parse(JSON.stringify(DEFAULT_PRIORITIES));
      else if (f === "types") TS[f] = JSON.parse(JSON.stringify(DEFAULT_TYPES));
      else if (f === "workflows") TS[f] = [];
      else if (f === "workflowSchemes") TS[f] = [];
      else if (f === "workflowDrafts") TS[f] = {};
      else if (f === "resolutions") TS[f] = [];
      else if (f === "customFields") TS[f] = [];
      else if (f === "ticketHistory") TS[f] = {};
      else if (f === "templates") TS[f] = [];
      else if (f === "ticketSeq") TS[f] = 1;
      else TS[f] = null;
    }
  });
  // Restore gantt data
  if (p.data._ganttData && typeof S !== "undefined"){
    try {
      S.data = JSON.parse(p.data._ganttData);
      if (typeof flatAll === "function") S.flat = flatAll(S.data.tasks||[]);
    } catch(e){console.warn("gantt restore",e)}
  }
  // Restore yaml editor
  if (p.data._yaml && document.getElementById("ye")){
    document.getElementById("ye").value = p.data._yaml;
  }
}

/* Migration: convert old single-project state into project[0] */
function prjMigrateLegacy(){
  if (PRJ.projects.length > 0) return; // already migrated
  var legacy = null;
  try {
    var raw = localStorage.getItem(PRJ.LEGACY_KEY);
    if (raw) legacy = JSON.parse(raw);
  } catch(e){}

  var defaultProj = {
    id: "prj-default",
    name: "サンプルプロジェクト",
    key: "SAMPLE",
    icon: "📋",
    color: "#0c66e4",
    createdAt: new Date().toISOString(),
    data: {}
  };

  if (legacy){
    PROJECT_SCOPED_FIELDS.forEach(function(f){
      if (legacy[f] !== undefined) defaultProj.data[f] = legacy[f];
    });
    if (legacy.yaml) defaultProj.data._yaml = legacy.yaml;
  }

  PRJ.projects = [defaultProj];
  PRJ.activeProjectId = defaultProj.id;
  prjSave();
}

/* Override saveTS to also snapshot to active project */
(function(){
  if (typeof saveTS !== "function") return;
  var _origSave = saveTS;
  window.saveTS = function(){
    _origSave();  // saves the legacy key too (for backward compat)
    prjSnapshotFromTS();
    prjSave();
  };
})();

/* Initialize: called by 07-sync-init.js after init */
function prjInit(){
  if (!prjLoad()){
    // First run - migrate legacy
    prjMigrateLegacy();
    // Restore from active project
    var p = getActiveProject();
    if (p) prjRestoreToTS(p);
  } else {
    // Already have project data - restore active one
    var p = getActiveProject();
    if (p){
      prjRestoreToTS(p);
    } else if (PRJ.projects.length > 0){
      PRJ.activeProjectId = PRJ.projects[0].id;
      prjRestoreToTS(PRJ.projects[0]);
      prjSave();
    }
  }
  // Render switcher
  setTimeout(prjRenderSwitcher, 100);
}

/* ============================================================
   PROJECT SWITCHER UI (topbar)
   ============================================================ */
function prjRenderSwitcher(){
  // Remove existing
  var old = document.getElementById("prjSwitcher");
  if (old) old.remove();

  var topbar = document.querySelector(".tb-actions");
  if (!topbar) return;

  var p = getActiveProject();
  var sw = document.createElement("div");
  sw.id = "prjSwitcher";
  sw.style.cssText = "display:flex;align-items:center;gap:6px;margin-right:8px;padding:4px 10px;border:1px solid var(--bd);border-radius:4px;cursor:pointer;background:var(--b1);font-size:13px;user-select:none;transition:background .1s";
  sw.onmouseenter = function(){sw.style.background = "var(--b2)"};
  sw.onmouseleave = function(){sw.style.background = "var(--b1)"};
  sw.innerHTML = '<span style="font-size:16px">'+(p?p.icon:"📋")+'</span>'+
    '<span style="font-weight:600;color:var(--t1)">'+escHtml(p?p.name:"プロジェクト未選択")+'</span>'+
    '<span style="color:var(--t2);font-size:10px">▼</span>';
  sw.onclick = prjShowDropdown;
  // Insert at front of topbar actions
  topbar.insertBefore(sw, topbar.firstChild);
}

function prjShowDropdown(){
  // Toggle dropdown
  var existing = document.getElementById("prjDropdown");
  if (existing){existing.remove();return}

  var sw = document.getElementById("prjSwitcher");
  var rect = sw.getBoundingClientRect();
  var dd = document.createElement("div");
  dd.id = "prjDropdown";
  dd.style.cssText = "position:fixed;top:"+(rect.bottom+4)+"px;left:"+rect.left+"px;background:var(--b1);border:1px solid var(--bd);border-radius:6px;box-shadow:0 8px 24px rgba(9,30,66,.25);z-index:5000;min-width:280px;max-width:380px;font-size:13px;padding:6px";

  var html = '<div style="padding:6px 12px;font-size:10px;text-transform:uppercase;color:var(--t2);font-weight:700;letter-spacing:.5px">プロジェクト ('+PRJ.projects.length+')</div>';
  PRJ.projects.forEach(function(p){
    var active = p.id === PRJ.activeProjectId;
    html += '<div class="prj-dd-item" data-prj-id="'+p.id+'" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:4px;cursor:pointer;'+(active?"background:var(--ac-bg);":"")+'">';
    html += '<span style="font-size:18px">'+p.icon+'</span>';
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escHtml(p.name)+'</div>';
    var ticketCount = (p.data && p.data.tickets) ? p.data.tickets.length : 0;
    var sprintCount = (p.data && p.data.sprints) ? p.data.sprints.length : 0;
    html += '<div style="font-size:10px;color:var(--t3);font-family:monospace">'+escHtml(p.key)+' / '+ticketCount+' tickets'+(sprintCount?", "+sprintCount+" sprints":"")+'</div>';
    html += '</div>';
    if (active) html += '<span style="color:var(--gn);font-size:14px">✓</span>';
    html += '</div>';
  });
  html += '<div style="border-top:1px solid var(--bd);margin:6px 0"></div>';
  html += '<button class="prj-dd-btn" data-act="new" style="display:block;width:100%;padding:8px 10px;background:none;border:none;text-align:left;font-size:13px;color:var(--ac);cursor:pointer;border-radius:4px;font-family:inherit">+ 新規プロジェクト作成</button>';
  html += '<button class="prj-dd-btn" data-act="manage" style="display:block;width:100%;padding:8px 10px;background:none;border:none;text-align:left;font-size:13px;color:var(--t1);cursor:pointer;border-radius:4px;font-family:inherit">⚙ プロジェクト管理</button>';

  dd.innerHTML = html;
  document.body.appendChild(dd);

  // Bind clicks
  dd.querySelectorAll(".prj-dd-item").forEach(function(it){
    it.onmouseenter = function(){if(it.style.background.indexOf("ac-bg")<0)it.style.background = "var(--b2)"};
    it.onmouseleave = function(){
      var active = it.dataset.prjId === PRJ.activeProjectId;
      it.style.background = active ? "var(--ac-bg)" : "";
    };
    it.onclick = function(){
      dd.remove();
      prjSwitch(it.dataset.prjId);
    };
  });
  dd.querySelectorAll(".prj-dd-btn").forEach(function(b){
    b.onmouseenter = function(){b.style.background = "var(--b2)"};
    b.onmouseleave = function(){b.style.background = "none"};
    b.onclick = function(){
      dd.remove();
      if (b.dataset.act === "new") prjCreateDlg();
      else if (b.dataset.act === "manage") prjManageDlg();
    };
  });

  // Close on click outside
  setTimeout(function(){
    var closer = function(ev){
      if (!dd.contains(ev.target) && ev.target.id !== "prjSwitcher" && !document.getElementById("prjSwitcher").contains(ev.target)){
        dd.remove();
        document.removeEventListener("mousedown", closer);
      }
    };
    document.addEventListener("mousedown", closer);
  }, 50);
}

function prjSwitch(projectId){
  if (projectId === PRJ.activeProjectId) return;
  // Save current project state
  prjSnapshotFromTS();
  prjSave();
  // Switch
  PRJ.activeProjectId = projectId;
  var p = getActiveProject();
  if (!p){toast("プロジェクトが見つかりません",1);return}
  prjRestoreToTS(p);
  prjSave();
  // Re-render
  prjRenderSwitcher();
  if (typeof switchView === "function" && TS.currentView){
    switchView(TS.currentView);
  } else if (typeof render === "function") {
    render();
  }
  toast("✓ "+p.name+" に切替");
}

function prjCreateDlg(){
  var html = '<h3>+ 新規プロジェクト作成</h3>';
  html += '<div style="font-size:12px;color:var(--t2);margin-bottom:14px">プロジェクトごとに独立したチケット・スプリント・ワークフロー・テンプレートを管理できます。<br>(ユーザー一覧・通知・監査ログは全プロジェクト共有です)</div>';
  html += '<label>プロジェクト名 *</label><input id="pcName" placeholder="例: モバイルアプリ開発">';
  html += '<label>キー (英数字、チケットIDの先頭) *</label><input id="pcKey" placeholder="例: MOB" maxlength="10">';
  html += '<label>アイコン</label><input id="pcIcon" maxlength="2" value="🚀" style="width:60px;font-size:18px;text-align:center">';
  html += '<label>初期データ</label><select id="pcInit"><option value="empty">空のプロジェクト</option><option value="defaults">デフォルトテンプレ・ワークフローをコピー</option><option value="copy">既存プロジェクトを複製</option></select>';
  html += '<div id="pcCopyFrom" style="display:none"><label>複製元</label><select id="pcCopySrc">';
  PRJ.projects.forEach(function(p){html += '<option value="'+p.id+'">'+escHtml(p.name)+'</option>'});
  html += '</select></div>';
  html += '<div class="ma"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn bp" id="pcOk">作成</button></div>';
  showModal(html);
  document.getElementById("pcInit").onchange = function(){
    document.getElementById("pcCopyFrom").style.display = this.value === "copy" ? "block" : "none";
  };
  // Auto-uppercase key
  document.getElementById("pcKey").oninput = function(){
    this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g,"");
  };
  // Auto-fill key from name
  document.getElementById("pcName").oninput = function(){
    var keyEl = document.getElementById("pcKey");
    if (!keyEl.value){
      keyEl.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g,"").substr(0,5) || "PROJ";
    }
  };

  document.getElementById("pcOk").onclick = function(){
    var name = document.getElementById("pcName").value.trim();
    var key = document.getElementById("pcKey").value.trim();
    var icon = document.getElementById("pcIcon").value.trim() || "📋";
    if (!name || !key){toast("名前とキー必須",1);return}
    if (PRJ.projects.find(function(p){return p.key===key})){toast("そのキーは既に使われています",1);return}

    if (typeof urCapture === "function") urCapture("プロジェクト作成", true);

    // Save current project state first
    prjSnapshotFromTS();

    var initMode = document.getElementById("pcInit").value;
    var newPrj = {
      id: "prj-"+Date.now(),
      name: name,
      key: key,
      icon: icon,
      color: "#0c66e4",
      createdAt: new Date().toISOString(),
      data: {}
    };

    if (initMode === "copy"){
      var srcId = document.getElementById("pcCopySrc").value;
      var src = PRJ.projects.find(function(p){return p.id===srcId});
      if (src && src.data){
        // Deep clone
        newPrj.data = JSON.parse(JSON.stringify(src.data));
        // Reset tickets keys to use new project key, reset to ticketSeq=1
        newPrj.data.tickets = (newPrj.data.tickets||[]).map(function(t){
          var oldKey = t.key;
          var newKey = key + "-" + (t.key.split("-")[1] || "1");
          t.key = newKey;
          return t;
        });
        newPrj.data._copiedFrom = src.name;
      }
    } else if (initMode === "defaults"){
      newPrj.data.statuses = JSON.parse(JSON.stringify(DEFAULT_STATUSES));
      newPrj.data.priorities = JSON.parse(JSON.stringify(DEFAULT_PRIORITIES));
      newPrj.data.types = JSON.parse(JSON.stringify(DEFAULT_TYPES));
      newPrj.data.tickets = [];
      newPrj.data.sprints = [];
      newPrj.data.templates = JSON.parse(JSON.stringify(typeof DEFAULT_TEMPLATES !== "undefined" ? DEFAULT_TEMPLATES : []));
      newPrj.data.ticketSeq = 1;
      newPrj.data.workflows = TS.workflows ? JSON.parse(JSON.stringify(TS.workflows)) : [];
    } else {
      newPrj.data.statuses = JSON.parse(JSON.stringify(DEFAULT_STATUSES));
      newPrj.data.priorities = JSON.parse(JSON.stringify(DEFAULT_PRIORITIES));
      newPrj.data.types = JSON.parse(JSON.stringify(DEFAULT_TYPES));
      newPrj.data.tickets = [];
      newPrj.data.sprints = [];
      newPrj.data.templates = [];
      newPrj.data.ticketSeq = 1;
      newPrj.data.workflows = [];
    }

    PRJ.projects.push(newPrj);
    PRJ.activeProjectId = newPrj.id;
    prjSave();
    prjRestoreToTS(newPrj);
    closeModal();
    prjRenderSwitcher();
    if (typeof switchView === "function") switchView(TS.currentView || "gantt");
    toast("✓ 「"+name+"」を作成して切替");
  };
}

function prjManageDlg(){
  var html = '<h3>⚙ プロジェクト管理</h3>';
  html += '<div style="font-size:12px;color:var(--t2);margin-bottom:14px">'+PRJ.projects.length+' 件のプロジェクト。アクティブなプロジェクトは削除できません。</div>';
  html += '<div style="max-height:50vh;overflow:auto;border:1px solid var(--bd);border-radius:4px">';
  html += '<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:var(--b2)">';
  html += '<th style="text-align:left;padding:8px;border-bottom:1px solid var(--bd)">プロジェクト</th>';
  html += '<th style="text-align:left;padding:8px;border-bottom:1px solid var(--bd)">キー</th>';
  html += '<th style="text-align:right;padding:8px;border-bottom:1px solid var(--bd)">チケット</th>';
  html += '<th style="text-align:right;padding:8px;border-bottom:1px solid var(--bd)">スプリント</th>';
  html += '<th style="text-align:right;padding:8px;border-bottom:1px solid var(--bd)">操作</th>';
  html += '</tr></thead><tbody>';
  PRJ.projects.forEach(function(p){
    var active = p.id === PRJ.activeProjectId;
    var tcnt = (p.data && p.data.tickets) ? p.data.tickets.length : 0;
    var scnt = (p.data && p.data.sprints) ? p.data.sprints.length : 0;
    html += '<tr'+(active?' style="background:var(--ac-bg)"':'')+'>';
    html += '<td style="padding:8px;border-bottom:1px solid var(--bd)"><span style="font-size:16px;margin-right:6px">'+p.icon+'</span><b>'+escHtml(p.name)+'</b>'+(active?' <span style="color:var(--gn);font-size:11px">●ACTIVE</span>':'')+'</td>';
    html += '<td style="padding:8px;border-bottom:1px solid var(--bd);font-family:monospace;color:var(--t2)">'+escHtml(p.key)+'</td>';
    html += '<td style="padding:8px;border-bottom:1px solid var(--bd);text-align:right">'+tcnt+'</td>';
    html += '<td style="padding:8px;border-bottom:1px solid var(--bd);text-align:right">'+scnt+'</td>';
    html += '<td style="padding:8px;border-bottom:1px solid var(--bd);text-align:right">';
    if (!active) html += '<button class="btn-icon" data-prj-act="switch" data-prj-id="'+p.id+'" title="切替">▶</button>';
    html += '<button class="btn-icon" data-prj-act="rename" data-prj-id="'+p.id+'" title="名前変更">✎</button>';
    html += '<button class="btn-icon" data-prj-act="export" data-prj-id="'+p.id+'" title="エクスポート">📤</button>';
    if (!active && PRJ.projects.length > 1) html += '<button class="btn-icon" data-prj-act="delete" data-prj-id="'+p.id+'" style="color:var(--dn)" title="削除">×</button>';
    html += '</td></tr>';
  });
  html += '</tbody></table></div>';
  html += '<div class="ma"><button class="btn bp" onclick="closeModal()">閉じる</button></div>';
  showModal(html);

  document.querySelectorAll("[data-prj-act]").forEach(function(b){
    b.onclick = function(){
      var act = b.dataset.prjAct;
      var id = b.dataset.prjId;
      if (act === "switch"){closeModal();prjSwitch(id)}
      else if (act === "rename") prjRenameDlg(id);
      else if (act === "export") prjExportYaml(id);
      else if (act === "delete") prjDelete(id);
    };
  });
}

function prjRenameDlg(id){
  var p = PRJ.projects.find(function(x){return x.id===id});
  if (!p) return;
  var html = '<h3>✎ プロジェクト編集</h3>';
  html += '<label>名前</label><input id="prName" value="'+escHtml(p.name)+'">';
  html += '<label>アイコン</label><input id="prIcon" maxlength="2" value="'+p.icon+'" style="width:60px;font-size:18px;text-align:center">';
  html += '<div class="ma"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn bp" id="prOk">保存</button></div>';
  showModal(html);
  document.getElementById("prOk").onclick = function(){
    if (typeof urCapture === "function") urCapture("プロジェクト名変更", true);
    p.name = document.getElementById("prName").value.trim() || p.name;
    p.icon = document.getElementById("prIcon").value.trim() || p.icon;
    prjSave();
    closeModal();
    prjRenderSwitcher();
    prjManageDlg();
    toast("✓ 保存");
  };
}

function prjDelete(id){
  var p = PRJ.projects.find(function(x){return x.id===id});
  if (!p) return;
  if (p.id === PRJ.activeProjectId){toast("アクティブなプロジェクトは削除できません",1);return}
  var tcnt = (p.data && p.data.tickets) ? p.data.tickets.length : 0;
  if (!confirm("プロジェクト「"+p.name+"」を完全に削除しますか？\nチケット "+tcnt+"件も含め全データが失われます（復元不可）")) return;
  if (typeof urCapture === "function") urCapture("プロジェクト削除", true);
  PRJ.projects = PRJ.projects.filter(function(x){return x.id!==id});
  prjSave();
  closeModal();
  prjManageDlg();
  toast("削除");
}

function prjExportYaml(id){
  var p = PRJ.projects.find(function(x){return x.id===id});
  if (!p) return;
  // Reuse existing yaml export
  var yaml = "# Project: "+p.name+"\n# Key: "+p.key+"\n# Exported: "+new Date().toISOString()+"\n\n";
  yaml += "project:\n  name: "+JSON.stringify(p.name)+"\n  key: "+JSON.stringify(p.key)+"\n  icon: "+JSON.stringify(p.icon)+"\n\n";
  if (p.data){
    PROJECT_SCOPED_FIELDS.forEach(function(f){
      if (p.data[f] !== undefined){
        try { yaml += f+": "+JSON.stringify(p.data[f], null, 2)+"\n\n"; } catch(e){}
      }
    });
  }
  var blob = new Blob([yaml], {type:"text/yaml"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = p.key+"-"+p.name.replace(/[^a-zA-Z0-9_-]+/g,"_")+".yaml";
  a.click();
  setTimeout(function(){URL.revokeObjectURL(url)}, 100);
  toast("📤 "+p.name+" をエクスポート");
}

</script>
