<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Project Management</title>
<style>
/* ===== JIRA Cloud Color Palette ===== */
:root{
  /* Light mode (default - JIRA Cloud style) */
  --b1:#ffffff;          /* page bg */
  --b2:#f7f8f9;          /* surface */
  --b3:#f1f2f4;          /* hover surface */
  --bh:#e9ebee;          /* deep hover */
  --t1:#172b4d;          /* primary text */
  --t2:#44546f;          /* secondary text */
  --t3:#8590a2;          /* muted */
  --bd:#dfe1e6;          /* border */
  --bd-strong:#c1c7d0;
  --ac:#0c66e4;          /* JIRA blue */
  --ac-h:#0055cc;
  --ac-bg:#e9f2ff;       /* light blue bg */
  --ac-bg-h:#cce0ff;
  --dn:#c9372c;          /* red */
  --dn-bg:#ffebe6;
  --wn:#a54800;          /* orange */
  --wn-bg:#fff7d6;
  --gn:#216e4e;          /* green */
  --gn-bg:#dcfff1;
  --pp:#5e4db2;          /* purple */
  --pp-bg:#f3f0ff;
  /* Sidebar (JIRA dark navy) */
  --sb-bg:#1d2125;
  --sb-bg-h:#2c333a;
  --sb-bg-sel:#1868db;
  --sb-t:#b6c2cf;
  --sb-t-h:#ffffff;
  --sb-bd:#2c333a;
  --shadow:0 1px 1px rgba(9,30,66,.25),0 0 1px rgba(9,30,66,.31);
}
[data-theme=dark]{
  --b1:#1d2125;--b2:#22272b;--b3:#282e33;--bh:#2c333a;
  --t1:#dee4ea;--t2:#9fadbc;--t3:#7e8c9a;
  --bd:#38414a;--bd-strong:#454c54;
  --ac:#579dff;--ac-h:#85b8ff;--ac-bg:#1c2b41;--ac-bg-h:#09326c;
  --dn:#f87168;--dn-bg:#42221f;
  --wn:#f5cd47;--wn-bg:#3a2f00;
  --gn:#7ee2b8;--gn-bg:#1c3329;
  --pp:#b8acf6;--pp-bg:#352c63;
  --sb-bg:#101214;--sb-bg-h:#22272b;--sb-bg-sel:#1d7afc;
  --sb-t:#9fadbc;--sb-t-h:#dee4ea;--sb-bd:#22272b;
  --shadow:0 1px 1px rgba(0,0,0,.4),0 0 1px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'Segoe UI','SF Pro Text','Hiragino Sans',sans-serif;background:var(--b1);color:var(--t1);display:flex;font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd-strong);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ===== JIRA-style buttons ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:none;background:transparent;color:var(--t2);border-radius:3px;font-size:13px;font-weight:500;white-space:nowrap;transition:background .1s}
.btn:hover{background:var(--b3);color:var(--t1)}
.btn.secondary{background:var(--b3);color:var(--t1)}
.btn.secondary:hover{background:var(--bh)}
.btn.bp{background:var(--ac);color:#fff}
.btn.bp:hover{background:var(--ac-h)}
.btn.danger{color:var(--dn)}.btn.danger:hover{background:var(--dn-bg);color:var(--dn)}
.btn-sm{padding:3px 8px;font-size:12px}
.btn-icon{padding:4px;border-radius:3px;color:var(--t2);background:transparent}
.btn-icon:hover{background:var(--b3)}

/* ===== Sidebar (JIRA navy) ===== */
#sidebar{width:240px;background:var(--sb-bg);color:var(--sb-t);flex-shrink:0;display:flex;flex-direction:column;transition:width .15s;position:relative;z-index:50}
#sidebar.collapsed{width:48px}
#sidebar.collapsed .sb-label,#sidebar.collapsed .sb-section,#sidebar.collapsed .sb-proj-name,#sidebar.collapsed .sb-proj-meta{display:none}
#sidebar.collapsed .sb-toggle-icon{transform:rotate(180deg)}
#sidebar.collapsed .sb-item{justify-content:center;padding:8px 0}
.sb-header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--sb-bd)}
.sb-logo{width:24px;height:24px;background:linear-gradient(135deg,#0c66e4 0%,#1d7afc 100%);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;flex-shrink:0}
.sb-brand{font-weight:700;color:var(--sb-t-h);font-size:15px;flex:1}
.sb-toggle{position:absolute;right:-12px;top:14px;width:24px;height:24px;background:var(--sb-bg);border:1px solid var(--sb-bd);border-radius:50%;color:var(--sb-t);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:51;font-size:11px}
.sb-toggle:hover{color:var(--sb-t-h);background:var(--sb-bg-h)}
.sb-toggle-icon{transition:transform .2s;display:inline-block}
.sb-proj{padding:14px 16px;border-bottom:1px solid var(--sb-bd);display:flex;align-items:center;gap:10px;cursor:pointer}
.sb-proj:hover{background:var(--sb-bg-h)}
.sb-proj-icon{width:24px;height:24px;background:linear-gradient(135deg,#42b983,#216e4e);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0}
.sb-proj-name{color:var(--sb-t-h);font-weight:600;font-size:13px;line-height:1.2}
.sb-proj-meta{color:var(--t3);font-size:11px;margin-top:2px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-section{padding:14px 16px 4px;color:var(--t3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.sb-item{display:flex;align-items:center;gap:12px;padding:7px 16px;color:var(--sb-t);cursor:pointer;font-size:13px;border-radius:0;transition:background .1s,color .1s;border-left:3px solid transparent}
.sb-item:hover{background:var(--sb-bg-h);color:var(--sb-t-h)}
.sb-item.active{background:rgba(35,93,227,.15);color:var(--sb-t-h);border-left-color:var(--ac)}
.sb-icon{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.sb-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-badge{font-size:10px;background:rgba(255,255,255,.1);color:var(--sb-t);padding:1px 6px;border-radius:8px;font-weight:600}
.sb-footer{padding:10px 16px;border-top:1px solid var(--sb-bd);display:flex;align-items:center;gap:10px;font-size:12px;color:var(--sb-t)}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#bf63f3,#0c66e4);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.sb-user-info{flex:1;overflow:hidden}
.sb-user-name{color:var(--sb-t-h);font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{color:var(--t3);font-size:10px}

/* ===== Main content area ===== */
#content{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--b1)}
#topbar{height:56px;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;background:var(--b1);flex-shrink:0;gap:14px}
.tb-search{flex:1;max-width:480px;position:relative}
.tb-search input{width:100%;padding:7px 12px 7px 34px;border:1px solid var(--bd);border-radius:3px;background:var(--b2);font-size:13px;color:var(--t1);outline:none;transition:border-color .1s,background .1s}
.tb-search input:focus{border-color:var(--ac);background:var(--b1);box-shadow:0 0 0 1px var(--ac)}
.tb-search::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.6;pointer-events:none}
.tb-actions{display:flex;align-items:center;gap:6px}
.tb-bell{position:relative;padding:6px;font-size:18px;color:var(--t2);background:transparent;border-radius:50%}
.tb-bell:hover{background:var(--b3)}
.tb-bell-cnt{position:absolute;top:0;right:0;background:var(--dn);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 4px}
.tb-bell-cnt.on{display:flex}

/* ===== Page header (Backlog/Board/etc) ===== */
.page-header{padding:20px 24px 12px;border-bottom:1px solid var(--bd);background:var(--b1)}
.page-bc{font-size:12px;color:var(--t2);margin-bottom:6px}
.page-bc a{color:var(--t2);text-decoration:none}.page-bc a:hover{color:var(--ac);text-decoration:underline}
.page-title{font-size:24px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:10px}
.page-tabs{display:flex;gap:0;margin-top:14px;border-bottom:1px solid var(--bd);margin:14px -24px 0}
.page-tab{padding:10px 16px;font-size:14px;color:var(--t2);cursor:pointer;border-bottom:3px solid transparent;font-weight:500;transition:all .1s}
.page-tab:hover{color:var(--t1)}
.page-tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.page-toolbar{display:flex;align-items:center;gap:10px;padding:12px 24px;border-bottom:1px solid var(--bd);background:var(--b1);flex-wrap:wrap}
.page-body{flex:1;overflow:auto;background:var(--b2)}

/* ===== Toolbar pieces ===== */
.tb-input{padding:6px 10px;border:1px solid var(--bd);border-radius:3px;background:var(--b1);font-size:13px;color:var(--t1);outline:none;font-family:inherit}
.tb-input:focus{border-color:var(--ac);box-shadow:0 0 0 1px var(--ac)}
.sep{width:1px;height:20px;background:var(--bd);margin:0 4px}
.ct{padding:4px 10px;border:1px solid var(--bd);background:var(--b1);color:var(--t2);border-radius:3px;font-size:12px;cursor:pointer}
.ct.on{background:var(--ac-bg);border-color:var(--ac);color:var(--ac);font-weight:600}

/* ===== Issue type icons (JIRA style) ===== */
.ti{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:3px;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.ti.task{background:#1868db}
.ti.bug{background:#e2483d}
.ti.story{background:#22a06b}
.ti.epic{background:#8270db}
.ti.incident{background:#f5a623}
.ti.subtask{background:#1868db;font-size:8px}
.ti.large{width:24px;height:24px;font-size:14px;border-radius:4px}

/* Priority icons */
.ti-pri{display:inline-flex;width:16px;height:16px;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:900}
.ti-pri.highest{color:#cd1316}.ti-pri.high{color:#e9744a}.ti-pri.medium{color:#e9a13a}.ti-pri.low{color:#5e6c84}.ti-pri.lowest{color:#7a869a}

/* Status badges (lozenge style) */
.lozenge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:3px;letter-spacing:.5px;white-space:nowrap;line-height:1}
.lozenge.todo{background:var(--b3);color:var(--t2)}
.lozenge.inprogress{background:var(--ac-bg);color:var(--ac)}
.lozenge.review{background:var(--wn-bg);color:var(--wn)}
.lozenge.done{background:var(--gn-bg);color:var(--gn)}

/* ===== Gantt-specific (preserved) ===== */
#ganttView{display:flex;flex:1;overflow:hidden;min-height:0}
#yp{width:280px;min-width:120px;display:flex;flex-direction:column;border-right:1px solid var(--bd);background:var(--b2);flex-shrink:0}
#yh{padding:8px 12px;background:var(--b1);border-bottom:1px solid var(--bd);font-size:12px;font-weight:600;color:var(--t1)}
#ye{flex:1;width:100%;background:var(--b2);color:var(--t1);border:none;padding:10px;font-family:'SF Mono',Consolas,monospace;font-size:11px;line-height:1.5;resize:none;outline:none;tab-size:2}
.rz{width:6px;cursor:col-resize;background:transparent;flex-shrink:0;transition:background .15s}
.rz:hover{background:var(--ac)}
#gp{flex:1;overflow:auto;background:var(--b1)}
#gw{display:flex;min-height:100%}
#tl{width:340px;min-width:140px;background:var(--b1);flex-shrink:0;position:sticky;left:0;z-index:20;border-right:1px solid var(--bd)}
#tlh{height:48px;display:flex;align-items:stretch;background:var(--b2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:21;font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.hc{display:flex;align-items:center;justify-content:flex-start;padding:0 8px;border-right:1px solid var(--bd);overflow:hidden}.hc.nm{flex:1}
.tr{height:36px;display:flex;align-items:center;border-bottom:1px solid var(--bd);font-size:13px;color:var(--t1);background:var(--b1)}
.tr:hover{background:var(--b2)}
.tr.l0{background:var(--ac-bg)!important;font-weight:600}
.tr.l1{background:var(--b2);font-weight:500}
.tr.dov{box-shadow:inset 0 2px 0 var(--ac)}.tr.dra{opacity:.4}
.tc{display:flex;align-items:center;height:100%;padding:0 8px;border-right:1px solid var(--bd);overflow:hidden;white-space:nowrap;flex-shrink:0;color:var(--t1)}
.tc.nm{flex:1;gap:4px}
.tn{overflow:hidden;text-overflow:ellipsis;flex:1;cursor:pointer;color:var(--t1)}.tn:hover{color:var(--ac);text-decoration:underline}
.badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700;flex-shrink:0;line-height:14px;text-transform:uppercase;letter-spacing:.3px}
.ta2{display:none;gap:2px;margin-left:auto;flex-shrink:0;align-items:center}.tr:hover .ta2{display:flex}
.ta2 button{padding:2px 4px;font-size:11px;color:var(--t2);border-radius:3px}.ta2 button:hover{background:var(--b3);color:var(--t1)}
.coll{cursor:pointer;font-size:11px;color:var(--t2);flex-shrink:0;width:16px;text-align:center;user-select:none}
.prb{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;color:#fff}
.ied{background:var(--b1);border:1px solid var(--ac);border-radius:3px;padding:3px 6px;font-size:13px;color:var(--t1);outline:none;font-family:inherit;width:100%;box-shadow:0 0 0 1px var(--ac)}
#tp{flex:1;position:relative;flex-shrink:0;background:var(--b1)}
#thd{height:48px;background:var(--b2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10;display:flex;flex-direction:column}
#mr{display:flex;height:22px}#dr{display:flex;height:26px}
.mc{border-right:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--t1)}
.dc{display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t2);flex-shrink:0;border-right:1px solid var(--bd)}
.dc.we{background:var(--b2)}
.dc.hd{background:var(--dn-bg);color:var(--dn);font-weight:600}
.dc.td{background:var(--ac-bg);color:var(--ac);font-weight:700}
#cb{position:relative}.cr{height:36px;position:relative;border-bottom:1px solid var(--bd);display:flex}
.cdc{flex-shrink:0;height:100%;border-right:1px solid var(--bd)}.cdc.we{background:var(--b2)}.cdc.hd{background:var(--dn-bg);opacity:.5}
.bar{position:absolute;height:22px;top:7px;border-radius:4px;cursor:grab;display:flex;align-items:center;font-size:11px;color:#fff;font-weight:500;z-index:5;min-width:4px;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.bar:hover{filter:brightness(1.08);z-index:6;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.bbg{position:absolute;inset:0;border-radius:4px;pointer-events:none}.bpr{position:absolute;left:0;top:0;height:100%;border-radius:4px;pointer-events:none}
.bl{position:relative;z-index:1;padding:0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.rh{position:absolute;top:-2px;width:10px;height:calc(100% + 4px);cursor:ew-resize;z-index:10}.rh.rl{left:-2px}.rh.rr{right:-2px}.rh:hover{background:rgba(255,255,255,.4)}
.bar.gb{height:14px;top:11px;border-radius:3px;overflow:visible}
.bar.gb::before,.bar.gb::after{content:'';position:absolute;bottom:-4px;width:8px;height:8px;background:inherit;clip-path:polygon(0 0,100% 0,50% 100%)}.bar.gb::before{left:0}.bar.gb::after{right:0}
.depb{position:absolute;right:3px;top:50%;transform:translateY(-50%);width:18px;height:16px;border-radius:3px;background:rgba(255,255,255,.3);color:#fff;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700;border:1px solid rgba(255,255,255,.4);z-index:7}
.bar:hover .depb{display:flex}.depb:hover{background:#fff;color:var(--ac)}
#tdy{position:absolute;top:0;width:2px;background:var(--dn);z-index:15;pointer-events:none;box-shadow:0 0 4px var(--dn)}
#tdy::after{content:'TODAY';position:absolute;top:4px;left:6px;font-size:9px;color:#fff;font-weight:700;white-space:nowrap;background:var(--dn);padding:2px 6px;border-radius:3px}
.dropi{position:absolute;left:0;right:0;height:3px;background:var(--ac);z-index:20;pointer-events:none;border-radius:2px;display:none}
.dind{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);padding:14px 24px;border-radius:6px;background:var(--ac);color:#fff;font-size:14px;font-weight:600;z-index:2000;box-shadow:0 8px 24px rgba(0,0,0,.2);display:none;text-align:center}
.toast{position:fixed;bottom:24px;right:24px;padding:10px 16px;border-radius:4px;font-size:13px;z-index:2000;font-weight:500;display:none;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);min-width:200px}
.acb{position:absolute;display:flex;gap:2px;z-index:9;opacity:0;transition:opacity .15s;padding:8px;margin:-8px}.acb:hover{opacity:1}
.acb>div{width:18px;height:18px;border-radius:3px;background:var(--b1);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:var(--t2);box-shadow:var(--shadow)}.acb>div:hover{background:var(--b3);color:var(--t1)}
.dp{fill:none;stroke:var(--t3);stroke-width:1.5;opacity:.6;pointer-events:none}

/* ===== Modal (JIRA style) ===== */
.mo{position:fixed;inset:0;background:rgba(9,30,66,.54);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding-top:80px}
.md{background:var(--b1);border-radius:3px;padding:20px 24px;min-width:480px;max-width:600px;max-height:80vh;overflow-y:auto;box-shadow:0 16px 32px -4px rgba(9,30,66,.25),0 12px 24px rgba(9,30,66,.15)}
.md h3{margin-bottom:18px;font-size:20px;font-weight:500;color:var(--t1)}
.md label{display:block;margin-bottom:4px;font-size:12px;color:var(--t2);font-weight:600}
.md input,.md select,.md textarea{width:100%;padding:7px 10px;border:1px solid var(--bd);border-radius:3px;background:var(--b1);color:var(--t1);font-size:13px;margin-bottom:12px;outline:none;font-family:inherit;transition:border-color .1s}
.md input:focus,.md select:focus,.md textarea:focus{border-color:var(--ac);box-shadow:0 0 0 1px var(--ac)}
.md .fr{display:flex;gap:10px}.md .fr>div{flex:1}
.md .ma{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--bd)}
.cr3{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.cr3 input[type=color]{width:34px;height:30px;border:1px solid var(--bd);border-radius:3px;cursor:pointer;padding:0}
.cr3 input[type=range]{flex:1;accent-color:var(--ac)}
.cr3 .cp{width:30px;height:30px;border-radius:3px;border:1px solid var(--bd)}

/* ===== Status bar ===== */
#sb{padding:6px 24px;background:var(--b2);border-top:1px solid var(--bd);font-size:12px;color:var(--t2);display:flex;justify-content:space-between;flex-shrink:0}

/* ===== View containers ===== */
.vw{display:none;flex:1;flex-direction:column;overflow:hidden}
.vw.active{display:flex}

/* ===== Issues view (JIRA style) ===== */
.tk-table{width:100%;background:var(--b1)}
.tk-row{display:grid;grid-template-columns:48px 90px 50px 1fr 110px 110px 80px 70px;gap:0;padding:8px 16px;border-bottom:1px solid var(--bd);font-size:13px;cursor:pointer;align-items:center;color:var(--t1);transition:background .1s}
.tk-row:hover{background:var(--b3)}
.tk-row.sel{background:var(--ac-bg)}
.tk-row.hd{background:var(--b2);font-weight:700;font-size:11px;color:var(--t2);position:sticky;top:0;cursor:default;text-transform:uppercase;letter-spacing:.5px;padding:10px 16px;z-index:5;border-bottom:1px solid var(--bd-strong)}
.tk-row.hd:hover{background:var(--b2)}
.tk-key{font-family:'SF Mono',monospace;color:var(--ac);font-weight:600;font-size:13px}
.tk-row .tk-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;display:flex;align-items:center;gap:6px}
.tk-row .tk-asg{font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis}
.tk-row .tk-due{font-size:11px;color:var(--t2);font-family:'SF Mono',monospace}
.tk-row .tk-due.overdue{color:var(--dn);font-weight:700}
.tk-row.subtask>div:first-child{padding-left:24px}
.ind-line{display:inline-block;width:14px;color:var(--t3);font-size:12px}
.sub-cnt{display:inline-flex;align-items:center;gap:2px;font-size:10px;color:var(--t2);background:var(--b3);padding:1px 6px;border-radius:8px;font-weight:600}
.gantt-link{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:3px;background:var(--gn-bg);color:var(--gn);font-size:10px;font-weight:600;cursor:pointer}

/* Issue list+detail layout */
.tv-body{flex:1;display:flex;overflow:hidden}
.tv-list{flex:1;overflow:auto;background:var(--b1)}
.tv-detail{width:480px;border-left:1px solid var(--bd);background:var(--b1);overflow:auto;padding:0}

/* Detail panel (JIRA style) */
.dt-h{padding:12px 24px 0;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bd);padding-bottom:10px}
.dt-bc{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:4px;flex:1}
.dt-bc a{color:var(--t2);text-decoration:none;cursor:pointer}.dt-bc a:hover{color:var(--ac);text-decoration:underline}
.dt-close{padding:4px;background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer;border-radius:3px}.dt-close:hover{background:var(--b3);color:var(--t1)}
.dt-content{padding:16px 24px}
.dt-title{font-size:22px;font-weight:500;color:var(--t1);margin-bottom:14px;cursor:pointer;padding:6px 8px;border-radius:3px;line-height:1.3}
.dt-title:hover{background:var(--b3)}
.dt-actions{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.dt-meta{display:grid;grid-template-columns:100px 1fr;gap:10px 14px;margin-bottom:16px;font-size:13px}
.dt-meta>label{color:var(--t2);font-weight:600;align-self:center;font-size:12px}
.dt-meta>div,.dt-meta>select,.dt-meta>input{padding:4px 8px;border-radius:3px;font-size:13px}
.dt-meta select,.dt-meta input{border:1px solid transparent;background:transparent;color:var(--t1);outline:none;cursor:pointer;font-family:inherit;width:100%}
.dt-meta select:hover,.dt-meta input:hover{border-color:var(--bd);background:var(--b3)}
.dt-meta select:focus,.dt-meta input:focus{border-color:var(--ac);background:var(--b1);box-shadow:0 0 0 1px var(--ac)}
.dt-sec{margin-top:18px;padding-top:14px;border-top:1px solid var(--bd)}
.dt-sec h4{font-size:12px;text-transform:uppercase;color:var(--t2);margin-bottom:8px;letter-spacing:.5px;font-weight:700}
.dt-desc{font-size:13px;line-height:1.6;background:var(--b2);padding:10px 14px;border-radius:3px;white-space:pre-wrap;cursor:pointer;min-height:60px;color:var(--t1)}
.dt-desc:hover{background:var(--b3)}
.cmt{padding:10px 14px;background:var(--b2);border-radius:3px;margin-bottom:8px;font-size:13px}
.cmt-h{display:flex;justify-content:space-between;color:var(--t2);font-size:11px;margin-bottom:6px;align-items:center}
.cmt-rm{padding:2px 6px;color:var(--dn);background:none;border:none;cursor:pointer;font-size:11px;border-radius:3px}.cmt-rm:hover{background:var(--dn-bg)}
.cmt-body{line-height:1.5;white-space:pre-wrap;color:var(--t1)}
.lk-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--b2);border-radius:3px;margin-bottom:4px;font-size:13px;cursor:pointer;transition:background .1s}
.lk-row:hover{background:var(--b3)}
.lk-row .lk-key{font-family:'SF Mono',monospace;color:var(--ac);font-weight:600;flex-shrink:0}
.lk-row .lk-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t1)}
.lk-row .lk-rm{padding:2px 6px;color:var(--t3);background:none;border:none;cursor:pointer;font-size:14px;border-radius:3px;opacity:0;transition:opacity .1s}
.lk-row:hover .lk-rm{opacity:1}.lk-row .lk-rm:hover{color:var(--dn);background:var(--dn-bg)}
.link-group{margin-bottom:14px}
.link-group-h{font-size:11px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--bd)}

/* ===== Kanban (JIRA style) ===== */
.kb-cols{flex:1;display:flex;gap:10px;padding:14px 20px;overflow:auto;min-height:0;background:var(--b2)}
.kb-col{min-width:280px;width:280px;background:var(--b1);border:1px solid var(--bd);border-radius:4px;display:flex;flex-direction:column;flex-shrink:0;max-height:100%;position:relative;transition:box-shadow .15s}
.kb-col.dragover{box-shadow:0 0 0 2px var(--ac)}
.kb-col.col-drag-over{box-shadow:0 0 0 2px var(--gn)}
.kb-col-h-actions{display:flex;gap:2px;align-items:center;opacity:0;transition:opacity .15s}
.kb-col:hover .kb-col-h-actions{opacity:1}
.kb-col-h-actions button{padding:2px 5px;font-size:10px;border:none;background:transparent;color:var(--t2);border-radius:2px;cursor:pointer}
.kb-col-h-actions button:hover{background:var(--b3);color:var(--t1)}
.kb-col-h-actions button.dn{color:var(--dn)}
.kb-col-h-grip{cursor:grab;color:var(--t3);font-size:14px;padding:0 4px;user-select:none}
.kb-col-h-grip:active{cursor:grabbing}
.kb-col-wip-warn{font-size:10px;color:var(--dn);font-weight:700;margin-left:auto}
.kb-add-col{min-width:240px;width:240px;border:2px dashed var(--bd);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:13px;transition:all .15s;background:transparent}
.kb-add-col:hover{border-color:var(--ac);color:var(--ac);background:var(--ac-bg)}

/* Sprint CSS */
.sp-card{background:var(--b1);border:1px solid var(--bd);border-radius:6px;padding:18px;margin-bottom:18px;box-shadow:0 1px 2px rgba(9,30,66,.05)}
.sp-card-h{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.sp-state-pill{display:inline-block;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.sp-state-pill.active{background:#dcfff1;color:#0d5c40}
.sp-state-pill.planned{background:#dfe1e6;color:#42526e}
.sp-state-pill.completed{background:#dde9ff;color:#0747a6}
.sp-stats{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:8px}
.sp-stat{flex:0 0 auto}
.sp-stat-l{font-size:10px;text-transform:uppercase;color:var(--t2);font-weight:700;letter-spacing:.5px;margin-bottom:2px}
.sp-stat-v{font-size:18px;font-weight:600;color:var(--t1)}
.sp-progress{display:flex;height:8px;border-radius:4px;overflow:hidden;background:var(--b3);margin:8px 0}
.sp-progress-seg{transition:width .3s}
.sp-tickets{display:flex;flex-direction:column;gap:4px;background:var(--b2);border-radius:4px;padding:8px;min-height:60px;border:2px dashed transparent;transition:border-color .15s}
.sp-tickets.dragover{border-color:var(--ac);background:var(--ac-bg)}
.sp-tickets-empty{color:var(--t3);font-size:12px;padding:14px;text-align:center;font-style:italic}
.sp-ticket{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--b1);border-radius:3px;border:1px solid var(--bd);font-size:13px;cursor:grab;transition:box-shadow .1s}
.sp-ticket:hover{box-shadow:0 1px 3px rgba(9,30,66,.12)}
.sp-ticket.dragging{opacity:.5}
.sp-ticket-key{font-family:monospace;font-size:11px;color:var(--t3);min-width:60px}
.sp-ticket-title{flex:1;color:var(--t1)}
.sp-sp-pill{background:var(--ac);color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;min-width:24px;text-align:center}
.sp-tab.on{box-shadow:none}
.btn-sm{padding:4px 10px;font-size:11px}
.kb-col-h{padding:10px 14px;font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:var(--b2)}
.kb-col-h .ct-cnt{background:var(--b3);padding:2px 8px;border-radius:10px;font-size:11px;color:var(--t1)}
.kb-col-b{flex:1;overflow:auto;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:120px}
.kb-card{background:var(--b1);border:1px solid var(--bd);border-radius:4px;padding:10px 12px;cursor:grab;font-size:13px;box-shadow:var(--shadow);transition:box-shadow .1s,transform .1s}
.kb-card:hover{box-shadow:0 4px 8px rgba(9,30,66,.15);border-color:var(--ac)}
.kb-card.dragging{opacity:.4;transform:rotate(2deg)}
.kb-card .ct-key{font-family:'SF Mono',monospace;color:var(--t2);font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:4px}
.kb-card .ct-title{margin:4px 0;line-height:1.4;color:var(--t1);font-weight:500}
.kb-card .ct-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:11px;color:var(--t2);gap:6px;flex-wrap:wrap}
.kb-card .ct-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.kb-card.subtask{border-left:3px solid var(--t3)}
.kb-col.dragover{background:var(--ac-bg);border-color:var(--ac)}

/* ===== Backlog ===== */
.bl-section{background:var(--b1);border:1px solid var(--bd);border-radius:4px;margin:12px 20px}
.bl-h{padding:12px 16px;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd);background:var(--b2)}
.bl-h .bl-meta{font-size:12px;color:var(--t2);font-weight:400;margin-left:8px}
.bl-list{}
.bl-row{display:grid;grid-template-columns:24px 90px 36px 1fr 110px 90px 60px 80px;gap:8px;padding:8px 14px;border-bottom:1px solid var(--bd);font-size:13px;align-items:center;cursor:grab;color:var(--t1)}
.bl-row:hover{background:var(--b2)}.bl-row:last-child{border-bottom:none}
.bl-row .grip{cursor:grab;color:var(--t3);text-align:center}
.bl-row.dragover{box-shadow:inset 0 2px 0 var(--ac)}
.bl-row.subtask{padding-left:36px;background:var(--b2);font-size:12px}

/* Audit */
.au-list{flex:1;overflow:auto;padding:14px 20px;background:var(--b2)}
.au-row{padding:10px 14px;border-bottom:1px solid var(--bd);font-size:13px;display:grid;grid-template-columns:160px 100px 90px 1fr;gap:14px;align-items:center;background:var(--b1)}
.au-row:first-child{border-radius:4px 4px 0 0}
.au-row:last-child{border-radius:0 0 4px 4px}
.au-time{font-family:'SF Mono',monospace;font-size:11px;color:var(--t2)}
.au-user{color:var(--ac);font-weight:600}
.au-act{padding:2px 8px;border-radius:3px;font-size:10px;text-transform:uppercase;text-align:center;font-weight:700;letter-spacing:.5px}
.au-act.create{background:var(--gn-bg);color:var(--gn)}
.au-act.update{background:var(--ac-bg);color:var(--ac)}
.au-act.delete{background:var(--dn-bg);color:var(--dn)}

/* Admin */
.adm-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:20px;overflow:auto;background:var(--b2);align-content:start}
.adm-card{background:var(--b1);border:1px solid var(--bd);border-radius:4px;padding:18px}
.adm-card h3{margin-bottom:12px;font-size:14px;font-weight:600}
.adm-list{margin-top:8px}
.adm-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--b2);border-radius:3px;margin-bottom:6px;font-size:13px}
.adm-item .ai-name{flex:1;color:var(--t1)}
.adm-item .ai-rm{padding:2px 6px;color:var(--dn);background:none;border:none;cursor:pointer;font-size:14px;border-radius:3px}.adm-item .ai-rm:hover{background:var(--dn-bg)}
.adm-add{display:flex;gap:6px;margin-top:8px}
.adm-add input,.adm-add select{flex:1;padding:6px 10px;border:1px solid var(--bd);background:var(--b1);color:var(--t1);border-radius:3px;font-size:13px;outline:none;font-family:inherit}

/* Notification dropdown */
.notif{position:fixed;top:60px;right:20px;width:360px;max-height:60vh;background:var(--b1);border:1px solid var(--bd);border-radius:4px;z-index:1500;box-shadow:0 8px 24px rgba(9,30,66,.25);display:none;flex-direction:column}
.notif-h{padding:12px 16px;border-bottom:1px solid var(--bd);font-size:14px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.notif-list{flex:1;overflow:auto;max-height:50vh}
.notif-item{padding:10px 16px;border-bottom:1px solid var(--bd);font-size:13px;cursor:pointer}.notif-item:hover{background:var(--b2)}.notif-item.unread{background:var(--ac-bg);border-left:3px solid var(--ac)}
.notif-item .nf-time{font-size:11px;color:var(--t3);margin-top:4px}

/* Ticket detail subtask/parent breadcrumb */
.parent-bc{font-size:11px;color:var(--t2);margin-bottom:4px;display:flex;align-items:center;gap:4px;padding-bottom:6px;border-bottom:1px dashed var(--bd)}
.parent-bc a{color:var(--ac);cursor:pointer;text-decoration:none}.parent-bc a:hover{text-decoration:underline}

/* Issue list ID inline icon */
.tk-icon-cell{display:flex;align-items:center;gap:4px}

/* Empty state */
.empty-state{padding:60px 20px;text-align:center;color:var(--t2)}
.empty-state-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-state-title{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--t1)}
.empty-state-text{font-size:13px}

/* ===== Workflow Designer ===== */
.wf-layout{display:grid;grid-template-columns:280px 1fr;gap:0;flex:1;overflow:hidden;min-height:0}
.wf-sidebar{border-right:1px solid var(--bd);background:var(--b1);overflow:auto;display:flex;flex-direction:column}
.wf-sidebar h4{padding:12px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);font-weight:700;border-bottom:1px solid var(--bd);background:var(--b2);display:flex;justify-content:space-between;align-items:center}
.wf-list{padding:6px}
.wf-list-item{padding:10px 12px;cursor:pointer;border-radius:3px;font-size:13px;display:flex;align-items:center;gap:8px;color:var(--t1)}
.wf-list-item:hover{background:var(--b3)}
.wf-list-item.active{background:var(--ac-bg);color:var(--ac);font-weight:600}
.wf-list-item .wf-list-status{font-size:10px;color:var(--t3);margin-left:auto}
.wf-list-item.draft .wf-list-status{color:var(--wn)}
.wf-canvas{display:flex;flex-direction:column;overflow:hidden;background:var(--b2);min-width:0}
.wf-canvas-h{padding:14px 20px;border-bottom:1px solid var(--bd);background:var(--b1);display:flex;align-items:center;gap:10px}
.wf-canvas-h h3{font-size:18px;font-weight:600;flex:1}
.wf-canvas-h .wf-status-pill{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.wf-canvas-h .wf-status-pill.draft{background:var(--wn-bg);color:var(--wn)}
.wf-canvas-h .wf-status-pill.published{background:var(--gn-bg);color:var(--gn)}
.wf-canvas-body{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:0;overflow:hidden}
.wf-statuses,.wf-transitions{padding:16px 20px;overflow:auto}
.wf-statuses{border-right:1px solid var(--bd);background:var(--b1)}
.wf-transitions{background:var(--b1)}
.wf-section-h{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.wf-status-card{background:var(--b2);border:1px solid var(--bd);border-radius:4px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;font-size:13px;cursor:grab}
.wf-status-card:hover{border-color:var(--ac)}
.wf-status-card .wf-status-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.wf-status-card .wf-status-name{flex:1;font-weight:600}
.wf-status-card .wf-status-cat{font-size:10px;color:var(--t2);background:var(--b3);padding:1px 6px;border-radius:3px;text-transform:uppercase}
.wf-status-card .wf-init{background:var(--gn-bg);color:var(--gn);padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.5px}
.wf-status-card .wf-rm-btn{padding:2px 6px;color:var(--dn);background:none;border:none;cursor:pointer;border-radius:3px;font-size:14px;opacity:.6}
.wf-status-card .wf-rm-btn:hover{background:var(--dn-bg);opacity:1}
.wf-trans-card{background:var(--b2);border:1px solid var(--bd);border-radius:4px;padding:12px;margin-bottom:8px;font-size:13px}
.wf-trans-card:hover{border-color:var(--ac)}
.wf-trans-h{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.wf-trans-name{font-weight:600;color:var(--t1);flex:1}
.wf-trans-flow{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2);margin-bottom:6px;flex-wrap:wrap}
.wf-trans-flow .wf-from,.wf-trans-flow .wf-to{padding:2px 8px;background:var(--b3);border-radius:3px;font-weight:500;color:var(--t1)}
.wf-trans-flow .wf-arrow{color:var(--ac);font-weight:700}
.wf-trans-cv{display:flex;gap:14px;font-size:11px;color:var(--t3);margin-top:4px}
.wf-trans-cv span{display:inline-flex;align-items:center;gap:3px}
.wf-trans-cv b{color:var(--ac);font-weight:600}
.wf-add-btn{width:100%;padding:8px;border:1px dashed var(--bd);background:none;border-radius:3px;color:var(--t2);cursor:pointer;font-size:12px;margin-top:6px}
.wf-add-btn:hover{border-color:var(--ac);color:var(--ac);background:var(--ac-bg)}
/* Transition Dialog */
.wf-cond-list{margin-top:8px}
.wf-cond-row{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--b2);border-radius:3px;margin-bottom:4px;font-size:12px}
.wf-cond-row .wf-cond-rm{margin-left:auto;color:var(--dn);background:none;border:none;cursor:pointer;font-size:14px;opacity:.6}
.wf-cond-row .wf-cond-rm:hover{opacity:1}
.wf-tab-bar{display:flex;border-bottom:1px solid var(--bd);margin-bottom:14px;gap:0}
.wf-tab{padding:8px 14px;font-size:13px;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;font-weight:500}
.wf-tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.wf-tab:hover:not(.on){color:var(--t1)}
/* Migration Wizard */
.mw-row{display:grid;grid-template-columns:1fr 30px 1fr;gap:10px;align-items:center;padding:10px;background:var(--b2);border-radius:4px;margin-bottom:8px}
.mw-old{padding:6px 10px;background:var(--dn-bg);color:var(--dn);border-radius:3px;font-weight:600;font-size:13px}
.mw-arrow{text-align:center;color:var(--ac);font-size:18px}
.mw-new{padding:6px 10px;border:1px solid var(--bd);border-radius:3px;background:var(--b1);color:var(--t1);font-size:13px}
/* History timeline */
.hist-list{padding:14px 20px;overflow:auto;background:var(--b2)}
.hist-row{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--bd);font-size:13px}
.hist-row:last-child{border:none}
.hist-time{font-family:'SF Mono',monospace;font-size:11px;color:var(--t2);width:140px;flex-shrink:0}
.hist-user{color:var(--ac);font-weight:600;width:90px;flex-shrink:0}
.hist-body{flex:1;color:var(--t1)}
.hist-from{padding:1px 6px;background:var(--b3);border-radius:3px;font-size:11px}
.hist-to{padding:1px 6px;background:var(--ac-bg);color:var(--ac);border-radius:3px;font-size:11px;font-weight:600}

/* ===== Workflow Visualizer ===== */
.wfv-toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--b1);flex-shrink:0}
.wfv-stage{user-select:none}
.wfv-stage svg{display:block}
.wf-diagram-body{padding:0!important;background:var(--b1)!important}
.wf-vm.on{background:var(--ac);color:#fff}
.wf-canvas-h{flex-wrap:wrap;gap:8px}

/* ===== Template Gallery ===== */
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.tpl-card{background:var(--b1);border:1px solid var(--bd);border-radius:6px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:all .15s;box-shadow:0 1px 2px rgba(9,30,66,.08)}
.tpl-card:hover{box-shadow:0 4px 12px rgba(9,30,66,.12);border-color:var(--ac);transform:translateY(-2px)}
.tpl-card-h{display:flex;gap:12px;align-items:center}
.tpl-icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;color:#fff}
.tpl-name{font-size:15px;font-weight:600;color:var(--t1);line-height:1.3}
.tpl-meta{font-size:11px;color:var(--t2);margin-top:2px}
.tpl-desc{font-size:13px;color:var(--t2);line-height:1.5;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.tpl-card-f{display:flex;gap:6px;align-items:center;padding-top:10px;border-top:1px solid var(--bd);margin-top:auto}

/* ===== Template Editor ===== */
.tpl-editor-body{flex:1;display:grid;grid-template-columns:1fr 280px;overflow:hidden;min-height:0}
.tpl-canvas-wrap{overflow:auto;background:var(--b2);position:relative}
.tpl-canvas{position:relative;min-width:100%;min-height:600px}
.tpl-sidebar{border-left:1px solid var(--bd);background:var(--b1);overflow:auto;display:flex;flex-direction:column}
.tpl-list-item{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-radius:3px;font-size:13px;color:var(--t1);margin-bottom:2px}
.tpl-list-item:hover{background:var(--b3)}
.tpl-list-item.active{background:var(--ac-bg);color:var(--ac);font-weight:600}
.tpl-li-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tpl-li-edit{padding:3px 6px;font-size:11px;color:var(--t3);background:none;border:none;cursor:pointer;border-radius:3px}
.tpl-li-edit:hover{color:var(--ac);background:var(--b3)}

/* ===== Process Visualizer Modal ===== */
.pvz-modal{position:fixed;inset:0;background:rgba(9,30,66,.65);z-index:2000;display:none;align-items:center;justify-content:center;padding:24px}
.pvz-content{background:var(--b1);border-radius:8px;width:100%;max-width:1400px;height:calc(100vh - 48px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(9,30,66,.4)}
.pvz-header{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:14px;background:var(--b2)}
.pvz-h-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;flex-shrink:0}
.pvz-h-title{font-size:18px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pvz-h-meta{font-size:12px;color:var(--t2);margin-top:2px}
.pvz-close{padding:8px 12px;background:none;border:none;font-size:24px;cursor:pointer;color:var(--t2);border-radius:4px;line-height:1}
.pvz-close:hover{background:var(--b3);color:var(--t1)}
.pvz-toolbar{padding:10px 20px;border-bottom:1px solid var(--bd);background:var(--b1);display:flex;align-items:center;gap:8px}
.pvz-stage{flex:1;overflow:hidden;position:relative;background:var(--b2);background-image:radial-gradient(circle, var(--bd) 1px, transparent 1px);background-size:20px 20px;cursor:grab;user-select:none}
.pvz-stage svg{display:block;position:absolute;top:0;left:0}

/* Node action popup */
.pvz-node-pop{position:absolute;background:var(--b1);border:1px solid var(--bd);border-radius:8px;padding:14px;width:280px;box-shadow:0 8px 24px rgba(9,30,66,.25);z-index:50;font-size:13px}
.pvz-node-pop label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-top:8px;margin-bottom:3px;font-weight:700}
.pvz-node-pop select{width:100%;padding:6px 8px;border:1px solid var(--bd);border-radius:3px;background:var(--b1);color:var(--t1);font-size:12px;outline:none}
.pvz-node-pop select:focus{border-color:var(--ac);box-shadow:0 0 0 1px var(--ac)}
.pvz-pop-h{display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.pvz-pop-key{font-family:'SF Mono',monospace;color:var(--ac);font-weight:700;font-size:13px;flex:1}
.pvz-pop-close{padding:0;width:22px;height:22px;background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;border-radius:3px}
.pvz-pop-close:hover{background:var(--b3);color:var(--t1)}
.pvz-pop-title{font-size:13px;font-weight:600;color:var(--t1);margin-top:6px;line-height:1.3}
.pvz-pop-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.pvz-pop-actions .btn{flex:1}
.pvz-tr-btn{display:block;width:100%;padding:6px 10px;background:var(--ac-bg);color:var(--ac);border:1px solid var(--ac-bg-h);border-radius:3px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:4px;text-align:left;font-family:inherit}
.pvz-tr-btn:hover{background:var(--ac);color:#fff;border-color:var(--ac)}

/* ===== Bulk Operations Bar ===== */
.bulk-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1d2125;color:#fff;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(9,30,66,.3);z-index:1500;min-width:600px;max-width:90vw}
.bulk-bar .btn{color:#fff}
.bulk-bar .btn.secondary{background:rgba(255,255,255,.12);color:#fff;border:none}
.bulk-bar .btn.secondary:hover{background:rgba(255,255,255,.22);color:#fff}
.bulk-bar .btn.bp{background:var(--ac);color:#fff}
.bulk-bar .btn.danger{color:#ff8b80;background:rgba(255,255,255,.08)}
.bulk-bar .btn.danger:hover{background:rgba(220,80,80,.4);color:#fff}
.bulk-bar .btn-icon{color:#fff;background:rgba(255,255,255,.1)}
.bulk-bar .btn-icon:hover{background:rgba(255,255,255,.2)}
.bulk-bar .bulk-cnt{background:var(--ac);color:#fff;padding:3px 10px;border-radius:12px;font-size:13px;font-weight:700;min-width:30px;text-align:center}

/* Bulk select checkbox in row */
.tk-bulk-cb{display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:transparent;background:var(--b1);border:1.5px solid var(--bd-strong);border-radius:3px;flex-shrink:0;transition:all .1s}
.tk-bulk-cb:hover{border-color:var(--ac)}
.tk-bulk-cb.on{background:var(--ac);border-color:var(--ac);color:#fff}
.tk-row.bulk-sel{background:var(--ac-bg)!important}

/* ===== Mobile / Responsive (≤768px) ===== */
@media (max-width:768px){
  #sidebar{position:fixed;top:0;left:0;bottom:0;z-index:200;transform:translateX(-100%);transition:transform .2s}
  #sidebar.mobile-open{transform:translateX(0);box-shadow:0 0 24px rgba(0,0,0,.3)}
  #sidebar.collapsed{width:240px}
  #content{width:100%}
  .tb-search{max-width:none}
  .tb-search input{font-size:14px}
  #topbar{padding:0 12px;gap:8px;height:52px}
  .page-header{padding:14px 14px 8px}
  .page-title{font-size:18px}
  .page-toolbar{padding:8px 12px;flex-wrap:wrap;gap:6px}
  .page-toolbar .btn{padding:6px 10px;font-size:12px}
  .tv-body{flex-direction:column}
  .tv-detail{width:100%;border-left:none;border-top:1px solid var(--bd);max-height:50vh}
  .tk-row{grid-template-columns:32px 70px 28px 1fr 80px 60px;font-size:12px;padding:8px 10px;gap:6px}
  .tk-row>div:nth-child(7),.tk-row>div:nth-child(8){display:none}
  .tk-row.hd>div:nth-child(7),.tk-row.hd>div:nth-child(8){display:none}
  .kb-cols{padding:10px;gap:8px}
  .kb-col{min-width:240px;width:240px}
  .bl-row{grid-template-columns:18px 70px 28px 1fr 80px 50px;gap:6px;padding:6px 10px;font-size:12px}
  .bl-row>div:nth-child(7),.bl-row>div:nth-child(8){display:none}
  .md{min-width:0;width:calc(100% - 32px);max-width:480px;padding:16px}
  .md h3{font-size:18px;margin-bottom:14px}
  .bulk-bar{min-width:0;width:calc(100% - 24px);left:12px;right:12px;transform:none;flex-wrap:wrap}
  .bulk-bar .btn{padding:5px 8px;font-size:11px}
  .pvz-modal{padding:0}
  .pvz-content{height:100vh;border-radius:0;max-width:none}
  .pvz-header{padding:10px 12px;gap:8px}
  .pvz-h-title{font-size:14px}
  .pvz-h-meta{font-size:10px}
  .pvz-h-icon{width:36px;height:36px;font-size:18px}
  .tpl-grid{grid-template-columns:1fr;gap:10px}
  .tpl-card{padding:12px}
  .tpl-editor-body{grid-template-columns:1fr}
  .tpl-sidebar{display:none}
  /* Mobile sidebar overlay toggle */
  #sbToggle{display:none}
}
.mobile-menu-btn{display:none;padding:6px;background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer}
@media (max-width:768px){.mobile-menu-btn{display:inline-flex}}

input[type=file]{display:none}

   TICKET MANAGEMENT EXTENSION
   - LocalStorage persistence
   - Tickets, Kanban, Backlog, Audit, Admin

var DEFAULT_STATUSES = [
  {id:"todo", name:"未着手", color:"#95a5a6"},
  {id:"inprogress", name:"進行中", color:"#3498db"},
  {id:"review", name:"レビュー", color:"#f39c12"},
  {id:"done", name:"完了", color:"#27ae60"}
];
var DEFAULT_PRIORITIES = ["highest","high","medium","low","lowest"];
var DEFAULT_TYPES = ["task","bug","story","epic","incident"];
var DEFAULT_ROLES = [
  {id:"admin", name:"管理者", perms:["*"]},
  {id:"editor", name:"編集者", perms:["ticket.create","ticket.edit","ticket.delete","comment.create"]},
  {id:"viewer", name:"閲覧者", perms:["ticket.view","comment.create"]}
];

/* ===== Persistence ===== */
function saveTS(){
  try {
    var snap = {
      tickets:TS.tickets,users:TS.users,roles:TS.roles,statuses:TS.statuses,
      priorities:TS.priorities,types:TS.types,sprints:TS.sprints,
      notifications:TS.notifications,auditLog:TS.auditLog.slice(-500),
      currentUser:TS.currentUser,ticketSeq:TS.ticketSeq,
      autoLink:TS.autoLink,gitProvider:TS.gitProvider,gitRepo:TS.gitRepo,
      workflows:TS.workflows,workflowSchemes:TS.workflowSchemes,workflowDrafts:TS.workflowDrafts,
      resolutions:TS.resolutions,customFields:TS.customFields,ticketHistory:TS.ticketHistory,
      templates:TS.templates,alertConfig:TS.alertConfig,autoCompleteParent:TS.autoCompleteParent,
      templatesInitialized:TS.templatesInitialized,
      yaml: document.getElementById("ye") ? document.getElementById("ye").value : ""
    };
    localStorage.setItem("ganttTicketState", JSON.stringify(snap));
  } catch(e) { console.warn("Save failed:", e); }
}

function loadTS(){
  try {
    var raw = localStorage.getItem("ganttTicketState");
    if (!raw) return false;
    var s = JSON.parse(raw);
    TS.tickets = s.tickets || [];
    TS.users = s.users || [];
    TS.roles = s.roles || DEFAULT_ROLES;
    TS.statuses = s.statuses || DEFAULT_STATUSES;
    TS.priorities = s.priorities || DEFAULT_PRIORITIES;
    TS.types = s.types || DEFAULT_TYPES;
    TS.sprints = s.sprints || [];
    TS.notifications = s.notifications || [];
    TS.auditLog = s.auditLog || [];
    TS.currentUser = s.currentUser || null;
    TS.ticketSeq = s.ticketSeq || 1;
    TS.autoLink = s.autoLink !== false;
    TS.gitProvider = s.gitProvider || "github";
    TS.gitRepo = s.gitRepo || "";
    TS.workflows = s.workflows || [];
    TS.workflowSchemes = s.workflowSchemes || [];
    TS.workflowDrafts = s.workflowDrafts || {};
    TS.resolutions = s.resolutions || [];
    TS.customFields = s.customFields || [];
    TS.ticketHistory = s.ticketHistory || {};
    TS.templates = s.templates || [];
    TS.templatesInitialized = !!s.templatesInitialized;
    TS.alertConfig = s.alertConfig || null;
    TS.autoCompleteParent = s.autoCompleteParent || "prompt";
    if (s.yaml && document.getElementById("ye")) document.getElementById("ye").value = s.yaml;
    return true;
  } catch(e) { console.warn("Load failed:", e); return false; }
}

/* ===== Audit Log ===== */
function audit(action, entity, entityId, detail){
  TS.auditLog.push({
    ts: new Date().toISOString(),
    user: TS.currentUser ? TS.currentUser.id : "system",
    action: action, entity: entity, entityId: entityId, detail: detail||""
  });
  if (TS.auditLog.length > 500) TS.auditLog.shift();
}

/* ===== Permission ===== */
function hasPerm(perm){
  if (!TS.currentUser) return false;
  var role = TS.roles.find(function(r){return r.id===TS.currentUser.roleId});
  if (!role) return false;
  return role.perms.indexOf("*")>=0 || role.perms.indexOf(perm)>=0;
}

/* ===== Notifications ===== */
function notify(userId, msg, ticketId){
  TS.notifications.push({
    id: "n"+Date.now()+Math.random().toString(36).substr(2,4),
    userId: userId, msg: msg, ticketId: ticketId||null,
    ts: new Date().toISOString(), read: false
  });
  updateBell();
}
function updateBell(){
  var bc = document.getElementById("bellCnt");
  if (!bc || !TS.currentUser) return;
  if (!TS.notifications) TS.notifications = [];
  var unread = TS.notifications.filter(function(n){return n.userId===TS.currentUser.id && !n.read}).length;
  bc.textContent = unread;
  bc.classList.toggle("on", unread>0);
}
function renderNotif(){
  var nl = document.getElementById("notifList");
  if (!nl) return;
  nl.innerHTML = "";
  if (!TS.currentUser){nl.innerHTML='<div class="notif-item">ログインしてください</div>';return}
  if (!TS.notifications) TS.notifications = [];
  var mine = TS.notifications.filter(function(n){return n.userId===TS.currentUser.id}).slice().reverse();
  if (!mine.length){nl.innerHTML='<div class="notif-item" style="color:var(--t3)">通知なし</div>';return}
  mine.forEach(function(n){
    var d = document.createElement("div");
    d.className = "notif-item"+(n.read?"":" unread");
    var t = new Date(n.ts);
    d.innerHTML = '<div>'+escHtml(n.msg)+'</div><div class="nf-time">'+t.toLocaleString("ja-JP")+'</div>';
    d.onclick = function(){
      n.read = true;
      if (n.ticketId){TS.selectedTicket = n.ticketId;switchView("ticket")}
      saveTS();updateBell();renderNotif();
      document.getElementById("notif").style.display = "none";
    };
    nl.appendChild(d);
  });
}

function escHtml(s){return String(s||"").replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]})}

/* ===== Ticket CRUD ===== */
function newTicketKey(){return "TK-"+(TS.ticketSeq++)}

function createTicket(data){
  if (!hasPerm("ticket.create")){toast("権限がありません",1);return null}
  var t = {
    key: data.key || newTicketKey(),
    title: data.title || "",
    description: data.description || "",
    type: data.type || "task",
    status: data.status || "todo",
    priority: data.priority || "medium",
    assignee: data.assignee || "",
    reporter: data.reporter || (TS.currentUser?TS.currentUser.id:""),
    labels: data.labels || [],
    dueDate: data.dueDate || null,
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    storyPoint: data.storyPoint || null,
    sprintId: data.sprintId || null,
    parentKey: data.parentKey || null,
    links: data.links || [],
    comments: [],
    attachments: [],
    customFields: data.customFields || {},
    ganttTaskId: data.ganttTaskId || null,
    gitRefs: data.gitRefs || []
  };
  TS.tickets.push(t);
  audit("create","ticket",t.key,t.title);
  if (t.assignee && t.assignee !== (TS.currentUser?TS.currentUser.id:""))
    notify(t.assignee, t.key+" があなたにアサインされました: "+t.title, t.key);
  saveTS();
  return t;
}

function updateTicket(key, patch){
  if (!hasPerm("ticket.edit")){toast("権限がありません",1);return false}
  var t = TS.tickets.find(function(x){return x.key===key});
  if (!t) return false;
  var oldAsg = t.assignee;
  Object.keys(patch).forEach(function(k){t[k]=patch[k]});
  t.updatedAt = new Date().toISOString();
  audit("update","ticket",key,Object.keys(patch).join(","));
  if (patch.assignee && patch.assignee !== oldAsg && patch.assignee !== (TS.currentUser?TS.currentUser.id:""))
    notify(patch.assignee, key+" があなたにアサインされました: "+t.title, key);
  saveTS();
  return true;
}

function deleteTicket(key){
  if (!hasPerm("ticket.delete")){toast("権限がありません",1);return false}
  var idx = TS.tickets.findIndex(function(x){return x.key===key});
  if (idx<0) return false;
  TS.tickets.splice(idx,1);
  // Remove backlinks
  TS.tickets.forEach(function(t){
    t.links = (t.links||[]).filter(function(l){return l.target!==key});
  });
  audit("delete","ticket",key,"");
  saveTS();
  return true;
}

function addComment(key, body){
  if (!hasPerm("comment.create")){toast("権限がありません",1);return false}
  var t = TS.tickets.find(function(x){return x.key===key});
  if (!t) return false;
  t.comments.push({
    id: "c"+Date.now(),
    user: TS.currentUser?TS.currentUser.id:"anonymous",
    body: body,
    ts: new Date().toISOString()
  });
  audit("update","comment",key,"add");
  // Notify assignee + reporter
  [t.assignee, t.reporter].forEach(function(u){
    if (u && TS.currentUser && u!==TS.currentUser.id) notify(u, key+" にコメント: "+body.substring(0,40), key);
  });
  saveTS();
  return true;
}

/* ===== Git Reference Auto-link ===== */
function extractGitRefs(text){
  var refs = [];
  var re = /\b(TK-\d+|[A-Z]+-\d+)\b/g;
  var m;
  while ((m = re.exec(text))) refs.push(m[1]);
  return refs;
}
function linkCommitToTicket(commitMsg, commitHash, repoUrl){
  var refs = extractGitRefs(commitMsg);
  refs.forEach(function(key){
    var t = TS.tickets.find(function(x){return x.key===key});
    if (t){
      t.gitRefs = t.gitRefs || [];
      if (!t.gitRefs.find(function(r){return r.hash===commitHash}))
        t.gitRefs.push({hash:commitHash, msg:commitMsg, url:repoUrl, ts:new Date().toISOString()});
      audit("update","ticket",key,"git: "+commitHash.substring(0,7));
    }
  });
  saveTS();
}

/* ===== JQL-Compatible Search ===== */
function parseJQL(q){
  q = q.trim();
  if (!q) return function(){return true};
  // Tokenize: status = "Done" AND priority != Low ORDER BY ...
  var orderMatch = q.match(/\s+ORDER\s+BY\s+(\w+)\s*(ASC|DESC)?$/i);
  var orderField = null, orderDir = "ASC";
  if (orderMatch){orderField=orderMatch[1].toLowerCase();orderDir=(orderMatch[2]||"ASC").toUpperCase();q=q.substring(0,orderMatch.index)}

  // Parse expression with AND/OR
  function parseExpr(s){
    s = s.trim();
    var orParts = splitTop(s, /\s+OR\s+/i);
    if (orParts.length>1) return function(t){return orParts.some(function(p){return parseExpr(p)(t)})};
    var andParts = splitTop(s, /\s+AND\s+/i);
    if (andParts.length>1) return function(t){return andParts.every(function(p){return parseExpr(p)(t)})};
    return parseClause(s);
  }
  function splitTop(s, re){
    // Simple split (no nested parens for now)
    return s.split(re);
  }
  function parseClause(s){
    s = s.trim();
    // Handle "field IN (a, b, c)"
    var inMatch = s.match(/^(\w+)\s+(NOT\s+)?IN\s*\((.*)\)$/i);
    if (inMatch){
      var f = inMatch[1].toLowerCase(), neg = !!inMatch[2];
      var vals = inMatch[3].split(",").map(function(v){return v.trim().replace(/^["']|["']$/g,"")});
      return function(t){var v=getField(t,f);var has=vals.indexOf(String(v))>=0;return neg?!has:has};
    }
    // Handle "field operator value"
    var m = s.match(/^(\w+)\s*(=|!=|>=|<=|>|<|~|!~)\s*(.+)$/);
    if (!m) return function(){return true};
    var field = m[1].toLowerCase(), op = m[2], val = m[3].trim().replace(/^["']|["']$/g,"");
    return function(t){
      var fv = getField(t, field);
      if (fv == null) fv = "";
      switch(op){
        case "=": return String(fv) === val;
        case "!=": return String(fv) !== val;
        case ">": return String(fv) > val;
        case "<": return String(fv) < val;
        case ">=": return String(fv) >= val;
        case "<=": return String(fv) <= val;
        case "~": return String(fv).toLowerCase().indexOf(val.toLowerCase()) >= 0;
        case "!~": return String(fv).toLowerCase().indexOf(val.toLowerCase()) < 0;
      }
      return false;
    };
  }
  function getField(t, f){
    var aliases = {assignee:"assignee",status:"status",priority:"priority",type:"type",reporter:"reporter",title:"title",summary:"title",key:"key",sprint:"sprintId",sprintid:"sprintId",duedate:"dueDate",storypoint:"storyPoint",storypoints:"storyPoint",description:"description",label:"labels",labels:"labels",gantt:"ganttTaskId",gantttaskid:"ganttTaskId",parent:"parentKey",parentkey:"parentKey"};
    var k = aliases[f] || f;
    if (k === "labels") return (t.labels||[]).join(",");
    return t[k];
  }
  var pred = parseExpr(q);
  return function(list){
    var r = list.filter(pred);
    if (orderField){
      r.sort(function(a,b){
        var av=a[orderField]||"", bv=b[orderField]||"";
        return orderDir==="DESC" ? (av<bv?1:av>bv?-1:0) : (av<bv?-1:av>bv?1:0);
      });
    }
    return r;
  };
}

function searchTickets(q){
  if (!q.trim()) return TS.tickets.slice();
  // If looks like JQL (has = or AND), use parser. Else fulltext.
  if (/[=!<>~]|\bAND\b|\bOR\b|\bIN\b|\bORDER\s+BY\b/i.test(q)){
    try { return parseJQL(q)(TS.tickets); }
    catch(e){ console.warn("JQL error",e); }
  }
  var ql = q.toLowerCase();
  return TS.tickets.filter(function(t){
    return (t.title||"").toLowerCase().indexOf(ql)>=0 ||
           (t.description||"").toLowerCase().indexOf(ql)>=0 ||
           (t.key||"").toLowerCase().indexOf(ql)>=0 ||
           (t.labels||[]).some(function(l){return l.toLowerCase().indexOf(ql)>=0});
  });
}

/* ===== View Switching ===== */
function switchView(v){
  TS.currentView = v;
  document.querySelectorAll(".sb-item").forEach(function(b){b.classList.toggle("active", b.dataset.v===v)});
  document.querySelectorAll(".vw").forEach(function(d){d.classList.remove("active");d.style.display="none"});
  var view = document.getElementById(v+"View");
  if (view){view.classList.add("active");view.style.display="flex";if(v!=="gantt")view.style.flexDirection="column"}
  if (v==="gantt") {
    if (typeof render === "function") render();
  } else if (v==="ticket") renderTicketView();
  else if (v==="kanban") renderKanbanView();
  else if (v==="backlog") renderBacklogView();
  else if (v==="workflow") renderWorkflowView();
  else if (v==="template") renderTemplateView();
  else if (v==="audit") renderAuditView();
  else if (v==="admin") renderAdminView();
  else if (v==="sprint" && typeof renderSprintView === "function") renderSprintView();
}


/* ===== Ticket View ===== */
function renderTicketView(){
  var v = document.getElementById("ticketView");
  v.innerHTML = '<div class="page-header"><div class="page-bc"><a>プロジェクト</a> / <a>サンプル</a></div><div class="page-title">🎫 Issues</div></div><div class="page-toolbar"><input class="tb-input" id="ticketSearch" placeholder="検索 / JQL: status = todo AND priority = high" value="'+escHtml(TS.filter)+'" style="flex:1;max-width:480px"><button class="btn bp" id="ticketAdd">+ Create</button><button class="btn secondary" id="ticketTpl">⚡ From Template</button><button class="btn secondary" id="ticketImport">📥 Import</button><button class="btn secondary" id="ticketExport">📤 Export</button></div><div class="tv-body"><div class="tv-list" id="ticketList"></div><div class="tv-detail" id="ticketDetail" style="display:none"></div></div>';
  var listEl = document.getElementById("ticketList");
  var results = searchTickets(TS.filter);
  // Build hierarchy: parents first, then children indented
  var byKey = {};results.forEach(function(t){byKey[t.key]=t});
  var hierarchical = [];
  var added = {};
  results.forEach(function(t){
    if (added[t.key]) return;
    if (t.parentKey && byKey[t.parentKey]) return; // skip; will be added under parent
    hierarchical.push({t:t, level:0});
    added[t.key] = true;
    // Find children (in result set)
    var children = results.filter(function(x){return x.parentKey===t.key&&!added[x.key]});
    children.forEach(function(c){
      hierarchical.push({t:c, level:1});
      added[c.key] = true;
    });
  });
  // Add orphans (children whose parent is not in results)
  results.forEach(function(t){if(!added[t.key]){hierarchical.push({t:t,level:0});added[t.key]=true}});

  var html = '<div class="tk-row hd"><div><button class="tk-bulk-cb" id="tkSelAll" title="全選択">＋</button></div><div>KEY</div><div>TYPE</div><div>SUMMARY</div><div>STATUS</div><div>PRIORITY</div><div>ASSIGNEE</div><div>DUE</div></div>';
  hierarchical.forEach(function(item){
    var t = item.t;
    var st = TS.statuses.find(function(s){return s.id===t.status});
    var due = t.dueDate ? formatDate(t.dueDate) : "";
    var dueCls = (t.dueDate && t.dueDate < new Date().toISOString().substr(0,10) && t.status !== "done") ? " overdue" : "";
    var sel = TS.selectedTicket===t.key ? " sel" : "";
    var subCnt = TS.tickets.filter(function(x){return x.parentKey===t.key}).length;
    var indent = item.level>0 ? '<span class="ind-line">└</span>' : '';

      html += '</div></div>';

    html += '</div></div>';

  html += '<div class="dt-sec"><button class="btn" style="color:var(--dn);border-color:var(--dn);width:100%" id="dtDel">🗑 削除</button></div>';

  document.getElementById("dtDue").onchange = function(){updateTicket(t.key,{dueDate:this.value||null});renderTicketView()};
  document.getElementById("dtSp").onchange = function(){updateTicket(t.key,{storyPoint:parseInt(this.value)||null});renderTicketView()};
  document.getElementById("dtGantt").onchange = function(){updateTicket(t.key,{ganttTaskId:this.value||null});renderTicketView()};

        var fn = WF_CONDITIONS[cond.type||cond];
        if (!fn) continue;

function invertLinkType(typ){
  var inv = {blocks:"blocked_by",blocked_by:"blocks",relates_to:"relates_to",duplicates:"is_duplicated_by",is_duplicated_by:"duplicates",clones:"is_cloned_by",is_cloned_by:"clones"};
  return inv[typ] || typ;
}

function addLinkDlg(t){
  var typeOpts = '<option value="blocks">⛔ blocks</option><option value="blocked_by">⛔ is blocked by</option><option value="relates_to" selected>🔗 relates to</option><option value="duplicates">📋 duplicates</option><option value="clones">⎘ clones</option>';
  var tgtOpts = '<option value="">-- 選択 --</option>'+TS.tickets.filter(function(x){return x.key!==t.key}).map(function(x){
    return '<option value="'+x.key+'">'+x.key+': '+escHtml(x.title.substring(0,50))+'</option>';
  }).join("");
  showModal('<h3>🔗 リンク追加</h3><label>関係</label><select id="alType">'+typeOpts+'</select><label>リンク先チケット</label><select id="alTgt">'+tgtOpts+'</select><div class="ma"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn bp" id="alOk">追加</button></div>');
  document.getElementById("alOk").onclick = function(){
    var typ = document.getElementById("alType").value;
    var tgt = document.getElementById("alTgt").value;
    if (!tgt){toast("リンク先を選択",1);return}
    t.links = t.links || [];
    if (t.links.find(function(x){return x.type===typ&&x.target===tgt})){toast("既に存在",1);return}
    t.links.push({type:typ, target:tgt});
    audit("update","ticket",t.key,"link "+typ+" "+tgt);
    saveTS();closeModal();renderTicketView();
  };
}

function linkToGanttDlg(t){
  if (typeof S === "undefined" || !S.flat || !S.flat.length){toast("Ganttタスクがありません",1);return}
  var opts = '<option value="">-- 解除 --</option>'+S.flat.map(function(g){
    return '<option value="'+g.id+'"'+(t.ganttTaskId===g.id?" selected":"")+'>'+(g.lv>0?"  ".repeat(g.lv):"")+g.name+'</option>';
  }).join("");
  showModal('<h3>📊 Gantt連携</h3><label>連携先Ganttタスク</label><select id="lgTgt">'+opts+'</select><div class="ma"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn bp" id="lgOk">設定</button></div>');
  document.getElementById("lgOk").onclick = function(){
    var v = document.getElementById("lgTgt").value;
    updateTicket(t.key,{ganttTaskId:v||null});
    closeModal();renderTicketView();toast("Gantt連携: "+(v||"解除"));
  };
}

function newTicketDlg(defaultStatus, parentKey){

  var tpOpts = TS.types.map(function(p){return '<option value="'+p+'">'+p.toUpperCase()+'</option>'}).join("");

/* ===== CSV Import/Export ===== */
function exportCsv(){
  var hdr = ["key","title","type","status","priority","assignee","reporter","dueDate","storyPoint","labels","description"];
  var rows = TS.tickets.map(function(t){
    return hdr.map(function(h){
      var v = h==="labels" ? (t.labels||[]).join(";") : (t[h]||"");
      return '"'+String(v).replace(/"/g,'""')+'"';
    }).join(",");
  });
  var csv = hdr.join(",")+"\n"+rows.join("\n");
  var b = new Blob([csv],{type:"text/csv"});
  var a = document.createElement("a");a.href=URL.createObjectURL(b);a.download="tickets.csv";a.click();
  toast("CSV出力完了");
}

function importCsv(){
  var inp = document.createElement("input");
  inp.type = "file";inp.accept = ".csv";
  inp.onchange = function(e){
    var f = e.target.files[0];if(!f)return;
    var r = new FileReader();
    r.onload = function(ev){
      var lines = ev.target.result.split(/\r?\n/).filter(Boolean);
      if (!lines.length) return;
      var hdr = parseCsvLine(lines[0]);
      var added = 0;
      for (var i=1;i<lines.length;i++){
        var cells = parseCsvLine(lines[i]);
        var obj = {};
        hdr.forEach(function(h,j){obj[h]=cells[j]||""});
        if (obj.labels) obj.labels = obj.labels.split(";").filter(Boolean);
        if (obj.storyPoint) obj.storyPoint = parseInt(obj.storyPoint)||null;
        createTicket(obj);added++;
      }
      toast(added+"件追加");renderTicketView();
    };
    r.readAsText(f);
  };
  inp.click();
}
function parseCsvLine(line){
  var r=[],cur="",inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(inQ){if(c==='"'){if(line[i+1]==='"'){cur+='"';i++}else inQ=false}else cur+=c}
    else{if(c==='"')inQ=true;else if(c===","){r.push(cur);cur=""}else cur+=c}
  }
  r.push(cur);return r;
}

    hsl += '<button data-newst="'+st.id+'" title="チケット追加">+</button>';
    hsl += '<button data-edcol="'+st.id+'" title="列を編集">✎</button>';

    hsl += '</span></span></div><div class="kb-col-b"></div>';
    col.innerHTML = hsl;
    var body = col.querySelector(".kb-col-b");
    items.forEach(function(t){
      var c = document.createElement("div");
      var subCnt = TS.tickets.filter(function(x){return x.parentKey===t.key}).length;
      var hasSubsCls = subCnt>0?" has-children":"";
      var subCls = t.parentKey?" subtask":"";
      c.className = "kb-card"+hasSubsCls+subCls;
      c.draggable = true;c.dataset.key = t.key;
      c.style.borderLeftColor = st.color;
      var parentInfo = "";
      if (t.parentKey){
        var par = TS.tickets.find(function(x){return x.key===t.parentKey});
        if (par) parentInfo = '<div style="font-size:9px;color:var(--t3);margin-bottom:2px">↳ '+par.key+'</div>';
      }
      var typeIcon = '<span class="ti '+(t.parentKey?"subtask":t.type)+'">'+(t.parentKey?"S":t.type[0].toUpperCase())+'</span>';
      var ganttBadge = t.ganttTaskId ? ' <span class="gantt-link" title="Gantt連携">📊</span>' : '';
      var subBadge = subCnt > 0 ? ' <span class="sub-cnt">📎'+subCnt+'</span>' : '';
      var linkCnt = (t.links||[]).filter(function(l){return l.type!=="subtask"}).length;
      var linkBadge = linkCnt > 0 ? ' <span class="sub-cnt">🔗'+linkCnt+'</span>' : '';
      c.innerHTML = parentInfo+'<div class="ct-key">'+typeIcon+t.key+'</div><div class="ct-title">'+escHtml(t.title)+'</div><div class="ct-meta"><span class="ti-pri '+t.priority+'" title="'+t.priority+'">'+priIcon(t.priority)+'</span><span style="color:var(--t2);font-size:9px">'+escHtml(t.assignee||"-")+'</span>'+(t.storyPoint?'<span style="background:var(--b1);color:var(--ac);font-weight:700;padding:1px 5px;border-radius:8px;font-size:9px">'+t.storyPoint+'</span>':'')+subBadge+linkBadge+ganttBadge+'</div>';
      c.onclick = function(){TS.selectedTicket=t.key;switchView("ticket")};
      c.ondragstart = function(e){
        e.stopPropagation();
        e.dataTransfer.setData("text/plain",t.key);
        e.dataTransfer.setData("application/x-card", t.key);
        c.classList.add("dragging");
      };
      c.ondragend = function(){c.classList.remove("dragging")};
      body.appendChild(c);
    });
    // Card drop on column body (status change)
    col.ondragover = function(e){
      e.preventDefault();
      var isCol = e.dataTransfer.types.indexOf("application/x-col") >= 0;
      if (isCol) col.classList.add("col-drag-over");
      else col.classList.add("dragover");
    };
    col.ondragleave = function(){col.classList.remove("dragover");col.classList.remove("col-drag-over")};
    col.ondrop = function(e){
      e.preventDefault();col.classList.remove("dragover");col.classList.remove("col-drag-over");
      // Column reorder?
      var srcCol = e.dataTransfer.getData("application/x-col");
      if (srcCol && srcCol !== st.id){
        var cols = TS.boardConfig.columns.slice();
        var srcIdx = cols.indexOf(srcCol);
        var dstIdx = cols.indexOf(st.id);
        if (srcIdx >= 0 && dstIdx >= 0){
          if (typeof urCapture === "function") urCapture("列順変更", true);
          cols.splice(srcIdx, 1);
          cols.splice(dstIdx, 0, srcCol);
          TS.boardConfig.columns = cols;
          saveTS();
          renderKanbanView();
        }
        return;
      }
      // Card drop
      var k = e.dataTransfer.getData("text/plain");
      var ticket = TS.tickets.find(function(x){return x.key===k});
      if (!ticket) return;
      if (ticket.status === st.id){renderKanbanView();return}
      // Try workflow engine first
      if (typeof getAvailableTransitions==="function" && TS.workflows && TS.workflows.length){
        var trans = getAvailableTransitions(ticket).filter(function(tr){return tr.to===st.id});
        if (trans.length){
          var tr = trans[0];
          var needsDialog = (tr.validators||[]).length || (tr.conditions||[]).length;
          if (needsDialog){
            for (var i=0;i<(tr.conditions||[]).length;i++){
              var cond=tr.conditions[i];var fn=WF_CONDITIONS[cond.type||cond];
              if (fn){var cr=fn.check(ticket,tr,{});if(!cr.ok){toast("条件NG: "+cr.msg,1);renderKanbanView();return}}
            }
            if ((tr.validators||[]).length){
              showTransitionDlg(ticket, tr);
              return;
            }
          }
          var r = executeTransition(k, tr.id, {});
          if (!r.ok){toast(r.msg||"遷移失敗",1)}
          else {toast("'"+tr.name+"' 実行")}
          renderKanbanView();
          return;
        } else {
          toast("ワークフロー上 "+ticket.status+"→"+st.id+" の遷移は定義されていません",1);
          renderKanbanView();
          return;
        }
      }
      updateTicket(k, {status: st.id});renderKanbanView();
    };
    // Column drag start (for reorder)
    col.ondragstart = function(e){
      // Only start col drag from grip area
      if (e.target.classList && e.target.classList.contains("kb-col-h-grip")){
        e.dataTransfer.setData("application/x-col", st.id);
        e.dataTransfer.effectAllowed = "move";
        col.style.opacity = "0.5";
      } else {
        e.preventDefault();
      }
    };
    col.ondragend = function(){col.style.opacity = "1"};
    kc.appendChild(col);
  });

  // "+ Add Column" button
  var addCol = document.createElement("div");
  addCol.className = "kb-add-col";
  addCol.innerHTML = '<div style="text-align:center"><div style="font-size:24px;line-height:1">+</div><div>列を追加</div>'+(hiddenCount>0?'<div style="font-size:10px;margin-top:4px">非表示: '+hiddenCount+'件</div>':'')+'</div>';
  addCol.onclick = function(){kbAddColDlg()};
  kc.appendChild(addCol);

  document.getElementById("kbSearch").oninput = function(){TS.filter=this.value;clearTimeout(window._kbSt);window._kbSt=setTimeout(renderKanbanView,300)};
  document.getElementById("kbAdd").onclick = function(){newTicketDlg()};
  document.getElementById("kbColMgr").onclick = function(){kbColMgrDlg()};
  v.querySelectorAll("[data-newst]").forEach(function(b){b.onclick = function(e){e.stopPropagation();newTicketDlg(b.dataset.newst)}});
  v.querySelectorAll("[data-edcol]").forEach(function(b){b.onclick = function(e){e.stopPropagation();kbEditColDlg(b.dataset.edcol)}});
  v.querySelectorAll("[data-rmcol]").forEach(function(b){b.onclick = function(e){

    var sid = b.dataset.rmcol;
    var st = TS.statuses.find(function(s){return s.id===sid});
    if (!st) return;
    if (!confirm("列「"+st.name+"」を非表示にしますか？\n\n（チケットは削除されません。「列管理」から再表示できます）")) return;
    if (typeof urCapture === "function") urCapture("列非表示", true);
    TS.boardConfig.columns = TS.boardConfig.columns.filter(function(x){return x !== sid});
    saveTS();
    renderKanbanView();
  }});
}

/* ===== Board column management ===== */
function ensureBoardConfig(){
  if (!TS.boardConfig) TS.boardConfig = {};
  if (!TS.boardConfig.columns){
    // Default: show all statuses in TS.statuses order
    TS.boardConfig.columns = TS.statuses.map(function(s){return s.id});
  }
  if (!TS.boardConfig.wipLimits) TS.boardConfig.wipLimits = {};
  // Cleanup: remove ids that don't exist anymore
  TS.boardConfig.columns = TS.boardConfig.columns.filter(function(id){
    return TS.statuses.find(function(s){return s.id===id});
  });
}

/* ===== Backlog View ===== */
function renderBacklogView(){
  var v = document.getElementById("backlogView");
  var notDone = TS.tickets.filter(function(t){return t.status!=="done"&&!t.sprintId});
  var inSprints = {};
  TS.sprints.forEach(function(sp){inSprints[sp.id] = TS.tickets.filter(function(t){return t.sprintId===sp.id})});
  var html = '<div class="page-header"><div class="page-bc"><a>プロジェクト</a> / <a>サンプル</a></div><div class="page-title">📚 Backlog</div></div><div class="page-toolbar"><button class="btn bp" id="blAddSp">+ Sprint</button><button class="btn secondary" id="blAddTk">+ Issue</button></div><div class="page-body" style="overflow:auto">';
  TS.sprints.forEach(function(sp){
    var items = inSprints[sp.id] || [];
    var totalSp = items.reduce(function(a,t){return a+(t.storyPoint||0)},0);
    html += '<div class="bl-section"><div class="bl-h"><span>🏃 '+escHtml(sp.name)+' <span style="color:var(--t3);font-size:10px">'+(sp.startDate||"")+' ~ '+(sp.endDate||"")+'</span> <span style="color:var(--ac);font-size:10px">'+items.length+'件 / SP:'+totalSp+'</span></span><span><button class="btn" data-spaction="start" data-id="'+sp.id+'">'+(sp.active?"終了":"開始")+'</button> <button class="btn" data-spaction="del" data-id="'+sp.id+'" style="color:var(--dn)">削除</button></span></div><div class="bl-list" data-sprint="'+sp.id+'">';
    items.forEach(function(t){html += blRowHtml(t)});
    if (!items.length) html += '<div style="padding:14px;text-align:center;color:var(--t3);font-size:11px">空 — チケットをドラッグで追加</div>';
    html += '</div></div>';
  });
  html += '<div class="bl-section"><div class="bl-h">📚 Backlog ('+notDone.length+'件)</div><div class="bl-list" data-sprint="">';
  notDone.forEach(function(t){html += blRowHtml(t)});
  if (!notDone.length) html += '<div style="padding:14px;text-align:center;color:var(--t3);font-size:11px">バックログは空です</div>';
  html += '</div></div></div>';
  v.innerHTML = html;
  document.getElementById("blAddSp").onclick = function(){
    var n = prompt("スプリント名");if(!n)return;
    var sd = prompt("開始日 (YYYY-MM-DD)", new Date().toISOString().substr(0,10));
    var ed = prompt("終了日 (YYYY-MM-DD)");
    TS.sprints.push({id:"sp"+Date.now(),name:n,startDate:sd,endDate:ed,active:false});
    audit("create","sprint",n,"");saveTS();renderBacklogView();
  };
  document.getElementById("blAddTk").onclick = newTicketDlg;
  v.querySelectorAll("[data-spaction]").forEach(function(b){
    b.onclick = function(){
      var sp = TS.sprints.find(function(x){return x.id===b.dataset.id});
      if (b.dataset.spaction==="start"){sp.active=!sp.active;audit("update","sprint",sp.id,sp.active?"start":"end")}
      else if (b.dataset.spaction==="del"){
        TS.tickets.forEach(function(t){if(t.sprintId===sp.id)t.sprintId=null});
        TS.sprints = TS.sprints.filter(function(x){return x.id!==sp.id});
        audit("delete","sprint",sp.id,"");
      }
      saveTS();renderBacklogView();
    };
  });
  v.querySelectorAll(".bl-row").forEach(function(r){
    r.draggable = true;
    r.ondragstart = function(e){e.dataTransfer.setData("text/plain",r.dataset.key);r.classList.add("dragging")};
    r.ondragend = function(){r.classList.remove("dragging")};
    r.onclick = function(){TS.selectedTicket=r.dataset.key;switchView("ticket")};
  });
  v.querySelectorAll(".bl-list").forEach(function(l){
    l.ondragover = function(e){e.preventDefault()};
    l.ondrop = function(e){
      e.preventDefault();
      var k = e.dataTransfer.getData("text/plain");
      var spId = l.dataset.sprint || null;
      updateTicket(k, {sprintId: spId});renderBacklogView();
    };
  });
}
function blRowHtml(t){
  var st = TS.statuses.find(function(s){return s.id===t.status});
  var subCls = t.parentKey ? " subtask" : "";
  var typeIcon = '<span class="ti '+(t.parentKey?"subtask":t.type)+'">'+(t.parentKey?"S":t.type[0].toUpperCase())+'</span>';
  var subCnt = TS.tickets.filter(function(x){return x.parentKey===t.key}).length;
  var subBadge = subCnt > 0 ? ' <span class="sub-cnt">📎'+subCnt+'</span>' : '';
  var ganttBadge = t.ganttTaskId ? ' <span class="gantt-link">📊</span>' : '';
  var stCls = t.status==="done"?"done":t.status==="inprogress"?"inprogress":t.status==="review"?"review":"todo";
  return '<div class="bl-row'+subCls+'" data-key="'+t.key+'"><div class="grip">⠿</div><div class="tk-key">'+t.key+'</div><div>'+typeIcon+'</div><div class="tk-title">'+escHtml(t.title)+subBadge+ganttBadge+'</div><div><span class="lozenge '+stCls+'">'+(st?st.name:t.status)+'</span></div><div><span class="ti-pri '+t.priority+'">'+priIcon(t.priority)+'</span> <span style="font-size:11px;color:var(--t2)">'+t.priority.substring(0,3)+'</span></div><div style="text-align:center;font-weight:600;color:var(--ac)">'+(t.storyPoint||"-")+'</div><div style="font-size:12px;color:var(--t2)">'+escHtml(t.assignee||"-")+'</div></div>';
}

function updateUserInfo(){
  var avatar = document.getElementById("sbAvatar");
  var nameEl = document.getElementById("sbUserName");
  var roleEl = document.getElementById("sbUserRole");
  if (TS.currentUser){
    var rl = TS.roles.find(function(r){return r.id===TS.currentUser.roleId});
