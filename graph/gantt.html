function getTicketWorkflow(ticket){
  var schemeId = ticket.workflowSchemeId || (TS.workflowSchemes[0] && TS.workflowSchemes[0].id);
  var scheme = TS.workflowSchemes.find(function(s){return s.id===schemeId});
  if (!scheme) return TS.workflows[0] || null;
  var mapping = (scheme.mappings||[]).find(function(m){return m.issueType===ticket.type});
  var wfId = mapping ? mapping.workflowId : scheme.defaultWorkflowId;
  return TS.workflows.find(function(w){return w.id===wfId}) || TS.workflows[0] || null;
}
function getAvailableTransitions(ticket){
  var wf = getTicketWorkflow(ticket);
  if (!wf) return [];
  return wf.transitions.filter(function(tr){
    if (!tr.from || !tr.from.length) return true;
    return tr.from.indexOf(ticket.status) >= 0 || tr.from.indexOf("*") >= 0;
  });
}
function executeTransition(ticketKey, transitionId, ctx){
  ctx = ctx || {};
  var t = TS.tickets.find(function(x){return x.key===ticketKey});
  if (!t) return {ok:false,msg:"チケットが見つかりません"};
  var wf = getTicketWorkflow(t);
  if (!wf) return {ok:false,msg:"ワークフローが定義されていません"};
  var tr = wf.transitions.find(function(x){return x.id===transitionId});
  if (!tr) return {ok:false,msg:"遷移が見つかりません"};
  var fromOk = !tr.from || !tr.from.length || tr.from.indexOf(t.status)>=0 || tr.from.indexOf("*")>=0;
  if (!fromOk) return {ok:false,msg:t.status+" からは実行できません"};
  for (var i=0;i<(tr.conditions||[]).length;i++){var cond=tr.conditions[i];var fn=WF_CONDITIONS[cond.type||cond];if(!fn)continue;var r=fn.check(t,tr,ctx);if(!r.ok)return{ok:false,msg:"条件NG: "+r.msg,phase:"condition"}}
  for (var j=0;j<(tr.validators||[]).length;j++){var v=tr.validators[j];var vf=WF_VALIDATORS[v.type||v];if(!vf)continue;var vr=vf.check(t,tr,ctx);if(!vr.ok)return{ok:false,msg:"検証NG: "+vr.msg,phase:"validator"}}
  var oldStatus = t.status;
  t.status = tr.to;
  t.updatedAt = new Date().toISOString();
  for (var k=0;k<(tr.postFunctions||[]).length;k++){var pf=tr.postFunctions[k];var pfn=WF_POSTFUNCTIONS[pf.type||pf];if(!pfn)continue;try{pfn.run(t,tr,ctx,pf.value)}catch(e){console.warn("PF error",e)}}
  if (ctx.assignee) t.assignee = ctx.assignee;
  if (ctx.comment) addComment(t.key, ctx.comment);
  if (ctx.dueDate) t.dueDate = ctx.dueDate;
  appendTicketHistory(t.key,{ts:new Date().toISOString(),user:TS.currentUser?TS.currentUser.id:"system",type:"transition",transition:tr.name,from:oldStatus,to:tr.to,comment:ctx.comment||""});
  audit("transition","ticket",t.key,tr.name+" ("+oldStatus+"→"+tr.to+")");
  if (typeof syncTicketToGantt==="function") syncTicketToGantt(t.key);
  saveTS();
  return {ok:true,oldStatus:oldStatus,newStatus:tr.to};
}
function appendTicketHistory(key, entry){
  if (!TS.ticketHistory[key]) TS.ticketHistory[key] = [];
  TS.ticketHistory[key].push(entry);
  if (TS.ticketHistory[key].length>200) TS.ticketHistory[key] = TS.ticketHistory[key].slice(-200);
}
function createWorkflow(name){
  var id="wf-"+Date.now();
  TS.workflows.push({id:id,name:name||"New Workflow",description:"",initialStatus:TS.statuses[0]?TS.statuses[0].id:"todo",statuses:TS.statuses.map(function(s){return s.id}),transitions:[]});
  audit("create","workflow",id,name);saveTS();return id;
}
function deleteWorkflow(id){
  var inUse = TS.workflowSchemes.some(function(s){return s.defaultWorkflowId===id||(s.mappings||[]).some(function(m){return m.workflowId===id})});
  if (inUse){toast("使用中のワークフローは削除できません",1);return false}
  TS.workflows = TS.workflows.filter(function(w){return w.id!==id});
  delete TS.workflowDrafts[id];
  audit("delete","workflow",id,"");saveTS();return true;
}
function saveDraft(workflowId, draft){TS.workflowDrafts[workflowId]=draft;audit("update","workflow_draft",workflowId,"");saveTS()}
function discardDraft(workflowId){delete TS.workflowDrafts[workflowId];saveTS()}
function publishDraft(workflowId){
  var draft = TS.workflowDrafts[workflowId];
  if (!draft) return {ok:false,msg:"草案がありません"};
  var v = validateWorkflow(draft);
  if (!v.ok) return v;
  var oldWf = TS.workflows.find(function(w){return w.id===workflowId});
  var oldStatuses = oldWf ? oldWf.statuses : [];
  var newStatuses = draft.statuses;
  var removed = oldStatuses.filter(function(s){return newStatuses.indexOf(s)<0});
  var migrationNeeded = [];
  if (removed.length){
    TS.tickets.forEach(function(t){
      var wf = getTicketWorkflow(t);
      if (wf && wf.id===workflowId && removed.indexOf(t.status)>=0) migrationNeeded.push({key:t.key,oldStatus:t.status});
    });
  }
  if (migrationNeeded.length) return {ok:false,requiresMigration:true,migrationNeeded:migrationNeeded,removed:removed,draft:draft};
  var idx = TS.workflows.findIndex(function(w){return w.id===workflowId});
  if (idx>=0) TS.workflows[idx]=draft;else TS.workflows.push(draft);
  delete TS.workflowDrafts[workflowId];
  audit("publish","workflow",workflowId, oldWf?"replaced":"created");
  saveTS();return {ok:true};
}
function publishWithMigration(workflowId, migrationMap){
  var draft = TS.workflowDrafts[workflowId];
  if (!draft) return {ok:false,msg:"草案がありません"};
  TS.tickets.forEach(function(t){
    var wf = getTicketWorkflow(t);
    if (wf && wf.id===workflowId && migrationMap[t.status]){
      var oldS = t.status;
      t.status = migrationMap[t.status];
      appendTicketHistory(t.key,{ts:new Date().toISOString(),user:TS.currentUser?TS.currentUser.id:"system",type:"migration",from:oldS,to:t.status,comment:"Workflow migration"});
      audit("migrate","ticket",t.key,oldS+"→"+t.status);
    }
  });
  var idx = TS.workflows.findIndex(function(w){return w.id===workflowId});
  if (idx>=0) TS.workflows[idx]=draft;else TS.workflows.push(draft);
  delete TS.workflowDrafts[workflowId];
  audit("publish","workflow",workflowId,"with migration");saveTS();return {ok:true};
}
function validateWorkflow(wf){
  if (!wf.name) return {ok:false,msg:"ワークフロー名が必要です"};
  if (!wf.statuses||!wf.statuses.length) return {ok:false,msg:"少なくとも1つのStatusが必要です"};
  if (!wf.initialStatus||wf.statuses.indexOf(wf.initialStatus)<0) return {ok:false,msg:"初期Statusが無効です"};
  for (var i=0;i<(wf.transitions||[]).length;i++){
    var tr = wf.transitions[i];
    if (!tr.name) return {ok:false,msg:"遷移名が必要です (#"+(i+1)+")"};
    if (!tr.to||wf.statuses.indexOf(tr.to)<0) return {ok:false,msg:"遷移先 '"+tr.to+"' が無効です ("+tr.name+")"};
    for (var j=0;j<(tr.from||[]).length;j++){if(tr.from[j]!=="*"&&wf.statuses.indexOf(tr.from[j])<0)return{ok:false,msg:"遷移元 '"+tr.from[j]+"' が無効 ("+tr.name+")"}}
  }
  return {ok:true};
}
function exportWorkflowYaml(wf){
  function ys(s){s=String(s||"");if(/[:\#\[\]\{\},&\*\!\|\>\'\"\%\@\`]/.test(s)||s===""||s==="true"||s==="false"||s==="null"||/^\d/.test(s))return JSON.stringify(s);return s}
  var lines = [];
  lines.push("name: "+ys(wf.name));
  if (wf.description) lines.push("description: "+ys(wf.description));
  lines.push("initialStatus: "+ys(wf.initialStatus));
  lines.push("statuses:");
  wf.statuses.forEach(function(s){var st=TS.statuses.find(function(x){return x.id===s});lines.push("  - "+ys(st?st.name:s)+" # id: "+s)});
  lines.push("transitions:");
  (wf.transitions||[]).forEach(function(tr){
    lines.push("  - name: "+ys(tr.name));
    lines.push("    from: ["+(tr.from||[]).map(function(f){return ys(f)}).join(", ")+"]");
    lines.push("    to: "+ys(tr.to));
    if ((tr.conditions||[]).length){lines.push("    conditions:");tr.conditions.forEach(function(c){lines.push("      - "+ys(c.type||c))})}
    if ((tr.validators||[]).length){lines.push("    validators:");tr.validators.forEach(function(v){lines.push("      - "+ys(v.type||v))})}
    if ((tr.postFunctions||[]).length){lines.push("    postFunctions:");tr.postFunctions.forEach(function(p){if(p.value)lines.push("      - {type: "+ys(p.type)+", value: "+ys(p.value)+"}");else lines.push("      - "+ys(p.type||p))})}
  });
  return lines.join("\n")+"\n";
}
function downloadFile(name, content, mime){
  var b = new Blob([content], {type:mime||"text/plain"});
  var a = document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);
}

function wfMigrationWizard(wfId, needed, removed){

  var html='<h3>🔄 Status Migration Wizard</h3><p style="font-size:13px;color:var(--t2);margin-bottom:14px">削除されるStatusに該当するチケットの移行先を指定してください。</p>';
  removed.forEach(function(oldS){
    var st=TS.statuses.find(function(x){return x.id===oldS});var keys=byOld[oldS]||[];
    html+='<div class="mw-row"><div class="mw-old">'+escHtml(st?st.name:oldS)+' <span style="font-size:10px;opacity:.7">('+keys.length+'件)</span></div><div class="mw-arrow">→</div><select class="mw-new" data-old="'+oldS+'">'+newOpts+'</select></div>';
    html+='<div style="font-size:10px;color:var(--t3);margin:-4px 0 8px;padding-left:8px">対象: '+keys.slice(0,10).join(", ")+(keys.length>10?(" ...他"+(keys.length-10)+"件"):"")+'</div>';
  });
  html+='<div class="ma"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn bp" id="mwOk">移行して公開</button></div>';

    var map={};document.querySelectorAll(".mw-new").forEach(function(s){map[s.dataset.old]=s.value});

  };
}

/* ============================================================
   WORKFLOW VISUALIZER
   - SVG node graph: Status nodes + Transition edges
   - Auto-layout (level-based)
   - Drag nodes to reposition
   - Hover edge for details
   - Pan & zoom
   ============================================================ */

var WFV = {
  positions: {},      // workflowId -> {statusId: {x,y}}
  zoom: 1,
  panX: 0, panY: 0,
  draggingNode: null,
  panning: false,
  drawingEdge: null,
  isDraft: false
};

function loadVizState(){
  try {
    var s = localStorage.getItem("wfvState");
    if (s){ var j = JSON.parse(s); WFV.positions = j.positions||{} }
  } catch(e){}
}
function saveVizState(){
  try { localStorage.setItem("wfvState", JSON.stringify({positions:WFV.positions})); } catch(e){}
}
loadVizState();

/* ===== Auto-layout: rank nodes by reachability from initialStatus ===== */
function autoLayoutWorkflow(wf){
  var levels = {};
  var visited = {};
  function bfs(){
    var queue = [{id:wf.initialStatus, level:0}];
    visited[wf.initialStatus] = true;
    levels[wf.initialStatus] = 0;
    while (queue.length){
      var cur = queue.shift();
      (wf.transitions||[]).forEach(function(tr){
        if ((tr.from||[]).indexOf(cur.id) >= 0 && !visited[tr.to]){
          visited[tr.to] = true;
          levels[tr.to] = cur.level + 1;
          queue.push({id:tr.to, level:cur.level+1});
        }
      });
    }
    // Unvisited -> place at end
    wf.statuses.forEach(function(s){
      if (!visited[s]) levels[s] = Math.max.apply(null, Object.values(levels).concat([0])) + 1;
    });
  }
  bfs();
  // Group by level, distribute vertically
  var byLevel = {};
  wf.statuses.forEach(function(s){
    var l = levels[s] || 0;
    if (!byLevel[l]) byLevel[l] = [];
    byLevel[l].push(s);
  });
  var positions = {};
  var levelKeys = Object.keys(byLevel).map(Number).sort(function(a,b){return a-b});
  var COL_W = 200, ROW_H = 100, MARGIN = 60;
  levelKeys.forEach(function(lv, ci){
    byLevel[lv].forEach(function(s, ri){
      positions[s] = {x: MARGIN + ci * COL_W, y: MARGIN + ri * ROW_H};
    });
  });
  return positions;
}

function getNodePos(wfId, statusId, wf){
  if (!WFV.positions[wfId]) WFV.positions[wfId] = autoLayoutWorkflow(wf);
  if (!WFV.positions[wfId][statusId]){
    var auto = autoLayoutWorkflow(wf);
    WFV.positions[wfId][statusId] = auto[statusId] || {x:60, y:60};
  }
  return WFV.positions[wfId][statusId];
}

/* ===== Render workflow as SVG graph ===== */
function renderWorkflowVisualizer(container, wf, opts){
  opts = opts || {};
  var wfId = opts.wfId || wf.id;
  var isDraft = !!opts.isDraft;
  var draft = opts.draft;
  WFV.isDraft = isDraft;
  WFV.currentWfId = wfId;
  if (!wf || !wf.statuses){
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔀</div><div class="empty-state-title">ステータスなし</div></div>';
    return;
  }

  // Toolbar - show different buttons based on draft state
  var toolbar = document.createElement("div");
  toolbar.className = "wfv-toolbar";
  var tbHtml = '<button class="btn secondary" id="wfvAuto">⚡ Auto Layout</button>'+
    '<button class="btn secondary" id="wfvZoomIn">＋</button>'+
    '<button class="btn secondary" id="wfvZoomOut">－</button>'+
    '<button class="btn secondary" id="wfvReset">⊕ Reset</button>';
  if (isDraft){
    tbHtml += '<button class="btn bp" id="wfvAddStatus" style="margin-left:8px">+ Status追加</button>';
    tbHtml += '<div style="font-size:11px;color:var(--ac);margin-left:auto;font-weight:600;line-height:1.4;text-align:right">';
    tbHtml += '✎ <b>DRAFT 編集中</b><br>';
    tbHtml += '<span style="font-weight:400">青ポート(→)からドラッグ=遷移作成 / 線クリック=メニュー / ノード右クリック=削除メニュー</span>';
    tbHtml += '</div>';
  } else {
    tbHtml += '<span style="font-size:12px;color:var(--t2);margin-left:auto">📖 閲覧モード — <b>Edit</b>ボタンを押すと編集できます</span>';
  }
  toolbar.innerHTML = tbHtml;
  container.innerHTML = "";
  container.appendChild(toolbar);

  var stage = document.createElement("div");
  stage.className = "wfv-stage";
  stage.style.cssText = "flex:1;overflow:auto;position:relative;background:var(--b2);background-image:radial-gradient(circle, var(--bd) 1px, transparent 1px);background-size:20px 20px;background-position:0 0;cursor:"+(isDraft?"crosshair":"grab");
  container.appendChild(stage);

  // Compute SVG size needed
  if (!wf.statuses.length){
    stage.innerHTML = '<div class="empty-state" style="padding:60px"><div class="empty-state-icon">🔀</div><div class="empty-state-title">ステータスがありません</div><div class="empty-state-text">ツールバーの「+ Status」ボタンから追加してください</div></div>';
    bindWfvToolbar(toolbar, container, wf, opts);
    return;
  }

  var positions = {};
  wf.statuses.forEach(function(s){positions[s] = getNodePos(wf.id, s, wf)});
  var maxX = 0, maxY = 0;
  Object.keys(positions).forEach(function(k){
    if (positions[k].x > maxX) maxX = positions[k].x;
    if (positions[k].y > maxY) maxY = positions[k].y;
  });
  var svgW = Math.max(1200, maxX + 300);
  var svgH = Math.max(600, maxY + 200);

  var svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width", svgW);
  svg.setAttribute("height", svgH);
  svg.style.cssText = "position:absolute;top:0;left:0;transform-origin:0 0;transform:translate("+WFV.panX+"px,"+WFV.panY+"px) scale("+WFV.zoom+")";
  svg.id = "wfvSvg";

  // Defs: arrow markers, drop shadows
  svg.innerHTML = '<defs>'+
    '<marker id="wfvArrow" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto">'+
      '<path d="M0,0 L12,5 L0,10 L3,5 Z" fill="#5e6c84"/></marker>'+
    '<marker id="wfvArrowHover" markerWidth="14" markerHeight="12" refX="13" refY="6" orient="auto">'+
      '<path d="M0,0 L14,6 L0,12 L4,6 Z" fill="#0c66e4"/></marker>'+
    '<filter id="wfvShadow" x="-20%" y="-20%" width="140%" height="140%">'+
      '<feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>'+
    '</defs>';

  // Group transitions by (from,to) to compute curve offsets for parallel edges
  var edgeMap = {};
  (wf.transitions||[]).forEach(function(tr){
    (tr.from||["*"]).forEach(function(from){
      var k = from + "→" + tr.to;
      if (!edgeMap[k]) edgeMap[k] = [];
      edgeMap[k].push(tr);
    });
  });

  // Render edges first (so nodes overlay)
  var edgesGroup = document.createElementNS("http://www.w3.org/2000/svg","g");
  edgesGroup.setAttribute("class","wfv-edges");
  Object.keys(edgeMap).forEach(function(k){
    var parts = k.split("→");
    var from = parts[0], to = parts[1];
    var transList = edgeMap[k];
    transList.forEach(function(tr, i){
      drawEdge(edgesGroup, wf, from, to, tr, i, transList.length, positions);
    });
  });
  // Self-loops & global transitions
  (wf.transitions||[]).forEach(function(tr){
    if (!tr.from || !tr.from.length || tr.from.indexOf("*")>=0){
      // Global - draw a small "any" badge near the to-node
      drawGlobalEdge(edgesGroup, wf, tr, positions);
    }
  });
  svg.appendChild(edgesGroup);

  // Drawing edge preview layer
  var drawingG = document.createElementNS("http://www.w3.org/2000/svg","g");
  drawingG.setAttribute("id","wfvDrawing");
  svg.appendChild(drawingG);

  // Render nodes
  var nodesGroup = document.createElementNS("http://www.w3.org/2000/svg","g");
  nodesGroup.setAttribute("class","wfv-nodes");
  wf.statuses.forEach(function(sid){
    drawNode(nodesGroup, wf, sid, positions[sid]);
  });
  svg.appendChild(nodesGroup);

  stage.appendChild(svg);

  // Tooltip layer
  var tooltip = document.createElement("div");
  tooltip.className = "wfv-tooltip";
  tooltip.style.cssText = "position:absolute;background:#1d2125;color:#fff;padding:8px 12px;border-radius:4px;font-size:12px;pointer-events:none;z-index:100;display:none;box-shadow:0 4px 12px rgba(0,0,0,.3);max-width:280px";
  stage.appendChild(tooltip);

  // === Bindings ===
  bindWfvToolbar(toolbar, container, wf, opts);

  // Wheel zoom
  stage.addEventListener("wheel", function(e){
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : 0.9;
    WFV.zoom = Math.max(0.3, Math.min(3, WFV.zoom * factor));
    applyTransform(svg);
  }, {passive:false});

  // Pan
  stage.addEventListener("mousedown", function(e){
    if (e.target === stage || e.target === svg){
      WFV.panning = true;
      WFV._panStart = {x:e.clientX, y:e.clientY, panX:WFV.panX, panY:WFV.panY};
      stage.style.cursor = "grabbing";
    }
  });

  // Remove previous document-level listeners before adding new ones
  if (WFV._docMove) document.removeEventListener("mousemove", WFV._docMove);
  if (WFV._docUp) document.removeEventListener("mouseup", WFV._docUp);

  WFV._docMove = function(e){
    if (WFV.panning){
      WFV.panX = WFV._panStart.panX + (e.clientX - WFV._panStart.x);
      WFV.panY = WFV._panStart.panY + (e.clientY - WFV._panStart.y);
      var s = document.getElementById("wfvSvg");
      if (s) s.style.transform = "translate("+WFV.panX+"px,"+WFV.panY+"px) scale("+WFV.zoom+")";
    }
    if (WFV.draggingNode){
      e.preventDefault();
      var st = document.querySelector(".wfv-stage");
      if (!st) return;
      var rect = st.getBoundingClientRect();
      var sx = (e.clientX - rect.left + st.scrollLeft - WFV.panX) / WFV.zoom;
      var sy = (e.clientY - rect.top + st.scrollTop - WFV.panY) / WFV.zoom;
      var pos = WFV.positions[WFV.currentWfId] && WFV.positions[WFV.currentWfId][WFV.draggingNode];
      if (!pos) return;
      pos.x = Math.max(0, sx - WFV._dragOffset.x);
      pos.y = Math.max(0, sy - WFV._dragOffset.y);
      WFV._wasDragged = true;

      // Update node transform IMMEDIATELY so the box follows the cursor
      var nodeEl = document.querySelector('[data-status="'+WFV.draggingNode+'"]');
      if (nodeEl){
        nodeEl.setAttribute("transform","translate("+pos.x+","+pos.y+")");
      }

      // Grow SVG if dragging near edge
      var svg2 = document.getElementById("wfvSvg");
      if (svg2){
        var curW = parseInt(svg2.getAttribute("width"));
        var curH = parseInt(svg2.getAttribute("height"));
        if (pos.x + 250 > curW) svg2.setAttribute("width", pos.x + 400);
        if (pos.y + 150 > curH) svg2.setAttribute("height", pos.y + 250);
      }

      // Update edges (lightweight: only update path d= for connected edges)
      wfvUpdateConnectedEdgesLight(WFV.draggingNode);
    }
    if (WFV.drawingEdge){
      var dgEl = document.getElementById("wfvDrawing");
      if (!dgEl) return;
      var st = document.querySelector(".wfv-stage");
      if (!st) return;
      var rect = st.getBoundingClientRect();
      var fromPos = WFV.positions[WFV.currentWfId][WFV.drawingEdge.from];
      if (!fromPos) return;
      var x1 = fromPos.x + 140, y1 = fromPos.y + 28;
      var x2 = (e.clientX - rect.left + st.scrollLeft - WFV.panX) / WFV.zoom;
      var y2 = (e.clientY - rect.top + st.scrollTop - WFV.panY) / WFV.zoom;
      var midX = (x1+x2)/2;
      var d = "M "+x1+","+y1+" C "+midX+","+y1+" "+midX+","+y2+" "+x2+","+y2;
      dgEl.innerHTML = '<path d="'+d+'" stroke="#0c66e4" stroke-width="2.5" fill="none" stroke-dasharray="4,3" marker-end="url(#wfvArrowHover)"/>';
    }
  };
  WFV._docUp = function(e){
    if (WFV.panning){
      WFV.panning = false;
      var st = document.querySelector(".wfv-stage");
      if (st) st.style.cursor = WFV.isDraft ? "crosshair" : "grab";
    }
    if (WFV.draggingNode){
      WFV.draggingNode = null; saveVizState();
      // Now that node moved, redraw edges
      if (typeof renderWorkflowCanvas === "function") renderWorkflowCanvas();
      setTimeout(function(){WFV._wasDragged = false}, 100);
    }
    if (WFV.drawingEdge && WFV.isDraft){
      // Find target status under cursor
      var st = document.querySelector(".wfv-stage");
      if (!st){WFV.drawingEdge = null; return}
      var rect = st.getBoundingClientRect();
      var mx = (e.clientX - rect.left + st.scrollLeft - WFV.panX) / WFV.zoom;
      var my = (e.clientY - rect.top + st.scrollTop - WFV.panY) / WFV.zoom;
      var draftLocal = TS.workflowDrafts && TS.workflowDrafts[WFV.currentWfId];
      var targetStatus = null;
      if (draftLocal){
        draftLocal.statuses.forEach(function(sid){
          var p = WFV.positions[WFV.currentWfId][sid];
          if (p && mx >= p.x && mx <= p.x+140 && my >= p.y && my <= p.y+56 && sid !== WFV.drawingEdge.from){
            targetStatus = sid;
          }
        });
      }
      if (targetStatus && draftLocal){
        // Check duplicate
        var dup = (draftLocal.transitions||[]).find(function(tr){
          return tr.to === targetStatus && tr.from && tr.from.indexOf(WFV.drawingEdge.from) >= 0;
        });
        if (dup){
          if (typeof toast === "function") toast("既に同じ遷移が存在します", 1);
        } else {
          var fromName = (TS.statuses.find(function(s){return s.id===WFV.drawingEdge.from})||{name:WFV.drawingEdge.from}).name;
          var toName = (TS.statuses.find(function(s){return s.id===targetStatus})||{name:targetStatus}).name;
          var fromId = WFV.drawingEdge.from;
          var toId = targetStatus;
          var wfIdLocal = WFV.currentWfId;
          setTimeout(function(){
            var html = '<h3>+ 遷移作成</h3>';
            html += '<div style="font-size:12px;color:var(--t2);margin-bottom:14px"><b>'+escHtml(fromName)+'</b> → <b>'+escHtml(toName)+'</b></div>';
            html += '<label>遷移名 *</label><input id="newTrName" placeholder="例: '+escHtml(toName)+'に進める" value="'+escHtml(toName+"に進める")+'">';
            html += '<div class="ma"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn bp" id="newTrOk">+ 作成</button></div>';
            showModal(html);
            var inp = document.getElementById("newTrName");
            if (inp){
              setTimeout(function(){inp.focus(); inp.select()}, 50);
              inp.onkeydown = function(ev){if(ev.key==="Enter"){document.getElementById("newTrOk").click()}};
            }
            document.getElementById("newTrOk").onclick = function(){
              var trName = document.getElementById("newTrName").value.trim();
              if (!trName){toast("遷移名必須",1);return}
              if (typeof urCapture === "function") urCapture("遷移作成", true);
              draftLocal.transitions = draftLocal.transitions || [];
              draftLocal.transitions.push({
                id: "tr-"+Date.now(),
                name: trName,
                from: [fromId],
                to: toId,
                conditions: [], validators: [], postFunctions: []
              });
              saveDraft(wfIdLocal, draftLocal);
              closeModal();
              if (typeof toast === "function") toast("✓ 遷移作成: "+trName);
              if (typeof renderWorkflowCanvas === "function") renderWorkflowCanvas();
            };
          }, 50);
        }
      }
      var dgEl = document.getElementById("wfvDrawing");
      if (dgEl) dgEl.innerHTML = "";
      WFV.drawingEdge = null;
    }
  };
  document.addEventListener("mousemove", WFV._docMove);
  document.addEventListener("mouseup", WFV._docUp);

  // Edge hover/click handlers via event delegation
  // (Important: edges layer can be rebuilt during drag; delegation makes handlers persistent)
  function findEdgeTarget(e){
    var t = e.target;
    while (t && t !== edgesGroup){
      if (t.dataset && t.dataset.trId) return t;
      t = t.parentNode;
    }
    return null;
  }
  edgesGroup.addEventListener("mouseover", function(e){
    var el = findEdgeTarget(e);
    if (!el) return;
    if (!el.dataset.tip) return;
    tooltip.innerHTML = el.dataset.tip + (isDraft ? '<div style="margin-top:6px;padding-top:6px;border-top:1px solid #444;color:#79e2f2;font-size:10px">クリックでメニュー表示</div>' : '');
    tooltip.style.display = "block";
  });
  edgesGroup.addEventListener("mousemove", function(e){
    var el = findEdgeTarget(e);
    if (!el) return;
    var rect = stage.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 12) + "px";
    tooltip.style.top = (e.clientY - rect.top + 12) + "px";
  });
  edgesGroup.addEventListener("mouseout", function(e){
    // Hide tooltip when leaving edges area
    var to = e.relatedTarget;
    if (!to || !edgesGroup.contains(to)) tooltip.style.display = "none";
  });
  if (isDraft){
    edgesGroup.addEventListener("click", function(e){
      var el = findEdgeTarget(e);
      if (!el) return;
      e.stopPropagation();
      var trId = el.dataset.trId;
      if (!trId) return;
      // Re-fetch latest draft each time (in case it was rebuilt)
      var currentDraft = TS.workflowDrafts[wfId];
      wfvShowEdgeMenu(trId, wfId, currentDraft, e.clientX, e.clientY);
    });
    edgesGroup.addEventListener("dblclick", function(e){
      var el = findEdgeTarget(e);
      if (!el) return;
      e.stopPropagation();
      var trId = el.dataset.trId;
      if (trId && typeof wfTransitionDlg === "function") wfTransitionDlg(wfId, trId);
    });
    edgesGroup.addEventListener("contextmenu", function(e){
      var el = findEdgeTarget(e);
      if (!el) return;
      e.preventDefault();
      e.stopPropagation();
      var trId = el.dataset.trId;
      if (!trId) return;
      var currentDraft = TS.workflowDrafts[wfId];
      if (!currentDraft) return;
      var tr = (currentDraft.transitions||[]).find(function(t){return t.id===trId});
      if (!tr) return;
      if (confirm("遷移を削除しますか?\n"+tr.name)){
        if (typeof urCapture === "function") urCapture("遷移削除", true);
        currentDraft.transitions = currentDraft.transitions.filter(function(t){return t.id!==trId});
        saveDraft(wfId, currentDraft);
        if (typeof toast === "function") toast("遷移削除");
        if (typeof renderWorkflowCanvas === "function") renderWorkflowCanvas();
      }
    });
  }

  // Node interactions
  nodesGroup.querySelectorAll("[data-status]").forEach(function(el){
    var sid = el.dataset.status;
    el.style.cursor = isDraft ? "move" : "grab";

    // Mousedown on body = drag, on port = edge create
    el.addEventListener("mousedown", function(e){
      e.stopPropagation();
      WFV._wasDragged = false;
      // Click on × delete button
      var delEl = e.target.closest && e.target.closest(".wfv-node-del");
      if (delEl && isDraft){
        e.preventDefault();
        wfvHandleNodeAction("delete", sid, wfId, draft);
        return;
      }
      // Port = edge create (only in draft mode)
      if (e.target.classList && e.target.classList.contains("wfv-port-out") && isDraft){
        WFV.drawingEdge = {from: sid};
        return;
      }
      // Node body = drag
      var rect = stage.getBoundingClientRect();
      var sx = (e.clientX - rect.left + stage.scrollLeft - WFV.panX) / WFV.zoom;
      var sy = (e.clientY - rect.top + stage.scrollTop - WFV.panY) / WFV.zoom;
      var pos = WFV.positions[wf.id][sid];
      WFV.draggingNode = sid;
      WFV._dragOffset = {x: sx - pos.x, y: sy - pos.y};
    });

    if (isDraft){
      // Double click = rename / edit
      el.addEventListener("dblclick", function(e){
        e.stopPropagation();
        wfvEditStatus(sid, wfId, draft);
      });
      // Right click = context menu
      el.addEventListener("contextmenu", function(e){
        e.preventDefault();
        e.stopPropagation();
        wfvShowNodeMenu(sid, wfId, draft, e.clientX, e.clientY);
      });
    }
  });

  function applyTransform(s){
    s.style.transform = "translate("+WFV.panX+"px,"+WFV.panY+"px) scale("+WFV.zoom+")";
  }
}

/* Bind toolbar buttons (extracted so we can call from empty-state too) */
function bindWfvToolbar(toolbar, container, wf, opts){
  opts = opts || {};
  var wfId = opts.wfId || wf.id;
  var isDraft = !!opts.isDraft;
  var draft = opts.draft;

  var ab = toolbar.querySelector("#wfvAuto");
  if (ab) ab.onclick = function(){
    WFV.positions[wf.id] = autoLayoutWorkflow(wf);
    saveVizState();
    if (typeof renderWorkflowCanvas === "function") renderWorkflowCanvas();
  };
  var zi = toolbar.querySelector("#wfvZoomIn");
  if (zi) zi.onclick = function(){
    WFV.zoom = Math.min(2, WFV.zoom*1.2);
    var s = document.getElementById("wfvSvg");
    if (s) s.style.transform = "translate("+WFV.panX+"px,"+WFV.panY+"px) scale("+WFV.zoom+")";
  };
  var zo = toolbar.querySelector("#wfvZoomOut");
  if (zo) zo.onclick = function(){
    WFV.zoom = Math.max(0.4, WFV.zoom/1.2);
    var s = document.getElementById("wfvSvg");
    if (s) s.style.transform = "translate("+WFV.panX+"px,"+WFV.panY+"px) scale("+WFV.zoom+")";
  };
  var rs = toolbar.querySelector("#wfvReset");
  if (rs) rs.onclick = function(){
    WFV.zoom = 1; WFV.panX = 0; WFV.panY = 0;
    var s = document.getElementById("wfvSvg");
    if (s) s.style.transform = "translate(0px,0px) scale(1)";
  };
  var addS = toolbar.querySelector("#wfvAddStatus");
  if (addS && isDraft) addS.onclick = function(){
    if (typeof wfAddStatusDlg === "function") wfAddStatusDlg(wfId);
  };
}

/* Edit status dialog (rename) */
function wfvEditStatus(statusId, wfId, draft){
  var st = TS.statuses.find(function(s){return s.id===statusId});
  if (!st) return;
  var newName = prompt("ステータス名を変更", st.name);
  if (newName && newName.trim() && newName !== st.name){
    if (typeof urCapture === "function") urCapture("ステータス名変更", true);
    st.name = newName.trim();
    saveTS();
    if (typeof toast === "function") toast("✓ "+st.name);
    if (typeof renderWorkflowCanvas === "function") renderWorkflowCanvas();
  }
}

/* Right-click node menu */
function wfvShowNodeMenu(statusId, wfId, draft, clientX, clientY){
  // Remove existing menu
  var old = document.getElementById("wfvNodeMenu");
  if (old) old.remove();

  var menu = document.createElement("div");
  menu.id = "wfvNodeMenu";
  menu.style.cssText = "position:fixed;left:"+clientX+"px;top:"+clientY+"px;background:var(--b1);border:1px solid var(--bd);border-radius:6px;padding:4px;box-shadow:0 8px 24px rgba(9,30,66,.25);z-index:5000;font-size:13px;min-width:180px";

  var items = [
    {label:"✎ 名前を変更",  act:"rename"},
    {label:"⚑ 初期Statusに設定", act:"setInitial"},
    {label:"🎨 色を変更", act:"color"},
    {label:"───", act:null},
    {label:"🗑 削除", act:"delete", danger:true}
  ];
  items.forEach(function(it){
    if (it.act === null){
      var sep = document.createElement("div");
      sep.style.cssText = "border-top:1px solid var(--bd);margin:4px 0";
      menu.appendChild(sep);
      return;
    }
    var btn = document.createElement("button");
    btn.style.cssText = "display:block;width:100%;padding:6px 12px;background:none;border:none;text-align:left;font-size:13px;color:"+(it.danger?"var(--dn)":"var(--t1)")+";cursor:pointer;border-radius:3px;font-family:inherit";
    btn.textContent = it.label;
    btn.onmouseover = function(){btn.style.background = "var(--b3)"};
    btn.onmouseout = function(){btn.style.background = "none"};
    btn.onclick = function(){
      menu.remove();
      wfvHandleNodeAction(it.act, statusId, wfId, draft);
    };
    menu.appendChild(btn);
  });
  document.body.appendChild(menu);

  // Close on click outside
  setTimeout(function(){
    var closer = function(ev){
      if (!menu.contains(ev.target)){menu.remove(); document.removeEventListener("mousedown", closer)}
    };
    document.addEventListener("mousedown", closer);
  }, 50);
}

function wfvHandleNodeAction(act, statusId, wfId, draft){
  var st = TS.statuses.find(function(s){return s.id===statusId});
  if (!st) return;
  if (act === "rename"){
    wfvEditStatus(statusId, wfId, draft);
  } else if (act === "setInitial"){
    if (!draft){toast("Draftモードでのみ可能",1);return}
    if (typeof urCapture === "function") urCapture("初期Status変更", true);
    draft.initialStatus = statusId;
    saveDraft(wfId, draft);
    if (typeof toast === "function") toast("✓ 初期Status: "+st.name);
    if (typeof renderWorkflowCanvas === "function") renderWorkflowCanvas();
  } else if (act === "color"){
    var newColor = prompt("色 (HEX例: #1868db)", st.color || "#5e6c84");
    if (newColor && /^#[0-9a-fA-F]{6}$/.test(newColor)){
      if (typeof urCapture === "function") urCapture("Status色変更", true);
      st.color = newColor;
      saveTS();
      if (typeof renderWorkflowCanvas === "function") renderWorkflowCanvas();
    }
  } else if (act === "delete"){
    if (!draft){toast("Draftモードでのみ可能",1);return}
    if (draft.statuses.length <= 1){toast("最低1つのStatus必要",1);return}
    if (draft.initialStatus === statusId){toast("初期Statusは削除不可。先に別のステータスを初期に設定してください",1);return}
    if (confirm("Statusをこのワークフローから削除しますか?\n"+st.name+"\n\n（マスタの定義は残ります）")){
      if (typeof urCapture === "function") urCapture("Status削除", true);
      draft.statuses = draft.statuses.filter(function(s){return s!==statusId});
      // Remove transitions touching this status
      draft.transitions = (draft.transitions||[]).filter(function(tr){
        return tr.to !== statusId && (!tr.from || tr.from.indexOf(statusId) < 0);
      });
      saveDraft(wfId, draft);
      if (typeof toast === "function") toast("削除");
      if (typeof renderWorkflowCanvas === "function") renderWorkflowCanvas();
    }
  }
}

/* Update only edges touching a node during drag (efficient) */
/* Lightweight: just update path d= attributes for edges connected to dragging node.
   Avoids DOM replacement which can cause flicker/race conditions during drag. */
function wfvUpdateConnectedEdgesLight(statusId){
  var wfId = WFV.currentWfId;
  if (!wfId) return;
  var positions = WFV.positions[wfId];
  if (!positions) return;
  var svg = document.getElementById("wfvSvg");
  if (!svg) return;
  var edgesGroup = svg.querySelector(".wfv-edges");
  if (!edgesGroup) return;
  // For each path with data-tr-id, recompute d if its endpoints are affected
  edgesGroup.querySelectorAll("[data-tr-id]").forEach(function(hitPath){
    var trId = hitPath.dataset.trId;
    var fromId = hitPath.dataset.from;
    var toId = hitPath.dataset.to;
    if (!fromId || !toId) return;
    if (fromId !== statusId && toId !== statusId) return;
    var fp = positions[fromId];
    var tp = positions[toId];
    if (!fp || !tp) return;
    var x1 = fp.x + 140, y1 = fp.y + 28;
    var x2 = tp.x, y2 = tp.y + 28;
    // Match drawEdge bezier
    var midX = (x1+x2)/2;
    var d = "M "+x1+","+y1+" C "+midX+","+y1+" "+midX+","+y2+" "+x2+","+y2;
    hitPath.setAttribute("d", d);
    // Find sibling visible path (same trId or directly after hit path) and update too
    var visible = hitPath.nextElementSibling;
    while (visible && visible.tagName !== "path"){visible = visible.nextElementSibling}
    if (visible && visible.tagName === "path") visible.setAttribute("d", d);
  });
}

function wfvUpdateConnectedEdges(statusId){
  var wfId = WFV.currentWfId;
  if (!wfId) return;
  var wf = TS.workflowDrafts[wfId] || (TS.workflows||[]).find(function(w){return w.id===wfId});
  if (!wf) return;
  var positions = WFV.positions[wfId];
  if (!positions) return;
  // Rebuild edges layer (simpler than tracking individual edges)
  var svg = document.getElementById("wfvSvg");
  if (!svg) return;
  var oldEdges = svg.querySelector(".wfv-edges");
  if (!oldEdges) return;
  var newEdges = document.createElementNS("http://www.w3.org/2000/svg","g");
  newEdges.setAttribute("class","wfv-edges");
  var edgeMap = {};
  (wf.transitions||[]).forEach(function(tr){
    (tr.from||["*"]).forEach(function(from){
      var k = from + "→" + tr.to;
      if (!edgeMap[k]) edgeMap[k] = [];
      edgeMap[k].push(tr);
    });
  });
  Object.keys(edgeMap).forEach(function(k){
    var parts = k.split("→");
    var transList = edgeMap[k];
    transList.forEach(function(tr, i){
      drawEdge(newEdges, wf, parts[0], parts[1], tr, i, transList.length, positions);
    });
  });
  (wf.transitions||[]).forEach(function(tr){
    if (!tr.from||!tr.from.length||tr.from.indexOf("*")>=0) drawGlobalEdge(newEdges, wf, tr, positions);
  });
  oldEdges.parentNode.replaceChild(newEdges, oldEdges);
}

function updateNodeAndEdges(wf, statusId){
  // Re-position the dragged node
  var nodeEl = document.querySelector('[data-status="'+statusId+'"]');
  if (!nodeEl) return;
  var pos = WFV.positions[wf.id][statusId];
  nodeEl.setAttribute("transform", "translate("+pos.x+","+pos.y+")");
  // Re-draw edges that touch this node
  var svg = document.getElementById("wfvSvg");
  if (!svg) return;
  // Just rebuild edges layer
  var oldEdges = svg.querySelector(".wfv-edges");
  if (oldEdges){
    var positions = {};
    wf.statuses.forEach(function(s){positions[s] = WFV.positions[wf.id][s]});
    var newEdges = document.createElementNS("http://www.w3.org/2000/svg","g");
    newEdges.setAttribute("class","wfv-edges");
    var edgeMap = {};
    (wf.transitions||[]).forEach(function(tr){
      (tr.from||["*"]).forEach(function(from){
        var k = from + "→" + tr.to;
        if (!edgeMap[k]) edgeMap[k] = [];
        edgeMap[k].push(tr);
      });
    });
    Object.keys(edgeMap).forEach(function(k){
      var parts = k.split("→");
      var transList = edgeMap[k];
      transList.forEach(function(tr, i){drawEdge(newEdges, wf, parts[0], parts[1], tr, i, transList.length, positions)});
    });
    (wf.transitions||[]).forEach(function(tr){
      if (!tr.from||!tr.from.length||tr.from.indexOf("*")>=0) drawGlobalEdge(newEdges, wf, tr, positions);
    });
    oldEdges.parentNode.replaceChild(newEdges, oldEdges);
  }
}

/* ===== Draw a transition edge ===== */
function drawEdge(group, wf, fromId, toId, tr, idx, total, positions){
  var fromPos = positions[fromId];
  var toPos = positions[toId];
  if (!fromPos || !toPos) return;
  var W = 140, H = 56;

  // Self-loop?
  if (fromId === toId){
    drawSelfLoop(group, fromPos, tr, W, H);
    return;
  }

  // Compute connection points (border centers)
  var fromCx = fromPos.x + W/2, fromCy = fromPos.y + H/2;
  var toCx = toPos.x + W/2, toCy = toPos.y + H/2;
  var dx = toCx - fromCx, dy = toCy - fromCy;
  var dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 1) return;

  // Border intersection points (assume rectangular)
  function borderPoint(cx, cy, dirX, dirY){
    var halfW = W/2, halfH = H/2;
    var tX = halfW / Math.abs(dirX || 0.0001);
    var tY = halfH / Math.abs(dirY || 0.0001);
    var t = Math.min(tX, tY);
    return {x: cx + dirX * t, y: cy + dirY * t};
  }
  var dirX = dx/dist, dirY = dy/dist;
  var p1 = borderPoint(fromCx, fromCy, dirX, dirY);
  var p2 = borderPoint(toCx, toCy, -dirX, -dirY);

  // Curve offset for parallel transitions
  var offset = 0;
  if (total > 1){
    offset = (idx - (total-1)/2) * 30;
  }
  var midX = (p1.x + p2.x)/2 + (-dirY) * offset;
  var midY = (p1.y + p2.y)/2 + (dirX) * offset;

  // Curved path
  var pathD = "M "+p1.x+","+p1.y+" Q "+midX+","+midY+" "+p2.x+","+p2.y;

  // Hit area (wider invisible path for tooltip/hover/click)
  var hit = document.createElementNS("http://www.w3.org/2000/svg","path");
  hit.setAttribute("d", pathD);
  hit.setAttribute("stroke", "transparent");
  hit.setAttribute("stroke-width", 18);
  hit.setAttribute("fill", "none");
  hit.style.cursor = WFV.isDraft ? "pointer" : "default";
  var tipHtml = '<b>'+escHtml(tr.name)+'</b><br>';
  if ((tr.conditions||[]).length) tipHtml += '<div style="color:#9fadbc;font-size:10px;margin-top:4px">📋 条件: '+tr.conditions.length+'</div>';
  if ((tr.validators||[]).length) tipHtml += '<div style="color:#9fadbc;font-size:10px">✓ 検証: '+tr.validators.length+'</div>';
  if ((tr.postFunctions||[]).length) tipHtml += '<div style="color:#9fadbc;font-size:10px">⚡ ポスト関数: '+tr.postFunctions.length+'</div>';
  hit.setAttribute("data-tip", tipHtml);
  if (tr && tr.id) hit.setAttribute("data-tr-id", tr.id);
  if (fromId) hit.setAttribute("data-from", fromId);
  if (toId) hit.setAttribute("data-to", toId);
  group.appendChild(hit);

  // Visible path
  var path = document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d", pathD);
  path.setAttribute("stroke", "#5e6c84");
  path.setAttribute("stroke-width", 1.6);
  path.setAttribute("fill", "none");
  path.setAttribute("marker-end", "url(#wfvArrow)");
  path.style.pointerEvents = "none";
  group.appendChild(path);

  // Transition name label
  var labelG = document.createElementNS("http://www.w3.org/2000/svg","g");
  labelG.style.pointerEvents = "none";
  // Background rect for legibility
  var labelBg = document.createElementNS("http://www.w3.org/2000/svg","rect");
  var lblText = tr.name.length > 18 ? tr.name.substring(0,16)+"…" : tr.name;
  var charW = 6.5;
  var bgW = lblText.length * charW + 16;
  labelBg.setAttribute("x", midX - bgW/2);
  labelBg.setAttribute("y", midY - 9);
  labelBg.setAttribute("width", bgW);
  labelBg.setAttribute("height", 18);
  labelBg.setAttribute("rx", 9);
  labelBg.setAttribute("fill", "#fff");
  labelBg.setAttribute("stroke", "#dfe1e6");
  labelBg.setAttribute("stroke-width", 1);
  labelG.appendChild(labelBg);
  // Icons for conditions/validators (small dots)
  var iconsX = midX - bgW/2 + 6;
  var labelOffset = 0;
  if ((tr.conditions||[]).length){
    var c = document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx", iconsX); c.setAttribute("cy", midY); c.setAttribute("r", 3);
    c.setAttribute("fill", "#5e4db2"); labelG.appendChild(c);
    iconsX += 8; labelOffset += 8;
  }
  if ((tr.validators||[]).length){
    var c = document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx", iconsX); c.setAttribute("cy", midY); c.setAttribute("r", 3);
    c.setAttribute("fill", "#a54800"); labelG.appendChild(c);
    iconsX += 8; labelOffset += 8;
  }
  if ((tr.postFunctions||[]).length){
    var c = document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx", iconsX); c.setAttribute("cy", midY); c.setAttribute("r", 3);
    c.setAttribute("fill", "#216e4e"); labelG.appendChild(c);
    labelOffset += 8;
  }
  var label = document.createElementNS("http://www.w3.org/2000/svg","text");
  label.setAttribute("x", midX + labelOffset/2);
  label.setAttribute("y", midY + 4);
  label.setAttribute("text-anchor", "middle");
  label.setAttribute("fill", "#172b4d");
  label.setAttribute("font-size", "11");
  label.setAttribute("font-weight", "500");
  label.setAttribute("font-family", "-apple-system,sans-serif");
  label.textContent = lblText;
  labelG.appendChild(label);
  group.appendChild(labelG);
}

function drawSelfLoop(group, pos, tr, W, H){
  var cx = pos.x + W/2, cy = pos.y;
  var pathD = "M "+(pos.x+W*0.7)+","+pos.y+" C "+(pos.x+W+30)+","+(pos.y-40)+" "+(pos.x+W+30)+","+(pos.y+H+10)+" "+(pos.x+W*0.7)+","+(pos.y+H);
  var path = document.createElementNS("http://www.w3.org/2000/svg","path");
  path.setAttribute("d", pathD);
  path.setAttribute("stroke", "#5e6c84");
  path.setAttribute("stroke-width", 1.6);
  path.setAttribute("fill", "none");
  path.setAttribute("marker-end", "url(#wfvArrow)");
  group.appendChild(path);
  var label = document.createElementNS("http://www.w3.org/2000/svg","text");
  label.setAttribute("x", pos.x + W + 36);
  label.setAttribute("y", pos.y + H/2 + 4);
  label.setAttribute("fill", "#172b4d");
  label.setAttribute("font-size", "11");
  label.setAttribute("font-family", "sans-serif");
  label.textContent = tr.name;
  group.appendChild(label);
}

function drawGlobalEdge(group, wf, tr, positions){
  // Show as a floating "Any" badge with arrow into the to-node
  var toPos = positions[tr.to];
  if (!toPos) return;
  var W = 140, H = 56;
  // Place label above target
  var labelX = toPos.x + W/2;
  var labelY = toPos.y - 30;
  var bg = document.createElementNS("http://www.w3.org/2000/svg","rect");
  bg.setAttribute("x", labelX - 50);
  bg.setAttribute("y", labelY - 10);
  bg.setAttribute("width", 100);
  bg.setAttribute("height", 18);
  bg.setAttribute("rx", 9);
  bg.setAttribute("fill", "#f3f0ff");
  bg.setAttribute("stroke", "#5e4db2");
  bg.setAttribute("stroke-dasharray", "3,2");
  bg.setAttribute("stroke-width", 1);
  group.appendChild(bg);
  var t = document.createElementNS("http://www.w3.org/2000/svg","text");
  t.setAttribute("x", labelX); t.setAttribute("y", labelY + 4);
  t.setAttribute("text-anchor","middle"); t.setAttribute("fill","#5e4db2");
  t.setAttribute("font-size","10"); t.setAttribute("font-weight","600");
  t.setAttribute("font-family","sans-serif");
  var lbl = "★ " + (tr.name.length>10 ? tr.name.substring(0,8)+"…" : tr.name);
  t.textContent = lbl;
  group.appendChild(t);
  // Dashed line to target
  var line = document.createElementNS("http://www.w3.org/2000/svg","path");
  line.setAttribute("d", "M "+labelX+","+(labelY+9)+" L "+labelX+","+toPos.y);
  line.setAttribute("stroke", "#5e4db2");
  line.setAttribute("stroke-width", 1.2);
  line.setAttribute("stroke-dasharray", "3,2");
  line.setAttribute("fill", "none");
  line.setAttribute("marker-end", "url(#wfvArrow)");
  group.appendChild(line);
}

// ===== Ticket export to YAML =====
function exportTicketsYaml(tickets){
  var data = {tickets: tickets.map(function(t){
    var o = {
      key: t.key, title: t.title, type: t.type, status: t.status,
      priority: t.priority, assignee: t.assignee||"", reporter: t.reporter||"",
      labels: t.labels||[], dueDate: t.dueDate||null,
      storyPoint: t.storyPoint||null, sprintId: t.sprintId||null,
      parentKey: t.parentKey||null, ganttTaskId: t.ganttTaskId||null,
      description: t.description||"",
      links: (t.links||[]).map(function(l){return {type:l.type, target:l.target}}),
      comments: (t.comments||[]).map(function(c){return {user:c.user, ts:c.ts, body:c.body}}),
      createdAt: t.createdAt, updatedAt: t.updatedAt
    };
    return o;
  })};
  return yS(data);
}

// ===== Ticket import from YAML =====
function importTicketsYaml(yamlText){
  try {
    var parsed = yP(yamlText);
    if (!parsed || !parsed.tickets || !Array.isArray(parsed.tickets)){
      return {ok:false, msg:"YAML に 'tickets:' 配列が必要です"};
    }
    var added = 0, updated = 0;
    parsed.tickets.forEach(function(yt){
      if (!yt.title) return;
      var existing = TS.tickets.find(function(x){return x.key===yt.key});
      var t = {
        key: yt.key || newTicketKey(),
        title: yt.title,
        description: yt.description || "",
        type: yt.type || "task",
        status: yt.status || "todo",
        priority: yt.priority || "medium",
        assignee: yt.assignee || "",
        reporter: yt.reporter || (TS.currentUser?TS.currentUser.id:""),
        labels: Array.isArray(yt.labels) ? yt.labels : [],
        dueDate: yt.dueDate || null,
        storyPoint: yt.storyPoint || null,
        sprintId: yt.sprintId || null,
        parentKey: yt.parentKey || null,
        ganttTaskId: yt.ganttTaskId || null,
        links: Array.isArray(yt.links) ? yt.links : [],
        comments: Array.isArray(yt.comments) ? yt.comments.map(function(c){return {id:"c"+Date.now()+Math.random().toString(36).substr(2,4), user:c.user||"system", ts:c.ts||new Date().toISOString(), body:c.body||""}}) : [],
        attachments: [],
        customFields: yt.customFields || {},
        gitRefs: yt.gitRefs || [],
        createdAt: yt.createdAt || new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };
      if (existing){
        var idx = TS.tickets.findIndex(function(x){return x.key===yt.key});
        TS.tickets[idx] = t;
        updated++;
        audit("update","ticket",t.key,"yaml import");
      } else {
        TS.tickets.push(t);
        // Update sequence number if key is TK-N
        var m = (yt.key||"").match(/^TK-(\d+)$/);
        if (m){var n = parseInt(m[1]); if (n >= TS.ticketSeq) TS.ticketSeq = n+1}
        added++;
        audit("create","ticket",t.key,"yaml import");
      }
    });
    saveTS();
    return {ok:true, added:added, updated:updated};
  } catch(e){
    return {ok:false, msg:"YAMLパースエラー: "+e.message};
  }
}

// ===== Tickets CSV export (richer than the built-in) =====
function exportTicketsCsvFull(){
  var hdr = ["key","title","type","status","priority","assignee","reporter","parentKey","ganttTaskId","sprintId","storyPoint","dueDate","labels","createdAt","updatedAt","description","links"];
  var rows = TS.tickets.map(function(t){
    return hdr.map(function(h){
      var v;
      if (h === "labels") v = (t.labels||[]).join(";");
      else if (h === "links") v = (t.links||[]).map(function(l){return l.type+":"+l.target}).join(";");
      else v = t[h];
      v = (v == null) ? "" : String(v);
      // Escape: replace " with ""
      return '"' + v.replace(/"/g,'""').replace(/\r?\n/g, "\\n") + '"';
    }).join(",");
  });
  return hdr.join(",") + "\n" + rows.join("\n");
}

// ===== Tickets CSV import (richer) =====
function importTicketsCsvFull(csvText){
  try {
    var lines = csvText.split(/\r?\n/).filter(function(l){return l.trim()});
    if (!lines.length) return {ok:false, msg:"CSV が空です"};
    var hdr = parseCsvLine(lines[0]);
    var added = 0, updated = 0;
    for (var i = 1; i < lines.length; i++){
      var cells = parseCsvLine(lines[i]);
      var obj = {};
      hdr.forEach(function(h, j){obj[h] = cells[j] != null ? cells[j].replace(/\\n/g, "\n") : ""});
      if (!obj.title && !obj.key) continue;
      if (obj.labels) obj.labels = obj.labels.split(";").filter(Boolean);
      else obj.labels = [];
      if (obj.links){
        obj.links = obj.links.split(";").filter(Boolean).map(function(l){
          var p = l.split(":");
          return {type:p[0], target:p.slice(1).join(":")};
        });
      } else obj.links = [];
      if (obj.storyPoint) obj.storyPoint = parseInt(obj.storyPoint) || null;
      // Detect existing
      var existing = TS.tickets.find(function(x){return x.key===obj.key});
      if (existing){
        Object.assign(existing, obj);
        existing.updatedAt = new Date().toISOString();
        updated++;
      } else {
        var t = createTicket(obj);
        if (t){
          var m = (obj.key||"").match(/^TK-(\d+)$/);
          if (m){var n = parseInt(m[1]); if (n >= TS.ticketSeq) TS.ticketSeq = n+1; t.key = obj.key}
          added++;
        }
      }
    }
    saveTS();
    return {ok:true, added:added, updated:updated};
  } catch(e){
    return {ok:false, msg:"CSV パースエラー: "+e.message};
  }
}

// ===== Full state import from YAML =====
function importFullStateYaml(yamlText){
  try {
    var parsed = yP(yamlText);
    if (!parsed) return {ok:false, msg:"パース失敗"};
    function asArr(v){return Array.isArray(v) ? v : (v && typeof v === "object" && Object.keys(v).length===0 ? [] : (v||[]))}
    function asObj(v){return (v && typeof v === "object" && !Array.isArray(v)) ? v : {}}
    var counts = {};
    // Tickets
    if (parsed.tickets !== undefined){TS.tickets = asArr(parsed.tickets); counts.tickets = TS.tickets.length}
    if (parsed.sprints !== undefined){TS.sprints = asArr(parsed.sprints); counts.sprints = TS.sprints.length}
    // Workflows
    if (parsed.workflows !== undefined){TS.workflows = asArr(parsed.workflows); counts.workflows = TS.workflows.length}
    if (parsed.workflowSchemes !== undefined){TS.workflowSchemes = asArr(parsed.workflowSchemes)}
    if (parsed.workflowDrafts !== undefined){TS.workflowDrafts = asObj(parsed.workflowDrafts)}
    // Master data
    if (parsed.statuses !== undefined){TS.statuses = asArr(parsed.statuses); counts.statuses = TS.statuses.length}
    if (parsed.users !== undefined){TS.users = asArr(parsed.users); counts.users = TS.users.length}
    if (parsed.roles !== undefined){TS.roles = asArr(parsed.roles)}
    if (parsed.resolutions !== undefined){TS.resolutions = asArr(parsed.resolutions)}
    if (parsed.types !== undefined){TS.types = asArr(parsed.types)}
    if (parsed.priorities !== undefined){TS.priorities = asArr(parsed.priorities)}
    // Templates / History / Logs
    if (parsed.templates !== undefined){TS.templates = asArr(parsed.templates); counts.templates = TS.templates.length}
    if (parsed.ticketHistory !== undefined){TS.ticketHistory = asObj(parsed.ticketHistory); counts.history = Object.keys(TS.ticketHistory).length}
    if (parsed.auditLog !== undefined){TS.auditLog = asArr(parsed.auditLog); counts.auditLog = TS.auditLog.length}
    if (parsed.notifications !== undefined){TS.notifications = asArr(parsed.notifications)}
    // Settings
    if (parsed.alertConfig){TS.alertConfig = asObj(parsed.alertConfig)}
    if (parsed.autoCompleteParent){TS.autoCompleteParent = parsed.autoCompleteParent}
    if (parsed.customFields !== undefined){TS.customFields = asArr(parsed.customFields)}
    if (parsed.ticketSeq){TS.ticketSeq = parsed.ticketSeq}
    if (parsed.currentUser){TS.currentUser = parsed.currentUser}
    if (parsed.autoLink !== undefined) TS.autoLink = parsed.autoLink;
    if (parsed.autoCreateTicket !== undefined) TS.autoCreateTicket = parsed.autoCreateTicket;
    if (parsed.gitProvider) TS.gitProvider = parsed.gitProvider;
    if (parsed.gitRepo) TS.gitRepo = parsed.gitRepo;
    // Gantt project & tasks
    if (parsed.project && typeof S !== "undefined"){
      if (!S.data) S.data = {};
      S.data.project = parsed.project;
      if (parsed.ganttTasks) S.data.tasks = asArr(parsed.ganttTasks);
      if (parsed.customHolidays) S.data.project.custom_holidays = asArr(parsed.customHolidays);
      if (S.data.tasks && typeof flatAll === "function") S.flat = flatAll(S.data.tasks);
      if (typeof yS === "function" && document.getElementById("ye")){
        document.getElementById("ye").value = yS(S.data);
      }
      counts.ganttTasks = (S.flat||[]).length;
    }
    audit("import","fullstate","-",JSON.stringify(counts));
    saveTS();
    return {ok:true, counts:counts};
  } catch(e){
    return {ok:false, msg:"YAML パースエラー: "+e.message};
  }
}

// Forward sync: Gantt task changes -> Ticket fields
function syncGanttToTickets(){
  if (typeof S === "undefined" || !S.flat) return;
  if (typeof TS === "undefined" || !TS || !TS.tickets) return;
  var dirty = false;
  // For each linked ticket, update from gantt task
  TS.tickets.forEach(function(tk){
    if (!tk.ganttTaskId) return;
    var g = S.flat.find(function(x){return x.id===tk.ganttTaskId});
    if (!g){
      // Gantt task was deleted - unlink
      tk.ganttTaskId = null;
      audit("update","ticket",tk.key,"gantt unlinked (task removed)");
      dirty = true;
      return;
    }
    // Sync title (only if ticket title was auto-generated from gantt)
    if (tk._ganttSync){
      if (tk.title !== g.name){tk.title = g.name; dirty = true}
    }
    // Sync due date (gantt end date -> ticket due date)
    if (g.ed && tk.dueDate !== g.ed){tk.dueDate = g.ed; dirty = true}
    // Sync assignee
    if (g.assignee && !tk.assignee){tk.assignee = g.assignee; dirty = true}
    // Sync progress -> status (heuristic)
    if (g.progress != null){
      var newSt = tk.status;
      if (g.progress >= 100 && tk.status !== "done") newSt = "done";
      else if (g.progress > 0 && (tk.status === "todo" || !tk.status)) newSt = "inprogress";
      if (newSt !== tk.status){tk.status = newSt; dirty = true}
    }
  });
  // Auto-create tickets for Gantt small-tasks without a linked ticket (optional)
  // This is opt-in via TS.autoCreateTicket flag
  if (TS.autoCreateTicket){
    S.flat.forEach(function(g){
      if (g.hasC) return; // skip group items
      var existing = TS.tickets.find(function(x){return x.ganttTaskId===g.id});
      if (existing) return;
      var key = newTicketKey();
      TS.tickets.push({
        key: key, title: g.name, description: "", type: "task",
        status: g.progress>=100?"done":(g.progress>0?"inprogress":"todo"),
        priority: "medium",
        assignee: g.assignee || "",
        reporter: TS.currentUser ? TS.currentUser.id : "",
        labels: [], dueDate: g.ed||null,
        createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
        storyPoint: g.dur || null, sprintId: null, parentKey: null,
        links: [], comments: [], attachments: [], customFields: {},
        ganttTaskId: g.id, gitRefs: [], _ganttSync: true
      });
      audit("create","ticket",key,"auto from gantt: "+g.name);
      dirty = true;
    });
  }
  if (dirty) saveTS();
}

// Backward sync: Ticket changes -> Gantt task fields
function syncTicketToGantt(ticketKey){
  if (typeof S === "undefined" || !S.flat || !S.data) return;
  if (typeof TS === "undefined" || !TS || !TS.tickets) return;
  var tk = TS.tickets.find(function(x){return x.key===ticketKey});
  if (!tk || !tk.ganttTaskId) return;
  var g = S.flat.find(function(x){return x.id===tk.ganttTaskId});
  if (!g) return;
  var changed = false;
  // Sync due date back to gantt end_date
  if (tk.dueDate && g.ed !== tk.dueDate){
    g.ed = tk.dueDate;
    if (g._r) g._r.end_date = tk.dueDate;
    if (g.sd && !g.hasC){g.dur = cW(g.sd, tk.dueDate, S.cH); if(g._r)g._r.duration=g.dur}
    changed = true;
  }
  // Sync assignee
  if (tk.assignee && g.assignee !== tk.assignee){
    g.assignee = tk.assignee;
    if (g._r) g._r.assignee = tk.assignee;
    changed = true;
  }
  // Sync status -> progress
  if (tk.status === "done" && g.progress < 100){
    g.progress = 100;
    if (g._r) g._r.progress = 100;
    changed = true;
  } else if (tk.status === "todo" && g.progress > 0){
    g.progress = 0;
    if (g._r) g._r.progress = 0;
    changed = true;
  } else if (tk.status === "inprogress" && (g.progress === 0 || g.progress === 100)){
    g.progress = 50;
    if (g._r) g._r.progress = 50;
    changed = true;
  }
  if (changed){
    resG(S.flat);
    if (typeof render === "function" && TS.currentView==="gantt") render();
    // Re-serialize YAML
    var ys = yS(S.data);
    document.getElementById("ye").value = ys;
  }
}

// Hook updateTicket to also sync Gantt
var _origUpdateTicket = updateTicket;
updateTicket = function(key, patch){
  var ok = _origUpdateTicket(key, patch);
  if (ok) syncTicketToGantt(key);
  return ok;
};

// Hook deleteTicket: do not delete Gantt task (Gantt is master), just unlink
// (Already handled by deleteTicket - no need to touch Gantt)

function initTS(){
  // Initialize multi-project FIRST (before any saveTS calls happen)
  // This loads PRJ.projects from gantt_projects_v1 OR migrates from legacy ganttTicketState
  // and restores active project's data into TS
  var projectsLoaded = false;
  if (typeof prjInit === "function"){
    prjInit();
    projectsLoaded = PRJ.projects.length > 0;
  }

  // If no projects (very first run), bootstrap with defaults
  if (!projectsLoaded){
    if (!loadTS()){
      TS.roles = DEFAULT_ROLES.slice();
      TS.statuses = DEFAULT_STATUSES.slice();
      TS.priorities = DEFAULT_PRIORITIES.slice();
      TS.types = DEFAULT_TYPES.slice();
      TS.users.push({id:"admin",name:"管理者",roleId:"admin"});
      TS.currentUser = TS.users[0];
      createTicket({title:"サンプルチケット", description:"これはサンプルです", priority:"medium", status:"todo", type:"task"});
    }

function ensureTemplates(){
  if (!TS.templates) TS.templates = [];
  // Only seed defaults on truly first load (when the flag is not set yet)
  if (TS.templates.length === 0 && !TS.templatesInitialized){
    TS.templates = JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
    TS.templatesInitialized = true;
    saveTS();
  } else if (TS.templates.length > 0){
    // Already have data - mark as initialized
    TS.templatesInitialized = true;
  }

/* ===== Apply template: create parent + subtasks + dependency links ===== */
function applyTemplate(templateId, fieldValues, options){
  options = options || {};
  var tpl = TS.templates.find(function(x){return x.id===templateId});
  if (!tpl) return {ok:false, msg:"テンプレートが見つかりません"};

  // Substitute {{field_key}} in title/desc
  function substitute(str){
    if (!str) return str;
    return String(str).replace(/\{\{(\w+)\}\}/g, function(m, k){
      return (fieldValues && fieldValues[k]!=null) ? fieldValues[k] : m;
    });
  }

  // 1. Create parent
  var parentTitle = substitute(tpl.parentTitle || tpl.name);
  var parent = createTicket({
    title: parentTitle,
    description: tpl.description || "",
    type: tpl.parentType || "task",
    priority: tpl.parentPriority || "medium",
    labels: (tpl.parentLabels || []).slice(),
    status: "todo",
    assignee: options.parentAssignee || ""
  });
  if (!parent) return {ok:false, msg:"親チケット作成失敗"};
  // Record template lineage on parent
  parent.templateId = tpl.id;
  parent.templateRole = "parent";
  parent.templateSnapshot = {
    nodes: JSON.parse(JSON.stringify(tpl.nodes||[])),
    edges: JSON.parse(JSON.stringify(tpl.edges||[])),
    name: tpl.name,
    icon: tpl.icon,
    color: tpl.color
  };
  audit("apply_template","ticket",parent.key,"template:"+tpl.name);

  // 2. Create subtasks - keep mapping nodeId -> ticket key
  var nodeToKey = {};
  var startDate = options.startDate ? new Date(options.startDate) : new Date();

  // Compute level (rank) for each node so we can assign due dates by level
  var levels = computeLevels(tpl.nodes, tpl.edges);

  tpl.nodes.forEach(function(n){
    var lvl = levels[n.id] || 0;
    // Each level adds duration of all parents -> approximate by lvl*durationDays
    var due = new Date(startDate);
    due.setDate(due.getDate() + (lvl + (n.durationDays||1)));
    var dueStr = due.toISOString().substr(0,10);

    var sub = createTicket({
      title: substitute(n.title),
      description: substitute(n.desc || ""),
      type: n.type || "task",
      priority: n.priority || tpl.parentPriority || "medium",
      labels: (n.labels || tpl.parentLabels || []).slice(),
      status: "todo",
      assignee: (options.roleAssignees && n.role && options.roleAssignees[n.role]) || "",
      parentKey: parent.key,
      dueDate: dueStr,
      storyPoint: n.durationDays || null
    });
    // Record template lineage on subtask
    sub.templateId = tpl.id;
    sub.templateRole = "subtask";
    sub.templateNodeId = n.id;
    nodeToKey[n.id] = sub.key;
    // Auto subtask link from parent
    parent.links = parent.links || [];
    parent.links.push({type:"subtask", target:sub.key});
  });

  // 3. Create dependency links via blocks/blocked_by
  (tpl.edges || []).forEach(function(e){
    var fromKey = nodeToKey[e.from];
    var toKey = nodeToKey[e.to];
    if (!fromKey || !toKey) return;
    var fromTk = TS.tickets.find(function(x){return x.key===fromKey});
    if (fromTk){
      fromTk.links = fromTk.links || [];
      fromTk.links.push({type:"blocks", target:toKey});
    }
  });

  saveTS();
  return {ok:true, parentKey:parent.key, subtaskKeys:Object.values(nodeToKey)};
}

function computeLevels(nodes, edges){
  var levels = {};
  var visited = {};
  // Start with nodes that have no incoming edge
  var incoming = {};
  nodes.forEach(function(n){incoming[n.id] = 0});
  (edges||[]).forEach(function(e){if(incoming[e.to]!=null)incoming[e.to]++});
  var queue = nodes.filter(function(n){return incoming[n.id]===0}).map(function(n){return {id:n.id, level:0}});
  queue.forEach(function(q){levels[q.id]=0;visited[q.id]=true});
  while (queue.length){
    var cur = queue.shift();
    (edges||[]).forEach(function(e){
      if (e.from === cur.id){
        var nl = cur.level + 1;
        if (levels[e.to] == null || levels[e.to] < nl){
          levels[e.to] = nl;
          if (!visited[e.to]){visited[e.to]=true; queue.push({id:e.to, level:nl})}
          else queue.push({id:e.to, level:nl}); // re-process
        }
      }
    });
  }
  // Any unvisited node gets level 0
  nodes.forEach(function(n){if(levels[n.id]==null)levels[n.id]=0});
  return levels;
}

  // Build form for fields
