zones:
  - id: dmz
    label: DMZ
    color: "rgba(231, 76, 60, 0.12)"
    x: 30
    y: 40
    width: 680
    height: 320
  - id: web
    label: Web Servers
    color: "rgba(52, 152, 219, 0.15)"
    parent: dmz
    x: 250
    y: 90
    width: 440
    height: 240
  - id: internal
    label: Internal LAN
    color: "rgba(46, 204, 113, 0.12)"
    x: 30
    y: 410
    width: 680
    height: 250
  - id: db-zone
    label: Database
    color: "rgba(241, 196, 15, 0.15)"
    parent: internal
    x: 360
    y: 460
    width: 330
    height: 170

nodes:
  - id: firewall
    label: Firewall
    color: "#e74c3c"
    zone: dmz
    x: 60
    y: 160
    width: 140
    height: 60
  - id: web01
    label: Web-01
    color: "#3498db"
    zone: web
    x: 280
    y: 130
    width: 130
    height: 55
  - id: web02
    label: Web-02
    color: "#2980b9"
    zone: web
    x: 440
    y: 130
    width: 130
    height: 55
  - id: lb
    label: Load Balancer
    color: "#9b59b6"
    zone: web
    x: 350
    y: 240
    width: 140
    height: 55
  - id: app-server
    label: App Server
    color: "#2ecc71"
    zone: internal
    x: 60
    y: 500
    width: 140
    height: 60
  - id: db-primary
    label: DB Primary
    color: "#f39c12"
    zone: db-zone
    x: 390
    y: 500
    width: 130
    height: 55
  - id: db-replica
    label: DB Replica
    color: "#e67e22"
    zone: db-zone
    x: 540
    y: 500
    width: 130
    height: 55

connections:
  - from: firewall
    to: lb
    protocol: HTTPS
    port: 443
    bidirectional: false
  - from: lb
    to: web01
    protocol: HTTP
    port: 80
    bidirectional: false
  - from: lb
    to: web02
    protocol: HTTP
    port: 80
    bidirectional: false
  - from: web01
    to: app-server
    protocol: HTTP
    port: 8080
    bidirectional: false
  - from: web02
    to: app-server
    protocol: HTTP
    port: 8080
    bidirectional: false
  - from: app-server
    to: db-primary
    protocol: TCP
    port: 5432
    bidirectional: false
  - from: db-primary
    to: db-replica
    protocol: TCP
    port: 5432
    bidirectional: false
  - from: firewall
    to: app-server
    protocol: SSH
    port: 22
    bidirectional: true
